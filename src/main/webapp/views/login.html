<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>로그인</title>
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f5f6fa; }
        .login-container { max-width: 400px; margin: 80px auto; padding: 30px; background: #fff; border-radius: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        h2 { text-align: center; margin-bottom: 20px; }
        input { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ccc; border-radius: 6px; }
        button { width: 100%; padding: 10px; background: #4a90e2; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; }
        button:hover { background: #357ab8; }
        .error { color: red; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>
<div class="login-container">
    <h2>로그인</h2>
    <form th:action="@{/login/process}" method="post">
        <input type="text" name="employeeId" placeholder="사원 아이디" required>
        <input type="password" name="password" placeholder="비밀번호" required>
        <button type="submit">로그인</button>
    </form>

    <div class="error" th:if="${errorMsg}" th:text="${errorMsg}"></div>
</div>
</body>
</html>
