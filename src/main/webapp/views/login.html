<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>로그인</title>
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f5f6fa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-container {
            background: #fff;
            width: 400px;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 30px;
            color: #333;
        }
        label {
            display: block;
            font-weight: 500;
            margin-bottom: 5px;
            color: #555;
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 12px;
            font-size: 14px;
            border: 1px solid #ccc;
            border-radius: 6px;
            margin-bottom: 20px;
            box-sizing: border-box;
        }
        .login-btn {
            width: 100%;
            padding: 12px;
            background-color: #4a90e2;
            color: #fff;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        .login-btn:hover {
            background-color: #357ab8;
        }
        .error-msg {
            color: red;
            font-size: 13px;
            margin-bottom: 10px;
            text-align: center;
        }
        .info-msg {
            color: #555;
            font-size: 13px;
            margin-bottom: 10px;
            text-align: center;
        }
        .join-link {
            text-align: center;
            margin-top: 15px;
            font-size: 13px;
        }
        .join-link a {
            color: #4a90e2;
            text-decoration: none;
        }
    </style>
</head>
<body>
<div class="login-container">
    <h1>넥스트 솔루션즈</h1>
    <form th:action="@{/login}" method="post">
        <label for="employeeId">아이디</label>
        <input type="text" id="employeeId" name="employeeId" placeholder="아이디" required/>

        <label for="password">비밀번호</label>
        <input type="password" id="password" name="password" placeholder="비밀번호" required/>

        <p class="error-msg" th:if="${errorMsg}" th:text="${errorMsg}"></p>
        <p class="info-msg" th:if="${infoMsg}" th:text="${infoMsg}"></p>

        <button type="submit" class="login-btn">로그인</button>
    </form>
    <div class="join-link">
        <p>아직 계정이 없으신가요? <a th:href="@{/join}">회원가입</a></p>
    </div>
</div>
</body>
</html>
