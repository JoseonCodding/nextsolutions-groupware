<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>사원 등록</title>
<style>
body {
	font-family: 'Noto Sans KR', sans-serif;
	justify-content: center;
	padding: 0px;
}

input, select {
	width: 95%;
	padding: 8px;
	border: 1px solid #ccc;
	border-radius: 4px;
}

input, select {
	padding: 8px;
	width: 100%;
	border: 1px solid #ccc;
	border-radius: 6px;
	box-sizing: border-box;
}


</style>
<!-- CSS 불러오기 -->
	<link rel="stylesheet" href="/css/commonStyle.css"> 
    <link rel="stylesheet" href="../css/common.css">
    <script src="/js/jquery-3.7.1.min.js"></script>
<script>
	
var idChk = false
$(function(){

$("#idChkBtn").click(function(){
	let employeeId = $("#employeeId").val()
	
	
	// 1) 사번: 정확히 숫자 8자리
    if (!/^\d{8}$/.test(employeeId)) {
        alert('사번은 숫자 8자리로 입력하세요.');
        $("#employeeId").employeeId.focus();
        idChk = false
        return;
    }
	
	
	$.ajax({
        url: "/employee/idChk",
        data: { employeeId: employeeId },
        success: function(data, status) {
            if(data){
				alert("중복된 아이디 이지롱")
				idChk  = false
            }else{
            	alert("사용가능 ID")
            	$("#employeeId").prop("readonly",true)
            	$("#idChkBtn").prop("disabled",true)
            	idChk  = true
				}
        	}
    	});
	})
})

var phoneChk  = false  
    $(function(){

    	$("#phoneChkBtn").click(function(){
			let phone = $("#phone").val()
			
			
			// 3) 휴대폰: 허용 형식 -> 01012345678
		    if (!/^010\d{8}$/.test(phone)) {
		        alert('휴대폰 번호는 01012345678 형식으로 입력하세요.');
		        $("#phone").phone.focus();
		        phoneChk = false
		        return;
		    }
			
			
			$.ajax({
                url: "/employee/phoneChk",
                data: { phone: phone },
                success: function(data, status) {
                    if(data){
						alert("중복된 폰번호 이지롱")
						phoneChk  = false
                    }else{
                    	alert("사용가능 폰번")
                    	$("#phone").prop("readonly",true)
                    	$("#phoneChkBtn").prop("disabled",true)
                    	phoneChk = true
					}
                }
            });
		})
	})
</script>
</head>
<body>
<div class="container">
    <h1 class="detail-title">사원 등록</h1>
    
    <form id="employeeForm" name="frm" action="/employee/register" method="post" enctype="multipart/form-data">
        
<table>
    <tr>
        <th>사번</th>
        <td><input type="text" name="employeeId" id="employeeId" required>
        
        
        <input type="button" value="중복확인" id="idChkBtn"/>
        </td>
        <th>비밀번호</th>
        <td><input type="password" name="password" required></td>
    </tr>
    <tr>
        <th>이름</th>
        <td><input type="text" name="empNm" required></td>
        <th>휴대폰 번호</th>
        <td><input type="text" name="phone" id="phone">
        
        
        <input type="button" value="중복확인" id="phoneChkBtn"/>
        </td>
    </tr>
    <tr>
        <th>생년월일</th>
        <td><input type="date" name="birth" required></td>
        <th>입사일</th>
        <td><input type="date" name="hireDate" required></td>
    </tr>
    <tr>
        <th>부서명</th>
        <td colspan="1">
            <select name="deptName">
                <option value="경영지원팀">경영지원팀</option>
                <option value="기획팀">기획팀</option>
                <option value="유통사업팀">유통사업팀</option>
                <option value="디자인팀">디자인팀</option>
                <option value="총무팀">총무팀</option>
                <option value="사원관리팀">사원관리팀</option>
                <option value="재무관리팀">재무관리팀</option>
            </select>
        </td>
        
        <th>직위</th>
                <td colspan="1">
            <select name="position">
                <option value="대표">대표</option>
                <option value="부장">부장</option>
                <option value="차장">차장</option>
                <option value="과장">과장</option>
                <option value="대리">대리</option>
                <option value="주임">주임</option>
                <option value="사원">사원</option>
            </select>
        </td>
        
        <td><!-- <input type="text" name="position" required> -->
        
        </td>
    </tr>
    <tr>
        <th>권한</th>
        <td colspan="3">
            <select name="role">
                <option value="대표">대표</option>
                <option value="프로젝트">프로젝트</option>
                <option value="근태">근태/연차</option>
                <option value="게시판">게시판</option>
                <option value="문서">문서관리</option>
                <option value="사원">사원관리</option>
                <option value="공지사항">공지사항</option>
                <option value="일정">일정관리</option>
                <option value="">일반</option> 
            </select>
        </td>
    </tr>
</table>
		<button type="button" class="back-btn" onclick="history.back()">뒤로가기</button>
        <button type="button" class="save-btn" onclick="validateAndSubmit()">등록</button>
    </form>
</div>



<script>

// 검증 및 제출 함수
function validateAndSubmit() {
    const f = document.getElementById('employeeForm');
    const pw = f.password.value.trim();
    const name = f.empNm.value.trim();
    const birth = f.birth.value;
    const hireDate = f.hireDate.value;
    
    
    if(!idChk){
        alert('아이디 쫌!!!!')
        return
    }
   
    //  비밀번호(필수): 아이디 체크 완료 후 무조건 검증
    //    최소 8자, 대문자/소문자/숫자/특수문자 각각 1개 이상
    if (!pw) {
        alert('비밀번호를 입력해주세요.');
        f.password.focus();
        return;
    }
    
    if (!/^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[~`!@#$%^&*()_\-+={}[\]|\\:;"'<>,.?/]).{8,}$/.test(pw)) {
       alert('비밀번호는 8자 이상이며 대문자/소문자/숫자/특수문자를 모두 포함해야 합니다.');
       f.password.focus();
       return;
    }
    
 	// 이름: 2글자 이상, 한글만
    if (!/^[가-힣]{2,}$/.test(name)) {
        alert("이름은 한글 2글자 이상 입력하세요.");
        f.empNm.focus();
        return;
    } 

    if(!phoneChk){
        alert('폰번 쫌!!!!')
        return
    } 
    
    // 날짜 필수 입력 검증
    if (!birth) {
        alert("생년월일을 입력해주세요.");
        f.birth.focus();
        return;
    }
    
    if (!hireDate) {
        alert("입사일을 입력해주세요.");
        f.hireDate.focus();
        return;
    }
    
	// 생년월일과 입사일 검증
    if (birth && hireDate) {
        const birthDate = new Date(birth);
        const hireDateObj = new Date(hireDate);
        const today = new Date();

        // 생년월일 미래 불가
        if (birthDate > today) {
            alert("생년월일은 오늘 이전 날짜여야 합니다.");
            f.birth.focus();
            return;
        }

        // 입사일은 생년월일보다 이후여야 함
        if (birthDate >= hireDateObj) {
            alert("입사일은 생년월일보다 이후여야 합니다.");
            f.hireDate.focus();
            return;
        }

        // 입사일 미래 불가
        if (hireDateObj > today) {
            alert("입사일은 오늘 이전 날짜여야 합니다.");
            f.hireDate.focus();
            return;
        }

        // 나이 계산 (입사일 기준)
        let ageAtHire = hireDateObj.getFullYear() - birthDate.getFullYear();
        const monthDiff = hireDateObj.getMonth() - birthDate.getMonth();
        if (monthDiff < 0 || (monthDiff === 0 && hireDateObj.getDate() < birthDate.getDate())) {
            ageAtHire--;
        }

        if (ageAtHire < 16) {
            alert("입사일 기준으로 만 16세 이상이어야 합니다.");
            f.birth.focus();
            return;
        }
    }


    // 모든 검증 통과 시 폼 제출
    f.submit();
}

// Enter 키 이벤트
document.getElementById('employeeForm').addEventListener('keydown', function(e) {
	if (e.key === 'Enter') {
		e.preventDefault();
		validateAndSubmit();
	}
});
</script>



</body>
</html>
