<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>사원 등록</title>
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f5f6fa;
            padding: 30px;
        }
        .container {
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            max-width: 800px;
            margin: auto;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        h2 {
            margin-bottom: 20px;
            font-size: 22px;
            font-weight: bold;
            color: #333;
        }
        table {
            width: 100%;
            border-spacing: 0;
        }
        table td {
            padding: 10px;
            vertical-align: middle;
        }
        input, select {
            padding: 8px;
            width: 100%;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
        }
        .save-btn {
            background: #4a90e2;
            color: #fff;
            padding: 10px 20px;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 20px;
            float: right;
        }
        .save-btn:hover {
            background: #357abd;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>사원 등록</h2>
    
    <form action="/employee/register" method="post" enctype="multipart/form-data">

        <table>
            <tr>
                <td>사번</td>
                <td><input type="text" name="employeeId" required></td>
                <td>비밀번호</td>
                <td><input type="password" name="password" required></td>
            </tr>
            <tr>
                <td>이름</td>
                <td><input type="text" name="empNm" required></td>
                <td>휴대폰 번호</td>
                <td><input type="text" name="phone"></td>
            </tr>
            <tr>
                <td>생년월일</td>
                <td><input type="date" name="birth"></td>
                <td>입사일</td>
                <td><input type="date" name="hireDate"></td>
            </tr>
            <tr>
                <td>부서명</td>
                <td><input type="text" name="deptName"></td>
                <td>직위</td>
                <td><input type="text" name="position"></td>
            </tr>
            <tr>
                <td>권한</td>
                <td colspan="3">
                    <select name="role">
                        <option value="대표">대표</option>
                        <option value="프로젝트">프로젝트</option>
                        <option value="근태">근태/연차</option>
                        <option value="게시판">게시판</option>
                        <option value="전자결재">전자결재</option>
                        <option value="사원">사원</option>
                        <option value="공지사항">공지사항</option>
                        
                    </select>
                </td>
            </tr>
            <tr>
                <td>사진 업로드</td>
                <td colspan="3"><input type="file" name="photo"></td>
            </tr>
        </table>

        <button type="submit" class="save-btn">등록 완료</button>
    </form>
</div>
</body>
</html>
