<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>사원 등록</title>
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f5f6fa;
            padding: 30px;
        }
        .container {
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            max-width: 800px;
            margin: auto;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        h2 {
            margin-bottom: 20px;
            font-size: 22px;
            font-weight: bold;
            color: #333;
        }
        table {
            width: 100%;
            border-spacing: 0;
        }
        table td {
            padding: 10px;
            vertical-align: middle;
        }
        input, select {
            padding: 8px;
            width: 100%;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
        }
        .save-btn {
            background: #4a90e2;
            color: #fff;
            padding: 10px 20px;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 20px;
            float: right;
        }
        .save-btn:hover {
            background: #357abd;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>사원 등록</h2>
    
    <form id="employeeForm" action="/employee/register" method="post" enctype="multipart/form-data">

        <table>
            <tr>
                <td>사번</td>
                <td><input type="text" name="employeeId" required></td>
                <td>비밀번호</td>
                <td><input type="password" name="password" required></td>
            </tr>
            <tr>
                <td>이름</td>
                <td><input type="text" name="empNm" required></td>
                <td>휴대폰 번호</td>
                <td><input type="text" name="phone"></td>
            </tr>
            <tr>
                <td>생년월일</td>
                <td><input type="date" name="birth"></td>
                <td>입사일</td>
                <td><input type="date" name="hireDate"></td>
            </tr>
            <tr>
                <td>부서명</td>
                <td><input type="text" name="deptName"></td>
                <td>직위</td>
                <td><input type="text" name="position"></td>
            </tr>
            <tr>
                <td>권한</td>
                <td colspan="3">
                    <select name="role">
                        <option value="대표">대표</option>
                        <option value="프로젝트">프로젝트</option>
                        <option value="근태">근태/연차</option>
                        <option value="게시판">게시판</option>
                        <option value="문서">문서관리</option>
                        <option value="사원">사원관리</option>
                        <option value="공지사항">공지사항</option>
                        <option value="일정">일정관리</option>
                        
                    </select>
                </td>
            </tr>
        </table>

        <button type="submit" class="save-btn">등록 완료</button>
    </form>
</div>

<script>
document.getElementById('employeeForm').addEventListener('submit', function(e) {
    const empId = this.employeeId.value.trim();
    const pw = this.password.value.trim();
    const name = this.empNm.value.trim();
    const phone = this.phone.value.trim();
    const birth = this.birth.value;
    const hireDate = this.hireDate.value;
    const role = this.role.value;

    // 사번: 숫자만, 최소 4자리
    if (!/^\d{4,}$/.test(empId)) {
        alert("사번은 숫자만 4자리 이상 입력하세요.");
        this.employeeId.focus();
        e.preventDefault();
        return;
    }

    // 비밀번호: 최소 6자
    if (pw.length < 6) {
        alert("비밀번호는 최소 6자 이상 입력하세요.");
        this.password.focus();
        e.preventDefault();
        return;
    }

    // 이름: 2글자 이상
    if (name.length < 2) {
        alert("이름은 2글자 이상 입력하세요.");
        this.empNm.focus();
        e.preventDefault();
        return;
    }

    // 휴대폰 번호 형식
    if (phone && !/^010-\d{4}-\d{4}$/.test(phone)) {
        alert("휴대폰 번호는 010-1234-5678 형식으로 입력하세요.");
        this.phone.focus();
        e.preventDefault();
        return;
    }

    // 날짜 유효성: 입사일이 생일보다 빠르면 안됨
    if (birth && hireDate && new Date(hireDate) < new Date(birth)) {
        alert("입사일은 생년월일 이후여야 합니다.");
        this.hireDate.focus();
        e.preventDefault();
        return;
    }

    // 권한 선택 확인
    if (!role) {
        alert("권한을 선택하세요.");
        this.role.focus();
        e.preventDefault();
    }
});
</script>

</body>
</html>
