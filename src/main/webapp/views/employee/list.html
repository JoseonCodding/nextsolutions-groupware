<style>
    .emp-status-active  { color: #28a745; font-weight: 600; }
    .emp-status-inactive { color: #dc3545; font-weight: 600; }
    .btn-toggle-inactive { background: #dc3545; color: #fff; padding: 5px 10px; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: 600; }
    .btn-toggle-inactive:hover { background: #c82333; }
    .btn-toggle-active   { background: #28a745; color: #fff; padding: 5px 10px; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: 600; }
    .btn-toggle-active:hover { background: #218838; }
</style>
<div class="board-container">
<h1 style="margin-top:12px;">사원 관리</h1>
<div class="board-controls">
  <div class="left-controls">
    <form action="/employee/list" method="get" class="search-form">
      <input type="text" name="keyword" th:value="${keyword}" placeholder="사원명 검색">
      <button type="submit"><i class="fa fa-search"></i> 검색</button>
      <a href="/employee/list" class="filter-btn"><i class="fa fa-rotate-left"></i> 초기화</a>
    </form>
  </div>
  <div style="display:flex; gap:8px;">
    <a href="/employee/register" class="btn">등록</a>
    <button id="editSelected" class="btn" style="background:#546e7a;">수정</button>
  </div>
</div>

<table class="board-table" style="width:100%; border-collapse:collapse;">
  <thead style="background:#f5f5f5;">
    <tr>
      <th>선택</th>
      <th>순번</th>
      <th>사번</th>
      <th>이름</th>
      <th>권한</th>
      <th>상태</th>
      <th>활성/비활성</th>
    </tr>
  </thead>
  <tbody>
    <tr th:each="emp : ${employees}"
        th:with="isActive=${emp.active == 1 or emp.active == true}">
      <td><input type="radio" name="empSelect" class="emp-check" th:value="${emp.empSeq}"></td>
      <td th:text="${emp.empSeq}"></td>
      <td th:text="${emp.employeeId}"></td>
      <td th:text="${emp.empNm} ?: ''"></td>
      <td th:text="${emp.role} ?: '-'"></td>
      <td class="status"
          th:classappend="${isActive} ? ' emp-status-active' : ' emp-status-inactive'"
          th:text="${isActive ? '활성' : '비활성'}"></td>
      <td>
        <button th:if="${isActive}"  class="btn-toggle-inactive" th:attr="data-emp=${emp.empSeq}">비활성화</button>
        <button th:if="${!isActive}" class="btn-toggle-active"   th:attr="data-emp=${emp.empSeq}">활성화</button>
      </td>
    </tr>
    <tr th:if="${#lists.isEmpty(employees)}">
      <td colspan="7" style="padding:60px; text-align:center; color:#999;">
        등록된 사원이 없습니다.
      </td>
    </tr>
  </tbody>
</table>

<div>
  <nav class="pagination">
    <a th:if="${page > 1}"
       th:href="@{/employee/list(page=${page-5 > 1 ? page-5 : 1}, keyword=${keyword})}"
       class="prev">&#x2039; Previous</a>

    <span th:if="${startPage > 1 and page == 1}" class="page-number now-page disabled" th:text="1"></span>
    <a th:if="${startPage > 1 and page != 1}" th:href="@{/employee/list(page=1, keyword=${keyword})}" th:text="1" class="page-number"></a>
    <span th:if="${startPage > 2}" class="ellipsis">...</span>

    <span th:each="i : ${#numbers.sequence(startPage, endPage)}">
      <span th:if="${i == page}" class="page-number now-page disabled" th:text="${i}"></span>
      <a th:if="${i != page}" th:href="@{/employee/list(page=${i}, keyword=${keyword})}" th:text="${i}" class="page-number"></a>
    </span>

    <span th:if="${endPage < totalPages - 1}" class="ellipsis">...</span>
    <span th:if="${endPage < totalPages and page == totalPages}" class="page-number now-page disabled" th:text="${totalPages}"></span>
    <a th:if="${endPage < totalPages and page != totalPages}"
       th:href="@{/employee/list(page=${totalPages}, keyword=${keyword})}" th:text="${totalPages}" class="page-number"></a>

    <a th:if="${page < totalPages}"
       th:href="@{/employee/list(page=${page+5 < totalPages ? page+5 : totalPages}, keyword=${keyword})}">Next &#x203A;</a>
  </nav>
</div>

<script>
document.querySelectorAll(".btn-toggle-active, .btn-toggle-inactive").forEach(btn => {
    btn.addEventListener("click", function() {
        const empSeq = this.dataset.emp;
        const row = this.closest("tr");
        const statusCell = row.querySelector(".status");

        fetch("/employee/toggle", {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded" },
            body: `emp_seq=${empSeq}`
        }).then(res => res.text())
          .then(data => {
              if (data === "OK") {
                  if (statusCell.textContent.trim() === "활성") {
                      statusCell.textContent = "비활성";
                      statusCell.classList.remove("emp-status-active");
                      statusCell.classList.add("emp-status-inactive");
                      this.textContent = "활성화";
                      this.classList.remove("btn-toggle-inactive");
                      this.classList.add("btn-toggle-active");
                  } else {
                      statusCell.textContent = "활성";
                      statusCell.classList.remove("emp-status-inactive");
                      statusCell.classList.add("emp-status-active");
                      this.textContent = "비활성화";
                      this.classList.remove("btn-toggle-active");
                      this.classList.add("btn-toggle-inactive");
                  }
              }
          });
    });
});

document.getElementById("editSelected").addEventListener("click", function() {
    const selected = document.querySelectorAll(".emp-check:checked");
    if (selected.length !== 1) {
        alert("사원 1명만 선택해주세요.");
        return;
    }
    const empSeq = selected[0].value;
    window.location.href = `/employee/edit?empSeq=${empSeq}`;
});
</script>
