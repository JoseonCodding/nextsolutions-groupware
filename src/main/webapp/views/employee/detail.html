<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>사원 상세 보기</title>
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f5f6fa;
            padding: 30px;
        }
        .container {
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            max-width: 800px;
            margin: auto;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        h2 {
            margin-bottom: 20px;
            font-size: 22px;
            font-weight: bold;
            color: #333;
        }
        table {
            width: 100%;
            border-spacing: 0;
        }
        table td {
            padding: 10px;
            vertical-align: middle;
        }
        input, select {
            padding: 8px;
            width: 100%;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
        }
        .save-btn {
            background: #ff9800;
            color: #fff;
            padding: 10px 20px;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 20px;
            float: right;
        }
        .save-btn:hover {
            background: #e68900;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>사원 상세 보기</h2>
    
    <form action="/employee/update" method="post" enctype="multipart/form-data">
        <input type="hidden" name="empSeq" th:value="${employee.empSeq}" />

        <table>
            <tr>
                <td>사번</td>
                <td th:text="${employee.employeeId}"></td>
                <td>이름</td>
                <td th:text="${employee.empNm}"></td>
            </tr>
            <tr>
                <td>휴대폰 번호</td>
                <td th:text="${employee.phone}"></td>
                <td>생년월일</td>
                <td th:text="${employee.birth}"></td>
            </tr>
            <tr>
                <td>입사일</td>
                <td th:text="${employee.hireDate}"></td>
                <td>퇴사일</td>
                <td th:text="${employee.resignDate}"></td>
            </tr>
            <tr>
                <td>부서명</td>
                <td th:text="${employee.deptName}"></td>
                <td>직위</td>
                <td th:text="${employee.position}"></td>
            </tr>
            <tr>
                <td>권한</td>
                <td colspan="3"></td>
                <td th:text="${employee.role}"></td>

            </tr>
        </table>
        <input type="button" value="수정" th:onclick="'update(' + ${employee.empSeq} + ')'" />
    </form>
</div>

<script>


function update(seq) {
    window.location.href = "/employee/edit?empSeq=" + seq;
}

</script>

</body>
</html>
