<link rel="stylesheet" href="/css/common.css">

<style>
.mypage-wrap {
  margin-top: 45px;
  max-width: 700px;
}

/* 알림 메시지 */
.mypage-msg-ok {
  padding: 12px 16px;
  background: #e8f5e9;
  border: 1px solid #a5d6a7;
  border-radius: 8px;
  margin-bottom: 16px;
  color: #2e7d32;
  font-size: 14px;
}
.mypage-msg-err {
  padding: 12px 16px;
  background: #ffebee;
  border: 1px solid #ef9a9a;
  border-radius: 8px;
  margin-bottom: 16px;
  color: #c62828;
  font-size: 14px;
}

/* 기본 정보 테이블 */
.mypage-info-table {
  width: 100%;
  border-collapse: collapse;
  margin-bottom: 24px;
}
.mypage-info-table th {
  width: 130px;
  padding: 12px 14px;
  background: var(--surface-alt);
  border: 1px solid var(--border);
  text-align: left;
  font-weight: 600;
  font-size: 13px;
  color: var(--text-2);
}
.mypage-info-table td {
  padding: 12px 14px;
  border: 1px solid var(--border);
  color: var(--text-1);
  font-size: 14px;
  background: var(--surface);
}

/* 섹션 카드 */
.mypage-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 22px;
  margin-bottom: 20px;
}
.mypage-card h3 {
  margin: 0 0 16px;
  font-size: 15px;
  font-weight: 700;
  color: var(--text-1);
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border-light);
}

/* 연락처 입력 행 */
.mypage-phone-row {
  display: flex;
  gap: 10px;
  align-items: center;
}
.mypage-phone-row input {
  flex: 1;
  padding: 9px 12px;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  font-size: 14px;
  font-family: var(--font);
  background: var(--surface-alt);
  color: var(--text-1);
  transition: border-color 0.15s, box-shadow 0.15s;
  outline: none;
}
.mypage-phone-row input:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(57,73,171,0.1);
  background: var(--surface);
}
.mypage-phone-row input::placeholder { color: var(--text-3); }

/* 비밀번호 폼 테이블 */
.mypage-pw-table {
  width: 100%;
  border-collapse: collapse;
  margin-bottom: 14px;
}
.mypage-pw-table th {
  width: 160px;
  padding: 10px 14px;
  background: var(--surface-alt);
  border: 1px solid var(--border);
  text-align: left;
  font-weight: 600;
  font-size: 13px;
  color: var(--text-2);
}
.mypage-pw-table td {
  padding: 8px 10px;
  border: 1px solid var(--border);
  background: var(--surface);
}
.mypage-pw-table input[type="password"] {
  width: 100%;
  padding: 9px 12px;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  font-size: 14px;
  font-family: var(--font);
  background: var(--surface-alt);
  color: var(--text-1);
  box-sizing: border-box;
  transition: border-color 0.15s, box-shadow 0.15s;
  outline: none;
}
.mypage-pw-table input[type="password"]:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(57,73,171,0.1);
  background: var(--surface);
}
.mypage-pw-table input::placeholder { color: var(--text-3); }

.mypage-form-footer {
  display: flex;
  justify-content: flex-end;
  margin-top: 4px;
}
</style>

<div class="container mypage-wrap">
  <h1 class="detail-title">마이페이지</h1>

  <!-- 알림 메시지 -->
  <div th:if="${msg}" class="mypage-msg-ok">
    <i class="fa fa-check-circle"></i> <span th:text="${msg}"></span>
  </div>
  <div th:if="${pwError}" class="mypage-msg-err">
    <i class="fa fa-exclamation-circle"></i> <span th:text="${pwError}"></span>
  </div>

  <!-- 기본 정보 -->
  <table class="mypage-info-table">
    <tr>
      <th>사번</th>
      <td th:text="${employee.employeeId}"></td>
    </tr>
    <tr>
      <th>이름</th>
      <td th:text="${employee.empNm}"></td>
    </tr>
    <tr>
      <th>부서</th>
      <td th:text="${employee.deptName ?: '-'}"></td>
    </tr>
    <tr>
      <th>직위</th>
      <td th:text="${employee.position ?: '-'}"></td>
    </tr>
    <tr>
      <th>입사일</th>
      <td th:text="${employee.hireDate != null ? #dates.format(employee.hireDate, 'yyyy-MM-dd') : '-'}"></td>
    </tr>
  </table>

  <!-- 연락처 변경 -->
  <div class="mypage-card">
    <h3><i class="fa fa-phone" style="color:var(--primary); margin-right:6px;"></i> 연락처 변경</h3>
    <form action="/mypage/updatePhone" method="post">
      <div class="mypage-phone-row">
        <input type="text" name="phone" th:value="${employee.phone}" placeholder="010-0000-0000">
        <button type="submit" class="save-btn">변경</button>
      </div>
    </form>
  </div>

  <!-- 비밀번호 변경 -->
  <div class="mypage-card">
    <h3><i class="fa fa-lock" style="color:var(--primary); margin-right:6px;"></i> 비밀번호 변경</h3>
    <form action="/mypage/updatePassword" method="post" id="pwForm">
      <table class="mypage-pw-table">
        <tr>
          <th>현재 비밀번호</th>
          <td>
            <input type="password" name="currentPw" id="currentPw" placeholder="현재 비밀번호 입력">
          </td>
        </tr>
        <tr>
          <th>새 비밀번호</th>
          <td>
            <input type="password" name="newPw" id="newPw" placeholder="8자 이상, 대/소문자/숫자/특수문자 포함">
          </td>
        </tr>
        <tr>
          <th>새 비밀번호 확인</th>
          <td>
            <input type="password" id="newPwConfirm" placeholder="새 비밀번호 재입력">
          </td>
        </tr>
      </table>
      <div class="mypage-form-footer">
        <button type="button" class="save-btn" onclick="submitPw()">변경</button>
      </div>
    </form>
  </div>
</div>

<script>
function submitPw() {
  var cur = document.getElementById('currentPw').value.trim();
  var nw  = document.getElementById('newPw').value.trim();
  var cf  = document.getElementById('newPwConfirm').value.trim();
  if (!cur) { alert('현재 비밀번호를 입력하세요.'); return; }
  if (!nw)  { alert('새 비밀번호를 입력하세요.'); return; }
  if (nw !== cf) { alert('새 비밀번호가 일치하지 않습니다.'); return; }
  if (!/^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[~`!@#$%^&*()_\-+={}[\]|\\:;"'<>,.?/]).{8,}$/.test(nw)) {
    alert('8자 이상, 대/소문자/숫자/특수문자를 모두 포함해야 합니다.');
    return;
  }
  document.getElementById('pwForm').submit();
}
</script>
