<link rel="stylesheet" href="/css/common.css">
<div class="container" style="margin-top:45px; max-width:700px;">
    <h1 class="detail-title">마이페이지</h1>

    <!-- 알림 메시지 -->
    <div th:if="${msg}" style="padding:12px 16px; background:#e8f5e9; border:1px solid #a5d6a7; border-radius:6px; margin-bottom:16px; color:#2e7d32;">
        <i class="fa fa-check-circle"></i> <span th:text="${msg}"></span>
    </div>
    <div th:if="${pwError}" style="padding:12px 16px; background:#ffebee; border:1px solid #ef9a9a; border-radius:6px; margin-bottom:16px; color:#c62828;">
        <i class="fa fa-exclamation-circle"></i> <span th:text="${pwError}"></span>
    </div>

    <!-- 기본 정보 (읽기 전용) -->
    <table style="width:100%; border-collapse:collapse; margin-bottom:24px;">
        <tr>
            <th style="width:130px; padding:12px; background:#f5f5f5; border:1px solid #ddd; text-align:left;">사번</th>
            <td style="padding:12px; border:1px solid #ddd;" th:text="${employee.employeeId}"></td>
        </tr>
        <tr>
            <th style="padding:12px; background:#f5f5f5; border:1px solid #ddd; text-align:left;">이름</th>
            <td style="padding:12px; border:1px solid #ddd;" th:text="${employee.empNm}"></td>
        </tr>
        <tr>
            <th style="padding:12px; background:#f5f5f5; border:1px solid #ddd; text-align:left;">부서</th>
            <td style="padding:12px; border:1px solid #ddd;" th:text="${employee.deptName ?: '-'}"></td>
        </tr>
        <tr>
            <th style="padding:12px; background:#f5f5f5; border:1px solid #ddd; text-align:left;">직위</th>
            <td style="padding:12px; border:1px solid #ddd;" th:text="${employee.position ?: '-'}"></td>
        </tr>
        <tr>
            <th style="padding:12px; background:#f5f5f5; border:1px solid #ddd; text-align:left;">입사일</th>
            <td style="padding:12px; border:1px solid #ddd;"
                th:text="${employee.hireDate != null ? #dates.format(employee.hireDate, 'yyyy-MM-dd') : '-'}"></td>
        </tr>
    </table>

    <!-- 연락처 변경 -->
    <div style="background:#fafafa; border:1px solid #ddd; border-radius:8px; padding:20px; margin-bottom:20px;">
        <h3 style="margin:0 0 14px; font-size:15px;">연락처 변경</h3>
        <form action="/mypage/updatePhone" method="post" style="display:flex; gap:10px; align-items:center;">
            <input type="text" name="phone" th:value="${employee.phone}"
                   style="flex:1; padding:9px 12px; border:1px solid #ccc; border-radius:6px; font-size:14px;"
                   placeholder="010-0000-0000">
            <button type="submit" class="save-btn" style="margin-top:0; float:none; padding:9px 20px;">변경</button>
        </form>
    </div>

    <!-- 비밀번호 변경 -->
    <div style="background:#fafafa; border:1px solid #ddd; border-radius:8px; padding:20px;">
        <h3 style="margin:0 0 14px; font-size:15px;">비밀번호 변경</h3>
        <form action="/mypage/updatePassword" method="post" id="pwForm">
            <table style="width:100%; border-collapse:collapse;">
                <tr>
                    <th style="width:130px; padding:10px; background:#f5f5f5; border:1px solid #ddd; text-align:left;">현재 비밀번호</th>
                    <td style="padding:8px; border:1px solid #ddd;">
                        <input type="password" name="currentPw" id="currentPw"
                               style="width:100%; padding:8px; border:1px solid #ccc; border-radius:4px; box-sizing:border-box;"
                               placeholder="현재 비밀번호 입력">
                    </td>
                </tr>
                <tr>
                    <th style="padding:10px; background:#f5f5f5; border:1px solid #ddd; text-align:left;">새 비밀번호</th>
                    <td style="padding:8px; border:1px solid #ddd;">
                        <input type="password" name="newPw" id="newPw"
                               style="width:100%; padding:8px; border:1px solid #ccc; border-radius:4px; box-sizing:border-box;"
                               placeholder="8자 이상, 대/소문자/숫자/특수문자 포함">
                    </td>
                </tr>
                <tr>
                    <th style="padding:10px; background:#f5f5f5; border:1px solid #ddd; text-align:left;">새 비밀번호 확인</th>
                    <td style="padding:8px; border:1px solid #ddd;">
                        <input type="password" id="newPwConfirm"
                               style="width:100%; padding:8px; border:1px solid #ccc; border-radius:4px; box-sizing:border-box;"
                               placeholder="새 비밀번호 재입력">
                    </td>
                </tr>
            </table>
            <div style="text-align:right; margin-top:12px;">
                <button type="button" class="save-btn" style="margin-top:0; float:none;" onclick="submitPw()">변경</button>
            </div>
        </form>
    </div>
</div>

<script>
function submitPw() {
    const cur = document.getElementById('currentPw').value.trim();
    const nw  = document.getElementById('newPw').value.trim();
    const cf  = document.getElementById('newPwConfirm').value.trim();
    if (!cur) { alert('현재 비밀번호를 입력하세요.'); return; }
    if (!nw)  { alert('새 비밀번호를 입력하세요.'); return; }
    if (nw !== cf) { alert('새 비밀번호가 일치하지 않습니다.'); return; }
    if (!/^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[~`!@#$%^&*()_\-+={}[\]|\\:;"'<>,.?/]).{8,}$/.test(nw)) {
        alert('8자 이상, 대/소문자/숫자/특수문자를 모두 포함해야 합니다.');
        return;
    }
    document.getElementById('pwForm').submit();
}
</script>
