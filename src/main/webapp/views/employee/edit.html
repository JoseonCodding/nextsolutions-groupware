<table>

<script>
document.getElementById('employeeUpdateForm').addEventListener('submit', function(e) {
    const f = this;

    const empId     = (f.employeeId?.value || '').trim();
    const name      = (f.empNm?.value || '').trim();
    const phone     = (f.phone?.value || '').trim();
    const birth     = (f.birth?.value || '').trim();
    const hireDate  = (f.hireDate?.value || '').trim();
    const resign    = (f.resignDate?.value || '').trim();
    const role      = (f.role?.value || '').trim();
    const pw        = (f.password?.value || '');

    // 1) 사번: 정확히 숫자 8자리
    if (!/^\d{8}$/.test(empId)) {
        alert('사번은 숫자 8자리로 입력하세요.');
        f.employeeId.focus();
        e.preventDefault();
        return;
    }

    // 2) 이름: 2자 이상
    if (name.length < 2) {
        alert('이름은 2자 이상 입력하세요.');
        f.empNm.focus();
        e.preventDefault();
        return;
    }

    // 3) 휴대폰: 허용 형식 -> 010-1234-5678 또는 01012345678
    if (phone && !/^010-\d{4}-\d{4}$/.test(phone) && !/^010\d{8}$/.test(phone)) {
        alert('휴대폰 번호는 010-1234-5678 또는 01012345678 형식으로 입력하세요.');
        f.phone.focus();
        e.preventDefault();
        return;
    }

    // 4) 비밀번호(선택): 입력했다면 강력 규칙 적용
    //    최소 8자, 대문자/소문자/숫자/특수문자 각각 1개 이상
    if (pw && !/^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[~`!@#$%^&*()_\-+={}[\]|\\:;"'<>,.?/]).{8,}$/.test(pw)) {
        alert('비밀번호는 8자 이상이며 대문자/소문자/숫자/특수문자를 모두 포함해야 합니다.');
        f.password.focus();
        e.preventDefault();
        return;
    }

    // 5) 날짜 관계 검증
    //    birth <= hireDate <= resign(있다면)
    const toDate = s => (s ? new Date(s + 'T00:00:00') : null);

    const birthD = toDate(birth);
    const hireD  = toDate(hireDate);
    const resD   = toDate(resign);

    if (birthD && hireD && hireD < birthD) {
        alert('입사일은 생년월일 이후여야 합니다.');
        f.hireDate.focus();
        e.preventDefault();
        return;
    }
    if (hireD && resD && resD < hireD) {
        alert('퇴사일은 입사일 이후여야 합니다.');
        f.resignDate.focus();
        e.preventDefault();
        return;
    }

    // 6) 권한 선택(값이 비어있지 않은지)
    if (!role) {
        alert('권한을 선택하세요.');
        f.role.focus();
        e.preventDefault();
        return;
    }

    // (선택) 휴대폰이 숫자만이면 자동 하이픈 적용
    if (/^010\d{8}$/.test(phone)) {
        f.phone.value = phone.replace(/^(\d{3})(\d{4})(\d{4})$/, '$1-$2-$3');
    }
});
</script>
