<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>사원 정보 수정</title>
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f5f6fa;
            padding: 30px;
        }
        .container {
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            max-width: 800px;
            margin: auto;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        h2 {
            margin-bottom: 20px;
            font-size: 22px;
            font-weight: bold;
            color: #333;
        }
        table {
            width: 100%;
            border-spacing: 0;
        }
        table td {
            padding: 10px;
            vertical-align: middle;
        }
        input, select {
            padding: 8px;
            width: 100%;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
        }
        .save-btn {
            background: #ff9800;
            color: #fff;
            padding: 10px 20px;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 20px;
            float: right;
        }
        .save-btn:hover {
            background: #e68900;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>사원 정보 수정</h2>
    
    <form action="/employee/update" method="post" enctype="multipart/form-data">
        <input type="hidden" name="empSeq" th:value="${employee.empSeq}" />

        <table>
            <tr>
                <td>사번</td>
                <td><input type="text" name="employeeId" th:value="${employee.employeeId}"></td>
                <td>이름</td>
                <td><input type="text" name="empNm" th:value="${employee.empNm}"></td>
            </tr>
            <tr>
                <td>휴대폰 번호</td>
                <td><input type="text" name="phone" th:value="${employee.phone}"></td>
                <td>생년월일</td>
                <td><input type="date" name="birth" th:value="${employee.birth}"></td>
            </tr>
            <tr>
                <td>입사일</td>
                <td><input type="date" name="hireDate" th:value="${employee.hireDate}"></td>
                <td>퇴사일</td>
                <td><input type="date" name="resignDate" th:value="${employee.resignDate}"></td>
            </tr>
            <tr>
                <td>부서명</td>
                <td><input type="text" name="deptName" th:value="${employee.deptName}"></td>
                <td>직위</td>
                <td><input type="text" name="position" th:value="${employee.position}"></td>
            </tr>
            <tr>
                <td>권한</td>
                <td colspan="3">
                    <select name="role" th:value="${employee.role}">
                        <option value="대표" th:selected="${employee.role == 1}">대표</option>
                        <option value="프로젝트" th:selected="${employee.role == 2}">프로젝트</option>
                        <option value="근태/연차" th:selected="${employee.role == 3}">근태/연차</option>
                        <option value="게시판" th:selected="${employee.role == 4}">게시판</option>
                        <option value="전자결재" th:selected="${employee.role == 5}">전자결재</option>
                        <option value="사원" th:selected="${employee.role == 6}">사원</option>
                        <option value="공지사항" th:selected="${employee.role == 7}">공지사항</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td>사진 업로드</td>
                <td colspan="3"><input type="file" name="photo"></td>
            </tr>
            <tr>
                <td>비밀번호 변경</td>
                <td colspan="3"><input type="password" name="password" placeholder="새 비밀번호 입력"></td>
            </tr>
        </table>

        <button type="submit" class="save-btn">수정 완료</button>
    </form>
</div>
</body>
</html>
