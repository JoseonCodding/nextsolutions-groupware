<style>
.emp-form-table { width: 100%; border-collapse: collapse; }
.emp-form-table th { width: 130px; padding: 12px; background: #f5f5f5; border: 1px solid #ddd; text-align: left; font-weight: 600; font-size: 14px; }
.emp-form-table td { padding: 10px; border: 1px solid #ddd; }
.emp-form-table input[type="text"],
.emp-form-table input[type="password"],
.emp-form-table input[type="date"],
.emp-form-table select {
    width: 100%; padding: 8px 10px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 14px; box-sizing: border-box;
}
.emp-form-table input:focus, .emp-form-table select:focus {
    border-color: #3949ab; outline: none; box-shadow: 0 0 0 2px rgba(57,73,171,.15);
}
.emp-form-table input[readonly], .emp-form-table select[disabled] {
    background: #f9f9f9; color: #6b7280;
}
</style>

<div class="board-container" style="max-width:860px;">
  <h1 style="margin-top:12px;">사원 정보 수정</h1>

  <form id="employeeUpdateForm" action="/employee/update" method="post">
    <input type="hidden" name="empSeq" th:value="${employee.empSeq}" />

    <table class="emp-form-table">
      <tr>
        <th>사번</th>
        <td><input type="text" name="employeeId" th:value="${employee.employeeId}" readonly></td>
        <th>이름</th>
        <td>
          <input type="text" name="empNm" th:value="${employee.empNm}"
                 th:readonly="${!(session.loginUser.role == '대표' or session.loginUser.role == '사원')}">
        </td>
      </tr>
      <tr>
        <th>휴대폰 번호</th>
        <td><input type="text" name="phone" th:value="${employee.phone}" readonly></td>
        <th>생년월일</th>
        <td>
          <input type="date" name="birth"
                 th:value="${employee.birth != null ? #dates.format(employee.birth, 'yyyy-MM-dd') : ''}">
        </td>
      </tr>
      <tr>
        <th>입사일</th>
        <td>
          <input type="date" name="hireDate"
                 th:value="${employee.hireDate != null ? #dates.format(employee.hireDate, 'yyyy-MM-dd') : ''}"
                 th:readonly="${!(session.loginUser.role == '대표' or session.loginUser.role == '사원')}">
        </td>
        <th>퇴사일</th>
        <td>
          <input type="date" name="resignDate"
                 th:value="${employee.resignDate != null ? #dates.format(employee.resignDate, 'yyyy-MM-dd') : ''}"
                 th:readonly="${!(session.loginUser.role == '대표' or session.loginUser.role == '사원')}">
        </td>
      </tr>
      <tr>
        <th>부서명</th>
        <td>
          <select name="deptName"
                  th:disabled="${!(session.loginUser.role == '대표' or session.loginUser.role == '사원')}">
            <option value="경영지원팀" th:selected="${employee.deptName == '경영지원팀'}">경영지원팀</option>
            <option value="기획팀"     th:selected="${employee.deptName == '기획팀'}">기획팀</option>
            <option value="유통사업팀" th:selected="${employee.deptName == '유통사업팀'}">유통사업팀</option>
            <option value="디자인팀"   th:selected="${employee.deptName == '디자인팀'}">디자인팀</option>
            <option value="총무팀"     th:selected="${employee.deptName == '총무팀'}">총무팀</option>
            <option value="사원관리팀" th:selected="${employee.deptName == '사원관리팀'}">사원관리팀</option>
            <option value="재무관리팀" th:selected="${employee.deptName == '재무관리팀'}">재무관리팀</option>
          </select>
        </td>
        <th>직위</th>
        <td>
          <select name="position"
                  th:disabled="${!(session.loginUser.role == '대표' or session.loginUser.role == '사원')}">
            <option value="대표" th:selected="${employee.position == '대표'}">대표</option>
            <option value="부장" th:selected="${employee.position == '부장'}">부장</option>
            <option value="차장" th:selected="${employee.position == '차장'}">차장</option>
            <option value="과장" th:selected="${employee.position == '과장'}">과장</option>
            <option value="대리" th:selected="${employee.position == '대리'}">대리</option>
            <option value="주임" th:selected="${employee.position == '주임'}">주임</option>
            <option value="사원" th:selected="${employee.position == '사원'}">사원</option>
          </select>
        </td>
      </tr>
      <tr>
        <th>권한</th>
        <td colspan="3">
          <select name="role"
                  th:disabled="${!(session.loginUser.role == '대표' or session.loginUser.role == '사원')}">
            <option value="대표"      th:selected="${employee.role == '대표'}">대표</option>
            <option value="프로젝트"  th:selected="${employee.role == '프로젝트'}">프로젝트</option>
            <option value="근태"      th:selected="${employee.role == '근태'}">근태/연차</option>
            <option value="게시판"    th:selected="${employee.role == '게시판'}">게시판</option>
            <option value="문서"      th:selected="${employee.role == '문서' or employee.role == '문서관리'}">문서관리</option>
            <option value="사원"      th:selected="${employee.role == '사원'}">사원관리</option>
            <option value="공지사항"  th:selected="${employee.role == '공지사항'}">공지사항</option>
            <option value="일정"      th:selected="${employee.role == '일정' or employee.role == '일정관리'}">일정관리</option>
            <option value=""          th:selected="${employee.role == null}">일반</option>
          </select>
        </td>
      </tr>
      <tr>
        <th>비밀번호 변경</th>
        <td colspan="3">
          <input type="password" name="password" placeholder="변경할 비밀번호 입력 (빈칸이면 유지)">
        </td>
      </tr>
    </table>

    <input type="hidden" name="active" th:value="${employee.active}" />

    <div style="display:flex; justify-content:flex-end; gap:10px; margin-top:16px;">
      <button type="button" class="btn" style="background:#546e7a;" onclick="history.back()">뒤로가기</button>
      <button type="button" class="btn" onclick="validateAndSubmit()">수정</button>
    </div>
  </form>
</div>

<script>
function validateAndSubmit() {
  const f = document.getElementById('employeeUpdateForm');
  const pw = f.password.value.trim();
  const name = f.empNm.value.trim();
  const birth = f.birth.value;
  const hireDate = f.hireDate.value;
  const resignDate = f.resignDate.value;
  const today = new Date(); today.setHours(0,0,0,0);

  if (pw && !/^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[~`!@#$%^&*()_\-+={}[\]|\\:;"'<>,.?/]).{8,}$/.test(pw)) {
    alert('비밀번호는 8자 이상이며 대문자/소문자/숫자/특수문자를 모두 포함해야 합니다.');
    f.password.focus(); return;
  }
  if (!/^[가-힣]{2,}$/.test(name)) { alert("이름은 한글 2글자 이상 입력하세요."); f.empNm.focus(); return; }
  if (!birth)     { alert("생년월일을 입력해주세요."); f.birth.focus(); return; }
  if (!hireDate)  { alert("입사일을 입력해주세요."); f.hireDate.focus(); return; }

  const birthDate = new Date(birth);
  const hireDateObj = new Date(hireDate);

  if (birthDate > today) { alert("생년월일은 오늘 이전 날짜여야 합니다."); f.birth.focus(); return; }
  if (birthDate >= hireDateObj) { alert("입사일은 생년월일보다 이후여야 합니다."); f.hireDate.focus(); return; }
  if (hireDateObj > today) { alert("입사일은 오늘 이전 날짜여야 합니다."); f.hireDate.focus(); return; }

  let ageAtHire = hireDateObj.getFullYear() - birthDate.getFullYear();
  const md = hireDateObj.getMonth() - birthDate.getMonth();
  if (md < 0 || (md === 0 && hireDateObj.getDate() < birthDate.getDate())) ageAtHire--;
  if (ageAtHire < 16) { alert("입사일 기준으로 만 16세 이상이어야 합니다."); f.birth.focus(); return; }

  if (hireDate && resignDate) {
    const resignDateObj = new Date(resignDate);
    if (hireDateObj >= resignDateObj) { alert("퇴사일은 입사일보다 이후여야 합니다."); f.hireDate.focus(); return; }
  }

  f.submit();
}

document.getElementById('employeeUpdateForm').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') { e.preventDefault(); validateAndSubmit(); }
});
</script>
