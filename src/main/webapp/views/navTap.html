<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEXTSOLUTIONS</title>
  <!-- 다크모드 깜빡임 방지: CSS 로드 전에 테마 적용 -->
  <script>
    (function(){
      var t = localStorage.getItem('nxTheme');
      if (t === 'dark') document.documentElement.setAttribute('data-theme','dark');
    })();
  </script>

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- 공통 스타일 -->
  <link rel="stylesheet" href="/css/commonStyle.css">
  <link rel="stylesheet" href="/css/common.css">

  <!-- 페이지별 스타일 -->
  <link rel="stylesheet" href="/css/attend.css">
  <link rel="stylesheet" href="/css/leave.css">
  <link rel="stylesheet" href="/css/approvalStyle.css">
  <link rel="stylesheet" href="/css/board.css">
  <link rel="stylesheet" href="/css/board_detail.css">
  <link rel="stylesheet" href="/css/schedule.css">
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet"/>
</head>
<body>

<div class="app-layout">

  <!-- 사이드바 -->
  <th:block th:replace="~{/layout/sidebar}"/>

  <!-- 메인 영역 -->
  <div class="main-area">

    <!-- 상단바 -->
    <th:block th:replace="~{/layout/header}"/>

    <!-- 컨텐츠 -->
    <main class="content-area">
      <th:block th:if="${navUrl != null and !#strings.isEmpty(navUrl)}">
        <th:block th:replace="~{__${navUrl}__}"/>
      </th:block>
      <th:block th:replace="~{${mainUrl}}"/>
    </main>

    <th:block th:replace="~{/layout/footer}"/>
  </div>
</div>

</body>
</html>
