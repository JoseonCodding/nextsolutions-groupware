<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>회원가입</title>
</head>
<body>
<h1>회원가입</h1>
<form th:action="@{/join}" method="post">
    <label>아이디</label>
    <input type="text" name="employeeId" required/>
    <label>비밀번호</label>
    <input type="password" name="password" required/>
    <button type="submit">가입하기</button>
</form>
</body>
</html>
