<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>회원가입</title>
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f5f6fa;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .join-container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            width: 350px;
        }
        h1 {
            text-align: center;
            font-size: 22px;
            margin-bottom: 30px;
            color: #333;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            font-size: 14px;
            color: #555;
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
            margin-bottom: 15px;
            box-sizing: border-box;
        }
        input:focus {
            border-color: #4a90e2;
            outline: none;
        }
        .join-btn {
            width: 100%;
            padding: 12px;
            background: #4a90e2;
            color: white;
            font-size: 15px;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        .join-btn:hover {
            background: #357ab8;
        }
        .link-login {
            text-align: center;
            margin-top: 15px;
            font-size: 13px;
        }
        .link-login a {
            color: #4a90e2;
            text-decoration: none;
        }
        .link-login a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div class="join-container">
    <h1>회원가입</h1>
    <form th:action="@{/join}" method="post">
        <label for="employeeId">아이디</label>
        <input type="text" id="employeeId" name="employeeId" placeholder="아이디를 입력하세요" required>

        <label for="password">비밀번호</label>
        <input type="password" id="password" name="password" placeholder="비밀번호를 입력하세요" required>

        <button type="submit" class="join-btn">가입하기</button>
    </form>

    <div class="link-login">
        <span>이미 계정이 있으신가요? </span>
        <a th:href="@{/login}">로그인</a>
    </div>
</div>
</body>
</html>
