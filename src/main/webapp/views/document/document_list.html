<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <title>문서관리</title>
</head>
<body>
<div class="document-list">
  <h2>문서 관리</h2>

  <table class="table table-bordered table-hover">
    <thead>
    <tr>
      <th>NO</th>
      <th>프로젝트명</th>
      <th>담당자</th>
      <th>진행상태</th>
      <th>등록일</th>
      <th>버전</th>
      <th>파일명</th>
    </tr>
    </thead>
    <tbody>
    <!-- approvalData: List<DocumentDTO> -->
    <tr th:each="doc : ${approvalData}">
      <!-- NO = gid (같은 문서 그룹 고정 번호) -->
      <td th:text="${doc.gid}"></td>

      <!-- 제목 클릭 시 항상 최신 상세로 (ver 파라미터 생략) -->
      <td>
        <a th:href="@{/document/detail(gid=${doc.gid}, page=${page}, size=${size}, keyword=${keyword})}"
           th:text="${doc.pjtNm}"></a>
      </td>

      <td th:text="${doc.empNm}"></td>
      <td th:text="${doc.pjtSttsCd}"></td>
      <td th:text="${#dates.format(doc.frstRegDt, 'yyyy-MM-dd')}">-</td>

      <!-- 버전: v {ver} -->
      <td>
        <span th:text="'v ' + (${doc.ver} ?: '-')"></span>
      </td>
	
      <!-- 첨부: 빈 문자열도 제외 -->
      <td>
        <a th:if="${!#strings.isEmpty(doc.orgFileNm1)}"
   		   th:href="@{/document/download(fileName=${doc.atchFileSn1}, orgName=${doc.orgFileNm1})}"
   		   th:text="${doc.orgFileNm1}"></a>

        <br th:if="${!#strings.isEmpty(doc.orgFileNm2)}"/>
		<a th:if="${!#strings.isEmpty(doc.orgFileNm2)}"
   		   th:href="@{/document/download(fileName=${doc.atchFileSn2}, orgName=${doc.orgFileNm2})}"
   		   th:text="${doc.orgFileNm2}"></a>

        <br th:if="${!#strings.isEmpty(doc.orgFileNm3)}"/>
		<a th:if="${!#strings.isEmpty(doc.orgFileNm3)}"
   		   th:href="@{/document/download(fileName=${doc.atchFileSn3}, orgName=${doc.orgFileNm3})}"
   		   th:text="${doc.orgFileNm3}"></a>
      </td>
    </tr>

    <tr th:if="${#lists.isEmpty(approvalData)}">
      <!-- 컬럼 수 = 7 -->
      <td colspan="7" class="text-center">등록된 문서가 없습니다.</td>
    </tr>
    </tbody>
  </table>

  <!-- 페이징 -->
  <div class="pagination" style="display:flex;gap:6px;align-items:center">
  <!-- 처음 -->
  <a th:classappend="${page==1}?' disabled'"
     th:href="@{/document/main(page=1, size=${size})}">&lt;&lt;</a>

  <!-- 이전 -->
  <a th:classappend="${page==1}?' disabled'"
     th:href="@{/document/main(page=${page>1?page-1:1}, size=${size})}">&lt;</a>

  <!-- 번호 -->
  <span th:each="p : ${#numbers.sequence(startPage, endPage)}">
    <a th:if="${p!=page}"
       th:href="@{/document/main(page=${p}, size=${size})}"
       th:text="${p}"></a>
    <span th:if="${p==page}" th:text="${p}"
          style="font-weight:700;padding:2px 6px;border:1px solid #3b82f6;border-radius:4px;background:#eff6ff"></span>
  </span>

  <!-- 다음 -->
  <a th:classappend="${page==totalPages}?' disabled'"
     th:href="@{/document/main(page=${page<totalPages?page+1:totalPages}, size=${size})}">&gt;</a>

  <!-- 마지막 -->
  <a th:classappend="${page==totalPages}?' disabled'"
     th:href="@{/document/main(page=${totalPages}, size=${size})}">&gt;&gt;</a>
</div>

</div>
</body>
</html>
