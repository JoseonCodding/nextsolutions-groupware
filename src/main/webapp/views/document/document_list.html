<title>문서관리</title>
<body>
<div class="document-list">
  <h1>문서 관리</h1>
  <div class="board-controls">
<form th:action="@{/document/main}" method="get" style="display: flex; align-items: center; gap: 12px; margin-bottom: 20px;">
    <input type="hidden" name="size" th:value="${size}">
    <input type="hidden" name="sort" th:value="${sort}">
    <input type="hidden" name="page" value="1">

    <select name="keywordType" onchange="this.form.submit()"
        	style="height: 40px; width: 160px; font-size: 14px; padding: 0 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; outline: none; background: #fff;">
  	<option value="" disabled
          th:selected="${keywordType == null or #strings.isEmpty(keywordType)}">선택</option>
  	<option value="writer"  th:selected="${keywordType == 'writer'}">작성자명</option>
  	<option value="project" th:selected="${keywordType == 'project'}">프로젝트명</option>
  	<option value="status"  th:selected="${keywordType == 'status'}">진행상태</option>
	</select>


    <input type="text" name="keyword" th:value="${keyword}" placeholder="검색어 입력"
           style="height: 40px; padding: 0 12px; border-radius: 6px; border: 1px solid #ccc; box-sizing: border-box;">
    <button type="submit" style="height: 40px; padding: 0 20px; border-radius: 6px; border: none; background-color: #2962ff; color: #fff; cursor: pointer;">
    <i class="fa fa-search"></i>검색</button>
  </form>
</div>

  <table class="table table-bordered table-hover">
    <thead>
    <tr>
      <th>번호</th>
      <th>프로젝트명</th>
      <th>담당자</th>
      <th>등록일</th>
      <th>진행상태</th>
      <th>버전</th>
    </tr>
    </thead>
    <tbody>
    <!-- approvalData: List<DocumentDTO> -->
    <tr th:each="doc : ${approvalData}">
      <!-- NO = gid (같은 문서 그룹 고정 번호) -->
      <td th:text="${doc.gid}"></td>

      <!-- 제목 클릭 시 항상 최신 상세로 (ver 파라미터 생략) -->
      <td class="board-title">
        <a th:href="@{/document/detail(gid=${doc.gid}, page=${page}, size=${size}, keyword=${keyword})}"
           th:text="${doc.pjtNm}"></a>
      </td>

      <td th:text="${doc.empNm}"></td>
      <td th:text="${#dates.format(doc.frstRegDt, 'yyyy-MM-dd')}">-</td>
      <td th:text="${doc.pjtSttsCd}"></td>

      <!-- 버전: v {ver} -->
      <td>
        <span th:text="'v ' + (${doc.ver} ?: '-')"></span>
      </td>
	
      <!-- 첨부: 빈 문자열도 제외 
      <td>
        <a th:if="${!#strings.isEmpty(doc.orgFileNm1)}"
   		   th:href="@{/document/download(fileName=${doc.atchFileSn1}, orgName=${doc.orgFileNm1})}"
   		   th:text="${doc.orgFileNm1}"></a>

        <br th:if="${!#strings.isEmpty(doc.orgFileNm2)}"/>
		<a th:if="${!#strings.isEmpty(doc.orgFileNm2)}"
   		   th:href="@{/document/download(fileName=${doc.atchFileSn2}, orgName=${doc.orgFileNm2})}"
   		   th:text="${doc.orgFileNm2}"></a>

        <br th:if="${!#strings.isEmpty(doc.orgFileNm3)}"/>
		<a th:if="${!#strings.isEmpty(doc.orgFileNm3)}"
   		   th:href="@{/document/download(fileName=${doc.atchFileSn3}, orgName=${doc.orgFileNm3})}"
   		   th:text="${doc.orgFileNm3}"></a>
      </td> -->
    </tr>

    <tr th:if="${#lists.isEmpty(approvalData)}">
      <!-- 컬럼 수 = 7 -->
      <td colspan="7" class="text-center">등록된 문서가 없습니다.</td>
    </tr>
    </tbody>
  </table>

  <!-- 페이징 -->
  <div class="pagination" style="display:flex;gap:6px;align-items:center">
<!-- 페이징: 검색/정렬 파라미터 유지 -->
<a th:classappend="${page==1}?' disabled'"
   th:href="@{/document/main(page=1, size=${size}, keywordType=${keywordType}, keyword=${keyword}, sort=${sort})}">&lt;&lt;</a>

<a th:classappend="${page==1}?' disabled'"
   th:href="@{/document/main(page=${page>1?page-1:1}, size=${size}, keywordType=${keywordType}, keyword=${keyword}, sort=${sort})}">&lt;</a>

<span th:each="p : ${#numbers.sequence(startPage, endPage)}">
  <a th:if="${p!=page}"
     th:href="@{/document/main(page=${p}, size=${size}, keywordType=${keywordType}, keyword=${keyword}, sort=${sort})}"
     th:text="${p}"></a>
  <span th:if="${p==page}" th:text="${p}" style="font-weight:700;padding:2px 6px;border:1px solid #3b82f6;border-radius:4px;background:#eff6ff"></span>
</span>

<a th:classappend="${page==totalPages}?' disabled'"
   th:href="@{/document/main(page=${page<totalPages?page+1:totalPages}, size=${size}, keywordType=${keywordType}, keyword=${keyword}, sort=${sort})}">&gt;</a>

<a th:classappend="${page==totalPages}?' disabled'"
   th:href="@{/document/main(page=${totalPages}, size=${size}, keywordType=${keywordType}, keyword=${keyword}, sort=${sort})}">&gt;&gt;</a>
</div>

</div>

	<!-- 게시판 리스트 호버링 적용 JS -->
	<script>
		document.querySelectorAll('td.board-title').forEach(td => {
			  td.parentElement.addEventListener('mouseenter', () => {
			    td.parentElement.classList.add('hover-row');
			  });
			  td.parentElement.addEventListener('mouseleave', () => {
			    td.parentElement.classList.remove('hover-row');
			  });
			});
	</script>
</body>
