<title>문서관리</title>
<link rel="stylesheet" href="/css/board.css">
<body>
<div class="document-list">
  <h1 style="margin-top:45px;">문서 관리</h1>
  <div class="board-controls">
<form id="searchForm" th:action="@{/document/main}" method="get" 
	  onsubmit="return validateSearch(event)"
      style="display: flex; align-items: center; gap: 12px; margin-bottom: 20px;">
    <input type="hidden" name="size" th:value="${size}">
    <input type="hidden" name="sort" th:value="${sort}">
    <input type="hidden" name="page" value="1">

    <select name="keywordType" onchange="this.form.submit()"
        	style="height: 40px; width: 160px; font-size: 14px; padding: 0 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; outline: none; background: #fff;">
  	<option value="" disabled
          th:selected="${keywordType == null or #strings.isEmpty(keywordType)}">선택</option>
  	<option value="writer"  th:selected="${keywordType == 'writer'}">작성자명</option>
  	<option value="project" th:selected="${keywordType == 'project'}">프로젝트명</option>
  	<option value="status"  th:selected="${keywordType == 'status'}">진행상태</option>
	</select>


    <input type="text" name="keyword" th:value="${keyword}" placeholder="검색어 입력"
           style="height: 40px; padding: 0 12px; border-radius: 6px; border: 1px solid #ccc; box-sizing: border-box;">
    <button type="submit" style="height: 40px; padding: 0 20px; border-radius: 6px; border: none; background-color: #2962ff; color: #fff; cursor: pointer;">
    <i class="fa fa-search"></i>검색</button>
    <a th:href="@{/document/main}" class="filter-btn"><i class="fa fa-rotate-left"></i> 초기화 </a>
  </form>
</div>

  <table class="table table-bordered table-hover">
  
    <thead>
    <tr>
      <th>번호</th>
      <th>프로젝트명</th>
      <th>담당자</th>
      <th>등록일</th>
      <th>진행상태</th>
      <th>버전</th>
    </tr>
    </thead>
    <tbody>
    <!-- approvalData: List<DocumentDTO> -->
    <tr th:each="doc : ${approvalData}">
      <!-- NO = gid (같은 문서 그룹 고정 번호) -->
      <td th:text="${doc.gid}"></td>

      <!-- 제목 클릭 시 항상 최신 상세로 (ver 파라미터 생략) -->
      <td class="board-title">
        <a th:href="@{/document/detail(gid=${doc.gid}, page=${page}, size=${size}, keyword=${keyword})}"
           th:text="${doc.pjtNm}"></a>
      </td>

      <td th:text="|${doc.empNm} ${doc.position}|"></td>
      <td th:text="${#dates.format(doc.frstRegDt, 'yyyy-MM-dd')}">-</td>
      <td th:text="${doc.pjtSttsCd}"></td>

      <!-- 버전: v {ver} -->
      <td>
        <span th:text="'v ' + (${doc.ver} ?: '-')"></span>
      </td>
	
      <!-- 첨부: 빈 문자열도 제외 
      <td>
        <a th:if="${!#strings.isEmpty(doc.orgFileNm1)}"
   		   th:href="@{/document/download(fileName=${doc.atchFileSn1}, orgName=${doc.orgFileNm1})}"
   		   th:text="${doc.orgFileNm1}"></a>

        <br th:if="${!#strings.isEmpty(doc.orgFileNm2)}"/>
		<a th:if="${!#strings.isEmpty(doc.orgFileNm2)}"
   		   th:href="@{/document/download(fileName=${doc.atchFileSn2}, orgName=${doc.orgFileNm2})}"
   		   th:text="${doc.orgFileNm2}"></a>

        <br th:if="${!#strings.isEmpty(doc.orgFileNm3)}"/>
		<a th:if="${!#strings.isEmpty(doc.orgFileNm3)}"
   		   th:href="@{/document/download(fileName=${doc.atchFileSn3}, orgName=${doc.orgFileNm3})}"
   		   th:text="${doc.orgFileNm3}"></a>
      </td> -->
    </tr>

    <tr th:if="${#lists.isEmpty(approvalData)}">
      <!-- 컬럼 수 = 6 -->
      <td colspan="6" style="padding:90px; text-align:center; color:#999;"
      	  th:text="${(#strings.isEmpty(keywordType) and #strings.isEmpty(keyword)) ? '등록된 문서가 없습니다.' : '검색 조건에 맞는 문서가 없습니다.'}"></td>
    </tr>
    </tbody>
  </table>

<div>
       <!-- 페이지네이션(동현) -->
	<nav class="pagination">
	  <!-- Previous 버튼 -->
	  <a th:if="${page > 1}" 
	  th:href="@{/document/main(page=${page-5 > 1 ? page-5 : 1}, keyword=${keyword})}"
	  class="prev">&#x2039; Previous</a>
	
	  <!-- 첫 페이지 -->
	  <span 
	  th:if="${startPage > 1 and page == 1}" 
	  class="page-number now-page disabled" 
	  th:text="1">
	  </span>
	  
	  <a 
	  th:if="${startPage > 1 and page != 1}" 
	  th:href="@{/document/main(page=1, keyword=${keyword})}" 
	  th:text="1" 
	  class="page-number"></a>
	
	  <span 
	  th:if="${startPage > 2}" 
	  class="ellipsis">...</span>
	
	  <!-- 페이지 숫자들 -->
	  <span 
	  th:each="i : ${#numbers.sequence(startPage, endPage)}">
	    <span th:if="${i == page}" class="page-number now-page disabled" th:text="${i}"></span>
	    <a th:if="${i != page}" th:href="@{/document/main(page=${i}, keyword=${keyword})}" th:text="${i}" class="page-number"></a>
	  </span>
	
	  <span th:if="${endPage < totalPages - 1}" class="ellipsis">...</span>
	
	  <!-- 마지막 페이지 -->
	  <span th:if="${endPage < totalPages and page == totalPages}" class="page-number now-page disabled" th:text="${totalPages}"></span>
	  <a th:if="${endPage < totalPages and page != totalPages}" 
	  th:href="@{/document/main(page=${totalPages}, keyword=${keyword})}" th:text="${totalPages}" class="page-number"></a>
	
	  <!-- Next 버튼 -->
	  <a th:if="${page < totalPages}" th:href="@{/document/main(page=${page+5 < totalPages ? page+5 : totalPages}, keyword=${keyword})}">Next &#x203A;</a>
	</nav>
</div>

	<!-- 게시판 리스트 호버링 적용 JS (다른 페이지 테이블과 CSS 충돌방지용) -->
	<script>
		document.querySelectorAll('td.board-title').forEach(td => {
			  td.parentElement.addEventListener('mouseenter', () => {
			    td.parentElement.classList.add('hover-row');
			  });
			  td.parentElement.addEventListener('mouseleave', () => {
			    td.parentElement.classList.remove('hover-row');
			  });
			});
		  function validateSearch(e) {
			    const form = document.getElementById('searchForm');
			    const type = (form.keywordType?.value || '').trim();
			    const kw   = (form.keyword?.value || '').trim();

			    // 1) 유형 미선택
			    if (!type) {
			      alert('검색 유형을 선택하세요.');
			      return false;
			    }
			    // 2) 유형은 선택했지만 키워드 없음
			    if (!kw) {
			      alert('검색어를 입력하세요.');
			      return false;
			    }
			    return true;
			  }

			  // 게시판 리스트 호버링
			  document.querySelectorAll('td.board-title').forEach(td => {
			    td.parentElement.addEventListener('mouseenter', () => {
			      td.parentElement.classList.add('hover-row');
			    });
			    td.parentElement.addEventListener('mouseleave', () => {
			      td.parentElement.classList.remove('hover-row');
			    });
			  });
	</script>
</body>
