  <!-- 헤더 -->
  <div style="display:flex; align-items:baseline; gap:12px; margin-bottom:12px;">
    <h2 th:text="${doc.pjtNm}">프로젝트명</h2>
    <span style="padding:2px 8px; border-radius:12px; background:#eef; font-size:12px;"
          th:text="${doc.ver != null ? 'v ' + doc.ver : 'v -'}">v 1.0</span>
    <span style="padding:2px 8px; border-radius:12px; background:#efe; font-size:12px; margin-left:auto;"
          th:text="${doc.pjtSttsCd}">완료</span>
  </div>

  <!-- 메타 정보 -->
  <table class="table table-bordered" style="width:100%; margin-bottom:16px;">
    <tbody>
    <tr>
      <th style="width:140px;">문서번호</th>
      <td th:text="${doc.gid}">G-xxxx</td>
      <th style="width:140px;">등록일</th>
      <td th:text="${#dates.format(doc.frstRegDt, 'yyyy-MM-dd')}">-</td>
    </tr>
    <tr>
      <th>사번</th>
      <td th:text="${doc.employeeId}">2025xxxx</td>
      <th>담당자</th>
      <td th:text="|${doc.empNm} ${doc.position}|">홍길동</td>
    </tr>
    </tbody>
  </table>

  <!-- 첨부파일 -->
  <div style="margin-bottom:16px;">
    <h4 style="margin:0 0 8px;">첨부파일</h4>
    <ul style="margin:0; padding-left:18px;">
  <li th:if="${!#strings.isEmpty(doc.orgFileNm1)}">
    <a th:href="@{/document/download(fileName=${doc.atchFileSn1}, orgName=${doc.orgFileNm1})}"
       th:text="${doc.orgFileNm1}">파일1</a>
  </li>
  <li th:if="${!#strings.isEmpty(doc.orgFileNm2)}">
    <a th:href="@{/document/download(fileName=${doc.atchFileSn2}, orgName=${doc.orgFileNm2})}"
       th:text="${doc.orgFileNm2}">파일2</a>
  </li>
  <li th:if="${!#strings.isEmpty(doc.orgFileNm3)}">
    <a th:href="@{/document/download(fileName=${doc.atchFileSn3}, orgName=${doc.orgFileNm3})}"
       th:text="${doc.orgFileNm3}">파일3</a>
  </li>
  <li th:if="${#strings.isEmpty(doc.orgFileNm1) and
             #strings.isEmpty(doc.orgFileNm2) and
             #strings.isEmpty(doc.orgFileNm3)}">
    첨부 없음
  </li>
</ul>

  </div>

  <!-- 내용 -->
<div style="margin-bottom:20px;">
  <h4 style="margin:0 0 8px;">내용</h4>
  <div style="border:1px solid #eee; padding:12px; border-radius:8px; background:#fafafa;"
       th:utext="${doc.content}"></div>
</div>


  <!-- 액션 -->
  <div style="display:flex; justify-content: flex-end; margin-bottom:12px; gap:8px;">
    <a class="btn btn-secondary" th:href="@{/document/main(page=${page}, size=${size}, keyword=${keyword}, sort=${sort})}">목록으로</a>
    <a class="btn btn-outline-primary" th:href="@{/document/versions(gid=${doc.gid})}">버전 목록</a>

  </div>

</div>
