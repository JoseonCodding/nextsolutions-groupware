<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org" lang="ko">
<head>
<meta charset="UTF-8">
<title>문서관리 데이터 뷰어</title>
<style>
    table {
        width: 100%;
        border-collapse: collapse;
    }
    th, td {
        border: 1px solid #ccc;
        padding: 8px;
        word-break: break-word;
        vertical-align: top;
    }
    th {
        background-color: #f2f2f2;
    }
    .content-cell {
        max-width: 500px;
        white-space: normal;
    }
</style>
</head>
<body>
    <h2>★문서관리 뷰어</h2>
	<table>
	    <tr>
	        <th>version_id</th>
	        <td th:text="${doc.versionId} ?: 'Null'"></td>
	        <th>original_id</th>
	        <td th:text="${doc.originalId} ?: 'Null'"></td>
	    </tr>
	    <tr>
	        <th>PJT_NM</th>
	        <td th:text="${doc.pjtNm} ?: 'Null'"></td>
	        <th>employeeId</th>
	        <td th:text="${doc.employeeId} ?: 'Null'"></td>
	    </tr>
	    <tr>
	        <th>employeeName</th>
	        <td th:text="${doc.employeeName} ?: 'Null'"></td>
	        <th>pjtSttsCd</th>
	        <td th:text="${doc.pjtSttsCd} ?: 'Null'"></td>
	    </tr>
	    <tr>
	        <th>pjtBgngDt</th>
	        <td th:text="${doc.pjtBgngDt} ?: 'Null'"></td>
	        <th>pjtEndDt</th>
	        <td th:text="${doc.pjtEndDt} ?: 'Null'"></td>
	    </tr>
	    <tr>
	        <th>ATCH_FILE_SN1</th>
	        <td th:text="${doc.atchFileSn1} ?: 'Null'"></td>
	        <th>ORG_FILE_NM1</th>
	        <td>
	            <a th:if="${doc.orgFileNm1 != null and doc.atchFileSn1 != null}"
	               th:href="@{/document/downloadFile(fileName=${doc.atchFileSn1}, orgName=${doc.orgFileNm1})}"
	               th:text="${doc.orgFileNm1}"></a>
	            <span th:if="${doc.orgFileNm1 == null or doc.atchFileSn1 == null}">Null</span>
	        </td>
	    </tr>
	    <tr>
	        <th>versionName</th>
	        <td th:text="${doc.versionName} ?: 'Null'"></td>
	        <th>versionCreatedAt</th>
	        <td th:text="${doc.versionCreatedAt} ?: 'Null'"></td>
	    </tr>
	    <tr>
	        <th>content</th>
	        <td class="content-cell" colspan="3"
	            th:utext="${doc.content != null ? doc.content : '<i>Null</i>'}"></td>
	    </tr>
	</table>

</body>
</html>
