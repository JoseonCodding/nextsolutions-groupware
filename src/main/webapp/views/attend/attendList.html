<!-- 근태 관리 출퇴근변경이력 - 근태 관리자 화면 -->
<div class="check-list-container">
	<h1 >근태관리</h1>
	<form method="get" action="/attend/attendList">
	    <label>날짜 <input type="date" name="workDate"  th:value="${param.workDate}" /></label>
	    <label>이름 <input type="text" name="empNm" th:value="${param.empNm}"/></label>
	    <label>승인자 <input type="text" name="modifiedBy" th:value="${param.modifiedBy}"/></label>
	
	    <button class="filter-btn" type="submit"><i class="fa fa-search"></i>검색</button>
	
	</form>
	
	<form>
	    <!-- 동일 파라미터로 PDF -->
	    <button type="submit" formmethod="get" th:formaction="@{/attend/pdf}" class="filter-btn down-btn" >PDF 다운로드</button>
	
	    <!-- 초기 진입 안전값 -->
	    <input type="hidden" name="size" th:value="${size} ?: 10"/>
	    <input type="hidden" name="page" value="1"/>
	</form>

  <!-- 목록 그리드 -->
  <table>
    <thead>
      <tr>
        <th>날짜</th>
        <th>부서</th>
        <th>이름</th>
        <th>직위</th>
        <th>출근시간</th>
        <th>퇴근시간</th>
        <th class="modify-per">승인자</th>
        <th>직위</th>
        <th class="modify-day">승인일</th>
        <th class="modify-reason">변경사유</th>
      </tr>
    </thead>
	<tbody>
		<tr th:if="${#lists.isEmpty(mainData)}" >
			        <td colspan="10" >조회된 근태 내역이 없습니다.</td></tr>
		<tr th:each="dto : ${mainData}">
			<td th:text="${dto.workDate}"></td>
			<td th:text="${dto.deptName}"></td>
			<td th:text="${dto.empNm}"></td>
			<td th:text="${dto.position ?: ''}"></td>
			<td th:text="${dto.checkInHourMinute}"></td>
			<td th:text="${dto.checkOutHourMinute}"></td>
			<td th:text="${dto.status == '완료' ? dto.mbNm : ''}"></td>
			<td th:text="${dto.status == '완료' ? dto.mbPosition : ''}"></td>
			<td th:text="${dto.status == '완료' and dto.modifiedAt != null 
              ? #temporals.format(dto.modifiedAt, 'yyyy-MM-dd') : ''}"></td>
			<td th:text="${dto.status == '완료' ? dto.modificationReason : ''}"></td>
		</tr>
	</tbody>
</table>


	<!-- 페이징 요약 -->
	<div style="margin:16px 0; display:flex; gap:12px; align-items:center; flex-wrap:wrap;">
	  <div>
	    <strong th:text="${page.total}">0</strong>건 /
	    <span th:text="${page.pageNum}">1</span> /
	    <span th:text="${page.pages == 0 ? 1 : page.pages}"></span>페이지
	  </div>
	
	  <!-- 페이지 크기 선택 
	  <form method="get" action="/attend/attendList" style="display:flex; align-items:center; gap:6px;">
	    <input type="hidden" name="pageNum" th:value="${page.pageNum}" />
	    <input type="hidden" name="workDate" th:value="${param.workDate}" />
	    <input type="hidden" name="empNm" th:value="${param.empNm}" />
	    <input type="hidden" name="modifiedBy" th:value="${param.modifiedBy}" />
	
	    <label style="margin:7px 10px 0px 10px; top:10px; ">페이지 크기
	      <select name="pageSize" onchange="this.form.submit()" style="margin-left:10px; ">
	        <option th:value="10" th:selected="${page.pageSize==10}">10</option>
	        <option th:value="20" th:selected="${page.pageSize==20}">20</option>
	        <option th:value="30" th:selected="${page.pageSize==30}">30</option>
	        <option th:value="50" th:selected="${page.pageSize==50}">50</option>
	      </select>
	    </label>
	  </form>
	  -->
	</div>
	
	
	<!-- 페이지네이션 -->
		<nav class="pagination" >
		  <!-- Previous 버튼 -->
		  <a th:if="${pDTO.page > 1}" th:href="@{/attend/attendList(page=${pDTO.page-5 > 1 ? pDTO.page-5 : 1},workDate=${criteria.workDate},
	             empNm=${criteria.empNm},
	             modifiedBy=${criteria.modifiedBy})}" class="prev">&#x2039; Previous</a>
		
		  <!-- 첫 페이지 -->
		  <span th:if="${pDTO.startPage > 1 and pDTO.page == 1}" class="page-number now-page disabled" th:text="1"></span>
		  <a th:if="${pDTO.startPage > 1 and pDTO.page != 1}" th:href="@{/attend/attendList(page=1, workDate=${criteria.workDate},
	             empNm=${criteria.empNm},
	             modifiedBy=${criteria.modifiedBy})}" th:text="1" class="page-number"></a>
		
		  <span th:if="${pDTO.startPage > 2}" class="ellipsis">...</span>
		
		  <!-- 페이지 숫자들 -->
		  <span th:each="i : ${#numbers.sequence(pDTO.startPage, pDTO.endPage)}">
		    <span th:if="${i == pDTO.page}" class="page-number now-page disabled" th:text="${i}"></span>
		    <a th:if="${i != pDTO.page}" th:href="@{/attend/attendList(page=${i},workDate=${criteria.workDate},
	             empNm=${criteria.empNm},
	             modifiedBy=${criteria.modifiedBy})}" th:text="${i}" class="page-number"></a>
		  </span>
		
		  <span th:if="${pDTO.endPage < pDTO.totalPages - 1}" class="ellipsis">...</span>
		
		  <!-- 마지막 페이지 -->
		  <span th:if="${pDTO.endPage < pDTO.totalPages and pDTO.page == pDTO.totalPages}" class="page-number now-page disabled" th:text="${pDTO.totalPages}"></span>
		  <a th:if="${pDTO.endPage < pDTO.totalPages and pDTO.page != pDTO.totalPages}" th:href="@{/attend/attendList(page=${pDTO.totalPages}, workDate=${criteria.workDate},
	             empNm=${criteria.empNm},
	             modifiedBy=${criteria.modifiedBy})}" th:text="${pDTO.totalPages}" class="page-number"></a>
		
		  <!-- Next 버튼 -->
		  <a th:if="${pDTO.page < pDTO.totalPages}" th:href="@{/attend/attendList(page=${pDTO.page+5 < pDTO.totalPages ? pDTO.page+5 : pDTO.totalPages}, workDate=${criteria.workDate},
	             empNm=${criteria.empNm},
	             modifiedBy=${criteria.modifiedBy})}">Next &#x203A;</a>
		</nav>
	
	
	
	<!-- 페이징 UI 영역
	<div class="container mt-4 text-center">
	  <nav aria-label="Page navigation">
	    <ul class="pagination justify-content-center" style="list-style:none;">
	
	     
	      <li class="page-item" th:if="${page.hasPreviousPage}">
	        <a class="prev"
	           th:href="@{/attend/attendList(
	             pageNum=${page.prePage},
	             pageSize=${page.pageSize},
	             workDate=${criteria.workDate},
	             empNm=${criteria.empNm},
	             modifiedBy=${criteria.modifiedBy}
	           )}"
	           aria-label="Previous" >
	          <span aria-hidden="true">&#x2039; Previous</span>
	        </a>
	      </li>
	
	     
	      <li th:each="i : ${#numbers.sequence(page.navigateFirstPage, page.navigateLastPage)}"
	          th:classappend="${i == page.pageNum} ? 'active'">
	        <a class="page-number"
	           th:href="@{/attend/attendList(
	             page=${i},
	             workDate=${criteria.workDate},
	             empNm=${criteria.empNm},
	             modifiedBy=${criteria.modifiedBy}
	           )}"
	           th:text="${i}">1</a>
	      </li>
	
	      <li class="page-item" th:if="${page.hasNextPage}">
	        <a class="page-link"
	           th:href="@{/attend/attendList(
	             page=${page.nextPage},
	             workDate=${criteria.workDate},
	             empNm=${criteria.empNm},
	             modifiedBy=${criteria.modifiedBy}
	           )}"
	           aria-label="Next">
	          <span aria-hidden="true">Next &#x203A;</span>
	        </a>
	      </li>
	
	    </ul>
	  </nav>
	  
	  
	</div>
	 -->
</div>
