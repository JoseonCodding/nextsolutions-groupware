	<!-- FullCalender 라이브러리 -->
	<div id="calendar"></div>

	<a class="insert-btn" th:href="@{/attend/attendTimeInsert}" >출퇴근 기록 수정 신청</a>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

<script th:inline="javascript">
/* 서버에서 전달한 Map을 JS 객체로 변환 */
var attendMap = /*[[${attendMap}]]*/ {};
var attendMapLeave = /*[[${attendMapLeave}]]*/ {};
var holidayArr = /*[[${holidayArr}]]*/ {};
var attendDTO2 = /*[[${attendDTO2}]]*/ {};
var currDay = new Date(attendDTO2.startDay);
//console.log(holidayArr)

//console.log(attendDTO2)

document.querySelector("#monthTitle").innerHTML = currDay.getFullYear()+"년 "+(currDay.getMonth()+1)+"월"
var events = [];

Object.keys(attendMap).forEach(function(date) {
    var dto = attendMap[date];
    
    // 출근 이벤트
    if(dto.checkInHourMinute) {
        events.push({
            title: '출근 ' + dto.checkInHourMinute,
            start: date ,
            color: '#3788d8' // 출근 색상
        });
    }

    // 퇴근 이벤트
    if(dto.checkOutHourMinute) {
        events.push({
            title: '퇴근 ' + dto.checkOutHourMinute ,
            start: date ,
            color: '#d8573c' // 퇴근 색상
        });
    }
});

Object.keys(attendMapLeave).forEach(function(leaveDate) {
    var leave = attendMapLeave[leaveDate];

    if (leave && leave.usedDateStr) {
        events.push({
			 title:'연차',
        	 start: leave.usedDateStr,   // 시작일
             end: leave.usedDateStr,     // 종료일도 지정 (같은 날이면 그대로)
             display: 'background',      // 배경으로 표시
             backgroundColor: '#ccffcc'  // 연두색 (미색 연두로 변경 가능)
        });
    }
});


holidayArr.forEach(function(holiday, idx) {

     events.push({
		title:holiday.title,
     	 start: holiday.startDateStr,   // 시작일
          end: holiday.endDateStr,     // 종료일도 지정 (같은 날이면 그대로)
          display: 'background',      // 배경으로 표시
          backgroundColor: '#ffd6d6'  
     });
    
});

document.addEventListener('DOMContentLoaded', function() {

	 var calendarEl = document.getElementById('calendar');
	 
	    var calendar = new FullCalendar.Calendar(calendarEl, {
	        initialView: 'dayGridMonth',
	        
	        height: 'auto',       // 높이 자동 맞춤
	        contentHeight: 'auto',
	        aspectRatio: 1,      // 가로세로 비율 (조정 가능)
			events:events,
			initialDate:attendDTO2.startDay,
	        headerToolbar: {
				            left: '',
				            center: '',
				            right: '',
				            
				            
				            /*
				            left: 'prevMonthButton',
				            center: 'title',
				            right: 'nextMonthButton'
				            */
	        },
	        
	        
	            
	    });
	    calendar.render();
});
</script>
