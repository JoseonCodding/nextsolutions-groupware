
<!--  
[[${restData}--><!-- ]] -->
<form  id="leaveForm" action="" method="post" >
<h2>연차 사용 신청</h2>
	<table border="">

		<tr>
			<td>사용할 연차</td>
			<td>
			<div th:each="dto, vv:${restData}">
				<input type="checkbox" class="leaveChk" th:name="|arr[${vv.index}].useChk|" value="true"/>
				<span th:text="${dto.createReason}"/> 
				
				<input type="hidden" th:name="|arr[${vv.index}].leaveId|" th:value="${dto.leaveId}"/>
				
				<input type="date" class="leaveDate" th:name="|arr[${vv.index}].usedDateStr|" value="" disabled />
			</div>
			</td>
		</tr>
			
		
		<tr>
			<td>연차사유</td>
			<td>
			<textarea name="reason" id="" cols="30" rows="1">개인 사유</textarea></td>
		</tr>
		

		<tr>
			<td colspan="2">
			<a class="back-btn" th:href="@{/attend/leaveList}">취소</a>
			<input class="regist-btn" type="submit" value="신청"/>
			</td>
		</tr>

	</table>
</form>

<script>
document.addEventListener("DOMContentLoaded", function() {
    // 오늘 날짜 yyyy-MM-dd 형식으로 세팅
    const today = new Date();
    const yyyy = today.getFullYear();
    const mm = String(today.getMonth() + 1).padStart(2, '0');
    const dd = String(today.getDate() + 1).padStart(2, '0');
    const todayStr = `${yyyy}-${mm}-${dd}`;

    // 체크박스 클릭 시 날짜 활성화/비활성화 처리
    document.querySelectorAll(".leaveChk").forEach(chk => {
        chk.addEventListener("change", function() {
            const dateInput = chk.closest("td").querySelector(".leaveDate");
            if (chk.checked) {
                dateInput.disabled = false;
                dateInput.setAttribute("min", todayStr); // 오늘 이후 선택 가능
            } else {
                dateInput.disabled = true;
                dateInput.value = ""; // 값 초기화
            }
        });
    });

    // 폼 제출 시 유효성 검사
    document.getElementById("leaveForm").addEventListener("submit", function(e) {
        const checkboxes = document.querySelectorAll(".leaveChk");
        let hasChecked = false;
        let msg = "";

        checkboxes.forEach(chk => {
            if (chk.checked) {
                hasChecked = true;
                const dateInput = chk.closest("td").querySelector(".leaveDate");
                if (!dateInput.value) {
                    msg = "체크된 연차의 날짜를 반드시 입력해야 합니다.";
                }
            }
        });

        if (!hasChecked) {
            e.preventDefault();
            alert("연차를 최소 1개 이상 선택해야 합니다.");
            return;
        }

        if (msg) {
            e.preventDefault();
            alert(msg);
            return;
        }
    });
});
</script>
