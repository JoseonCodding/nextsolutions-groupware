<div class="leave-container">
	<form  id="leaveForm" action="" method="post" >
		<h1 class="detail-title">연차 사용 신청</h1>
		<table border="">
			<tr>
				<th class="leave-chk-list">사용할 연차</th>
				<td>
					<div th:each="dto, vv:${restData}">
						<input type="checkbox" class="leaveChk" th:name="|arr[${vv.index}].useChk|" th:target_data="|ud${vv.index}|" value="true" />
						<span th:text="${dto.createReason}"/> 
						
						<input type="hidden" th:name="|arr[${vv.index}].leaveId|" th:value="${dto.leaveId}"/>
						
						<input type="date" class="leaveDate" th:id="|ud${vv.index}|" th:name="|arr[${vv.index}].usedDateStr|" value="" disabled />
					</div>
				</td>
			</tr>
			<tr>
				<th>연차사유</th>
				<td>
					<textarea class="write" name="reason" id="" cols="30" rows="1" placeholder='개인사유' required></textarea></td>
				</tr>
		</table>
	
			<a class="back-btn" th:href="@{/attend/leaveList}">취소</a>
			<input class="regist-btn" type="submit" value="신청"/>
	
	</form>
</div>
<script src="/js/jquery-3.7.1.min.js"></script>
<script>

 //금일 이후 유효성 빠진 ver
$(function(){

	// 오늘 날짜 yyyy-MM-dd 형식으로 세팅
	const today = new Date();
    const yyyy = today.getFullYear();
    const mm = String(today.getMonth() + 1).padStart(2, '0');
    const dd = String(today.getDate() + 1).padStart(2, '0');
    const todayStr = `${yyyy}-${mm}-${dd}`;
    
	$(".leaveChk").change(function(){
		
		//console.log('눌렀으냐',$(this).prop('checked'))
		//console.log($('#'+$(this).attr('target_data'))  )
		//console.log($(this).attr('target_data'))  
		//$('#'+$(this).attr('target_data')).prop('disabled',!$(this).prop('checked'))
		
		const targetId = $(this).attr('target_data');
        const $dateInput = $('#' + targetId);

        // 체크 여부에 따라 disabled 제어
        $dateInput.prop('disabled', !$(this).prop('checked'));
		if ($(this).prop('checked')) {
            // 오늘 이후 날짜만 선택 가능
            $dateInput.attr('min', todayStr);
        } else {
            // 비활성화 시 값 초기화
            $dateInput.val('');
            $dateInput.removeAttr('min'); // min 속성 제거
        }
	})
})

	$(function(){

	    // 체크박스 change 이벤트
	    $(".leaveChk").change(function(){
	        const targetId = $(this).attr('target_data');
	        const $dateInput = $('#' + targetId);
	        $dateInput.prop('disabled', !$(this).prop('checked'));
	        if ($(this).prop('checked')) {
	            const today = new Date();
	            const yyyy = today.getFullYear();
	            const mm = String(today.getMonth() + 1).padStart(2, '0');
	            const dd = String(today.getDate() + 1).padStart(2, '0');
	            const todayStr = `${yyyy}-${mm}-${dd}`;
	            $dateInput.attr('min', todayStr);
	        } else {
	            $dateInput.val('');
	            $dateInput.removeAttr('min');
	        }
	    });

	    // AJAX로 연차 신청
	    $("#leaveForm").submit(function(e) {
	        e.preventDefault();

	        const checkboxes = $(".leaveChk");
	        let hasChecked = false;
	        let msg = "";

	        checkboxes.each(function() {
	            if ($(this).prop("checked")) {
	                hasChecked = true;
	                const dateInput = $("#" + $(this).attr("target_data"));
	                if (!dateInput.val()) {
	                    msg = "체크된 연차의 날짜를 반드시 입력해야 합니다.";
	                }
	            }
	        });

	        if (!hasChecked) { alert("연차를 최소 1개 이상 선택해야 합니다."); return; }
	        if (msg) { alert(msg); return; }

	        // 서버 POST
	        $.post($(this).attr("action"), $(this).serialize())
	         .done(function() {
	             alert("신청 완료되었습니다.");
	             location.href = "/attend/leaveList";
	         })
	         .fail(function() {
	             alert("신청 중 오류가 발생했습니다.");
	         });
	    });
	});


     
   
});
</script>
