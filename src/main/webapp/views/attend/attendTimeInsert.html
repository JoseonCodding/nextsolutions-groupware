
<div class="check-container">
	<form action="/attend/save" method="post" enctype="multipart/form-data">
	
	  <h1 class="detail-title">출퇴근 기록 수정 신청</h1>
	  <table >
	    <!-- 체크박스(정상출근/정상퇴근) -->
	    <tr class="attend-option">
	      <th >출퇴근내역</th>
	      <td>
	        <div class="attchk">
	          <label >
	            <input class="action-one" type="checkbox" name="actions" value="IN" />
	            정상출근
	          </label>
	          <label>
	            <input class="action-one" type="checkbox" name="actions" value="OUT" />
	            정상퇴근
	          </label>
	        </div>
		  </td>
		  
		  <!--  
	        <div class="attdate">	      
	          <label class="attdd" for="dateSelect">출석 날짜 선택 : </label>
	         -->  
	       
          <th class="attdd" for="dateSelect">출석 날짜 선택</th>
          <td>
	          <select class="attdd" id="dateSelect" name="workDate">
	            <option value="" >날짜 선택</option>
	            <option th:each="opt : ${attendOptions}"
	        			th:value="${opt.workDate}"
	        			th:text="${opt.workDate}" class="dates">
				</option>			  
	          </select>
          </td>	       
	    </tr>

	    <tr>
	      <th >내용</th>
	      <td  colspan="3">
	        <textarea class="write" name="content" id="content" rows="10"
	                  placeholder="사유를 자세히 입력해주세요." ></textarea>
	      </td>
	    </tr>
	    
	  </table>

       	<a th:href="@{/attend}"  class="attbb" >취소</a>
       	
        <button type="submit" class="insert-attbb">신청</button>
    </form> 

</div>

<script th:if="${msg != null}">
        alert("[[${msg}]]");
</script>
