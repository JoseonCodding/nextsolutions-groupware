<form action="/attend/save" method="post" enctype="multipart/form-data">

  <h2>출퇴근 기록 수정 신청</h2>
  
  <table>
    <!-- 체크박스(정상출근/정상퇴근) -->
    <tr>
      <td >출퇴근내역</td>
      <td colspan="2">
        <div >
          <label >
            <input class="action-one" type="checkbox" name="actions" value="IN" />
            정상출근
          </label>
          <label>
            <input class="action-one" type="checkbox" name="actions" value="OUT" />
            정상퇴근
          </label>
        </div>

        <div>
          <label for="dateSelect">출석 날짜 선택</label>
          <select id="dateSelect" name="workDate">
            <option value="">-- 날짜 선택 --</option>
            <option th:each="opt : ${attendOptions}"
        			th:value="${opt.date}"
        			th:text="${opt.date}">
			</option>
          </select>
        </div>

      </td>
    </tr>

    <!-- 내용 -->
    <tr>
      <td >내용</td>
      <td colspan="2">
        <textarea name="content" id="content" rows="10"
                  placeholder="사유를 자세히 입력해주세요."></textarea>
      </td>
    </tr>

    <!-- 제출 -->
	<tr>
      <td colspan="2">
       	<a th:href="@{/attend}" >취소</a>
        <button type="submit">신청</button>
      </td>
    </tr>
  </table>
</form>

<script th:if="${msg != null}">
        alert("[[${msg}]]");
</script>
<script>
// '정상출퇴근' 체크 시 나머지 자동 해제, 개별 체크 시 BOTH 해제
const both = document.querySelector('.action-both');
const ones = document.querySelectorAll('.action-one');

if (both) {
  both.addEventListener('change', function(){
    if (this.checked) ones.forEach(cb => cb.checked = false);
  });
}
ones.forEach(cb => {
  cb.addEventListener('change', function(){
    if (this.checked && both) both.checked = false;
  });
});
</script>
