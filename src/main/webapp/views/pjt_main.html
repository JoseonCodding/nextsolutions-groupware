<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>프로젝트 목록</title>
  <style>
    body {
      font-family: 'Arial', sans-serif;
      margin: 40px;
      background-color: #f9f9f9;
    }
    h1 {
      color: #333;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      background-color: white;
    }
    th, td {
      padding: 12px;
      border-bottom: 1px solid #ccc;
      text-align: left;
    }
    th {
      background-color: #f0f0f0;
    }
    tr:hover {
      background-color: #f5f5f5;
    }
    .button {
      padding: 6px 12px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }
    .btn-view { background-color: #4CAF50; color: white; }
    .btn-edit { background-color: #2196F3; color: white; }
    .btn-delete { background-color: #f44336; color: white; }
    .btn-add {
      margin-top: 20px;
      background-color: #673ab7;
      color: white;
    }
  </style>
</head>
<body>

  <h1>프로젝트 목록</h1>

  <button class="button btn-add" onclick="location.href='project_add.html'">＋ 새 프로젝트 추가</button>

  <table>
    <thead>
      <tr>
        <th>프로젝트 ID</th>
        <th>프로젝트명</th>
        <th>설명</th>
        <th>상태</th>
        <th>생성일</th>
        <th>작업</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>PJT001</td>
        <td>통합 관리 시스템</td>
        <td>사내 프로젝트 통합 관리 시스템 구축</td>
        <td>진행중</td>
        <td>2025-08-01</td>
        <td>
          <button class="button btn-view" onclick="location.href='project_view.html?id=PJT001'">보기</button>
          <button class="button btn-edit" onclick="location.href='project_edit.html?id=PJT001'">편집</button>
          <button class="button btn-delete" onclick="deleteProject('PJT001')">삭제</button>
        </td>
      </tr>
      <!-- 더 많은 프로젝트 행들 추가 -->
    </tbody>
  </table>

  <script>
    function deleteProject(projectId) {
      if (confirm(`프로젝트 ${projectId}를 삭제하시겠습니까?`)) {
        // 여기에 삭제 API 요청 또는 폼 전송 로직 작성
        alert(`프로젝트 ${projectId} 삭제 처리 중...`);
        // 예: location.href = `project_delete.do?id=${projectId}`;
      }
    }
  </script>

</body>
</html>
