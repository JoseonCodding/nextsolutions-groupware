<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>접근 권한 없음</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a237e 0%, #3949ab 50%, #5c6bc0 100%);
            font-family: 'Segoe UI', sans-serif;
        }

        .card {
            background: #fff;
            border-radius: 20px;
            padding: 64px 80px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
            max-width: 480px;
            width: 90%;
            animation: fadeUp 0.4s ease;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .icon {
            width: 80px;
            height: 80px;
            background: #fbe9e7;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 36px;
        }

        .code {
            font-size: 80px;
            font-weight: 800;
            color: #1a237e;
            line-height: 1;
            letter-spacing: -2px;
        }

        .divider {
            width: 48px;
            height: 4px;
            background: #c62828;
            border-radius: 2px;
            margin: 16px auto;
        }

        .title {
            font-size: 20px;
            font-weight: 700;
            color: #222;
            margin-bottom: 10px;
        }

        .desc {
            font-size: 14px;
            color: #888;
            line-height: 1.7;
            margin-bottom: 36px;
        }

        .btn-group {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .btn {
            padding: 11px 28px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            border: none;
            transition: filter 0.15s;
        }
        .btn:hover { filter: brightness(0.88); }

        .btn-primary {
            background: #3949ab;
            color: #fff;
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #555;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">🔒</div>
        <div class="code">403</div>
        <div class="divider"></div>
        <div class="title">접근 권한이 없습니다</div>
        <div class="desc">
            이 페이지에 접근할 수 있는 권한이 없습니다.<br>
            담당자에게 권한을 요청하거나 다른 계정으로 로그인하세요.
        </div>
        <div class="btn-group">
            <a href="javascript:history.back()" class="btn btn-secondary">이전 페이지</a>
            <a href="/dashboard" class="btn btn-primary">홈으로</a>
        </div>
    </div>
</body>
</html>
