<title>팀 채팅</title>
<link rel="stylesheet" href="/css/common.css">

<style>
.chat-wrap {
    display: flex;
    flex-direction: column;
    height: calc(100vh - 120px);
    max-width: 800px;
    margin: 20px auto;
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.1);
    overflow: hidden;
}
.chat-header {
    background: #3949ab;
    color: #fff;
    padding: 16px 20px;
    font-size: 16px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 10px;
}
.chat-status {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #aaa;
}
.chat-status.connected { background: #69f0ae; }

.chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    background: #f5f6fa;
}
.chat-msg {
    display: flex;
    flex-direction: column;
    max-width: 70%;
}
.chat-msg.mine {
    align-self: flex-end;
    align-items: flex-end;
}
.chat-msg.theirs {
    align-self: flex-start;
    align-items: flex-start;
}
.chat-msg-sender {
    font-size: 11px;
    color: #888;
    margin-bottom: 3px;
}
.chat-msg-bubble {
    padding: 9px 14px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.5;
    word-break: break-word;
    max-width: 100%;
}
.chat-msg.mine .chat-msg-bubble {
    background: #3949ab;
    color: #fff;
    border-bottom-right-radius: 4px;
}
.chat-msg.theirs .chat-msg-bubble {
    background: #fff;
    color: #222;
    border-bottom-left-radius: 4px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
}
.chat-msg-time {
    font-size: 10px;
    color: #aaa;
    margin-top: 3px;
}
.chat-date-divider {
    text-align: center;
    font-size: 12px;
    color: #aaa;
    margin: 6px 0;
    position: relative;
}
.chat-date-divider::before,
.chat-date-divider::after {
    content: '';
    display: inline-block;
    width: 60px;
    height: 1px;
    background: #ddd;
    vertical-align: middle;
    margin: 0 8px;
}
.chat-input-area {
    display: flex;
    gap: 10px;
    padding: 14px 16px;
    border-top: 1px solid #e0e0e0;
    background: #fff;
}
.chat-input {
    flex: 1;
    padding: 10px 14px;
    border: 1px solid #ddd;
    border-radius: 24px;
    font-size: 14px;
    outline: none;
    resize: none;
    height: 42px;
    line-height: 1.4;
}
.chat-input:focus { border-color: #3949ab; }
.chat-send-btn {
    padding: 0 20px;
    background: #3949ab;
    color: #fff;
    border: none;
    border-radius: 24px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    height: 42px;
}
.chat-send-btn:hover { filter: brightness(0.88); }
.chat-send-btn:disabled { background: #bbb; cursor: default; }
</style>

<div class="chat-wrap">
    <div class="chat-header">
        <div class="chat-status" id="chatStatus"></div>
        전체 채팅
    </div>

    <div class="chat-messages" id="chatMessages">
        <!-- 이전 메시지 -->
        <th:block th:each="msg : ${chatHistory}">
            <div class="chat-msg"
                 th:classappend="${msg.senderId == loginUser.employeeId} ? ' mine' : ' theirs'">
                <div class="chat-msg-sender"
                     th:if="${msg.senderId != loginUser.employeeId}"
                     th:text="${msg.senderName}"></div>
                <div class="chat-msg-bubble" th:text="${msg.content}"></div>
                <div class="chat-msg-time" th:text="${msg.sentAtStr}"></div>
            </div>
        </th:block>
    </div>

    <div class="chat-input-area">
        <input type="text" id="chatInput" class="chat-input"
               placeholder="메시지를 입력하세요..." maxlength="500"
               onkeydown="if(event.key==='Enter' && !event.shiftKey){event.preventDefault();sendMsg();}"/>
        <button class="chat-send-btn" id="sendBtn" onclick="sendMsg()" disabled>전송</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
<script th:inline="javascript">
(function () {
    const myId   = /*[[${loginUser.employeeId}]]*/ '';
    const myName = /*[[${loginUser.empNm}]]*/ '';

    const statusEl  = document.getElementById('chatStatus');
    const messagesEl = document.getElementById('chatMessages');
    const inputEl   = document.getElementById('chatInput');
    const sendBtn   = document.getElementById('sendBtn');

    // 페이지 로드 시 스크롤 맨 아래
    messagesEl.scrollTop = messagesEl.scrollHeight;

    // STOMP 연결
    const socket = new SockJS('/ws/chat');
    const stompClient = Stomp.over(socket);
    stompClient.debug = null; // 콘솔 로그 제거

    stompClient.connect({}, function () {
        statusEl.classList.add('connected');
        sendBtn.disabled = false;

        stompClient.subscribe('/topic/chat.global', function (frame) {
            const msg = JSON.parse(frame.body);
            appendMessage(msg, msg.senderId === myId);
        });
    }, function () {
        statusEl.classList.remove('connected');
        sendBtn.disabled = true;
    });

    function sendMsg() {
        const content = inputEl.value.trim();
        if (!content || sendBtn.disabled) return;
        stompClient.send('/app/chat.send', {}, JSON.stringify({ content: content }));
        inputEl.value = '';
        inputEl.focus();
    }

    function appendMessage(msg, isMine) {
        const now = new Date();
        const timeStr = now.getHours().toString().padStart(2,'0') + ':'
                      + now.getMinutes().toString().padStart(2,'0');

        const div = document.createElement('div');
        div.className = 'chat-msg ' + (isMine ? 'mine' : 'theirs');

        let html = '';
        if (!isMine) {
            html += `<div class="chat-msg-sender">${esc(msg.senderName || '')}</div>`;
        }
        html += `<div class="chat-msg-bubble">${esc(msg.content)}</div>`;
        html += `<div class="chat-msg-time">${timeStr}</div>`;
        div.innerHTML = html;

        messagesEl.appendChild(div);
        messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function esc(s) {
        return s.replace(/&/g,'&amp;').replace(/</g,'&lt;')
                .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    window.sendMsg = sendMsg;
})();
</script>
