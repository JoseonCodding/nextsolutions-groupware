<title>채팅</title>
<link rel="stylesheet" href="/css/common.css">

<style>
.chat-wrap {
    display: flex;
    flex-direction: column;
    height: calc(100vh - 120px);
    max-width: 800px;
    margin: 20px auto;
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.1);
    overflow: hidden;
}
.chat-header {
    background: #3949ab;
    color: #fff;
    padding: 14px 20px;
    font-size: 15px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 12px;
}
.chat-back-btn {
    color: #fff;
    text-decoration: none;
    font-size: 18px;
    line-height: 1;
}
.chat-back-btn:hover { opacity: 0.8; }
.chat-status {
    width: 9px; height: 9px;
    border-radius: 50%;
    background: #aaa;
    margin-left: auto;
}
.chat-status.connected { background: #69f0ae; }
.chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    background: #f5f6fa;
}
.chat-msg { display: flex; flex-direction: column; max-width: 70%; }
.chat-msg.mine  { align-self: flex-end;  align-items: flex-end; }
.chat-msg.theirs{ align-self: flex-start; align-items: flex-start; }
.chat-msg-sender { font-size: 11px; color: #888; margin-bottom: 3px; }
.chat-msg-bubble {
    padding: 9px 14px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.5;
    word-break: break-word;
}
.chat-msg.mine   .chat-msg-bubble {
    background: #3949ab; color: #fff; border-bottom-right-radius: 4px;
}
.chat-msg.theirs .chat-msg-bubble {
    background: #fff; color: #222; border-bottom-left-radius: 4px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
}
.chat-msg-time { font-size: 10px; color: #aaa; margin-top: 3px; }
.chat-input-area {
    display: flex;
    gap: 10px;
    padding: 14px 16px;
    border-top: 1px solid #e0e0e0;
    background: #fff;
}
.chat-input {
    flex: 1;
    padding: 10px 14px;
    border: 1px solid #ddd;
    border-radius: 24px;
    font-size: 14px;
    outline: none;
    height: 42px;
}
.chat-input:focus { border-color: #3949ab; }
.chat-send-btn {
    padding: 0 20px;
    background: #3949ab;
    color: #fff;
    border: none;
    border-radius: 24px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    height: 42px;
}
.chat-send-btn:hover { filter: brightness(0.88); }
.chat-send-btn:disabled { background: #bbb; cursor: default; }
.chat-attach-btn {
    width: 42px; height: 42px;
    border: 1px solid #ddd;
    border-radius: 50%;
    background: #f5f5f5;
    cursor: pointer;
    font-size: 18px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
}
.chat-attach-btn:hover { background: #e8eaf6; }
.chat-msg-image {
    max-width: 220px; max-height: 220px;
    border-radius: 10px; cursor: pointer; display: block;
}
.chat-msg-file {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 12px;
    background: rgba(255,255,255,0.15);
    border-radius: 8px; text-decoration: none;
    color: inherit; font-size: 13px;
}
.chat-msg.theirs .chat-msg-file { background: #f0f0f0; color: #333; }
.upload-progress {
    font-size: 11px; color: #aaa; padding: 2px 6px;
    display: none;
}
.chat-msg-actions {
    display: none;
    gap: 4px;
    margin-bottom: 3px;
}
.chat-msg.mine:hover .chat-msg-actions { display: flex; }
.msg-action-btn {
    font-size: 11px; padding: 2px 7px;
    border: 1px solid #ccc; border-radius: 10px;
    background: #fff; cursor: pointer; color: #555;
}
.msg-action-btn:hover { background: #f0f0f0; }
.msg-action-btn.del { color: #e53935; border-color: #e53935; }
.chat-msg-deleted {
    font-size: 12px; color: #bbb; font-style: italic;
    padding: 6px 12px;
}
.chat-msg-edit-area {
    display: flex; gap: 6px; align-items: center;
}
.chat-msg-edit-input {
    flex: 1; padding: 6px 10px; border: 1px solid #3949ab;
    border-radius: 12px; font-size: 14px; outline: none;
    min-width: 160px;
}
.read-mark {
    font-size: 10px; color: #3949ab; font-weight: 600;
    margin-top: 2px; align-self: flex-end;
}
</style>

<div class="chat-wrap">
    <div class="chat-header">
        <a href="/chat" class="chat-back-btn">&#8592;</a>
        <span th:text="${roomTitle}">채팅방</span>
        <div class="chat-status" id="chatStatus"></div>
    </div>

    <div class="chat-messages" id="chatMessages">
        <th:block th:each="msg : ${chatHistory}">
            <div class="chat-msg"
                 th:classappend="${msg.senderId == loginUser.employeeId} ? ' mine' : ' theirs'"
                 th:attr="data-msg-id=${msg.messageId}">
                <!-- 수정/삭제 버튼 (본인 메시지만, 삭제 안된 것만) -->
                <div class="chat-msg-actions"
                     th:if="${msg.senderId == loginUser.employeeId and (msg.isDeleted == null or !msg.isDeleted)}">
                    <button class="msg-action-btn"
                            th:if="${msg.messageType == null or msg.messageType == 'text'}"
                            th:onclick="'startEdit(' + ${msg.messageId} + ')'">수정</button>
                    <button class="msg-action-btn del"
                            th:onclick="'deleteMsg(' + ${msg.messageId} + ')'">삭제</button>
                </div>
                <div class="chat-msg-sender"
                     th:if="${msg.senderId != loginUser.employeeId}"
                     th:text="${msg.senderName}"></div>
                <!-- 삭제된 메시지 -->
                <div class="chat-msg-deleted" th:if="${msg.isDeleted}">삭제된 메시지입니다.</div>
                <th:block th:unless="${msg.isDeleted}">
                    <!-- 이미지 -->
                    <div class="chat-msg-bubble" th:if="${msg.messageType == 'image'}" style="padding:4px;">
                        <img class="chat-msg-image"
                             th:src="@{/approval/downloadFile(fileName=${msg.fileUrl}, orgName=${msg.fileName})}"
                             th:alt="${msg.fileName}"
                             onclick="this.requestFullscreen ? this.requestFullscreen() : null">
                    </div>
                    <!-- 파일 -->
                    <div class="chat-msg-bubble" th:if="${msg.messageType == 'file'}">
                        <a class="chat-msg-file"
                           th:href="@{/approval/downloadFile(fileName=${msg.fileUrl}, orgName=${msg.fileName})}"
                           th:text="${'📎 ' + msg.fileName}" download></a>
                    </div>
                    <!-- 텍스트 -->
                    <div class="chat-msg-bubble"
                         th:if="${msg.messageType == null or msg.messageType == 'text'}"
                         th:text="${msg.content}"></div>
                    <span th:if="${msg.isEdited}" style="font-size:10px;color:#bbb;">(수정됨)</span>
                </th:block>
                <!-- 읽음 표시 (1:1, 본인 메시지, 삭제 안된 것만) -->
                <span class="read-mark"
                      th:if="${otherLastRead != null
                               and msg.senderId == loginUser.employeeId
                               and (msg.isDeleted == null or !msg.isDeleted)
                               and msg.sentAt != null
                               and !msg.sentAt.isAfter(otherLastRead)}">읽음</span>
                <div class="chat-msg-time" th:text="${msg.sentAtStr}"></div>
            </div>
        </th:block>
    </div>

    <div class="chat-input-area">
        <button class="chat-attach-btn" type="button" onclick="document.getElementById('fileInput').click()" title="파일 첨부">📎</button>
        <input type="file" id="fileInput" style="display:none"
               accept="image/*,.pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.txt,.zip"
               onchange="uploadFile(this)">
        <input type="text" id="chatInput" class="chat-input"
               placeholder="메시지를 입력하세요..." maxlength="500"
               onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg();}"/>
        <span class="upload-progress" id="uploadProgress">업로드 중...</span>
        <button class="chat-send-btn" id="sendBtn" onclick="sendMsg()" disabled>전송</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
<script th:inline="javascript">
(function () {
    const myId      = /*[[${loginUser.employeeId}]]*/ '';
    const myName    = /*[[${loginUser.empNm}]]*/ '';
    const roomId    = /*[[${roomId}]]*/ 'global';
    const isDm      = roomId.startsWith('dm_');
    // 상대방이 마지막으로 읽은 시각 (ms, 서버에서 내려온 값)
    const otherLastReadRaw = /*[[${otherLastRead}]]*/ null;
    let otherLastReadMs = otherLastReadRaw ? new Date(otherLastReadRaw).getTime() : 0;

    const statusEl   = document.getElementById('chatStatus');
    const messagesEl = document.getElementById('chatMessages');
    const inputEl    = document.getElementById('chatInput');
    const sendBtn    = document.getElementById('sendBtn');

    messagesEl.scrollTop = messagesEl.scrollHeight;

    const socket = new SockJS('/ws/chat');
    const stompClient = Stomp.over(socket);
    stompClient.debug = null;

    stompClient.connect({}, function () {
        statusEl.classList.add('connected');
        sendBtn.disabled = false;

        stompClient.subscribe('/topic/chat.' + roomId, function (frame) {
            const msg = JSON.parse(frame.body);
            if (msg.eventType === 'delete') {
                handleDelete(msg.messageId);
            } else if (msg.eventType === 'edit') {
                handleEdit(msg.messageId, msg.content);
            } else if (msg.eventType === 'read') {
                // 상대방이 읽음 → 내 메시지에 읽음 마크 표시
                otherLastReadMs = Date.now();
                document.querySelectorAll('.chat-msg.mine').forEach(row => {
                    if (!row.querySelector('.read-mark')) {
                        const mark = document.createElement('span');
                        mark.className = 'read-mark';
                        mark.textContent = '읽음';
                        const timeEl = row.querySelector('.chat-msg-time');
                        if (timeEl) timeEl.before(mark);
                    }
                });
            } else {
                appendMessage(msg, msg.senderId === myId);
                fetch('/chat/markRead', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: 'roomId=' + encodeURIComponent(roomId)
                });
            }
        });
    }, function () {
        statusEl.classList.remove('connected');
        sendBtn.disabled = true;
    });

    function sendMsg() {
        const content = inputEl.value.trim();
        if (!content || sendBtn.disabled) return;
        stompClient.send('/app/chat.send', {}, JSON.stringify({
            roomId: roomId, content: content, messageType: 'text'
        }));
        inputEl.value = '';
        inputEl.focus();
    }

    function uploadFile(input) {
        const file = input.files[0];
        if (!file) return;
        if (file.size > 20 * 1024 * 1024) { alert('파일 크기는 20MB 이하만 가능합니다.'); return; }

        const progressEl = document.getElementById('uploadProgress');
        progressEl.style.display = 'inline';
        sendBtn.disabled = true;

        const fd = new FormData();
        fd.append('file', file);
        fetch('/chat/upload', { method: 'POST', body: fd })
            .then(r => r.json())
            .then(data => {
                progressEl.style.display = 'none';
                sendBtn.disabled = false;
                input.value = '';
                if (data.error) { alert('업로드 실패: ' + data.error); return; }
                stompClient.send('/app/chat.send', {}, JSON.stringify({
                    roomId: roomId,
                    content: data.fileName,
                    messageType: data.messageType,
                    fileUrl: data.fileUrl,
                    fileName: data.fileName
                }));
            })
            .catch(() => {
                progressEl.style.display = 'none';
                sendBtn.disabled = false;
                alert('업로드 중 오류가 발생했습니다.');
            });
    }

    function appendMessage(msg, isMine) {
        const now = new Date();
        const timeStr = now.getHours().toString().padStart(2,'0') + ':'
                      + now.getMinutes().toString().padStart(2,'0');
        const div = document.createElement('div');
        div.className = 'chat-msg ' + (isMine ? 'mine' : 'theirs');
        let html = '';
        if (!isMine) html += `<div class="chat-msg-sender">${esc(msg.senderName || '')}</div>`;

        const type = msg.messageType || 'text';
        const dlBase = '/approval/downloadFile?fileName=' + encodeURIComponent(msg.fileUrl || '')
                     + '&orgName=' + encodeURIComponent(msg.fileName || '');
        if (type === 'image') {
            html += `<div class="chat-msg-bubble" style="padding:4px;">
                       <img class="chat-msg-image" src="${dlBase}" alt="${esc(msg.fileName||'')}"
                            onclick="this.requestFullscreen&&this.requestFullscreen()">
                     </div>`;
        } else if (type === 'file') {
            html += `<div class="chat-msg-bubble">
                       <a class="chat-msg-file" href="${dlBase}" download>📎 ${esc(msg.fileName||'')}</a>
                     </div>`;
        } else {
            html += `<div class="chat-msg-bubble">${esc(msg.content)}</div>`;
        }
        html += `<div class="chat-msg-time">${timeStr}</div>`;
        div.innerHTML = html;
        messagesEl.appendChild(div);
        messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function deleteMsg(messageId) {
        if (!confirm('메시지를 삭제할까요?')) return;
        stompClient.send('/app/chat.delete', {}, JSON.stringify({ messageId: messageId, roomId: roomId }));
    }

    function startEdit(messageId) {
        const row = document.querySelector(`[data-msg-id="${messageId}"]`);
        if (!row) return;
        const bubble = row.querySelector('.chat-msg-bubble');
        if (!bubble) return;
        const original = bubble.textContent.trim();
        bubble.innerHTML = `
            <div class="chat-msg-edit-area">
                <input class="chat-msg-edit-input" value="${esc(original)}" maxlength="500">
                <button class="msg-action-btn" onclick="submitEdit(${messageId}, this)">저장</button>
                <button class="msg-action-btn" onclick="cancelEdit(${messageId}, '${esc(original)}')">취소</button>
            </div>`;
        bubble.querySelector('input').focus();
    }

    function submitEdit(messageId, btn) {
        const input = btn.parentElement.querySelector('input');
        const content = input.value.trim();
        if (!content) return;
        stompClient.send('/app/chat.edit', {}, JSON.stringify({ messageId: messageId, roomId: roomId, content: content }));
    }

    function cancelEdit(messageId, original) {
        const row = document.querySelector(`[data-msg-id="${messageId}"]`);
        if (!row) return;
        const bubble = row.querySelector('.chat-msg-bubble');
        if (bubble) bubble.textContent = original;
    }

    function handleDelete(messageId) {
        const row = document.querySelector(`[data-msg-id="${messageId}"]`);
        if (!row) return;
        const actionsEl = row.querySelector('.chat-msg-actions');
        if (actionsEl) actionsEl.remove();
        const bubble = row.querySelector('.chat-msg-bubble');
        if (bubble) bubble.replaceWith(Object.assign(document.createElement('div'), {
            className: 'chat-msg-deleted', textContent: '삭제된 메시지입니다.'
        }));
        const editedMark = row.querySelector('span[style]');
        if (editedMark) editedMark.remove();
    }

    function handleEdit(messageId, content) {
        const row = document.querySelector(`[data-msg-id="${messageId}"]`);
        if (!row) return;
        const bubble = row.querySelector('.chat-msg-bubble');
        if (bubble) bubble.textContent = content;
        if (!row.querySelector('.edited-mark')) {
            const mark = document.createElement('span');
            mark.className = 'edited-mark';
            mark.style.cssText = 'font-size:10px;color:#bbb;';
            mark.textContent = '(수정됨)';
            const timeEl = row.querySelector('.chat-msg-time');
            if (timeEl) timeEl.before(mark);
        }
    }

    function appendMessage(msg, isMine) {
        const now = new Date();
        const timeStr = now.getHours().toString().padStart(2,'0') + ':'
                      + now.getMinutes().toString().padStart(2,'0');
        const div = document.createElement('div');
        div.className = 'chat-msg ' + (isMine ? 'mine' : 'theirs');
        div.dataset.msgId = msg.messageId;
        let html = '';
        if (isMine) {
            const type = msg.messageType || 'text';
            if (type === 'text') {
                html += `<div class="chat-msg-actions">
                    <button class="msg-action-btn" onclick="startEdit(${msg.messageId})">수정</button>
                    <button class="msg-action-btn del" onclick="deleteMsg(${msg.messageId})">삭제</button>
                </div>`;
            } else {
                html += `<div class="chat-msg-actions">
                    <button class="msg-action-btn del" onclick="deleteMsg(${msg.messageId})">삭제</button>
                </div>`;
            }
        }
        if (!isMine) html += `<div class="chat-msg-sender">${esc(msg.senderName || '')}</div>`;

        const type = msg.messageType || 'text';
        const dlBase = '/approval/downloadFile?fileName=' + encodeURIComponent(msg.fileUrl || '')
                     + '&orgName=' + encodeURIComponent(msg.fileName || '');
        if (type === 'image') {
            html += `<div class="chat-msg-bubble" style="padding:4px;">
                       <img class="chat-msg-image" src="${dlBase}" alt="${esc(msg.fileName||'')}"
                            onclick="this.requestFullscreen&&this.requestFullscreen()">
                     </div>`;
        } else if (type === 'file') {
            html += `<div class="chat-msg-bubble">
                       <a class="chat-msg-file" href="${dlBase}" download>📎 ${esc(msg.fileName||'')}</a>
                     </div>`;
        } else {
            html += `<div class="chat-msg-bubble">${esc(msg.content)}</div>`;
        }
        html += `<div class="chat-msg-time">${timeStr}</div>`;
        div.innerHTML = html;
        messagesEl.appendChild(div);
        messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function esc(s) {
        return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;')
                        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    window.sendMsg = sendMsg;
    window.uploadFile = uploadFile;
    window.deleteMsg = deleteMsg;
    window.startEdit = startEdit;
    window.submitEdit = submitEdit;
    window.cancelEdit = cancelEdit;
})();
</script>
