<script src="/js/jquery-3.7.1.min.js"></script>
<script th:inline="javascript">

	const arr = /*[[ ${scheduleList}]]*/{};
	const dto = /*[[ ${scheduleDTO}]]*/{};
	const viewMode = /*[[ ${viewMode}]]*/{};
	//console.log(arr)
	
	$(function(){
        console.log("document ready!");

        // ==========================
        // 공통 상수/전역
        // ==========================
        const WEEK_START_DAY = 0; // 0: 일요일
        const weekTitle = "일월화수목금토";

        // 주별 보기 기준 날짜(해당 주에 속한 '월 안의' 임의 날짜)
        let weekRef = null;
        // 현재 주차(주별 보기 시 유지용)
        let currentWeekNo = null;

        // XSS 방어
        function escapeHtml(text) {
            return text
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        // 일정 1개 HTML 변환 시
        function scheduleOneView(schOne){
            var clickBox = "";
            let color = "black"; // 기본: 일반 일정(검은색)
            
            
         	// schOne.scheduleId가 문자열일 수도 있으므로 숫자로 변환
            const scheduleId = parseInt(schOne.scheduleId, 10);

            // 숫자가 아닌 경우 처리
            if (isNaN(scheduleId)) {
                console.error('잘못된 scheduleId:', schOne.scheduleId);
                return ''; // 클릭박스 생성 중단 혹은 기본값 처리
            }
            
            const viewMode = currentView; // 현재 월/주/일
            //clickBox = "<a href='/schedule/detail?scheduleId=" + schOne.scheduleId + "&viewMode=" + viewMode + "' class='sche-comm'>" + schOne.title + "</a>";
            //return clickBox + "<br/>";
            
            
            /*
            if(schOne.holiday=='일정' || schOne.holiday=='휴무일'){
                clickBox = "<a href='/schedule/detail?scheduleId="+schOne.scheduleId+"'>"+schOne.title+"</a>";
            }else if(schOne.holiday=='프로젝트' ){
                clickBox = "<a href='/pjtMng/pjtDetail?pjtSn="+ schOne.pjtSn +"'>"+schOne.title+"</a>";
            }else{
                clickBox = schOne.title;
            }
            return clickBox+"<br/>";
            */
            
            if(schOne.holiday == '휴무일'){
                clickBox = "<a href='/schedule/detail?scheduleId="+schOne.scheduleId +"&viewMode=" + viewMode + "' class='sche-comm holiday-sche'>"+escapeHtml(schOne.title)+"</a>";

            }else if(schOne.holiday == '프로젝트'){
                clickBox = "<a href='/pjtMng/pjtDetail?pjtSn="+ schOne.pjtSn +"&viewMode=" + viewMode + "' class='sche-comm project-sche'>"+escapeHtml(schOne.title)+"</a>";
            }else if(schOne.holiday == '연차'){
                clickBox = "<span class='sche-comm leave'>"+escapeHtml(schOne.title)+"</span>";
            }else{
                clickBox = "<a href='/schedule/detail?scheduleId="+schOne.scheduleId +"&viewMode=" + viewMode + "' class='sche-comm normal-sche'>"+escapeHtml(schOne.title)+"</a>";
            }

            return clickBox + "<br/>";
            
        }

        // 월 -> 각 일별 스케줄
        function dayScheduleGet(todayStr){
        	var today = new Date(todayStr)
        	var lastDay = new Date(today.getYear(), today.getMonth()+1,0).getDate()  // 월 마지막 날 
        	//console.log(lastDay)
        	var lastChk = today.getDate() == lastDay  // 현재 날짜가 달의 마지막 날인 지 확인
            var res = [];
            for(const vv of arr){
                if((vv.startLocalDate <= todayStr && vv.endLocalDate >= todayStr)
                	&& (     (vv.repeatCheck < 2) || (vv.repeatCheck == 2 && today.getDay() == vv.startLocalDayNo) || 
                			(vv.repeatCheck == 3 && (today.getDate() == vv.startLocalDateNo  || (lastChk && lastDay <  vv.startLocalDateNo  ) ))   )
                			//월체크																//달의 마자막 날이면서 일정날짜가 마지막날보다 크다면   29일 인데 31 일 일정이라면
                ){
                    res.push(vv);
                }
            }
            return res;
        }
        
        
        //종일 스케줄
        function timeScheduleGet(todayStr, pTime){
        	var today = new Date(todayStr)
        	
            var res = [];
            for(const vv of arr){
                var stT = eval(vv.startTimeStr.substr(0,2));
                var endT = eval(vv.endTimeStr.substr(0,2));
                if( vv.cate!="종일" && 
                	vv.startLocalDate <= todayStr && vv.endLocalDate >= todayStr
                	&& (  (vv.repeatCheck < 2) || (vv.repeatCheck == 2 && today.getDay() == vv.startLocalDayNo) || (vv.repeatCheck == 3 && today.getDate() == vv.startLocalDateNo)   ) &&
                    stT <= pTime && endT >= pTime ){
                    res.push(vv);
                }
            }
            return res;
        }
        
        // 시간별 스케줄
        function allTimeScheduleGet(todayStr){
        	var today = new Date(todayStr)
            var res = [];
            for(const vv of arr){
                if((vv.cate == '종일' && vv.startLocalDate <= todayStr && vv.endLocalDate >= todayStr)
                	&& (     (vv.repeatCheck < 2) || (vv.repeatCheck == 2 && today.getDay() == vv.startLocalDayNo) || (vv.repeatCheck == 3 && today.getDate() == vv.startLocalDateNo)   )		
                ){
                    res.push(vv);
                }
            }
            return res;
        }

        // 유틸
        function dateToStr(ddd){  // yyyy-MM-dd
            var mm = ddd.getMonth()+1;
            if(mm<10){ mm = '0'+mm; }
            var dd = ddd.getDate();
            if(dd<10){ dd = '0'+dd; }
            return ddd.getYear()+1900+"-"+mm+"-"+dd;
        }

        // (월별) 날짜 셀 생성
        function oneDayToSchTd(i){
            monthFirst.setDate(i);
            var td= $("<td class='monthgrid-day'></td>");
            var ttt = i+"<br/>";
            for(var vv of dayScheduleGet(dateToStr(monthFirst))){
                ttt += scheduleOneView(vv);
            }
            td.html(ttt);
            return td;
        }

        // 월별 렌더
        function monthDiaryView(){
            console.log("monthDiaryView() 실행");
            $("#month_title").html(monthFirst.getYear()+1900+'년 '+(monthFirst.getMonth()+1) + '월');
            monthFirst.setDate(1);
            var first = monthFirst.getDay();
            monthFirst = new Date(monthFirst.getFullYear(),monthFirst.getMonth()+1,0);
            var last = monthFirst.getDate();

            $("#diary_body").empty();
            $("#diary_body").append("<tr><th class='mTH'>일</th><th class='mTH'>월</th><th class='mTH'>화</th><th class='mTH'>수</th><th class='mTH'>목</th><th class='mTH'>금</th><th class='mTH'>토</th></tr>");
            var trLine = $("<tr valign='top' class='no-hover'></tr>");
            $("#diary_body").append(trLine);

            for(var i = 1; i <= first;i++){
                trLine.append($("<td class='monthgrid-day'></td>"));
            }
            for(var i = 1; i <= last;i++){
                trLine.append(oneDayToSchTd(i));
                if(monthFirst.getDay()==6){
                    trLine = $("<tr valign='top' class='no-hover'></tr>");
                    $("#diary_body").append(trLine);
                }
            }
        }

        // == 주차 계산 ==
        function weekOfMonth(schDate){
            const firstDay = new Date(schDate.getFullYear(), schDate.getMonth(), 1);
            const dayOfMonth = schDate.getDate();
            const firstDayWeek = firstDay.getDay();
            const offset = (firstDayWeek - WEEK_START_DAY + 7) % 7;
            return Math.ceil((dayOfMonth + offset) / 7);
        }
        function weeksInMonth(year, monthIdx){
            const last = new Date(year, monthIdx + 1, 0);
            return weekOfMonth(last);
        }
        function getSundayOfWeek(dd){
            const day = dd.getDay(); // 0~6
            const diff = WEEK_START_DAY - day; // 일요일 기준
            const sunday = new Date(dd);
            sunday.setDate(dd.getDate() + diff);
            return sunday;
        }
     	/*
        // 주차 계산 (월경계 포함)
        function weekOfMonthInclusive(schDate){
            // 해당 날짜가 속한 주의 일요일(week start)을 구함
            const weekStart = getSundayOfWeek(schDate);

            // 기준: 달의 첫 날이 속한 주의 일요일
            const firstDay = new Date(schDate.getFullYear(), schDate.getMonth(), 1);
            const firstWeekStart = getSundayOfWeek(firstDay);

            // 두 주차 간 차이 계산 (밀리초 단위 → 주차 변환)
            const diffTime = weekStart - firstWeekStart;
            const diffWeeks = Math.floor(diffTime / (7 * 24 * 60 * 60 * 1000));

            return diffWeeks + 1; // 첫 주는 1주부터 시작
        }*/

        // 주별 렌더
        function weekDiaryView(){
        	weekRef = getSundayOfWeek(weekRef);
        	var weekTitleDay = new Date(weekRef.getFullYear(), weekRef.getMonth(), weekRef.getDate()+6)
        	console.log(weekRef, weekTitleDay)
        	
            // 앵커 날짜를 기준으로 현재 주차 산정 + 타이틀용 유지
            currentWeekNo = weekOfMonth(weekTitleDay);

            $("#month_title").html(
            		weekTitleDay.getFullYear() + '년 ' + (weekTitleDay.getMonth()+1) + '월 '
            );
            
            $("#week_title").html(
                    currentWeekNo + '주'
            );

            const weekStart = getSundayOfWeek(weekRef);
            const weekArr = [];
            for(let i=0;i<7;i++){
                weekArr.push(new Date(weekStart.getFullYear(), weekStart.getMonth(), weekStart.getDate()+i));
            }

            $("#diary_body").empty();

            // 헤더
            var title = $("<tr><th>시간</th></tr>");
            for(var dd of weekArr){
                title.append($("<th  class='wTH'>"+dd.getDate()+"일("+weekTitle[dd.getDay()]+")</th>"));
            }
            $("#diary_body").append(title);

            // 종일
            title = $("<tr class='no-hover'><th>종일</th></tr>");
            for(var dd of weekArr){
                var ttdd = $("<td   valign='top'></td>");
                var ttt = "";
                for(vv of allTimeScheduleGet(dateToStr(dd))){
                    ttt += scheduleOneView(vv);
                }
                ttdd.html(ttt);
                title.append(ttdd);
            }
            $("#diary_body").append(title);

            // 시간대 (7~21)
            for(var i = 7 ; i <= 21; i++){
                var trLine = $("<tr><td>"+i+":00</td></tr>");
                for(var dd of weekArr){
                    var ttdd = $("<td  valign='top'></td>");
                    var ttt = "";
                    for(vv of timeScheduleGet(dateToStr(dd), i)){
                        ttt += scheduleOneView(vv);
                    }
                    ttdd.html(ttt);
                    trLine.append(ttdd);
                }
                $("#diary_body").append(trLine);
            }
        }

        // 일별 렌더
        function dayDiaryView(){
            console.log("dayDiaryView() 실행:");
            $("#month_title").html(dayOne.getYear()+1900+'년 '+(dayOne.getMonth()+1) + '월');
            
            $("#day_title").html(dayOne.getDate()+ '일');

            $("#diary_body").empty();
            var title = $("<tr><th class='dHH'>시간</th><th   class='dTH'>"+dayOne.getDate()+"일("+weekTitle[dayOne.getDay()]+")</th></tr>");
            $("#diary_body").append(title);

            title = $("<tr><th>종일</th></tr>");
            var ttdd = $("<td   valign='top'></td>");
            var ttt = "";
            for(vv of allTimeScheduleGet(dateToStr(dayOne))){
                ttt += scheduleOneView(vv);
            }
            ttdd.html(ttt);
            title.append(ttdd);
            $("#diary_body").append(title);

            for(var i = 7 ; i <= 21; i++){
                var trLine = $("<tr><td>"+i+":00</td></tr>");
                var ttdd2 = $("<td   valign='top'></td>");
                var ttt2 = "";
                for(vv of timeScheduleGet(dateToStr(dayOne), i)){
                    ttt2 += scheduleOneView(vv);
                }
                ttdd2.html(ttt2);
                trLine.append(ttdd2);
                $("#diary_body").append(trLine);
            }
        }

        // 네비게이션: 이전/다음
        $("#prevMonth").click(function(){
            if(currentView=='month'){
                monthFirst.setDate(1);
                monthFirst.setMonth(monthFirst.getMonth()-1);
                monthDiaryView();
            }else if(currentView=='week'){
                // 전월 동일 주차로 이동 (없으면 마지막 주로 보정)
                let y = weekRef.getFullYear();
                let m = weekRef.getMonth() - 1;
                if (m < 0){ m = 11; y--; }

                const lastDay = new Date(y, m + 1, 0);
                const lastWeekNo = weeksInMonth(y, m);
                const desiredWeekNo = currentWeekNo || weekOfMonth(weekRef);
                const targetWeekNo = Math.min(desiredWeekNo, lastWeekNo);

                const dayInMonth = Math.min(lastDay.getDate(), 1 + (targetWeekNo - 1) * 7);
                weekRef = new Date(y, m, dayInMonth);

                weekDiaryView();
            }else if(currentView=='day'){
                dayOne.setMonth(dayOne.getMonth()-1);
                dayDiaryView();
            }
        });

        $("#nextMonth").click(function(){
            if(currentView=='month'){
                monthFirst.setDate(1);
                monthFirst.setMonth(monthFirst.getMonth()+1);
                monthDiaryView();
            }else if(currentView=='week'){
                // 익월 동일 주차로 이동 (없으면 마지막 주로 보정)
                let y = weekRef.getFullYear();
                let m = weekRef.getMonth() + 1;
                if (m > 11){ m = 0; y++; }

                const lastDay = new Date(y, m + 1, 0);
                const lastWeekNo = weeksInMonth(y, m);
                const desiredWeekNo = currentWeekNo || weekOfMonth(weekRef);
                const targetWeekNo = Math.min(desiredWeekNo, lastWeekNo);

                const dayInMonth = Math.min(lastDay.getDate(), 1 + (targetWeekNo - 1) * 7);
                weekRef = new Date(y, m, dayInMonth);

                weekDiaryView();
            }else if(currentView=='day'){
                dayOne.setMonth(dayOne.getMonth()+1);
                dayDiaryView();
            }
        });

        $("#prevWeek").click(function(){
            weekRef.setDate(weekRef.getDate()-7);
            weekDiaryView();
        });
        $("#nextWeek").click(function(){
            weekRef.setDate(weekRef.getDate()+7);
            weekDiaryView();
        });
        $("#prevDay").click(function(){
            dayOne.setDate(dayOne.getDate()-1);
            dayDiaryView();
        });
        $("#nextDay").click(function(){
            dayOne.setDate(dayOne.getDate()+1);
            dayDiaryView();
        });

        // 보기 전환
        let currentView = 'month';
        function setView(view) {
            currentView = view;
            $("#dayNav, #weekNav").hide();
            if (view === 'month') {
                $("#dayNav, #weekNav").hide();
            } else if (view === 'day') {
                $("#dayNav").show();
            } else if (view === 'week') {
                $("#weekNav").show();
            }
            $("#monthNav").show();
        }

        $("#viewMonth").on("click", function() {
            setView('month');
            monthFirst = new Date();
            //monthDiaryView();
            location.href = "/schedule?viewMode=month";	// 보기 전환 버튼
        });
        $("#viewWeek").on("click", function() {
            setView('week');
            // 현재 날짜를 앵커로 설정(월 안의 날짜)
            weekRef = new Date();
            //weekDiaryView();
            location.href = "/schedule?viewMode=week";	// 보기 전환 버튼
        });
        $("#viewDay").on("click", function() {
            setView('day');
            dayOne = new Date();
            //dayDiaryView();
            location.href = "/schedule?viewMode=day";	// 보기 전환 버튼
        });
        

        // 상세보기 페이지에서 '목록으로' 버튼 처리
        $(function(){
            $("#backToList").on("click", function(){
                const urlParams = new URLSearchParams(window.location.search);
                const viewMode = urlParams.get('viewMode') || 'month';
                location.href = "/schedule?viewMode=" + viewMode;
            });
        });


        
        // 초기 상태
        //var monthFirst = new Date();
        //var dayOne = null;
        //monthDiaryView();
        //setView('month');
        
     	// 초기 상태: URL 파라미터(viewMode) 기반
        var monthFirst = new Date();
        var dayOne = new Date();
        weekRef = new Date();

        const urlParams = new URLSearchParams(window.location.search);
        const viewMode = urlParams.get('viewMode') || 'month'; // 기본값 month

        if (viewMode === 'month') {
            setView('month');
            monthDiaryView();
        } else if (viewMode === 'week') {
            setView('week');
            weekDiaryView();
        } else if (viewMode === 'day') {
            setView('day');
            dayDiaryView();
        }

    });
</script>

<div class="sche-container">
<h1>일정 관리</h1>
	
	
	<div class="view-select">
	    <!-- 보기 전환 버튼 -->
	    <button id="viewMonth">월별</button>
	    <button id="viewWeek">주별</button>
	    <button id="viewDay">일별</button>
	</div>
	
	<!-- 월 이동 버튼 -->
	<div id="monthNav" class="month-nav" >
	    <button id="prevMonth" class="month-btn1">이전달</button>
	    <h2 id="month_title" ></h2>
	    <button id="nextMonth" class="month-btn2">다음달</button>
	</div>
	
	<!-- 주 이동 버튼 -->
	<div id="weekNav" class="week-nav">
	    <button id="prevWeek" class="week-btn1">이전주</button>
	    <h2 id="week_title" ></h2>
	    <button id="nextWeek" class="week-btn2">다음주</button>
	</div>
	
	<!-- 일 이동 버튼 -->
	<div id="dayNav" class="day-nav">
	    <button id="prevDay" class="day-btn1">이전날</button>
	    <h2 id="day_title" ></h2>
	    <button id="nextDay" class="day-btn2">다음날</button>
	</div>
	
	<!-- 월별 보기 -->
	<table class="sche-table no-hover" id="diary_body">
	</table>
	
	
	<br />
	
	<!-- 권한자만 등록 버튼 보이도록 -->
	<a th:if="${session.loginUser.role == '일정' or session.loginUser.role == '대표'}"
	   th:href="@{/schedule/insert}" class="rrgg">일정 등록</a>
</div>
