<!-- 일정 상세보기 -->
<div>
    <h1 class="detail-title">일정 상세보기</h1>
    <table>
        <tr>
            <th>일정명</th>
            <td>
                <span th:text="${scd.title}"></span>
            </td>
        </tr>
        <tr>
            <th>기간</th>
            <td>
                <span th:text="${scd.startDateStr}"></span>
                <span th:text="${scd.startTimeStr}"></span>
                ~
                <span th:text="${scd.endDateStr}"></span>
                <span th:text="${scd.endTimeStr}"></span>
                <span th:if="${scd.cate == '종일'}">(종일)</span>
            </td>
        </tr>
        <tr>
            <th>일정 옵션</th>
            <td>
                <span th:if="${scd.repeatCheck == 0}">반복 없음</span>
                <span th:if="${scd.repeatCheck == 1}">매일 반복</span>
                <span th:if="${scd.repeatCheck == 2}">매주 반복</span>
                <span th:if="${scd.repeatCheck == 3}">매달 반복</span>

                <span th:if="${scd.holiday != null}"> | 휴무일</span>
                <span th:if="${scd.alarm != null}"> | 알림</span>
            </td>
        </tr>
        <tr>
            <th>내용</th>
            <td>
                <p th:text="${scd.content}"></p>
            </td>
        </tr>
    </table>

    <div class="btn-area">
        <a href="/schedule" class="back-btn">목록으로</a>
        <!-- employId가 일치하거나 권한자만 수정/삭제 가능 -->
        <a th:if="${session.loginUser.employeeId==scd.employeeId  || session.loginUser.role == '일정' or session.loginUser.role == '대표'}"
           th:href="@{|/schedule/modify?scheduleId=${scd.scheduleId}|}" class="edit-btn">수정</a>
        <a th:if="${session.loginUser.employeeId==scd.employeeId  || session.loginUser.role == '일정' or session.loginUser.role == '대표'}"
           th:href="@{|/schedule/delete?scheduleId=${scd.scheduleId}|}" class="reject-btn">삭제</a>
    </div>
</div>
