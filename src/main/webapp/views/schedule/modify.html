<!-- 일정 수정 -->
<script>
  // 1) 상태 적용
  function applyState() {
    const allDayCheckbox = document.getElementById("allDay");
    const holidayCheckbox = document.getElementById("holiday");
    const repeatSelect = document.getElementById("repeatCheck");
    const startTimeInput = document.getElementById("startTime");
    const endTimeInput = document.getElementById("endTime");
    if (!allDayCheckbox || !holidayCheckbox || !repeatSelect) return;

    const isDaily = repeatSelect.value === "1";
    const isHoliday = holidayCheckbox.checked;

    // 매일 반복 선택 시 → 휴무일 불가
    holidayCheckbox.disabled = isDaily;
    if (isDaily) holidayCheckbox.checked = false;

    // 휴무일 선택 시 → 종일 강제, 반복 불가
    if (isHoliday) {
      allDayCheckbox.checked = true;
      repeatSelect.disabled = true;
      repeatSelect.value = "0";
    } else {
      repeatSelect.disabled = false;
    }

    // 종일 선택 시 → 시간 입력 불가
    const isAllDay = allDayCheckbox.checked;
    if (startTimeInput) {
      startTimeInput.disabled = isAllDay;
      if (isAllDay) startTimeInput.value = "";
    }
    if (endTimeInput) {
      endTimeInput.disabled = isAllDay;
      if (isAllDay) endTimeInput.value = "";
    }
  }

  // 2) 날짜/시간 유효성
  function validateEndTime() {
    const startDateInput = document.getElementById("startDate");
    const endDateInput = document.getElementById("endDate");
    const startTimeInput = document.getElementById("startTime");
    const endTimeInput = document.getElementById("endTime");

    if (!startDateInput || !endDateInput || !startTimeInput || !endTimeInput) return;

    // 날짜 비교
    const startDate = new Date(startDateInput.value);
    const endDate = new Date(endDateInput.value);
    if (startDate > endDate) {
      alert("시작일은 종료일보다 늦을 수 없습니다.");
      startDateInput.value = endDateInput.value;
    }

    // 종료시간 제한
    if (startDateInput.value === endDateInput.value && startTimeInput.value && endTimeInput.value) {
      const startTimeNum = parseInt(startTimeInput.value.replace(":", ""), 10);
      const endTimeNum = parseInt(endTimeInput.value.replace(":", ""), 10);
      if (endTimeNum < startTimeNum) {
        alert("종료시간은 시작시간보다 앞설 수 없습니다.");
        endTimeInput.value = startTimeInput.value;
      }
      endTimeInput.min = startTimeInput.value;
    } else {
      endTimeInput.removeAttribute("min");
    }
  }

  function bindDateEvents() {
    document.getElementById("startDate").addEventListener("change", validateEndTime);
    document.getElementById("endDate").addEventListener("change", validateEndTime);
    document.getElementById("endTime").addEventListener("change", validateEndTime);
  }

  // 3) 상태 이벤트
  function bindStateEvents() {
    document.getElementById("holiday").addEventListener("change", applyState);
    document.getElementById("allDay").addEventListener("change", applyState);
    document.getElementById("repeatCheck").addEventListener("change", applyState);
  }

  // 4) 초기화
  document.addEventListener("DOMContentLoaded", function () {
    bindDateEvents();
    bindStateEvents();
    applyState();
  });
</script>

<div class="sche-detail-container">
<form th:action="@{/schedule/modify}" method="post" th:object="${scd}">
<input type="hidden" th:field="*{scheduleId}" />
    <h1 class="detail-title">일정 수정</h1>
    <table class="sche-table-detail">
        <tr>
            <th style="width:200px;">일정명</th>
            <td colspan="3">
                <input type="text" th:field="*{title}"  style="width:100%;" required />
            </td>
        </tr>
        <tr>
            <th>기간</th>
            <td colspan="3">
                시작:
                <input type="date" th:field="*{startDateStr}" id="startDate"/>
                <input type="time" th:field="*{startTimeStr}" id="startTime"/>
                ~ 종료:
                <input type="date" th:field="*{endDateStr}" id="endDate"/>
                <input type="time" th:field="*{endTimeStr}" id="endTime"/>

                <label>
                    <input type="checkbox" th:field="*{cate}" value="종일" id="allDay"/> 종일
                </label>
            </td>
        </tr>
        <tr>
            <th>일정 옵션</th>
            <td colspan="3">
                <label class="sche-options">반복일정 :
                    <select th:field="*{repeatCheck}" id="repeatCheck">
                        <option value="0">반복 없음</option>
                        <option value="1">매일</option>
                        <option value="2">매주</option>
                        <option value="3">매달</option>
                    </select>
                </label>
                <label class="sche-options">
                    <input type="checkbox" th:field="*{holiday}" value="휴무일" id="holiday"/> 휴무일
                </label>
                <label class="sche-options">
                    <input type="checkbox" th:field="*{alarm}" value="알림"/> 알림
                </label>
            </td>
        </tr>
        <tr>
            <th>내용</th>
            <td colspan="3">
                <textarea class="sche-content" th:field="*{content}" cols="50" rows="10" th:utext="*{contentBr}"></textarea>
            </td>
        </tr>
    </table>

        <a class="sche-delete-btn" th:href="@{/schedule/detail(scheduleId=${scd.scheduleId})}">취소</a>
        <button type="submit" class="sche-save-btn" th:href="@{/schedule/modify}" >수정</button>

</form>
</div>
