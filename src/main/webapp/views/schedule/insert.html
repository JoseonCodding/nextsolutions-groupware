<!-- 일정 등록 -->
<form action="" method="post" >
	<table border="" >
		<tr>
			<td colspan="3" align="center">
				일정 등록<a th:href="@{/schedule}">닫힘</a>
			</td>	
		</tr>
		<tr >
			<td colspan="3">
				일정명<textarea name="title" cols="30" rows="1"></textarea>
			</td>
		</tr>
		<tr >
			<td colspan="3">
				<input type="date" name="startDateStr" /><input type="time" name="startTime">
				~ <input type="date" name="endDateStr" /><input type="time" name="endTime">
				<input type="checkbox" name="cate" value="종일"/>종일일정
			</td>

		</tr>
		<tr>
			<td>
				<span>반복일정 : </span>
				<!-- 반복일정 옵션 -->
				<select  name="repeatCheck" id="repeatCheck">
					<option value="0">반복 없음</option>
					<option value="1">매일</option>
					<option value="2">매주</option>
					<option value="3">매달</option>
				</select>
			</td>
			<td>
				<input type="checkbox" name="holiday" value="휴무일"/>휴무일
			</td>
			<td>
				<input type="checkbox" name="alarm" value="알림"/>알림 
			</td>
		</tr>
		<tr >
			<td colspan="3">
				<textarea name="content" id="" cols="50" rows="30"></textarea>
			</td>
		</tr>
		<tr >
			<td colspan="3" align="right">
				<input type="submit" value="결재 신청"/>
			</td>
		</tr>
	</table>
</form>
<script>
// 반복일정 
	document.getElementById("repeatCheck").addEventListener("change", function() {
		const repeatSelect = document.getElementById("repeatSelect");
		if (this.checked) {
			repeatSelect.style.display = "inline-block";
		} else {
			repeatSelect.style.display = "none";
		}
	});
</script>
