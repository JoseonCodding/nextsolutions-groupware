<!-- 일정 등록 -->
<form action="" method="post" >
	<table border="" >
		<tr>
			<td colspan="3" align="center">
				일정 등록<a th:href="@{/schedule}">닫힘</a>
			</td>	
		</tr>
		<tr >
			<td colspan="3">
				일정명<textarea name="title" id="title" cols="30" rows="1"></textarea>
			</td>
		</tr>
		<tr >
			<td colspan="3">
				<input type="date" name="startDateStr" />
				~<input type="date" name="endDateStr" />
			</td>
		</tr>
		<tr>
			<td colspan="2">일정 종류 : 
				<input type="checkbox" name="cate"/>종일일정
				<select>
					<option value="매일"></option>
					<option value="매주"></option>
					<option value="매달"></option>
				</select>
				
			</td>
			<td>알림 설정</td>
		</tr>
		<tr >
			<td colspan="3">
				<textarea name="content" id="" cols="50" rows="30"></textarea>
			</td>
		</tr>
		<tr >
			<td colspan="3" align="right">
				<input type="submit" value="결재 신청"/>
			</td>
		</tr>
	</table>
</form>
