<!-- 일정 등록 -->

<script>
  // 1) 상태 적용
  function applyState() {
    const allDayCheckbox = document.querySelector('input[name="cate"][value="종일"]');
    const holidayCheckbox = document.querySelector('input[name="holiday"]');
    const repeatSelect   = document.getElementById("repeatCheck");
    const startTimeInput = document.querySelector('input[name="startTimeStr"]');
    const endTimeInput   = document.querySelector('input[name="endTimeStr"]');
    if (!allDayCheckbox || !holidayCheckbox || !repeatSelect) return;

    const isDaily   = repeatSelect.value === "1";
    const isHoliday = holidayCheckbox.checked;

    // 1) 매일 반복 최우선
    if (isDaily) {
      holidayCheckbox.checked  = false;
      holidayCheckbox.disabled = true;
      return;
    } else {
      holidayCheckbox.disabled = false;
    }

    // 2) 휴무일 체크 시
    if (isHoliday) {
      allDayCheckbox.checked = true;
      repeatSelect.disabled  = true;
      repeatSelect.value     = "0";
    } else {
      repeatSelect.disabled  = false;
    }

    // 3) 종일 체크 시
    const isAllDay = allDayCheckbox.checked;
    if (startTimeInput) startTimeInput.disabled = isAllDay;
    if (isAllDay) {
      if (startTimeInput) startTimeInput.value = "";
      if (endTimeInput)   endTimeInput.value   = "";
    }
  }

  // 2) 날짜 바인딩 (오늘부터 선택 가능)
  
  function bindDateEvents() {
    const startDateInput = document.querySelector('input[name="startDateStr"]');
    const endDateInput   = document.querySelector('input[name="endDateStr"]');
    const startTimeInput = document.querySelector('input[name="startTimeStr"]');
    const endTimeInput   = document.querySelector('input[name="endTimeStr"]');

    if (!startDateInput || !endDateInput || !startTimeInput || !endTimeInput) return;

    // 로컬 기준 YYYY-MM-DD (toISOString() 쓰면 KST에서 하루 밀릴 수 있음)
    const d = new Date();
    const today = [
      d.getFullYear(),
      String(d.getMonth() + 1).padStart(2, "0"),
      String(d.getDate()).padStart(2, "0")
    ].join("-");
    /*
    startDateInput.min = today;
    endDateInput.min   = today;
    
    startDateInput.addEventListener("change", function () {
      endDateInput.disabled = startDateInput.value === "";

      const baseMin = startDateInput.value || today;
      endDateInput.min = baseMin;

      if (startDateInput.value !== "" && endDateInput.value === "") {
        endDateInput.value = startDateInput.value;
      }
      if (endDateInput.value && endDateInput.value < startDateInput.value) {
        endDateInput.value = startDateInput.value;
      }
    });
    */
    
 	// 시작일 변경 시
    startDateInput.addEventListener("change", function () {
      if (startDateInput.value !== "") {
        endDateInput.disabled = false;
        endDateInput.value = startDateInput.value; // 종료일 = 시작일
        endDateInput.min = startDateInput.value;
      }
      // 종료시간 초기화
      endTimeInput.disabled = true;
      endTimeInput.value = "";
    });

    // 시작시간 변경 시
    startTimeInput.addEventListener("change", function () {
      if (!startTimeInput.value) {
        endTimeInput.disabled = true;
        endTimeInput.value = "";
        return;
      }

      // 종료시간 활성화
      endTimeInput.disabled = false;

      // 종료일 == 시작일인 경우 제약 적용
      if (startDateInput.value && endDateInput.value && startDateInput.value === endDateInput.value) {
        endTimeInput.min = startTimeInput.value;

        if (endTimeInput.value && endTimeInput.value < startTimeInput.value) {
          endTimeInput.value = startTimeInput.value;
        }
      } else {
        // 날짜가 다르면 시간 제약 없음
        endTimeInput.removeAttribute("min");
      }
    });

    // 종료일 변경 시
    endDateInput.addEventListener("change", function () {
      if (endDateInput.value && startDateInput.value) {
        if (endDateInput.value < startDateInput.value) {
          endDateInput.value = startDateInput.value; // 잘못 선택 시 보정
        }
      }

      // 종료일이 시작일과 같은 경우
      if (endDateInput.value === startDateInput.value && startTimeInput.value) {
        endTimeInput.min = startTimeInput.value;
      } else {
        // 다르면 종료시간 제약 해제
        endTimeInput.removeAttribute("min");
      }
    });
  }

  document.addEventListener("DOMContentLoaded", function () {
    bindDateTimeEvents();
  });
  

  // 3) 상태 변경 트리거 바인딩
  function bindStateEvents() {
    const holidayCheckbox = document.querySelector('input[name="holiday"]');
    const allDayCheckbox  = document.querySelector('input[name="cate"][value="종일"]');
    const repeatSelect    = document.getElementById("repeatCheck");
    if (!holidayCheckbox || !allDayCheckbox || !repeatSelect) return;

    holidayCheckbox.addEventListener("change", applyState);
    //allDayCheckbox.addEventListener("change", applyState);
    repeatSelect.addEventListener("change", applyState);
  
    allDayCheckbox.addEventListener("change", function () {
        // 휴무일이 켜져 있는데 사용자가 종일을 해제하려고 할 때
        if (!this.checked && holidayCheckbox.checked) {
          alert("먼저 휴무일 체크를 해제하세요.");
          this.checked = true; // 다시 종일 체크 유지
          return;
        }
  
    });
  
  
  }

  // 4) 초기화
  document.addEventListener("DOMContentLoaded", function () {
    bindDateEvents();
    bindStateEvents();
    applyState(); // 초기 상태 반영
  });
</script>

<form action="" method="post">
    <h1 class="detail-title">일정 등록</h1>
    <table class="sche-table">
        <tr>
            <th>일정명</th>
            <td colspan="3">
                <input type="text" name="title" required />
            </td>
        </tr>
        <tr>
            <th>기간</th>
            <td colspan="3">
                시작:
                <input type="date" name="startDateStr" required />
                <input type="time" name="startTimeStr" required />
                ~ 종료:
                <input type="date" name="endDateStr" disabled />
                <input type="time" name="endTimeStr" disabled />

                <label>
                    <input type="checkbox" name="cate" value="종일"/> 종일
                </label>
            </td>
        </tr>
        <tr>
            <th>일정 옵션</th>
            <td colspan="3">
                <label>반복일정 : 
                    <select name="repeatCheck" id="repeatCheck">
                        <option value="0">반복 없음</option>
                        <option value="1">매일</option>
                        <option value="2">매주</option>
                        <option value="3">매달 </option>
                    </select> |
                </label>
                <label>
                    <input type="checkbox" name="holiday" value="휴무일"/>  휴무일   |
                </label>
                <label>
                    <input type="checkbox" name="alarm" value="알림" /> 알림 
                </label>
            </td>
        </tr>
        <tr>
            <th>내용</th>
            <td colspan="3">
                <textarea name="content" cols="50" rows="10" required></textarea>
            </td>
        </tr>
    </table>

        <a class="back-btn" th:href="@{/schedule}">취소</a>
        <button type="submit" class="regist-btn">등록</button>

</form>
