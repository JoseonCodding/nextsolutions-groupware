
<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>프로젝트 등록</title>
<style>
body {
	font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
	margin: 50px;
	background-color: #f5f7fa;
	color: #333;
}

h1 {
	color: #4a4a4a;
	text-align: center;
	margin-bottom: 40px;
}

table {
	width: 60%;
	margin: 0 auto;
	border-collapse: collapse;
	background-color: #ffffff;
	box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
	border-radius: 10px;
	overflow: hidden;
}

th, td {
	padding: 16px 20px;
	text-align: left;
	border-bottom: 1px solid #e0e0e0;
}

th {
	width: 30%;
	background-color: #f0f0f0;
	font-weight: bold;
	color: #333;
}

tr:last-child td {
	border-bottom: none;
}

button {
	display: block;
	margin: 40px auto 0;
	padding: 12px 24px;
	background-color: #4a90e2;
	color: white;
	border: none;
	border-radius: 6px;
	font-size: 16px;
	cursor: pointer;
	transition: background-color 0.2s;
}

button:hover {
	background-color: #357abd;
}

button.save-btn {
	background-color: #28a745;
}

button.save-btn:hover {
	background-color: #218838;
}
/* 워크플로우 라인 스타일 */
.workflow-step {
	display: flex;
	align-items: center;
	margin-bottom: 10px;
}

.workflow-step select {
	flex: 1;
	padding: 6px;
	font-size: 14px;
}

.workflow-step button {
	margin-left: 10px;
	padding: 4px 10px;
	font-size: 14px;
	background-color: #007bff;
	color: white;
	border: none;
	border-radius: 4px;
	cursor: pointer;
	transition: background-color 0.2s;
}

.workflow-step button:hover {
	background-color: #0056b3;
}

/* 결재자 추가 버튼 */
.btn-add-approver {
	margin-top: 10px;
	padding: 8px 16px;
	font-size: 14px;
	background-color: #007bff;
	color: white;
	border: none;
	border-radius: 6px;
	cursor: pointer;
	transition: background-color 0.2s;
}

.btn-add-approver:hover {
	background-color: #0056b3;
}

.button-row {
	display: flex;
	justify-content: center; /* 가운데 정렬 */
	gap: 10px; /* 버튼 간격 */
	margin-top: 30px;
}

.button-row button {
	width: 200px;
	height: 45px;
	font-size: 16px;
	border: none;
	border-radius: 6px;
	cursor: pointer;
	transition: background-color 0.2s;
}

/* 저장 버튼 스타일 */
.button-row .save-btn {
	background-color: #28a745;
	color: white;
}

.button-row .save-btn:hover {
	background-color: #218838;
}

/* 돌아가기 버튼 스타일 */
.button-row .back-btn {
	background-color: #4a90e2;
	color: white;
}

.button-row .back-btn:hover {
	background-color: #357abd;
}
</style>
</head>
<body>
	<!-- 생략된 <head>와 스타일은 그대로 유지 -->

	<h1>프로젝트 등록</h1>

	<form th:action="@{/pjtMng/pjtSave}" method="post"
		enctype="multipart/form-data" id="pjtRegForm">
		<table>

			<tr>
				<th>프로젝트명</th>
				<td><input type="text" name="PJT_NM" required /></td>
			</tr>
			<tr>
				<th>상태</th>
				<td><input type="text" name="PJT_STTS"
					placeholder="예: 진행중/완료 등" /></td>
			</tr>
			<tr>
				<th>담당자</th>
				<td><input type="text" name="EMP_NM" placeholder="담당자 이름" /></td>
			</tr>
			<tr>
				<th>시작일</th>
				<td><input type="date" name="PJT_BGNG_DT"
					style="margin-right: 10px;" /></td>
			</tr>
			<tr>
				<th>종료일</th>

				<td><input type="date" name="PJT_END_DT"
					style="margin-right: 10px;" /></td>
			</tr>
			<tr>
				<th>결재자</th>
				<td><select class="approver-select" style="margin-right: 10px;">
						<option value="">-- 결재자 선택 --</option>
						<th:block th:each="ap : ${approverList}">
							<option th:value="${ap.emp_seq}" th:text="${ap.emp_nm}"></option>
						</th:block>
				</select></td>
			</tr>
			<tr>
				<th>내용</th>
				<td><input type="text" name="CONTENT" placeholder="프로젝트 설명" /></td>
			</tr>
			<tr>
				<th>파일업로드</th>
				<td><input type="file" name="files" id="files"
					class="form-control" multiple /> <!-- 선택한 파일명을 사용자에게 보여주는 영역 -->
					<div id="fileList" style="margin-top: 8px;"></div></td>
			</tr>
		</table>

		<!-- 🔧 숨겨진 input: 결재자들을 하나의 문자열로 서버에 전송 -->
		<input type="hidden" name="approvers" id="approversInput" />

		<!-- 🔧 버튼 묶음 -->
		<div class="button-row">

			<!-- ✅ 저장 직전, 결재자 hidden 값 세팅 위해 JS에서 submit 이벤트를 가로채 처리합니다. -->
			<button type="submit" class="save-btn">프로젝트 저장</button>
			<button type="button" class="back-btn" onclick="history.back()">←
				목록으로 돌아가기</button>
		</div>

		<!-- ✅ 페이지 스크립트: 파일명 표시 + 결재자 hidden 구성 -->
		<script>
	const filesInput = document.getElementById('files');
	const fileListDiv = document.getElementById('fileList');

	filesInput.addEventListener('change', () => {
	    fileListDiv.innerHTML = ''; // 초기화
	    const files = Array.from(filesInput.files || []);
	    if (files.length === 0) return;
	    files.forEach(f => {
	      const pill = document.createElement('span');
	      pill.className = 'file-pill';
	      pill.textContent = f.name;
	      fileListDiv.appendChild(pill);
	    });
	  });

  <!-- 결재자 추가 스크립트
     기본 select(approverSelect) 값 + 추가로 만든 select들을 모두 모아 hidden에 저장합니다. -->

  const btnAddApprover = document.getElementById('btnAddApprover');
  const wfContainer = document.getElementById('workflow-container');

  btnAddApprover.addEventListener('click', () => {
    const row = document.createElement('div');
    row.className = 'workflow-step';
    row.innerHTML = `
      <select class="approver-select" style="margin-right:10px;">
        <option value="">-- 결재자 선택 --</option>
        <!-- 서버에서 옵션이 렌더링될 수 있도록 아래 두 줄은 그대로 둡니다 -->
        <th:block th:each="ap : ${approverList}">
          <option th:value="\${ap.emp_seq}" th:text="\${ap.emp_nm}"></option>
        </th:block>
      </select>
      <button type="button" class="btn-del">X</button>
    `;
    wfContainer.appendChild(row);
    row.querySelector('.btn-del').addEventListener('click', () => row.remove());
  });

  // ---------- submit 시 결재자 값 hidden에 모으기 ----------
  const form = document.getElementById('pjtRegForm');
  form.addEventListener('submit', () => {
    const selects = document.querySelectorAll('.approver-select');
    const values = [];
    selects.forEach(sel => { if (sel.value) values.push(sel.value); });
    document.getElementById('approversInput').value = values.join(',');
    // ✨ 이제 백엔드에서 request.getParameter("approvers") 로 "1,5,8" 같은 문자열 수신 → 파싱해서 쓰면 됨.
  });

  // 💡 팁:
  // - 이 페이지는 '등록' 화면이므로 PJT_SN hidden은 보통 필요없습니다(신규 생성 후 컨트롤러에서 PK 반환).
  // - 수정 화면이라면 <input type="hidden" name="PJT_SN" th:value="${pjtSn}"> 를 추가하세요.
</script>


		<!--     <button type="button" onclick="removeApprover(this)">X</button>

    workflowContainer.appendChild(div);
  }

  function removeApprover(btn) {
    btn.parentElement.remove();
  }

	        name: select.value
	      });

		</script>
</body>
</html>
