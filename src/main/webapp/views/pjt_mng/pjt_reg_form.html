 <script> 
 // 담당자 (employeeId: 영문/숫자 4~50)- 고정되어있음 (유효성 없음) 
 // 달력 : 기간 (시작일, 종료일)
// 달력에서 시작일을 오늘 날짜 이전으로 설정 못하게  (yyyy-mm-dd 형식)
const today = new Date().toISOString().split('T')[0];

const startDateInput = document.getElementById('pjtBgngDt');
const endDateInput   = document.getElementById('pjtEndDt');


// 1. 최소 날짜를 오늘로 제한
startDateInput.setAttribute('min', today);
endDateInput.setAttribute('min', today);


//2. 시작일 포커스 시 기본값 오늘로
startDateInput.addEventListener('focus', () => {
  if (!startDateInput.value) {
    startDateInput.value = today;
  }
});

// 3. 종료일 포커스 시 기본값 오늘로
endDateInput.addEventListener('focus', () => {
  if (!endDateInput.value) {
    endDateInput.value = today;
  }
});

// 4. 시작일이 바뀌면 → 종료일 최소값도 시작일로 맞추기
startDateInput.addEventListener('change', () => {
  if (startDateInput.value) {
    endDateInput.setAttribute('min', startDateInput.value);

    // 만약 종료일이 시작일보다 빠르면 초기화
    if (endDateInput.value && endDateInput.value < startDateInput.value) {
      endDateInput.value = "";
    }
  }
});
</script>

<script>
//✨ Summernote의 "겉만 있는 빈 HTML"까지 깔끔히 제거
function extractTextFromHtml(html) {
  if (!html) return "";
  return html
    .replace(/&nbsp;/gi, " ")       // NBSP → 공백
    .replace(/<br\s*\/?>/gi, "\n")  // <br> → 줄바꿈
    .replace(/<p>\s*<\/p>/gi, "\n") // 빈 <p> → 줄바꿈
    .replace(/<[^>]*>/g, "")        // 모든 태그 제거
    .replace(/\u200B/g, "")         // zero-width space 제거
    .trim();
}


 
 


// ✅ 폼 제출 시 최종 유효성 검사
function validateForm() {	

  const form = document.forms[0];
  if (!form) return false; // 🚫 폼 없으면 막기
  

  // 1) 프로젝트명: 1~35자, 공백 허용, 특수문자 불가
  const name = (form.pjtNm?.value || "").trim();
  
  if (name === "") {
    alert("프로젝트명을 입력하세요.");
    form.pjtNm?.focus();
    return false;
  }
  if (!/^[가-힣A-Za-z0-9\s]{1,35}$/.test(name)) {
    alert("프로젝트명은 공백 가능, 특수문자 없이 1~35자여야 합니다.");
    form.pjtNm?.focus();
    return false;
  }
	
	
	
  const startInput = document.getElementById("pjtBgngDt");
  const endInput   = document.getElementById("pjtEndDt");

  const start = startInput.value;
  const end   = endInput.value;

  if (!start || !end) {
    alert("시작일과 종료일을 모두 입력하세요.");
    return false;
  }

  const startDate = new Date(start);
  const endDate   = new Date(end);

  if (startDate >= endDate) {
    alert("종료일은 시작일보다 뒤여야 합니다.");
    return false;
  }

  

  // 4) 상태(대기,진행중,완료)
  const stts = form.pjtSttsCd?.value || "";
  if (!["대기","진행중","완료"].includes(stts)) {
    alert("진행상태를 선택하세요.");
    form.pjtSttsCd?.focus();
    return false;
  }
  // (선택) 완료 상태면 종료일 필수
  if (stts === "완료" && !end) {
    alert("상태가 완료이면 종료일을 입력해야 합니다.");
    form.pjtEndDt?.focus();
    return false;
  }

  // 5) 내용 (Summernote 전용 검사)
  let contentHtml = "";
  if (window.$ && typeof $('#content')?.summernote === 'function') {
    contentHtml = $('#content').summernote('code'); // 에디터 HTML
  } else {
    contentHtml = form.pjtCn?.value || "";        // 폴백: 일반 textarea
  }
  const contentText = extractTextFromHtml(contentHtml);
  if (!contentText) {
    alert("내용을 입력하세요.");
    if (window.$ && typeof $('#content')?.summernote === 'function') {
      $('#content').summernote('focus');
    } else {
      form.pjtCn?.focus();
    }
    return false; // 폼 전송 차단
  }

//6) 결재자: 활성화된 경우에만 검사 (관리자 화면)
//- 값이 비어 있거나(placeholder 그대로)
//- 셀렉트 옵션 목록에 없는 값이면(조작) ⛔ 차단
const approverEl = document.querySelector('select[name="TB_PJT_APR"]');
if (approverEl && !approverEl.disabled) {
  const val = (approverEl.value || '').trim();
  const allowed = Array.from(approverEl.options)
    .map(o => (o.value || '').trim())
    .filter(v => v !== '');
  const isValid = val !== '' && allowed.includes(val);
  if (!isValid) {
    alert('결재자를 선택하세요. (목록의 등록된 결재자 중에서 선택)');
    approverEl.focus();
    return false;
  }
}


//7) 파일 검사(확장자 + 파일당 용량 + 전체 합계)
const FILE_IDS     = ['uploadFile1', 'uploadFile2', 'uploadFile3']; // ← 실제 id와 일치
const MAX_FILE_MB  = 5;  // 파일당 최대 5MB
const MAX_TOTAL_MB = 25;  // 전체 합계 최대 25MB
const EXT_REGEX = /\.(pdf|docx?|xlsx?|png|jpe?g|txt)$/i;

let totalBytes = 0;

for (const id of FILE_IDS) {
  const input = document.getElementById(id);
  if (!input || !input.files || input.files.length === 0) continue;

  for (const f of input.files) {
    // (1) 확장자
    if (!EXT_REGEX.test(f.name)) {
      alert(`허용되지 않은 파일 형식입니다.
허용: pdf, doc/docx, xls/xlsx, png, jpg/jpeg, txt
파일: ${f.name}`);
      input.value = ''; // 선택 취소
      return false;
    }

    // (2) 파일당 용량
    const maxPerFile = MAX_FILE_MB * 1024 * 1024;
    if (f.size > maxPerFile) {
      alert(`'${f.name}' 용량이 너무 큽니다.
현재: ${(f.size/1024/1024).toFixed(2)} MB / 제한: ${MAX_FILE_MB} MB`);
      input.value = '';
      return false;
    }

    totalBytes += f.size;
  }
}

// (3) 전체 합계 용량
const maxTotal = MAX_TOTAL_MB * 1024 * 1024;
if (totalBytes > maxTotal) {
  alert(`업로드 총 용량 초과입니다.
현재: ${(totalBytes/1024/1024).toFixed(2)} MB / 제한: ${MAX_TOTAL_MB} MB`);
  // 필요 시 선택 전체 초기화
  FILE_IDS.forEach(id => { const el = document.getElementById(id); if (el) el.value = ''; });
  return false;
}


  return true; // 통과
}
</script>
