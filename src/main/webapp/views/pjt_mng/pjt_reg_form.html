
<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>프로젝트 등록</title>
<style>
body {
	font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
	margin: 50px;
	background-color: #f5f7fa;
	color: #333;
}

h1 {
	color: #4a4a4a;
	text-align: center;
	margin-bottom: 40px;
}

table {
	width: 60%;
	margin: 0 auto;
	border-collapse: collapse;
	background-color: #ffffff;
	box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
	border-radius: 10px;
	overflow: hidden;
}

th, td {
	padding: 16px 20px;
	text-align: left;
	border-bottom: 1px solid #e0e0e0;
}

th {
	width: 30%;
	background-color: #f0f0f0;
	font-weight: bold;
	color: #333;
}

tr:last-child td {
	border-bottom: none;
}

button {
	display: block;
	margin: 40px auto 0;
	padding: 12px 24px;
	background-color: #4a90e2;
	color: white;
	border: none;
	border-radius: 6px;
	font-size: 16px;
	cursor: pointer;
	transition: background-color 0.2s;
}

button:hover {
	background-color: #357abd;
}

button.save-btn {
	background-color: #28a745;
}

button.save-btn:hover {
	background-color: #218838;
}
/* 워크플로우 라인 스타일 */
.workflow-step {
	display: flex;
	align-items: center;
	margin-bottom: 10px;
}

.workflow-step select {
	flex: 1;
	padding: 6px;
	font-size: 14px;
}

.workflow-step button {
	margin-left: 10px;
	padding: 4px 10px;
	font-size: 14px;
	background-color: #007bff;
	color: white;
	border: none;
	border-radius: 4px;
	cursor: pointer;
	transition: background-color 0.2s;
}

.workflow-step button:hover {
	background-color: #0056b3;
}

/* 결재자 추가 버튼 */
.btn-add-approver {
	margin-top: 10px;
	padding: 8px 16px;
	font-size: 14px;
	background-color: #007bff;
	color: white;
	border: none;
	border-radius: 6px;
	cursor: pointer;
	transition: background-color 0.2s;
}

.btn-add-approver:hover {
	background-color: #0056b3;
}

.button-row {
	display: flex;
	justify-content: center; /* 가운데 정렬 */
	gap: 10px; /* 버튼 간격 */
	margin-top: 30px;
}

.button-row button {
	width: 200px;
	height: 45px;
	font-size: 16px;
	border: none;
	border-radius: 6px;
	cursor: pointer;
	transition: background-color 0.2s;
}

/* 저장 버튼 스타일 */
.button-row .save-btn {
	background-color: #28a745;
	color: white;
}

.button-row .save-btn:hover {
	background-color: #218838;
}

/* 돌아가기 버튼 스타일 */
.button-row .back-btn {
	background-color: #4a90e2;
	color: white;
}

.button-row .back-btn:hover {
	background-color: #357abd;
}
</style>
</head>
<body>
	<!-- 생략된 <head>와 스타일은 그대로 유지 -->

	<h1>프로젝트 등록</h1>

	<form action="/pjtMng/savePjtProc" method="post"
		enctype="multipart/form-data">
		<table>

			<tr>
				<th>프로젝트명</th>
				<td><input type="text" name="pjtNm" required /></td>
			</tr>
			<tr>
				<th>기간</th>
				<td>시작일: <input type="date" name="pjtBgngDt"
					style="margin-right: 10px;" /> 종료일: <input type="date"
					name="pjtEndDt" /></td>
			</tr>
			<tr>
				<th>담당자</th>
				<td><input type="text" name="empNm" /></td>
			</tr>

			<tr>
				<th>내용</th>
				<td><input type="text" name="content" /></td>
			</tr>
			<tr>
				<th>결재 워크플로우</th>
				<td><c:if test="${isAdmin}">
						<div id="workflow-container"></div>
						<button type="button" onclick="addApprover()"
							class="btn-add-approver">+ 결재자 추가</button>
					</c:if> <c:if test="${!isAdmin}">
						<span style="color: gray;">※ 워크플로우 설정은 관리자만 가능합니다.</span>
					</c:if></td>
			</tr>

			<tr>
				<th>파일업로드</th>
				<td><input type="file" name="uploadFile" id="uploadFile" />
					<div id="fileName"
						style="margin-top: 8px; color: #333; font-size: 14px; background-color: #f0f0f0; padding: 6px 10px; border-radius: 4px; border: 1px solid #ccc; max-width: 300px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis;">
					</div></td>
			</tr>

			<!-- 🔧 [여기부터 추가] 결재 워크플로우 설정 UI -->

		</table>

		<!-- 🔧 숨겨진 input: 결재자들을 하나의 문자열로 서버에 전송 -->
		<input type="hidden" name="approvers" id="approversInput" />

		<!-- 🔧 버튼 묶음 -->
		<div class="button-row">
			<button type="submit" class="save-btn" onclick="prepareApprovers()">프로젝트
				저장</button>
			<button type="button" class="back-btn" onclick="history.back()">←
				목록으로 돌아가기</button>
		</div>

		<!-- 🔧 파일명 표시 스크립트 (기존 유지) -->
		<script>
  const fileInput = document.getElementById('uploadFile');
  const fileNameDiv = document.getElementById('fileName');

  fileInput.addEventListener('change', () => {
    if (fileInput.files.length > 0) {
      fileNameDiv.textContent = `선택한 파일: ${fileInput.files[0].name}`;
    } else {
      fileNameDiv.textContent = '';
    }
  });

  // 🔧 결재자 추가 스크립트
    const workflowContainer = document.getElementById('workflow-container');
  let approverCount = 0;

  function addApprover() {
    approverCount++;

    const div = document.createElement('div');
    div.classList.add('workflow-step');
    div.setAttribute("data-idx", approverCount);

    div.innerHTML = `
    	<input type="number" class="approver-order" min="1" style="width: 50px; margin-right: 10px;" placeholder="순서" />
    	  <select class="approver-select" style="margin-right:10px;">
        <option value="">-- 결재자 선택 --</option>
        <option value="장대리">장대리</option>
        <option value="최대리">최대리</option>
        <option value="이주임">이주임</option>
        <option value="정과장">정과장</option>
        <option value="신과장">신과장</option>
        <option value="김대표">김대표</option>

      </select>
      <button type="button" onclick="removeApprover(this)">X</button>
    `;

    workflowContainer.appendChild(div);
  }

  function removeApprover(btn) {
    btn.parentElement.remove();
  }

 
	  steps.forEach(step => {
	    const orderInput = step.querySelector('.approver-order');
	    const select = step.querySelector('.approver-select');

	    if (orderInput && select && select.value) {
	      approvers.push({
	        order: parseInt(orderInput.value),
	        name: select.value
	      });
	    }
	  });

    document.getElementById('approversInput').value = names.join(',');
  


  // 🔧 결재자 목록을 숨겨진 input에 저장
  function prepareApprovers() {
    const selects = document.querySelectorAll('.approver-select');
    const names = [];

    selects.forEach(select => {
      if (select.value) names.push(select.value);
    });

    document.getElementById('approversInput').value = names.join(',');
  }
</script>
</body>
</html>
