<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>프로젝트 등록</title>
<style>
body {
	font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
	margin: 50px;
	background-color: #f5f7fa;
	color: #333;
}

h1 {
	color: #4a4a4a;
	text-align: center;
	margin-bottom: 40px;
}

table {
	width: 60%;
	margin: 0 auto;
	border-collapse: collapse;
	background-color: #ffffff;
	box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
	border-radius: 10px;
	overflow: hidden;
}

th, td {
	padding: 16px 20px;
	text-align: left;
	border-bottom: 1px solid #e0e0e0;
}

th {
	width: 30%;
	background-color: #f0f0f0;
	font-weight: bold;
	color: #333;
}

tr:last-child td {
	border-bottom: none;
}

button {
	display: block;
	margin: 40px auto 0;
	padding: 12px 24px;
	background-color: #4a90e2;
	color: white;
	border: none;
	border-radius: 6px;
	font-size: 16px;
	cursor: pointer;
	transition: background-color 0.2s;
}

button:hover {
	background-color: #357abd;
}

button.save-btn {
	background-color: #28a745;
}

button.save-btn:hover {
	background-color: #218838;
}
</style>
</head>
<body>
	<h1>프로젝트 등록</h1>

	<form action="/pjtMng/savePjtProc" method="post"
		enctype="multipart/form-data">
		<table>
			<tr>
				<th>기간</th>
				<td>시작일: <input type="date" name="pjtBgngDt"
					style="margin-right: 10px;" /> 종료일: <input type="date"
					name="pjtEndDt" />
				</td>
			</tr>
			<tr>
				<th>프로젝트명</th>
				<td><input type="text" name="pjtNm" required /></td>
			</tr>

			<tr>
				<th>담당자</th>
				<td><input type="text" name="empNm" /></td>
			</tr>

			<tr>
				<th>내용</th>
				<td><input type="text" name="content" /></td>
			</tr>

			<tr>
				<th>파일업로드</th>
				<td><input type="file" name="uploadFile" id="uploadFile" />
					<div id="fileName"
						style="margin-top: 8px; color: #333; font-size: 14px; background-color: #f0f0f0; padding: 6px 10px; border-radius: 4px; border: 1px solid #ccc; max-width: 300px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis;">
					</div></td>
			</tr>

		</table>

		<button type="submit" class="save-btn">프로젝트 저장</button>
	</form>

	<button onclick="history.back()">← 목록으로 돌아가기</button>


	<script>
  const fileInput = document.getElementById('uploadFile');
  const fileNameDiv = document.getElementById('fileName');

  fileInput.addEventListener('change', () => {
    if (fileInput.files.length > 0) {
      fileNameDiv.textContent = `선택한 파일: ${fileInput.files[0].name}`;
    } else {
      fileNameDiv.textContent = '';
    }
  });
</script>
</body>
</html>
