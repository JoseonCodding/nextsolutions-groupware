<title>프로젝트 수정</title>
<link href="https://cdn.jsdelivr.net/npm/summernote@0.8.20/dist/summernote-lite.min.css" rel="stylesheet">

<div th:if="${errorMessage}"
     style="color:var(--danger); font-weight:bold; margin-bottom:10px;">
  [[${errorMessage}]]
</div>

<style>
table {
	width: 75%;
	margin: 0 auto;
	border-collapse: collapse;
	background-color: var(--surface);
	box-shadow: var(--shadow-md);
	border-radius: 10px;
	overflow: hidden;
}

th, td {
	padding: 16px 20px;
	text-align: left;
	border-bottom: 1px solid var(--border);
}

th {
	width: 20%;
	background-color: var(--surface-alt);
	font-weight: bold;
	text-align: center;
}

tr:last-child td {
	border-bottom: none;
}

input, select {
	padding: 8px;
	width: 100%;
	box-sizing: border-box;
}

/* 체크박스는 가로 100% 강제 적용에서 제외 */
input[type="checkbox"] {
  width: auto;
  display: inline-block;
  vertical-align: middle;
  margin-right: 6px;
}
</style>

<h1 class="detail-title" style="margin-top:45px;">프로젝트 수정</h1>
	<!-- ✅ 프로젝트 수정 Form -->
	<form method="post" action="/pjtMng/updatePjtProc"
		enctype="multipart/form-data" onsubmit="return validateForm()">

		<!-- hidden 값도 null-safe -->
		<input type="hidden" name="pjtSn" th:value="${pjt['PJT_SN'] ?: ''}" />
		<input type="hidden" name="gid" th:value="${pjt['gid'] ?: ''}" /> 
		<input type="hidden" name="oldFileName"   th:value="${pjt['ATCH_FILE_SN'] ?: ''}"> 
		<input type="hidden" name="oldOrgFileName" th:value="${pjt['ORG_FILE_NM'] ?: ''}">
		<input type="hidden" name="firstSign" th:value="${pjt['firstSign'] ?: ''}">
		<input type="hidden" name="secondSign" th:value="${pjt['secondSign'] ?: ''}"> 
		<input type="hidden" name="approvedBy" th:value="${pjt['approvedBy'] ?: ''}">
		
		<input type="hidden" name="oldFileName1" th:value="${pjt['ATCH_FILE_SN1']}" /> 
		<input type="hidden" name="oldOrgFileName1" th:value="${pjt['ORG_FILE_NM1']}" /> 
		<input type="hidden" name="oldFileName2" th:value="${pjt['ATCH_FILE_SN2']}" />
		<input type="hidden" name="oldOrgFileName2" th:value="${pjt['ORG_FILE_NM2']}" />
		<input type="hidden" name="oldFileName3" th:value="${pjt['ATCH_FILE_SN3']}" /> 
		<input type="hidden" name="oldOrgFileName3" th:value="${pjt['ORG_FILE_NM3']}" />

		<table>
			<tr>
				<th>프로젝트명</th>
				<!-- null이면 빈칸 또는 '값 없음' 등으로 표시 가능 -->
				<td><input type="text" name="pjtNm"
					th:value="${pjt['PJT_NM'] ?: ''}" /></td>
			</tr>				
			
			<tr>
				<!-- 결재자 사번에서 이름을 보이게 변경해놓음 : 현재 결재가 권한은 대표만 가능 -->
				<th>담당자</th>
				<td>
				<select name="employeeId" id="employeeId"  th:value="${pjt['employeeId']}"
					class="form-select" >
						<option value="">-- 담당자 선택 --</option>
						<th:block th:each="a : ${employeeList}">
							<option th:value="${a['employeeId']}"
								th:text="${a['emp_nm'] != null ? a['emp_nm'] : a['EMP_NM']}"
								th:selected="${pjt != null and a['employeeId'] == pjt['employeeId']}">
							</option>
						</th:block>
				</select>
				</td>
			</tr>		
									
			<tr>
				<th>기간</th>
				<td>
					시작일: <input type="date" name="pjtBgngDt" style="width:150px; border-radius:3px; margin-right: 10px;"
					th:value="${pjt['PJT_BGNG_DT'] ?: ''}" /> 종료일: 
					<input type="date" name="pjtEndDt" style="width:150px; border-radius:3px;" th:value="${pjt['PJT_END_DT'] ?: ''}" /> 
				</td>
			</tr>

			<tr
				th:with="stts=${pjt != null ? #strings.trim(pjt['PJT_STTS_CD']) : ''}" 
				style="border-radius:3px;">
				<th>상태</th>
				<td>
					<!-- 대기: 읽기전용 --> <input type="text" name="pjtSttsCd"
					th:value="${stts}" th:if="${stts == '대기'}" readonly
					class="readonly" /> <!-- 대기 아님: 드롭다운 --> <select name="pjtSttsCd"
					th:if="${stts != '대기'}" required>
						<option value="진행중" th:selected="${stts == '진행중'}">진행중</option>
						<option value="완료" th:selected="${stts == '완료'}">완료</option>
				</select>
				</td>
			</tr>

			<tr>
				<th>내용</th>
				<td><textarea id="content" name="content"
						th:text="${pjt['content'] ?: ''}"></textarea></td>
			</tr>

			<tr>
				<th>결재자</th>
				<td>
					<!-- DB로 넘어갈 진짜 값(사번) --> 
					<input type="hidden" name="TB_PJT_APR"
					th:value="${pjt['TB_PJT_APR']}" /> 
					<!-- 화면 표시용 (읽기 전용) --> 
					<input type="text" th:value="${pjt['app_user']}" readonly class="form-control" />
				</td>
			</tr>

			<!-- 파일 업로드 창 -->
			<!-- 파일 1 -->
<tr>
  <th rowspan="3">파일업로드</th>
  <!-- ⭕ 기존 파일이 있는 경우: 파일명 + 삭제 체크박스만 노출 (업로드 필드 비활성/숨김) -->
  <td th:if="${pjt['ATCH_FILE_SN1'] != null and pjt['ATCH_FILE_SN1'] != ''}">
    <div style="margin-top:8px; background:var(--surface-alt); padding:6px 10px; border-radius:4px; border:1px solid var(--border);">
      현재 파일: <span th:text="${pjt['ORG_FILE_NM1']}">첨부된 파일</span>
    </div>
    <label style="display:inline-block; margin-top:6px;">
      <input type="checkbox" name="delFileSlots1" value="true"> 삭제
    </label>
    <!-- 업로드 입력은 완전히 막음 -->
    <input type="file" name="uploadFile1" id="uploadFile1" style="display:none" disabled />

</tr>

<!-- 파일 2 -->
<tr>
  <td th:if="${pjt['ATCH_FILE_SN2'] != null && pjt['ATCH_FILE_SN2'] != ''}">

      현재 파일: <span th:text="${pjt['ORG_FILE_NM2']}">첨부된 파일</span>
    </div>
    <label style="display:inline-block; margin-top:6px;">
      <input type="checkbox" name="delFileSlots2" value="true"> 삭제

  </td>
  <td th:unless="${pjt['ATCH_FILE_SN2'] != null && pjt['ATCH_FILE_SN2'] != ''}">
    <input type="file" name="uploadFile2" id="uploadFile2"/>
  </td>
</tr>

<!-- 파일 3 -->
<tr>
  <td th:if="${pjt['ATCH_FILE_SN3'] != null && pjt['ATCH_FILE_SN3'] != ''}">
    <div style="margin-top:8px; background:var(--surface-alt); padding:6px 10px; border-radius:4px; border:1px solid var(--border);">
      현재 파일: <span th:text="${pjt['ORG_FILE_NM3']}">첨부된 파일</span>
    </div>
    <label style="display:inline-block; margin-top:6px;">
      <input type="checkbox" name="delFileSlots3" value="true"> 삭제
    </label>
    <input type="file" name="uploadFile3" id="uploadFile3" style="display:none" disabled />
  </td>
  <td th:unless="${pjt['ATCH_FILE_SN3'] != null && pjt['ATCH_FILE_SN3'] != ''}">
    <input type="file" name="uploadFile3" id="uploadFile3"/>

			<tr>
				<th>등록일</th>

				<td><input type="text" name="FRST_REG_DT"
      						 th:value="${pjt['FRST_REG_DT'] != null ? #temporals.format(pjt['FRST_REG_DT'], 'yyyy-MM-dd HH:mm:ss') : ''}"
      						 readonly /></td>
			</tr>
		</table>

		<!-- null-safe -->
		<input type="hidden" name="approvers" id="approversInput"
			th:value="${pjt['approvers'] ?: ''}" /> <input type="hidden"
			name="ver" id="ver" th:value="${pjt['ver'] ?: ''}" />

		<div class="button-row">
			<button type="button" class="back-btn" onclick="history.back()">
			목록 </button>
			
			

			<!-- 페이지 어딘가에서 stts를 이미 썼다면 그대로 활용 -->
			<button type="submit" class="save-btn"
				th:with="stts=${pjt != null ? #strings.trim(pjt['PJT_STTS_CD']) : ''}"
				th:disabled="${stts == '대기'}"
				th:title="${stts == '대기'} ? '대기 상태 프로젝트는 저장할 수 없습니다.' : null">

<input type="hidden" name="pageNum" th:value="${pageNum}">
<input type="hidden" name="pageSize" th:value="${pageSize}">

	<!-- 썸머노트용 JS -->
	<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
	<script
		src="https://cdn.jsdelivr.net/npm/summernote@0.8.20/dist/summernote-lite.min.js"></script>

				['para', ['ul', 'ol', 'paragraph']],

				['view', ['fullscreen', 'codeview', 'help']]
			]
		});

</script>
	
	
	<!--  유효성 검사 항목 -->
	
	<script>
/**
 * 프로젝트 수정 폼 유효성 검사 (빈값/날짜/파일/썸머노트 모두 포함)
 * - 폼 onsubmit="return validateForm()" 에 연결됨
 */
function validateForm() {
  // 0) 공통 헬퍼
  const trim = (s) => (s || "").toString().trim();
  const get = (name) => document.querySelector(`[name="${name}"]`);

  // 1) 필수값 (프로젝트명, 담당자)
  const pjtNmEl = get("pjtNm");
  const empEl   = get("employeeId");

  if (!pjtNmEl || trim(pjtNmEl.value) === "") {
    alert("프로젝트명을 입력하세요.");
    if (pjtNmEl) pjtNmEl.focus();
    return false;
  }
  if (!empEl || trim(empEl.value) === "") {
    alert("담당자를 선택하세요.");
    if (empEl) empEl.focus();
    return false;
  }

  // 2) 상태값(대기면 input[readonly], 그 외에는 select) 검증
  //    - readonly input(name="pjtSttsCd")가 있을 수도 있고,
  //      select(name="pjtSttsCd")가 있을 수도 있으니 둘 다 체크
  const sttsInput  = document.querySelector('input[name="pjtSttsCd"][readonly]');
  const sttsSelect = document.querySelector('select[name="pjtSttsCd"]');
  if (sttsSelect) {
    const v = trim(sttsSelect.value);
    if (v === "") {
      alert("상태를 선택하세요.");
      sttsSelect.focus();
      return false;
    }
  }
  // sttsInput(대기)은 읽기전용이므로 별도 검증 불필요

  // 3) 날짜(시작/종료) 필수 + 순서 검사 (문자열 비교 안전)
  const bgEl = get("pjtBgngDt");
  const edEl = get("pjtEndDt");

  const bg = trim(bgEl && bgEl.value);
  const ed = trim(edEl && edEl.value);

  if (!bg) {
    alert("시작일을 선택하세요.");
    if (bgEl) bgEl.focus();
    return false;
  }
  if (!ed) {
    alert("종료일을 선택하세요.");
    if (edEl) edEl.focus();
    return false;
  }
  if (ed < bg) {
    alert("종료일은 시작일보다 앞설 수 없습니다.");
    if (edEl) edEl.focus();
    return false;
  }

  // 4) 썸머노트 내용 필수 (공백/태그만 있는 경우까지 방지)
  //  - summernote가 로드되어 있으면 API로 검사, 아니라면 textarea의 값으로 검사
  try {
    if (window.jQuery && $('#content').length && $('#content').summernote) {
      const isEmpty = $('#content').summernote('isEmpty');
      if (isEmpty) {
        alert("내용을 입력하세요.");
        $('#content').summernote('focus');
        return false;
      }
    } else {
      const contentEl = get("content");
      if (!contentEl || trim(contentEl.value) === "") {
        alert("내용을 입력하세요.");
        if (contentEl) contentEl.focus();
        return false;
      }
    }
  } catch (e) {
    // 만약 오류가 나더라도 폼이 멈추지 않게 기본 textarea 값만 체크
    const contentEl = get("content");
    if (!contentEl || trim(contentEl.value) === "") {
      alert("내용을 입력하세요.");
      if (contentEl) contentEl.focus();
      return false;
    }
  }

  // 5) 파일 확장자/개별 용량/총합 용량 검사 (기존 로직 + 확장자 검사 합침)
  const FILE_IDS = ['uploadFile1', 'uploadFile2', 'uploadFile3'];
  const ALLOWED = /\.(pdf|docx?|xlsx?|png|jpe?g)$/i;
  const MAX_FILE_MB  = 5;   // 파일당 최대 5MB
  const MAX_TOTAL_MB = 25;  // 전체 합계 최대 25MB

  let totalBytes = 0;

  for (const id of FILE_IDS) {
    const input = document.getElementById(id);
    if (!input || !input.files || input.files.length === 0) continue;

    for (const f of input.files) {
      if (!ALLOWED.test(f.name)) {
        alert("허용되지 않은 파일 형식입니다. (pdf, doc/docx, xls/xlsx, png, jpg/jpeg)");
        input.value = "";
        input.focus();
        return false;
      }
      if (f.size > MAX_FILE_MB * 1024 * 1024) {
        alert(`'${f.name}' 파일은 ${MAX_FILE_MB}MB를 초과했습니다.`);
        input.value = "";
        input.focus();
        return false;
      }
      totalBytes += f.size;
    }
  }

  if (totalBytes > MAX_TOTAL_MB * 1024 * 1024) {
    alert(`총 업로드 용량이 ${MAX_TOTAL_MB}MB를 초과했습니다.`);
    FILE_IDS.forEach(id => {
      const el = document.getElementById(id);
      if (el) el.value = "";
    });
    return false;
  }

  // 6) (옵션) 결재자 워크플로우 문자열 합치기 (페이지에 있다면)
  const approversInput = document.getElementById('approversInput');
  if (approversInput) {
    const selects = document.querySelectorAll('.approver-select');
    const names = [];
    selects.forEach(sel => { if (sel.value) names.push(sel.value); });
    approversInput.value = names.join(',');
  }

  // 모든 검사 통과!
  return true;
}

/* ------- 보조: 날짜 변경 시 실시간 가드(UX용) ------- */
document.addEventListener("DOMContentLoaded", () => {
  const bg = document.querySelector('input[name="pjtBgngDt"]');
  const ed = document.querySelector('input[name="pjtEndDt"]');
  if (!bg || !ed) return;

  // 오늘 이전을 막고 싶으면 주석 해제
  // const pad = n => String(n).padStart(2,"0");
  // const now = new Date(); now.setHours(0,0,0,0);
  // const today = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`;
  // bg.min = today; ed.min = today;

  const guard = () => {
    if (bg.value && ed.value && ed.value < bg.value) {
      alert("종료일은 시작일보다 앞설 수 없습니다.");
      ed.value = "";
      ed.focus();
    }
  };
  bg.addEventListener("change", guard);
  ed.addEventListener("change", guard);
});
</script>
