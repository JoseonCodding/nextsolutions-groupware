<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>프로젝트 변경</title>

<!-- 썸머노트 CSS -->
<link
	href="https://cdn.jsdelivr.net/npm/summernote@0.8.20/dist/summernote-lite.min.css"
	rel="stylesheet">


<style>
body {
	font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
	margin: 50px;
	background-color: #f5f7fa;
	color: #333;
}

h1 {
	color: #4a4a4a;
	text-align: center;
	margin-bottom: 40px;
}

table {
	width: 75%;
	margin: 0 auto;
	border-collapse: collapse;
	background-color: #ffffff;
	box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
	border-radius: 10px;
	overflow: hidden;
}

th, td {
	padding: 16px 20px;
	text-align: left;
	border-bottom: 1px solid #e0e0e0;
}

th {
	width: 20%;
	background-color: #f0f0f0;
	font-weight: bold;
	color: #333;
}

tr:last-child td {
	border-bottom: none;
}

input, select {
	padding: 8px;
	width: 100%;
	box-sizing: border-box;
}

.button-row {
	display: flex;
	justify-content: center;
	gap: 10px;
	margin-top: 30px;
}

.button-row button {
	width: 200px;
	height: 45px;
	font-size: 16px;
	border: none;
	border-radius: 6px;
	cursor: pointer;
	transition: background-color 0.2s;
}

.save-btn {
	background-color: #28a745;
	color: white;
}

.save-btn:hover {
	background-color: #218838;
}

.back-btn {
	background-color: #4a90e2;
	color: white;
}

.back-btn:hover {
	background-color: #357abd;
}

.save-btn:disabled {
	background-color: #ccc !important; /* 회색 */
	color: #666 !important; /* 글자도 연한 회색 */
	cursor: not-allowed; /* 마우스 커서 X 모양 */
}
</style>
</head>

<body>

	<h1>프로젝트 변경</h1>
	<!-- ✅ 프로젝트 수정 Form -->
	<form method="post" action="/pjtMng/updatePjtProc"
		enctype="multipart/form-data">

		<!-- hidden 값도 null-safe -->
		<input type="hidden" name="pjtSn" th:value="${pjt['PJT_SN'] ?: ''}" />

		<input type="hidden" name="gid" th:value="${pjt['gid'] ?: ''}" />
		<input type="hidden" name="oldFileName"  th:value="${pjt['ATCH_FILE_SN'] ?: ''}"> 
		<input type="hidden" name="oldOrgFileName" th:value="${pjt['ORG_FILE_NM'] ?: ''}">
		<input type="hidden" name="firstSign" th:value="${pjt['firstSign'] ?: ''}">
		<input type="hidden" name="secondSign" th:value="${pjt['secondSign'] ?: ''}">
		<input type="hidden" name="approvedBy" th:value="${pjt['approvedBy'] ?: ''}">



		<table>
			<tr>
				<th>프로젝트명</th>
				<!-- null이면 빈칸 또는 '값 없음' 등으로 표시 가능 -->
				<td><input type="text" name="pjtNm"
					th:value="${pjt['PJT_NM'] ?: ''}" /></td>
			</tr>
			<tr>
				<th>담당자</th>
				<td>
					<!-- 모델 키가 employeeid 인 듯하여 그대로 사용 --> <input type="text"
					name="employeeId" th:value="${pjt['employeeId'] ?: ''}"
					placeholder="담당자 이름 입력" />
				</td>
			</tr>
			<tr>
				<th>기간</th>
				<td>
					<!-- 날짜가 문자열이면 그대로, LocalDate면 아래 주석 참고 --> 
					시작일: <input type="date"
					name="pjtBgngDt" style="margin-right: 10px;"
					th:value="${pjt['PJT_BGNG_DT'] ?: ''}" /> 종료일: <input type="date"
					name="pjtEndDt" th:value="${pjt['PJT_END_DT'] ?: ''}" />
					 <!-- ✍️ 만약 LocalDate/LocalDateTime 이면:
             th:value="${pjt['PJT_BGNG_DT'] != null ? #dates.format(pjt['PJT_BGNG_DT'], 'yyyy-MM-dd') : ''}" -->
				</td>
			</tr>

			<tr	th:with="stts=${pjt != null ? #strings.trim(pjt['PJT_STTS_CD']) : ''}">
				<th>상태</th>
				<td>
					<!-- 대기: 읽기전용 --> <input type="text" name="pjtSttsCd"
					th:value="${stts}" th:if="${stts == '대기'}" readonly
					class="readonly" /> <!-- 대기 아님: 드롭다운 --> <select name="pjtSttsCd"
					th:if="${stts != '대기'}" required>
						<option value="진행중" th:selected="${stts == '진행중'}">진행중</option>
						<option value="완료" th:selected="${stts == '완료'}">완료</option>
				</select>
				</td>
			</tr>

			<tr>
				<th>내용</th>
				<td><textarea id="content" name="content"
						th:text="${pjt['content'] ?: ''}"></textarea></td>
			</tr>
			<!-- <tr>
				<th>결재자</th>
				<td><select name="TB_PJT_APR" class="form-select"
					th:disabled="${!isAdmin}">
						<option value="">-- 결재자 선택 --</option>
						<option th:each="a : ${approverList}" th:value="${a.employeeId}"
							th:text="${a.employeeId}"
							th:selected="${pjt != null and a.employeeId == pjt.TB_PJT_APR}">
						</option>
				</select></td>
			</tr>
			 -->


			<tr>
				<th>결재자</th>
				<td>
					<!-- DB로 넘어갈 진짜 값(사번) --> <input type="hidden" name="TB_PJT_APR"
					th:value="${approverFixedId}" /> <!-- 화면 표시용 (읽기 전용) --> <input
					type="text" th:value="${approverFixedName}" readonly
					class="form-control" />
				</td>
			</tr>
			
			<tr>
				<th rowspan="3">파일업로드</th>
				<td><input type="file" name="uploadFile1" id="uploadFile1" />
					<div id="fileName" th:text="${pjt['ORG_FILE_NM1'] ?: '첨부된 파일 없음'}"
						style="margin-top: 8px; color: #333; font-size: 14px; background-color: #f0f0f0; padding: 6px 10px; border-radius: 4px;">
					</div></td>
			</tr>
			<tr>
				<td><input type="file" name="uploadFile2" id="uploadFile2" />
					<div id="fileName" th:text="${pjt['ORG_FILE_NM2'] ?: '첨부된 파일 없음'}"
						style="margin-top: 8px; color: #333; font-size: 14px; background-color: #f0f0f0; padding: 6px 10px; border-radius: 4px;">
					</div></td>
			</tr>
			<tr>
				<td><input type="file" name="uploadFile3" id="uploadFile3" />
					<div id="fileName" th:text="${pjt['ORG_FILE_NM3'] ?: '첨부된 파일 없음'}"
						style="margin-top: 8px; color: #333; font-size: 14px; background-color: #f0f0f0; padding: 6px 10px; border-radius: 4px;">
					</div></td>
			</tr>

			<tr>
				<th>등록일</th>

				<td><input type="text" name="FRST_REG_DT"
					th:value="${pjt['FRST_REG_DT']}" readonly /></td>
			</tr>
		</table>


		<!-- null-safe -->
		<input type="hidden" name="approvers" id="approversInput"
			th:value="${pjt['approvers'] ?: ''}" />

		<div class="button-row">
			<button type="button" class="back-btn" onclick="history.back()">←
				돌아가기</button>
			<!-- <button type="submit" class="save-btn">저장</button> -->

			<!-- 페이지 어딘가에서 stts를 이미 썼다면 그대로 활용 -->
			<button type="submit" class="save-btn"
				th:with="stts=${pjt != null ? #strings.trim(pjt['PJT_STTS_CD']) : ''}"
				th:disabled="${stts == '대기'}"
				th:title="${stts == '대기'} ? '대기 상태 프로젝트는 저장할 수 없습니다.' : null">
				저장</button>


		</div>
	</form>

	<script>
  const fileInput = document.getElementById('uploadFile');
  const fileNameDiv = document.getElementById('fileName');

  if (fileInput) {
    fileInput.addEventListener('change', () => {
      if (fileInput.files.length > 0) {
        fileNameDiv.textContent = `선택한 파일: ${fileInput.files[0].name}`;
      } else {
        fileNameDiv.textContent = '';
      }
    });
  }

  const workflowContainer = document.getElementById('workflow-container');
  let approverCount = 0;

  function addApprover() {
    approverCount++;

    const div = document.createElement('div');
    div.classList.add('workflow-step');

    div.innerHTML = `
      <input type="number" class="approver-order" min="1" style="width: 50px; margin-right: 10px;" placeholder="순서" />
      <select class="approver-select" style="margin-right:10px;">
        <option value="">-- 결재자 선택 --</option>
        <option value="장대리">장대리</option>
        <option value="최대리">최대리</option>
        <option value="이주임">이주임</option>
        <option value="정과장">정과장</option>
        <option value="신과장">신과장</option>
        <option value="김대표">김대표</option>
      </select>
      <button type="button" onclick="removeApprover(this)">X</button>
    `;

    workflowContainer.appendChild(div);
  }

  function removeApprover(btn) {
    btn.parentElement.remove();
  }

  function prepareApprovers() {
    const selects = document.querySelectorAll('.approver-select');
    const names = [];

    selects.forEach(select => {
      if (select.value) names.push(select.value);
    });

    document.getElementById('approversInput').value = names.join(',');
  }
</script>

	<!-- 썸머노트용 JS -->
	<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
	<script
		src="https://cdn.jsdelivr.net/npm/summernote@0.8.20/dist/summernote-lite.min.js"></script>
	<script
		src="https://cdnjs.cloudflare.com/ajax/libs/summernote/0.8.20/lang/summernote-ko-KR.min.js"></script>
	<script>
	$(document).ready(function() {
		$('#content').summernote({
			lang: 'ko-KR',
			placeholder: '내용을 입력하세요',
			tabsize: 2,
			height: 300,
			toolbar: [
				['style', ['style']],
				['font', ['bold', 'italic', 'underline', 'clear']],
				['fontname', ['fontname']],
				['fontsize', ['fontsize']],
				['color', ['color']],
				['para', ['ul', 'ol', 'paragraph']],
				['height', ['height']],
				['insert', ['picture', 'link', 'table']],
				['view', ['fullscreen', 'codeview', 'help']]
			]
		});
	});
</script>
</body>
</html>
