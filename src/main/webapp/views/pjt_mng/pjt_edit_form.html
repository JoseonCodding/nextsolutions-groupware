<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>프로젝트 변경</title>
<style>
body {
	font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
	margin: 50px;
	background-color: #f5f7fa;
	color: #333;
}

h1 {
	color: #4a4a4a;
	text-align: center;
	margin-bottom: 40px;
}

table {
	width: 60%;
	margin: 0 auto;
	border-collapse: collapse;
	background-color: #ffffff;
	box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
	border-radius: 10px;
	overflow: hidden;
}

th, td {
	padding: 16px 20px;
	text-align: left;
	border-bottom: 1px solid #e0e0e0;
}

th {
	width: 30%;
	background-color: #f0f0f0;
	font-weight: bold;
	color: #333;
}

tr:last-child td {
	border-bottom: none;
}

input, select {
	padding: 8px;
	width: 100%;
	box-sizing: border-box;
}

.button-row {
	display: flex;
	justify-content: center;
	gap: 10px;
	margin-top: 30px;
}

.button-row button {
	width: 200px;
	height: 45px;
	font-size: 16px;
	border: none;
	border-radius: 6px;
	cursor: pointer;
	transition: background-color 0.2s;
}

.save-btn {
	background-color: #28a745;
	color: white;
}

.save-btn:hover {
	background-color: #218838;
}

.back-btn {
	background-color: #4a90e2;
	color: white;
}

.back-btn:hover {
	background-color: #357abd;
}
</style>
</head>

<body>

	<h1>프로젝트 변경</h1>

	<form method="post" action="/pjtMng/updatePjtProc" enctype="multipart/form-data">

		<input type="hidden" name="pjtSn" th:value="${pjt.PJT_SN}" />

		<table>
			<tr>
  <th>프로젝트명</th>
  <td><input type="text" name="pjtNm" th:value="${pjt.PJT_NM}" required /></td>
</tr>

<tr>
  <th>담당자</th>
  <td>
    <select name="empNm">
      <option value="">선택</option>
      <option th:each="emp : ${empList}" th:value="${emp.EMP_NM}"
              th:text="${emp.EMP_NM}"
              th:selected="${emp.EMP_NM} == ${pjt.EMP_NM}"></option>
    </select>
  </td>
</tr>

<tr>
  <th>시작일</th>
  <td><input type="date" name="pjtBgngDt" th:value="${pjt.PJT_BGNG_DT}" /></td>
</tr>

<tr>
  <th>종료일</th>
  <td><input type="date" name="pjtEndDt" th:value="${pjt.PJT_END_DT}" /></td>
</tr>

<tr>
  <th>상태</th>
  <td>
    <select name="pjtSttsCd">
      <option value="01" th:selected="${pjt.PJT_STTS_CD == '01'}">진행중</option>
      <option value="02" th:selected="${pjt.PJT_STTS_CD == '02'}">완료</option>
      <option value="03" th:selected="${pjt.PJT_STTS_CD == '03'}">보류</option>
    </select>
  </td>
</tr>

<tr>
  <th>내용</th>
  <td><input type="text" name="CONTENT" th:value="${pjt['CONTENT']}" /></td>
</tr>


			<!-- ✅ [2] 결재 워크플로우 UI -->
			<tr>
				<th>결재 워크플로우</th>
				<td>
					<div id="workflow-container"></div>
					<button type="button" onclick="addApprover()"
						class="btn-add-approver">+ 결재자 추가</button>
				</td>
			</tr>

			<!-- ✅ [3] 파일 업로드 -->
			<tr>
				<th>파일업로드</th>
				<td><input type="file" name="uploadFile" id="uploadFile" />
					<div id="fileName"
						style="margin-top: 8px; color: #333; font-size: 14px; background-color: #f0f0f0; padding: 6px 10px; border-radius: 4px;">
					</div></td>
			</tr>
		</table>
		<input type="hidden" name="approvers" id="approversInput" />
		<div class="button-row">
			<button type="submit" class="save-btn">저장</button>
			<button type="button" class="back-btn" onclick="history.back()">←
				돌아가기</button>
		</div>
	</form>
<script>
  const fileInput = document.getElementById('uploadFile');
  const fileNameDiv = document.getElementById('fileName');

  if (fileInput) {
    fileInput.addEventListener('change', () => {
      if (fileInput.files.length > 0) {
        fileNameDiv.textContent = `선택한 파일: ${fileInput.files[0].name}`;
      } else {
        fileNameDiv.textContent = '';
      }
    });
  }

  const workflowContainer = document.getElementById('workflow-container');
  let approverCount = 0;

  function addApprover() {
    approverCount++;

    const div = document.createElement('div');
    div.classList.add('workflow-step');

    div.innerHTML = `
      <input type="number" class="approver-order" min="1" style="width: 50px; margin-right: 10px;" placeholder="순서" />
      <select class="approver-select" style="margin-right:10px;">
        <option value="">-- 결재자 선택 --</option>
        <option value="장대리">장대리</option>
        <option value="최대리">최대리</option>
        <option value="이주임">이주임</option>
        <option value="정과장">정과장</option>
        <option value="신과장">신과장</option>
        <option value="김대표">김대표</option>
      </select>
      <button type="button" onclick="removeApprover(this)">X</button>
    `;

    workflowContainer.appendChild(div);
  }

  function removeApprover(btn) {
    btn.parentElement.remove();
  }

  function prepareApprovers() {
    const selects = document.querySelectorAll('.approver-select');
    const names = [];

    selects.forEach(select => {
      if (select.value) names.push(select.value);
    });

    document.getElementById('approversInput').value = names.join(',');
  }
</script>

</body>
</html>
