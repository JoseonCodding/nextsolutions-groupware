<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <title>프로젝트 변경</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 50px;
      background-color: #f5f7fa;
      color: #333;
    }

    h1 {
      color: #4a4a4a;
      text-align: center;
      margin-bottom: 40px;
    }

    table {
      width: 60%;
      margin: 0 auto;
      border-collapse: collapse;
      background-color: #ffffff;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      border-radius: 10px;
      overflow: hidden;
    }

    th, td {
      padding: 16px 20px;
      text-align: left;
      border-bottom: 1px solid #e0e0e0;
    }

    th {
      width: 30%;
      background-color: #f0f0f0;
      font-weight: bold;
      color: #333;
    }

    tr:last-child td {
      border-bottom: none;
    }

    input, select {
      padding: 8px;
      width: 100%;
      box-sizing: border-box;
    }

    .button-row {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 30px;
    }

    .button-row button {
      width: 200px;
      height: 45px;
      font-size: 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    .save-btn {
      background-color: #28a745;
      color: white;
    }

    .save-btn:hover {
      background-color: #218838;
    }

    .back-btn {
      background-color: #4a90e2;
      color: white;
    }

    .back-btn:hover {
      background-color: #357abd;
    }
  </style>
</head>

<body>

  <h1>프로젝트 변경</h1>

  <form method="post" action="/pjtMng/updatePjtProc">
    <input type="hidden" name="PJT_SN" value="${pjt.PJT_SN}" />

    <table>
      <tr>
        <th>프로젝트명</th>
        <td><input type="text" name="PJT_NM" value="${pjt.PJT_NM}" required /></td>
      </tr>

      <tr>
        <th>담당자</th>
        <td><input type="text" name="EMP_NM" value="${pjt.EMP_NM}" /></td>
      </tr>

      <tr>
        <th>시작일</th>
        <td><input type="date" name="PJT_BGNG_DT" value="${pjt.PJT_BGNG_DT}" /></td>
      </tr>

      <tr>
        <th>종료일</th>
        <td><input type="date" name="PJT_END_DT" value="${pjt.PJT_END_DT}" /></td>
      </tr>

      <tr>
        <th>상태</th>
        <td>
          <select name="PJT_STTS_CD">
			<option value="01" th:selected="${pjt.PJT_STTS_CD == '01'}">진행중</option>
			<option value="02" th:selected="${pjt.PJT_STTS_CD == '02'}">완료</option>
			<option value="03" th:selected="${pjt.PJT_STTS_CD == '03'}">보류</option>
          </select>
        </td>
      </tr>
    </table>

    <div class="button-row">
      <button type="submit" class="save-btn">저장</button>
      <button type="button" class="back-btn" onclick="history.back()">← 돌아가기</button>
    </div>
  </form>

</body>
</html>
