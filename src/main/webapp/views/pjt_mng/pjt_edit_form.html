<body>

	<h1 class="detail-title" style="margin-top:45px;">프로젝트 수정</h1>
	<!-- ✅ 프로젝트 수정 Form -->
	<form method="post" action="/pjtMng/updatePjtProc"
		enctype="multipart/form-data" onsubmit="return validateForm()">

		<!-- hidden 값도 null-safe -->
		<input type="hidden" name="pjtSn" th:value="${pjt['PJT_SN'] ?: ''}" />
		<input type="hidden" name="gid" th:value="${pjt['gid'] ?: ''}" /> 
		<input type="hidden" name="oldFileName"   th:value="${pjt['ATCH_FILE_SN'] ?: ''}"> 
		<input type="hidden" name="oldOrgFileName" th:value="${pjt['ORG_FILE_NM'] ?: ''}">
		<input type="hidden" name="firstSign" th:value="${pjt['firstSign'] ?: ''}">
		<input type="hidden" name="secondSign" th:value="${pjt['secondSign'] ?: ''}"> 
		<input type="hidden" name="approvedBy" th:value="${pjt['approvedBy'] ?: ''}">
		
		<input type="hidden" name="oldFileName1" th:value="${pjt['ATCH_FILE_SN1']}" /> 
		<input type="hidden" name="oldOrgFileName1" th:value="${pjt['ORG_FILE_NM1']}" /> 
		<input type="hidden" name="oldFileName2" th:value="${pjt['ATCH_FILE_SN2']}" />
		<input type="hidden" name="oldOrgFileName2" th:value="${pjt['ORG_FILE_NM2']}" />
		<input type="hidden" name="oldFileName3" th:value="${pjt['ATCH_FILE_SN3']}" /> 
		<input type="hidden" name="oldOrgFileName3" th:value="${pjt['ORG_FILE_NM3']}" />

		<table>
			<tr>
				<th>프로젝트명</th>
				<!-- null이면 빈칸 또는 '값 없음' 등으로 표시 가능 -->
				<td><input type="text" name="pjtNm"
					th:value="${pjt['PJT_NM'] ?: ''}" /></td>
			</tr>
			<tr>
				<th>담당자</th>
				<td>
					<!-- 모델 키가 employeeid 인 듯하여 그대로 사용 -->
					 <input type="text"
					name="employeeId" th:value="${pjt['employeeId'] ?: ''}"
					placeholder="담당자 이름 입력" readonly />
				</td>
			</tr>
			
			<tr>
				<!-- 담당자 사번에서 이름을 보이게 변경해놓음 -->
				<th>담당자</th>
				<td>
				<select name="employeeId" id="employeeId"
					class="form-select" >
						<option value="">-- 담당자 선택 --</option>
						<th:block th:each="a : ${approverList}">
							<option th:value="${a['employeeId']}"
								th:text="${a['emp_nm'] != null ? a['emp_nm'] : a['EMP_NM']}"
								th:selected="${pjt != null and a['employeeId'] == pjt['TB_PJT_APR']}">
							</option>
						</th:block>
				</select>
				</td>
			</tr>
			
			<tr>
				<th>기간</th>
				<td>
					시작일: <input type="date" name="pjtBgngDt" style="width:150px; border-radius:3px; margin-right: 10px;"
					th:value="${pjt['PJT_BGNG_DT'] ?: ''}" /> 종료일: 
					<input type="date" name="pjtEndDt" style="width:150px; border-radius:3px;" th:value="${pjt['PJT_END_DT'] ?: ''}" /> 
				</td>
			</tr>

			<tr
				th:with="stts=${pjt != null ? #strings.trim(pjt['PJT_STTS_CD']) : ''}" 
				style="border-radius:3px;">
				<th>상태</th>
				<td>
					<!-- 대기: 읽기전용 --> <input type="text" name="pjtSttsCd"
					th:value="${stts}" th:if="${stts == '대기'}" readonly
					class="readonly" /> <!-- 대기 아님: 드롭다운 --> <select name="pjtSttsCd"
					th:if="${stts != '대기'}" required>
						<option value="진행중" th:selected="${stts == '진행중'}">진행중</option>
						<option value="완료" th:selected="${stts == '완료'}">완료</option>
				</select>
				</td>
			</tr>

			<tr>
				<th>내용</th>
				<td><textarea id="content" name="content"
						th:text="${pjt['content'] ?: ''}"></textarea></td>
			</tr>

			<tr>
				<th>결재자</th>
				<td>
					<!-- DB로 넘어갈 진짜 값(사번) --> 
					<input type="hidden" name="TB_PJT_APR"
					th:value="${pjt['TB_PJT_APR']}" /> <!-- 화면 표시용 (읽기 전용) --> <input
					type="text" th:value="${pjt['TB_PJT_APR']}" readonly
					class="form-control" />
				</td>
			</tr>


			<!-- 파일 업로드 창 -->
			<tr>
				<th rowspan="3">파일업로드</th>
				<td>
				<input type="file" name="uploadFile1" id="uploadFile1" />
					<div
						style="margin-top: 8px; background-color: #f0f0f0; padding: 6px 10px; border-radius: 4px; border: 1px solid #ccc;">
						<span th:text="${pjt['ORG_FILE_NM1'] ?: '첨부된 파일 없음'}"></span>
					</div>
					 <label th:if="${pjt['ATCH_FILE_SN1'] != null && pjt['ATCH_FILE_SN1'] != ''}"
							style="display: inline-block; margin-top: 6px;"> <input
							type="checkbox" name="delFileSlots1" value="true"> 삭제
				</label>
				</td>
			</tr>
			<tr>
				<td><input type="file" name="uploadFile2" id="uploadFile2" />
					<div
						style="margin-top: 8px; background-color: #f0f0f0; padding: 6px 10px; border-radius: 4px; border: 1px solid #ccc;">
						<span th:text="${pjt['ORG_FILE_NM2'] ?: '첨부된 파일 없음'}"></span>
					</div>
					 <label th:if="${pjt['ATCH_FILE_SN2'] != null && pjt['ATCH_FILE_SN2'] != ''}"
					style="display: inline-block; margin-top: 6px;">
					 <input type="checkbox" name="delFileSlots2" value="true"> 삭제
				</label></td>
			</tr>
			<tr>
				<td><input type="file" name="uploadFile3" id="uploadFile3" />
					<div
						style="margin-top: 8px; background-color: #f0f0f0; padding: 6px 10px; border-radius: 4px; border: 1px solid #ccc;">
						<span th:text="${pjt['ORG_FILE_NM3'] ?: '첨부된 파일 없음'}"></span>
					</div> <label th:if="${pjt['ATCH_FILE_SN3'] != null && pjt['ATCH_FILE_SN3'] != ''}"
					style="display: inline-block; margin-top: 6px;"> <input
						type="checkbox" name="delFileSlots3" value="true"> 삭제
				</label></td>
			</tr>


			<tr>
				<th>등록일</th>

				<td><input type="text" name="FRST_REG_DT"
      						 th:value="${pjt['FRST_REG_DT'] != null ? #temporals.format(pjt['FRST_REG_DT'], 'yyyy-MM-dd HH:mm:ss') : ''}"
      						 readonly /></td>
			</tr>
		</table>

		<!-- null-safe -->
		<input type="hidden" name="approvers" id="approversInput"
			th:value="${pjt['approvers'] ?: ''}" /> <input type="hidden"
			name="ver" id="ver" th:value="${pjt['ver'] ?: ''}" />

		<div class="button-row">
			<button type="button" class="back-btn" onclick="history.back()">
			목록 </button>
			<!-- <button type="submit" class="save-btn">저장</button> -->

			<!-- 페이지 어딘가에서 stts를 이미 썼다면 그대로 활용 -->
			<button type="submit" class="save-btn"
				th:with="stts=${pjt != null ? #strings.trim(pjt['PJT_STTS_CD']) : ''}"
				th:disabled="${stts == '대기'}"
				th:title="${stts == '대기'} ? '대기 상태 프로젝트는 저장할 수 없습니다.' : null">
				저장</button>


		</div>
	</form>
	<!-- 기간: 종료일이 시작일 유효성 검사  -->	
	<script>
(function () {
  const bg = document.querySelector('input[name="pjtBgngDt"]');
  const ed = document.querySelector('input[name="pjtEndDt"]');
  if (!bg || !ed) return;

  // yyyy-MM-dd 포맷은 문자열 비교로 안전하게 검증 가능
  const isValid = () => !(bg.value && ed.value && ed.value < bg.value);

  // 변경 시 바로 검사 (앞서면 종료일 비우고 포커스)
  const onChange = () => {
    if (!isValid()) { ed.value = ""; ed.focus(); alert("종료일은 시작일보다 앞설 수 없습니다."); }
  };
  bg.addEventListener("change", onChange);
  ed.addEventListener("change", onChange);

  // 제출 시 최종 차단
  const form = bg.closest("form");
  if (form) {
    form.addEventListener("submit", (e) => {
      if (!isValid()) { e.preventDefault(); ed.focus(); alert("종료일은 시작일보다 앞설 수 없습니다."); }
    });
  }
})();
</script>
	
	
	
	
	
	<!-- 파일 저장 용량에 대한부분 -->
<script>
function validateForm() {
  const FILE_IDS = ['uploadFile1', 'uploadFile2', 'uploadFile3'];
  const MAX_FILE_MB  = 5;   // 파일당 최대 5MB
  const MAX_TOTAL_MB = 25;  // 전체 합계 최대 25MB
  let totalBytes = 0;

  for (const id of FILE_IDS) {
    const input = document.getElementById(id);
    if (!input || !input.files || input.files.length === 0) continue;

    for (const f of input.files) {
      if (f.size > MAX_FILE_MB * 1024 * 1024) {
        alert(`'${f.name}' 파일은 ${MAX_FILE_MB}MB를 초과했습니다.`);
        input.value = ""; // 잘못된 파일 초기화
        return false; // 🚫 저장 중단
      }
      totalBytes += f.size;
    }
  }

  if (totalBytes > MAX_TOTAL_MB * 1024 * 1024) {
    alert(`총 업로드 용량이 ${MAX_TOTAL_MB}MB를 초과했습니다.`);
    FILE_IDS.forEach(id => {
      const el = document.getElementById(id);
      if (el) el.value = "";
    });
    return false;
  }

  return true;
}
</script>

	<script>
  
//업로드 미리보기 + 간단 검증(확장자/용량)
  (function () {
    const ALLOWED = /\.(pdf|docx?|xlsx?|png|jpe?g)$/i;
    const MAX_MB = 10;

    const pairs = [
      { input: 'uploadFile1', label: 'fileName1' },
      { input: 'uploadFile2', label: 'fileName2' },
      { input: 'uploadFile3', label: 'fileName3' },
    ];

    pairs.forEach(p => {
      const $in = document.getElementById(p.input);
      const $lb = document.getElementById(p.label);
      if (!$in || !$lb) return;

      $in.addEventListener('change', () => {
        if (!$in.files || $in.files.length === 0) { $lb.textContent = ''; return; }
        const f = $in.files[0];

        if (!ALLOWED.test(f.name)) {
          alert('허용되지 않은 파일 형식입니다. (pdf, doc/docx, xls/xlsx, png, jpg/jpeg)');
          $in.value = ''; $lb.textContent = ''; return;
        }
        if (f.size > MAX_MB * 1024 * 1024) {
          alert(`파일 용량은 최대 ${MAX_MB}MB입니다.`);
          $in.value = ''; $lb.textContent = ''; return;
        }

        $lb.textContent = `선택한 파일: ${f.name}`;
      });
    });
  })();
  
  
// 결재자 선택에 대한부분 
  const workflowContainer = document.getElementById('workflow-container');
  let approverCount = 0;

  function addApprover() {
    approverCount++;

    const div = document.createElement('div');
    div.classList.add('workflow-step');

    div.innerHTML = `
      <input type="number" class="approver-order" min="1" style="width: 50px; margin-right: 10px;" placeholder="순서" />
      <select class="approver-select" style="margin-right:10px;">
        <option value="">-- 결재자 선택 --</option>
        <option value="장대리">장대리</option>
        <option value="최대리">최대리</option>
        <option value="이주임">이주임</option>
        <option value="정과장">정과장</option>
        <option value="신과장">신과장</option>
        <option value="김대표">김대표</option>
      </select>
      <button type="button" onclick="removeApprover(this)">X</button>
    `;

    workflowContainer.appendChild(div);
  }

  function removeApprover(btn) {
    btn.parentElement.remove();
  }

  function prepareApprovers() {
    const selects = document.querySelectorAll('.approver-select');
    const names = [];

    selects.forEach(select => {
      if (select.value) names.push(select.value);
    });

    document.getElementById('approversInput').value = names.join(',');
  }
</script>

	<!-- 썸머노트용 JS -->
	<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
