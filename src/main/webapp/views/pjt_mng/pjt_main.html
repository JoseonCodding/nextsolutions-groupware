/* 🔧 여기부터: 정렬+검색 오른쪽 정렬 */
.toolbar-right {
	display: flex;
	justify-content: flex-start; /* 전체 오른쪽 정렬 : 오른쪽하고 싶으면 flex-end; */
	align-items: center;
	gap: 12px; /* 드롭다운-검색 사이 간격 */
	margin-top: 20px;
}

.toolbar-right select {
	height: 40px;
	width: 160px;
	font-size: 14px;
	padding: 0 12px;
	border: 1px solid #ccc;
	border-radius: 6px;
	box-sizing: border-box;
	outline: none;
	cursor: pointer;
	background: #fff;
}

.toolbar-right input[type="text"] {
	height: 40px;
	padding: 0 12px;
	border-radius: 6px;
	border: 1px solid #ccc;
	box-sizing: border-box;
}

.toolbar-right .button {
	height: 40px;
	padding: 0 20px;
	border-radius: 6px;
	background-color: #2962ff;
	color: #fff;
}

/*  페이지네이션 선택된(현재) 페이지 버튼 */
.page-item.active .page-link {
	background-color: #d32f2f; /* 진한 빨강*/
	border-color: #b71c1c;
	color: #fff;
	font-weight: bold;
	box-shadow: 0 0 8px rgba(211, 47, 47, 0.6);
}

/* 마우스 올렸을 때 */
.page-item.active .page-link:hover {
	background-color: #b71c1c;
	border-color: #7f0000;
	color: #fff;
}


 /* 페이징 번호 점 없애기*/
.pagination {
	list-style: none; /* 점(불릿) 제거*/ 
	padding-left: 0; /* 왼쪽 여백 제거 */
	margin: 0;    /* 위아래 여백도 조정 */
}


/*완료시 버튼비활성화 */
.btn-disabled {
	background-color: #ccc !important; /* 회색 */
	color: #666 !important;
	cursor: not-allowed;
}

/* 카드 그리드 */
.cards-grid {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 14px;
  margin-bottom: 20px;
}

.stat-card {
  background: #fff;
  border-radius: 12px;
  padding: 18px 18px;
  border: 1px solid #f1f5f9;
  box-shadow: 0 1px 4px rgba(0,0,0,0.05);
  cursor: pointer;
  display: flex;
  flex-direction: column;
  gap: 10px;
  transition: box-shadow 0.18s, transform 0.18s;
}
.stat-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 6px 16px rgba(0,0,0,0.10);
}
.stat-card .icon {
  width: 38px;
  height: 38px;
  border-radius: 9px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
}
.stat-card .label {
  font-size: 12px;
  color: #94a3b8;
  font-weight: 500;
  white-space: nowrap;
}
.stat-card .value {
  font-size: 24px;
  font-weight: 700;
  color: #1a202c;
  line-height: 1;
  margin: 0;
}
</style>
</head>
<body>

	<h1 style="margin-top: 45px;">프로젝트 관리</h1>
	<!-- 카드 요약 -->
	<div class="cards-grid">

		<div class="stat-card" onclick="location.href='/pjtMng/getPjtList'">
			<div class="icon" style="background:#eef2ff;color:#3949ab;"><i class="fa fa-layer-group"></i></div>
			<div class="label">전체 프로젝트</div>
			<div class="value" th:text="${totalCount != null ? totalCount : 0}">0</div>
		</div>

		<div class="stat-card" th:onclick="|location.href='@{/pjtMng/getPjtList(keywordType=''my'', keyword=${loginUser.empNm})}'|">
			<div class="icon" style="background:#f3e5f5;color:#6a1b9a;"><i class="fa fa-user"></i></div>
			<div class="label">내담당 프로젝트</div>
			<div class="value" th:text="${myProjectCount}">0</div>
		</div>

		<div class="stat-card" onclick="location.href='/pjtMng/getPjtList?keywordType=myApproval'">
			<div class="icon" style="background:#fff3e0;color:#e65100;"><i class="fa fa-file-signature"></i></div>
			<div class="label">내결재 프로젝트</div>
			<div class="value" th:text="${myApprovalTodoCount}">0</div>
		</div>

		<div class="stat-card" onclick="location.href='/pjtMng/getPjtList?keywordType=status&amp;keyword=진행중'">
			<div class="icon" style="background:#e3f2fd;color:#0277bd;"><i class="fa fa-spinner"></i></div>
			<div class="label">진행중인 프로젝트</div>
			<div class="value" th:text="${progressCount}">0</div>
		</div>

		<div class="stat-card" onclick="location.href='/pjtMng/getPjtList?keywordType=status&amp;keyword=대기'">
			<div class="icon" style="background:#fce4ec;color:#c62828;"><i class="fa fa-clock"></i></div>
			<div class="label">대기중인 프로젝트</div>
			<div class="value" th:text="${pendingCount}">0</div>
		</div>

		<div class="stat-card" onclick="location.href='/pjtMng/getPjtList?keywordType=status&amp;keyword=완료'">
			<div class="icon" style="background:#e8f5e9;color:#2e7d32;"><i class="fa fa-circle-check"></i></div>
			<div class="label">완료된 프로젝트</div>
			<div class="value" th:text="${completeCount}">0</div>
		</div>
	</div>


	<!-- 🔹 검색 + 등록 버튼 한 줄 배치 -->
	<div
		style="display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-top: 20px;">

		<!-- 1. 왼쪽: 정렬 + 검색 -->
		<form action="/pjtMng/getPjtList" method="get"
			onsubmit="return validateSearchForm(this);"
			style="display: flex; align-items: center; gap: 12px; margin-bottom: 20px;">

			<select name="keywordType"
				style="height: 40px; width: 160px; font-size: 14px; padding: 0 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; outline: none; background: #fff;">
				<option value="" disabled th:selected="${#strings.isEmpty(keywordType) or keywordType == 'myApproval'}">선택</option>
				<option value="writer" th:selected="${keywordType == 'writer'}">담당자명</option>
				<option value="project" th:selected="${keywordType == 'project'}">프로젝트명</option>
				<option value="status" th:selected="${keywordType == 'status'}">진행상태</option>
			</select> <input type="text" name="keyword" placeholder="검색어 입력"
				th:value="${keyword}"
				style="height: 40px; padding: 0 12px; border-radius: 6px; border: 1px solid #ccc; box-sizing: border-box;">

			    <button type="submit" class="filter-btn">
			      <i class="fa fa-search"></i> 검색
			    </button>
			    <a href="/pjtMng/getPjtList" class="filter-btn">
			      <i class="fa fa-rotate-left"></i> 초기화
			    </a>
		</form>

		
	</div>


	<!-- 🔹 유효성 검사 스크립트 -->
	<script>
		function validateSearchForm(form) {
			const keywordType = form.keywordType.value.trim();
			const keyword = form.keyword.value.trim();

			if (!keywordType) {
				alert("검색 유형을 선택하세요.");
				form.keywordType.focus();
				return false;
			}
			if (!keyword) {
				alert("검색어를 입력하세요.");
				form.keyword.focus();
				return false;
			}
			return true;
		}
	</script>

	<table>
		<thead>
			<tr>
				<th style="width:35px; text-align: center;">번호</th>
				<th style="width: 340px;">제목</th>
				<th style="width: 90px;">담당자</th>
				<th style="width: 70px;">진행상태</th>
				
				<th>기간</th>
				
				<th style="width: 80px;">결재자</th>
				<th style="width: 50px;">버전</th>
				<!--  <th>gid</th>-->
				<th style="width: 70px;">　</th>
			</tr>
		</thead>
		<tbody>
			<!-- ✅ 검색 결과 없을 때 -->
   			 <tr th:if="${#lists.isEmpty(pjtList)}">
       		 <td colspan="9" style="text-align: center; vertical-align: middle; font-weight: bold; color: #444;">
  					  검색 조건에 맞는 프로젝트가 없습니다.
			</td>
		    <!-- ✅ 검색 결과 있을 때 반복 출력 -->
			<tr th:each="pjt, stat : ${pjtList}">
			
			<!-- 페이지 순번 처리  -->
				<td	th:text="${pageInfo != null ? (pageInfo.pageSize * (pageInfo.pageNum - 1) + stat.index + 1) : (stat.index + 1)}" style="text-align: center;"></td>
				<td class="board-title">
					<a th:text="${pjt['PJT_NM']}" th:href="@{/pjtMng/pjtDetail(pjtSn=${pjt['PJT_SN']}, pageNum=${pageNum}, keywordType=${keywordType}, keyword=${keyword})}" style="width:340px;"></a>
				</td>
				<!-- <td th:utext="${pjt['employeeId']+'<br/>'+pjt['position']}">담당자</td>	 이름,직책 두줄처리된거 -->
				<td th:utext="${pjt['employeeId']+' '+pjt['position']}">담당자</td>  <!-- 이름,직책 한줄처리된거 -->
								
				<td th:text="${pjt['PJT_STTS_CD']}">진행상태</td>				
				<td th:text="${pjt['PJT_BGNG_DT']} + ' ~ ' + ${pjt['PJT_END_DT']}">기간</td>
			
				<td th:utext="${pjt['TB_PJT_APR']+' '+pjt['position_APR']}">결재자</td>
				<td th:text="'v' +${pjt['ver']}"></td>
				<!--  <td th:text="${pjt['gid']}"></td> -->
				<td>
					<!-- 상세보기: 항상 가능 // 미사용 --> 
					<!-- <button class="detail-btn"
						th:onclick="'location.href=\'/pjtMng/pjtDetail?pjtSn=' + ${pjt['PJT_SN']} + '\''">
						상세
					</button> -->
            <!-- 수정 버튼 -->
					<button class="edit-btn"
						th:if="${session.loginUser.role == '대표' or session.loginUser.role == '프로젝트'}"
						th:classappend="${pjt['PJT_STTS_CD'] == '대기' or pjt['PJT_STTS_CD'] == '완료' or pjt['PJT_STTS_CD'] == '반려'} ? ' btn-disabled' : ''"
						th:disabled="${pjt['PJT_STTS_CD'] == '대기' or pjt['PJT_STTS_CD'] == '완료' or pjt['PJT_STTS_CD'] == '반려'}"
						th:onclick="'location.href=\'/pjtMng/pjtEditForm?pjtSn=' + ${pjt['PJT_SN']} + '\''" >수정</button>
				</td>
			</tr>
		</tbody>
	</table>
	
	
	<!-- 오른쪽하단: 프로젝트 등록 버튼 -->
	<div>
		<button class="regist-btn" onclick="location.href='/pjtMng/getSavePjtForm'">등록</button>
	</div>
	<!-- 페이지네이션
	<nav class="mt-4 text-center" th:if="${pageInfo != null}">
		<ul class="pagination justify-content-center">
			<li class="page-item"
				th:classappend="${pageInfo.prePage == 0} ? 'disabled'"><a
				class="page-link"
				th:href="@{/pjtMng/getPjtList(pageNum=${pageInfo.prePage}, keywordType=${keywordType}, pageSize=${pageInfo.pageSize}, keyword=${keyword}, sortType=${sortType})}">
					Previous </a></li>
			<li class="page-item"
				th:each="page : ${#numbers.sequence(pageInfo.navigateFirstPage, pageInfo.navigateLastPage)}"
				th:classappend="${page == pageInfo.pageNum} ? 'active'"><a
				class="page-link" th:text="${page}"
				th:href="@{/pjtMng/getPjtList(pageNum=${page}, keywordType=${keywordType}, pageSize=${pageInfo.pageSize}, keyword=${keyword}, sortType=${sortType})}"></a>
			</li>
			<li class="page-item"
				th:classappend="${pageInfo.nextPage == 0} ? 'disabled'"><a
				class="page-link"
				th:href="@{/pjtMng/getPjtList(pageNum=${pageInfo.nextPage}, keywordType=${keywordType}, pageSize=${pageInfo.pageSize}, keyword=${keyword}, sortType=${sortType})}">
					Next </a></li>
		</ul>
	</nav> -->
	
        <!-- 페이지네이션 필규버전 (시작)   -->
		<nav class="pagination">
		  <!-- Previous 버튼 -->
		  <a th:if="${pageNum > 1}" th:href="@{/pjtMng/getPjtList(pageNum=${pageNum-5 > 1 ? pageNum-5 : 1}, keywordType=${keywordType}, keyword=${keyword})}" class="prev">&#x2039; Previous</a>
		
		  <!-- 첫 페이지 -->
		  <span th:if="${startPage > 1 and pageNum == 1}" class="page-number now-page disabled" th:text="1"></span>
		  <a th:if="${startPage > 1 and pageNum != 1}" th:href="@{/pjtMng/getPjtList(pageNum=1, keywordType=${keywordType}, keyword=${keyword})}" th:text="1" class="page-number"></a>
		
		  <span th:if="${startPage > 2}" class="ellipsis">...</span>
		
		  <!-- 페이지 숫자들 -->
		  <span th:each="i : ${#numbers.sequence(startPage, endPage)}">
		    <span th:if="${i == pageNum}" class="page-number now-page disabled" th:text="${i}"></span>
		    <a th:if="${i != pageNum}" th:href="@{/pjtMng/getPjtList(pageNum=${i}, keywordType=${keywordType}, keyword=${keyword})}" th:text="${i}" class="page-number"></a>
		  </span>
		
		  <span th:if="${endPage < totalPages - 1}" class="ellipsis">...</span>
		
		  <!-- 마지막 페이지 -->
		  <span th:if="${endPage < totalPages and pageNum == totalPages}" class="page-number now-page disabled" th:text="${totalPages}"></span>
		  <a th:if="${endPage < totalPages and pageNum != totalPages}" th:href="@{/pjtMng/getPjtList(pageNum=${totalPages}, keywordType=${keywordType}, keyword=${keyword})}" th:text="${totalPages}" class="page-number"></a>
		
		  <!-- Next 버튼 -->
		  <a th:if="${pageNum < totalPages}" th:href="@{/pjtMng/getPjtList(pageNum=${pageNum+5 < totalPages ? pageNum+5 : totalPages}, keywordType=${keywordType}, keyword=${keyword})}"> Next &#x203A; </a>
		</nav>
		<!-- 페이지네이션 필규버전 (끝) -->

	<!-- 게시판 리스트 호버링 적용 JS -->
	<script>
		document.querySelectorAll('td.board-title').forEach(td => {
			  td.parentElement.addEventListener('mouseenter', () => {
			    td.parentElement.classList.add('hover-row');
			  });
			  td.parentElement.addEventListener('mouseleave', () => {
			    td.parentElement.classList.remove('hover-row');
			  });
			});
	</script>
</body>
