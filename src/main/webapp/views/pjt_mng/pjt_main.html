<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>프로젝트 목록</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 40px; background-color: #f9f9f9; }
    table { width: 100%; border-collapse: collapse; background-color: white; margin-top: 20px; }
    th, td { padding: 12px; border-bottom: 1px solid #ccc; text-align: left; }
    th { background-color: #eee; }
    tr:hover { background-color: #f5f5f5; }
    .button { padding: 6px 12px; font-size: 14px; border: none; border-radius: 4px; cursor: pointer; }
    .btn-view { background-color: #4CAF50; color: white; }
    .btn-edit { background-color: #2196F3; color: white; }
    .btn-delete { background-color: #f44336; color: white; }
    .btn-add { background-color: #673ab7; color: white; margin-top: 20px; }
  </style>
</head>
<body>

<h1>프로젝트 관리</h1>

<div style="display: flex; gap: 12px; align-items: center; margin-top: 10px;">
  <div style="
      font-size: 16px;
      color: #555;
      background-color: #e3f2fd;
      padding: 8px 12px;
      border-radius: 6px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
  ">
    총 프로젝트 수: <strong th:text="${pjtList.size()}">0</strong>개
  </div>

  <div style="
      font-size: 16px;
      color: #555;
      background-color: #fff3e0;
      padding: 8px 12px;
      border-radius: 6px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      border: 1px solid #ffb74d;
  ">
    진행 중 프로젝트: <strong th:text="${test}">0</strong>개
  </div>
</div>

<table>
  <thead>
    <tr>
      <th>프로젝트명</th>
      <th>진행상태</th>
      <th>담당자</th>
      <th>시작일</th>
      <th>마감일</th>
      <th>작업</th>
    </tr>
  </thead>
  <tbody>
<tr th:each="pjt : ${pjtList}">
  <td th:text="${pjt['PJT_NM']}"></td>
  <td th:text="${pjt['PJT_STTS_CD']}"></td>
  <td th:text="${pjt['EMP_NM']}"></td>
  <td th:text="${pjt['PJT_BGNG_DT']}"></td>
  <td th:text="${pjt['PJT_END_DT']}"></td>  
  
  <td>
  
	<button class="button btn-view"
	        th:onclick="'location.href=\'/pjtMng/pjtDetail?pjtSn=' + ${pjt['PJT_SN']} + '\''">
	  보기
	</button>
	
    <button class="button btn-edit"
            th:onclick="'location.href=\'project_edit.html?id=' + ${pjt['PJT_SN']} + '\''">
      편집
    </button>
    <button class="button btn-delete"
            th:onclick="'deleteProject(\'' + ${pjt['PJT_SN']} + '\')'">
      삭제
    </button>
  </td>
</tr>
  </tbody>
</table>

<button
  class="button btn-add"
  style="position: fixed; bottom: 20px; right: 20px; padding: 14px 20px; font-size: 18px; box-shadow: 0 4px 8px rgba(0,0,0,0.2); border-radius: 50%;"
  title="새 프로젝트 등록"
  onclick="location.href='/pjtMng/getSavePjtForm'">
  ＋
</button>


<script>
  function deleteProject(id) {
    if (confirm(`${id} 삭제할까요?`)) {
      alert(`삭제 처리 중: ${id}`);
      // fetch로 삭제 요청 날리게 해도 됨
    }
  }
</script>

</body>
</html>
