<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>프로젝트 목록</title>

  <!-- ✅ 팀원 스타일과 동일하게 보이도록 공통 UI 스타일 (CSS 파일 없이 head에 포함) -->
  <style>
    /* 페이지 기본 */
    body { font-family: Arial, sans-serif; margin: 40px; background-color: #f9f9f9; }

    /* 카드/테이블 공통 */
    table { width: 100%; border-collapse: collapse; background-color: white; margin-top: 20px; }
    th, td { padding: 12px; border-bottom: 1px solid #e5e7eb; text-align: left; }
    th { background-color: #f3f4f6; font-weight: 700; color: #374151; }
    tr:hover { background-color: #f9fafb; }

    /* ===== 팀 공통 토큰 ===== */
    :root{
      --gw-primary:#3B5BFF;        /* 팀원 파란 버튼 */
      --gw-primary-hover:#2F49CC;
      --gw-border:#e5e7eb;
      --gw-radius:10px;
      --gw-shadow:0 1px 2px rgba(0,0,0,.04);
      --gw-font:14px;
    }

    /* 버튼 통일 */
    .gw-btn{
      display:inline-flex; align-items:center; gap:8px;
      height:40px; padding:0 14px; border-radius:var(--gw-radius);
      border:1px solid transparent; font-weight:600; font-size:var(--gw-font);
      cursor:pointer; user-select:none; text-decoration:none;
    }
    .gw-btn-primary{ background:var(--gw-primary); color:#fff; }
    .gw-btn-primary:hover{ background:var(--gw-primary-hover); }
    .gw-btn-secondary{ background:#eef2ff; color:#1f2937; border-color:#c7d2fe; }
    .gw-btn-secondary:hover{ background:#e0e7ff; }

    /* 인풋/셀렉트 통일 */
    .gw-input, .gw-select{
      font-size:var(--gw-font); height:40px; padding:0 12px; background:#fff;
      border:1px solid var(--gw-border); border-radius:var(--gw-radius);
      box-shadow:var(--gw-shadow); outline:none;
    }
    .gw-input:focus, .gw-select:focus{
      border-color:var(--gw-primary); box-shadow:0 0 0 3px rgba(59,91,255,.12);
    }

    /* 검색바 레이아웃 */
    .gw-searchbar-wrap{ margin-top:20px; }
    .gw-searchbar{
      display:flex; align-items:center; gap:10px; flex-wrap:wrap;
      background:#fff; padding:10px; border-radius:12px; border:1px solid var(--gw-border);
    }

    /* 카드 스타일(상단 통계 5개) */
    .dash-cards{ display:flex; gap:16px; margin-top:20px; }
    .dash-card{
      flex:1; background:#fff; border:1px solid var(--gw-border); border-radius:6px; padding:16px;
      text-align:center; box-shadow:var(--gw-shadow);
    }
    .dash-title{ font-size:14px; color:#6b7280; }
    .dash-value{ font-size:22px; font-weight:bold; color:#111827; }

    /* 상단 우측 등록 버튼 컨테이너 */
    .top-actions{ display:flex; justify-content:flex-end; margin-top:20px; }

    /* 반응형 */
    @media (max-width: 1024px){ .dash-cards{ flex-wrap:wrap; } }
  </style>
</head>
<body>

<h1>프로젝트 관리</h1>

<!-- ✅ 상단 우측: 프로젝트 등록 버튼 (팀원 스타일) -->
<div class="top-actions">
  <!-- NOTE: 네 라우팅 그대로 유지 -->
  <a class="gw-btn gw-btn-primary" th:href="@{/pjtMng/getSavePjtForm}">
    <!-- ➕ 아이콘 -->
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </svg>
    프로젝트 등록
  </a>
</div>

<!-- ✅ 대시보드 카드 5개 (색상은 깔끔하게 통일) -->
<div class="dash-cards">
  <div class="dash-card">
    <div class="dash-title">총 프로젝트</div>
    <div class="dash-value" th:text="${pjtList != null ? pjtList.size() : 0}">0</div>
  </div>
  <div class="dash-card">
    <div class="dash-title">내 참여 프로젝트</div>
    <div class="dash-value" th:text="${myProjectCount}">0</div>
  </div>
  <div class="dash-card">
    <div class="dash-title">진행중</div>
    <div class="dash-value" th:text="${inProgressCount}">0</div>
  </div>
  <div class="dash-card">
    <div class="dash-title">완료</div>
    <div class="dash-value" th:text="${completedCount}">0</div>
  </div>
  <div class="dash-card">
    <div class="dash-title">대기</div>
    <div class="dash-value" th:text="${delayedCount}">0</div>
  </div>
</div>

<!-- ✅ 검색/정렬 통합 (한 개의 form으로 정리) -->
<div class="gw-searchbar-wrap">
  <!-- NOTE: 너의 컨트롤러가 /pjtMng/getPjtList 를 쓰고 있으니 그대로 둠 -->
  <form th:action="@{/pjtMng/getPjtList}" method="get" class="gw-searchbar">
 
  <!--   <정렬 기준 >
    <select name="sort" class="gw-select" th:value="${sort}">
      <option value="" disabled selected>정렬</option>
      <option value="PJT_SN">등록순</option>
      <option value="PJT_NM">프로젝트명</option>
      <option value="EMP_NM">담당자명</option> -->
     <!--  <option value="PJT_BGNG_DT">정렬: 시작일</option>
      <option value="PJT_END_DT">정렬: 마감일</option> 
     
    </select>

     <오름/내림차순> 
    <select name="order" class="gw-select" th:value="${order}">
      <option value="DESC">내림차순</option>
      <option value="ASC">오름차순</option>
    </select> -->

    <!-- 키워드 -->
    <input class="gw-input" type="text" name="keyword"
           th:value="${keyword}" placeholder="프로젝트명, 담당자 검색" />

    <!-- 조회 -->
    <button type="submit" class="gw-btn gw-btn-primary">
      <!-- 돋보기 -->
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M21 21l-3.8-3.8M10.5 18a7.5 7.5 0 1 1 0-15 7.5 7.5 0 0 1 0 15z"
              stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      조회
    </button>

    <!-- 초기화(파라미터 제거) -->
    <a class="gw-btn gw-btn-secondary" th:href="@{/pjtMng/getPjtList}">
      <!-- 리프레시 -->
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M21 12a9 9 0 0 1-15.3 6.4M3 12A9 9 0 0 1 18.3 5.6M3 4v6h6"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      초기화
    </a>

    <!-- 페이지 사이즈(원하면 숨김값으로 유지) -->
    <input type="hidden" name="pageSize" th:value="${pageInfo != null ? pageInfo.pageSize : 10}" />
    <!-- 페이지는 항상 1페이지부터 -->
    <input type="hidden" name="pageNum" value="1" />
  </form>
</div>

<!-- ✅ 목록 테이블 -->
<table>
  <thead>
    <tr>
      <th>순번</th>
      <th>프로젝트명</th>
      <th>담당자</th>
      <th>상태</th>       <!-- (중복 제거) -->
      <th>시작일</th>
      <th>마감일</th>
      <th>비고</th>
    </tr>
  </thead>

  <tbody>
    <!-- 목록이 없을 때 안내 -->
    <tr th:if="${pjtList == null or #lists.isEmpty(pjtList)}">
      <td colspan="8" style="text-align:center; color:#6b7280;">데이터가 없습니다.</td>
    </tr>

    <!-- 목록 렌더링 -->
    <tr th:each="pjt, stat : ${pjtList}">
    <td th:text="${offset + stat.index + 1}">1</td>
      <td th:text="${pjt['PJT_NM']}">프로젝트명</td>
      <td th:text="${pjt['EMP_NM']}">담당자</td>

      <!-- 상태: 코드 그대로 표시 중. (ING/HLD/CMP 등) 화면용 한글명이 필요하면 Service/SQL에서 alias로 PJT_STTS_NM 내려주기 -->
      <td th:text="${pjt['PJT_STTS_CD']}">상태</td>

      <!-- 날짜 컬럼: 네가 쓰는 키 그대로 유지 (PJT_BGNG_DT / PJT_END_DT) -->
      <td th:text="${pjt['PJT_BGNG_DT']}">시작일</td>
      <td th:text="${pjt['PJT_END_DT']}">마감일</td>

    <!--   <!-- 완료율: 없다면 0%로 표시 
      <td th:text="(${pjt['PROGRESS']} != null ? ${pjt['PROGRESS']} : 0) + '%'">0%</td> -->

      <td style="display:flex; gap:8px;">
        <!-- ✔ 상세보기/수정: onclick 대신 th:href 사용 -->
        <a class="gw-btn gw-btn-secondary"
           th:href="@{/pjtMng/pjtDetail(pjtSn=${pjt['PJT_SN']})}">상세보기</a>

        <a class="gw-btn gw-btn-primary"
           th:href="@{/pjtMng/pjtEditForm(pjtSn=${pjt['PJT_SN']})}">변경</a>
      </td>
    </tr>
  </tbody>
</table>

<!-- ✅ 페이징 (검색/정렬 파라미터 유지) -->
<nav class="mt-4 text-center" th:if="${pageInfo != null}">
  <ul class="pagination justify-content-center" style="display:flex; gap:6px; list-style:none; padding:0; margin-top:16px;">
    <!-- 이전 -->
    <li class="page-item" th:classappend="${pageInfo.prePage == 0} ? 'disabled'">
      <a class="gw-btn gw-btn-secondary"
         th:href="@{/pjtMng/getPjtList(pageNum=${pageInfo.prePage}, pageSize=${pageInfo.pageSize}, keyword=${keyword}, sort=${sort}, order=${order})}">
        Previous
      </a>
    </li>

    <!-- 숫자 페이지 -->
    <li class="page-item"
        th:each="page : ${#numbers.sequence(pageInfo.navigateFirstPage, pageInfo.navigateLastPage)}">
      <a class="gw-btn"
         th:classappend="${page == pageInfo.pageNum} ? ' gw-btn-primary' : ' gw-btn-secondary'"
         th:text="${page}"
         th:href="@{/pjtMng/getPjtList(pageNum=${page}, pageSize=${pageInfo.pageSize}, keyword=${keyword}, sort=${sort}, order=${order})}">1</a>
    </li>

    <!-- 다음 -->
    <li class="page-item" th:classappend="${pageInfo.nextPage == 0} ? 'disabled'">
      <a class="gw-btn gw-btn-secondary"
         th:href="@{/pjtMng/getPjtList(pageNum=${pageInfo.nextPage}, pageSize=${pageInfo.pageSize}, keyword=${keyword}, sort=${sort}, order=${order})}">
        Next
      </a>
    </li>
  </ul>
</nav>

</body>
</html>
