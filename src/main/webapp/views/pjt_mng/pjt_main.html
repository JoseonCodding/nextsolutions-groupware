/* 🔧 여기부터: 정렬+검색 오른쪽 정렬 */
.toolbar-right {
	display: flex;
	justify-content: flex-start; /* 전체 오른쪽 정렬 : 오른쪽하고 싶으면 flex-end; */
	align-items: center;
	gap: 12px; /* 드롭다운-검색 사이 간격 */
	margin-top: 20px;
}

.toolbar-right select {
	height: 40px;
	width: 160px;
	font-size: 14px;
	padding: 0 12px;
	border: 1px solid #ccc;
	border-radius: 6px;
	box-sizing: border-box;
	outline: none;
	cursor: pointer;
	background: #fff;
}

.toolbar-right input[type="text"] {
	height: 40px;
	padding: 0 12px;
	border-radius: 6px;
	border: 1px solid #ccc;
	box-sizing: border-box;
}

.toolbar-right .button {
	height: 40px;
	padding: 0 20px;
	border-radius: 6px;
	background-color: #2962ff;
	color: #fff;
}

/* ✅ 선택된(현재) 페이지 버튼 */
.pagination .page-item.active .page-link {
	background-color: #d32f2f; /* 진한 빨강 */
	border-color: #b71c1c;
	color: #fff;
	font-weight: bold;
	box-shadow: 0 0 8px rgba(211, 47, 47, 0.6);
}

/* 마우스 올렸을 때 */
.pagination .page-item.active .page-link:hover {
	background-color: #b71c1c;
	border-color: #7f0000;
	color: #fff;
}
/* 페이징 번호 점 없애기 */
.pagination {
	list-style: none; /* 점(불릿) 제거 */
	padding-left: 0; /* 왼쪽 여백 제거 */
	margin: 0; /* 위아래 여백도 조정 */
}
/*완료시 버튼비활성화 */
.btn-disabled {
	background-color: #ccc !important; /* 회색 */
	color: #666 !important;
	cursor: not-allowed;
}

/* 레이아웃 */
.cards-grid {
	display: grid;
	grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
	gap: 16px;
	margin-top: 20px;
}

/* 카드 공통 */
.stat-card {
	/* 포인트 색상: 인라인 style="--accent:#xxxxxx"로 들어온 값 사용 */
	--accent: #1976d2; /* 보더 색 */
	--bg: #f9fbfd;
	background: var(--bg);
	border-left: 6px solid var(--accent);
	border-radius: 10px;
	padding: 16px 18px;
	box-shadow: 0 1px 3px rgba(0, 0, 0, .08);
	cursor: pointer;
	display: flex;
	align-items: center;
	transition: box-shadow .18s ease, transform .18s ease;
}

/* 호버 효과 */
.stat-card:hover {
	transform: translateY(-3px);
	box-shadow: 0 6px 16px rgba(0, 0, 0, .10);
}

/* 내부 텍스트 */
.stat-card .label {
	font-size: 13px;
	font-weight: 700;
	color: #666;
	letter-spacing: .3px;
}

.stat-card .value {
	margin-top: 4px;
	font-size: 24px;
	font-weight: 800;
	color: #222;
}

/* 접근성: 키보드 포커스 */
.stat-card:focus-visible {
	outline: 3px solid var(--accent);
	outline-offset: 2px;
	border-radius: 10px;
}
</style>
</head>
<body>

	<h1 style="margin-bottom: 45px;">프로젝트 관리</h1>
	<!-- 카드 요약 -->
	<div class="cards-grid">

		<!-- 총 프로젝트 -->
		<div class="stat-card" style="--accent: #90caf9;"
			onclick="location.href='/pjtMng/getPjtList'">
			<div class="meta">
				<div class="label">총 프로젝트</div>
				<div class="value" th:text="${totalCount != null ? totalCount : 0}">0</div>
			</div>
		</div>

		<!-- 내 참여 프로젝트 -->
		<div class="stat-card" style="--accent: #ce93d8;"
			onclick="location.href='/pjtMng/getPjtList?keywordType=my&keyword=참여'">
			<div class="meta">
				<div class="label">내 참여 프로젝트</div>
				<div class="value" th:text="${myProjectCount}">0</div>
			</div>
		</div>

		<!-- 내 결재 프로젝트 -->
		<div class="stat-card" style="--accent: #ffb3b3;"
			onclick="location.href='/pjtMng/getPjtList?keywordType=myApproval&keyword=결재'">
			<div class="meta">
				<div class="label">내 결재 프로젝트</div>
				<div class="value" th:text="${myApprovalTodoCount}">0</div>
			</div>
		</div>

		<!-- 진행중인 프로젝트 -->
		<div class="stat-card" style="--accent: #ffe082;"
			onclick="location.href='/pjtMng/getPjtList?keywordType=status&keyword=진행중'">
			<div class="meta">
				<div class="label">진행중인 프로젝트</div>
				<div class="value" th:text="${progressCount}">0</div>
			</div>
		</div>

		<!-- 대기 -->
		<div class="stat-card" style="--accent: #ef9a9a;"
			onclick="location.href='/pjtMng/getPjtList?keywordType=status&keyword=대기'">
			<div class="meta">
				<div class="label">대기중인 프로젝트</div>
				<div class="value" th:text="${pendingCount}">0</div>
			</div>
		</div>
		<!-- 완료 -->
		<div class="stat-card" style="--accent: #81c784;"
			onclick="location.href='/pjtMng/getPjtList?keywordType=status&keyword=완료'">
			<div class="meta">
				<div class="label">완료된 프로젝트</div>
				<div class="value" th:text="${completeCount}">0</div>
			</div>
		</div>
	</div>


	<!-- 🔹 검색 + 등록 버튼 한 줄 배치 -->
	<div
		style="display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-top: 20px;">

		<!-- 1. 왼쪽: 정렬 + 검색 -->
		<form action="/pjtMng/getPjtList" method="get"
			onsubmit="return validateSearchForm(this);"
			style="display: flex; align-items: center; gap: 12px; margin-bottom: 20px;">

			<select name="keywordType"
				style="height: 40px; width: 160px; font-size: 14px; padding: 0 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; outline: none; background: #fff;">
				<option value="" disabled
					th:selected="${#strings.isEmpty(keywordType)}">선택</option>
				<option value="writer" th:selected="${keywordType == 'writer'}">작성자명</option>
				<option value="project" th:selected="${keywordType == 'project'}">프로젝트명</option>
				<option value="status" th:selected="${keywordType == 'status'}">진행상태</option>
			</select> <input type="text" name="keyword" placeholder="검색어 입력"
				th:value="${keyword}"
				style="height: 40px; padding: 0 12px; border-radius: 6px; border: 1px solid #ccc; box-sizing: border-box;">

			<button type="submit"
				style="height: 40px; padding: 0 20px; border-radius: 6px; border: none; background-color: #2962ff; color: #fff; cursor: pointer;">
				검색</button>
		</form>

		
	</div>


	<!-- 🔹 유효성 검사 스크립트 -->
	<script>
		function validateSearchForm(form) {
			const keywordType = form.keywordType.value.trim();
			const keyword = form.keyword.value.trim();

			if (!keywordType) {
				alert("검색 유형을 선택하세요.");
				form.keywordType.focus();
				return false;
			}
			if (!keyword) {
				alert("검색어를 입력하세요.");
				form.keyword.focus();
				return false;
			}
			return true;
		}
	</script>

	<table>
		<thead>
			<tr>
				<th style="width:35px; text-align: center;">번호</th>
				<th style="width: 350px;">제목</th>
				<th style="width: 50px;">담당자</th>
				<th style="width: 90px;">진행상태</th>
				
				<th>기간</th>
				<!-- <th>시작일</th>
				<th>종료일</th> -->
				<th style="width: 50px;">결재자</th>
				<th style="width: 50px;">버전</th>
				<!--  <th>gid</th>-->
				<th style="width: 70px;">　</th>
			</tr>
		</thead>
		<tbody>
			<!-- ✅ 검색 결과 없을 때 -->
   			 <tr th:if="${#lists.isEmpty(pjtList)}">
       		 <td colspan="9" style="text-align: center; vertical-align: middle; font-weight: bold; color: #444;">
  					  검색 조건에 맞는 프로젝트가 없습니다.
			</td>
		    <!-- ✅ 검색 결과 있을 때 반복 출력 -->
			<tr th:each="pjt, stat : ${pjtList}">
			
			<!-- 페이지 순번 처리  -->
				<td	th:text="${pageInfo != null ? (pageInfo.pageSize * (pageInfo.pageNum - 1) + stat.index + 1) : (stat.index + 1)}" style="text-align: center;"></td>
				<td>
					<a th:text="${pjt['PJT_NM']}" class="board-title" th:href="@{/pjtMng/pjtDetail(pjtSn=${pjt['PJT_SN']})}"></a>
				</td>
				<td th:text="${pjt['employeeId']} ">담당자</td>					
				<td th:text="${pjt['PJT_STTS_CD']}">진행상태</td>				
				<td th:text="${pjt['PJT_BGNG_DT']} + ' ~ ' + ${pjt['PJT_END_DT']}">기간</td>
			
				<td th:text="${pjt['TB_PJT_APR']}">결재자</td>
				<td th:text="'v' +${pjt['ver']}"></td>
				<!--  <td th:text="${pjt['gid']}"></td> -->
				<td>
					<!-- 상세보기: 항상 가능 // 미사용 --> 
					<!-- <button class="detail-btn"
						th:onclick="'location.href=\'/pjtMng/pjtDetail?pjtSn=' + ${pjt['PJT_SN']} + '\''">
						상세
					</button> -->
            <!-- 수정 버튼 -->
					<button class="edit-btn"
						th:if="${session.loginUser.role == '대표' or session.loginUser.role == '프로젝트'}"
						th:classappend="${pjt['PJT_STTS_CD'] == '대기' or pjt['PJT_STTS_CD'] == '완료'} ? ' btn-disabled' : ''"
						th:disabled="${pjt['PJT_STTS_CD'] == '대기' or pjt['PJT_STTS_CD'] == '완료'}"
						th:onclick="'location.href=\'/pjtMng/pjtEditForm?pjtSn=' + ${pjt['PJT_SN']} + '\''">
						수정</button>
				</td>
			</tr>
		</tbody>
	</table>
	
	
	<!-- 오른쪽하단: 프로젝트 등록 버튼 -->
		<div style="margin-top: 20px; text-align: right;">
   <button onclick="location.href='/pjtMng/getSavePjtForm'"
           style="height: 40px; padding: 0 20px; border-radius: 6px; border: none; background-color: #2962ff; color: #fff; cursor: pointer;">
       프로젝트 등록
   </button>
</div>
	<!-- 페이징 -->
	<nav class="mt-4 text-center" th:if="${pageInfo != null}">
		<ul class="pagination justify-content-center">
			<li class="page-item"
				th:classappend="${pageInfo.prePage == 0} ? 'disabled'"><a
				class="page-link"
				th:href="@{/pjtMng/getPjtList(pageNum=${pageInfo.prePage}, pageSize=${pageInfo.pageSize}, keyword=${keyword}, sortType=${sortType})}">
					Previous </a></li>
			<li class="page-item"
				th:each="page : ${#numbers.sequence(pageInfo.navigateFirstPage, pageInfo.navigateLastPage)}"
				th:classappend="${page == pageInfo.pageNum} ? 'active'"><a
				class="page-link" th:text="${page}"
				th:href="@{/pjtMng/getPjtList(pageNum=${page}, pageSize=${pageInfo.pageSize}, keyword=${keyword}, sortType=${sortType})}"></a>
			</li>
			<li class="page-item"
				th:classappend="${pageInfo.nextPage == 0} ? 'disabled'"><a
				class="page-link"
				th:href="@{/pjtMng/getPjtList(pageNum=${pageInfo.nextPage}, pageSize=${pageInfo.pageSize}, keyword=${keyword}, sortType=${sortType})}">
					Next </a></li>
		</ul>
	</nav>

	<script>
		
	</script>
