<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>프로젝트 상세</title>
  <!-- 공통 CSS만 사용 (예: .table, .btn 등) -->
  <link rel="stylesheet" th:href="@{/css/common.css}">
  <style>
    /* 버튼만 색상 맞춤 (스샷 톤) — 공통 CSS에 버튼 컬러가 있다면 삭제해도 OK */
    .btn-primary{ background:#1976d2; border:none; }
    .btn-primary:hover{ filter:brightness(0.95); }
    .btn-pink{ background:#f06292; color:#fff; border:none; }
    .btn-pink:hover{ filter:brightness(0.95); }
    .actions{ text-align:right; margin-top:16px; }
    .muted{ color:#777; }
   
    /* 테이블 폭/중앙 정렬 — 공통에서 처리되면 제거 가능 */
    .wrap{ max-width:1200px; margin:0 auto; }
    h2{  margin:24px 0; }
    td{text-align: left;}
    
  </style>
</head>
<body>
<div class="wrap">

  <h1 style="text-align: center; margin-top:45px;">프로젝트 상세 정보</h1>

  <!-- 상세 테이블: 라벨/값 × 2열 구조 -->
  <table class="table table-bordered">
    <tbody>
      <!-- 1행: 프로젝트명 / 담당자 -->
      <tr>
        <th style="width:15%;">프로젝트명</th>
        <td style="width:35%;" th:text="${pjt['PJT_NM']}"></td>

        <th style="width:15%;">담당자</th>
        <td style="width:35%;" th:text="${pjt['employeeId']}"></td>
      </tr>

      <!-- 2행: 등록자 / 상태 -->
      <tr>
        <th>등록자</th>
        <td th:text="${pjt['reg_user']}"></td>

        <th>상태</th>
        <td th:text="${pjt['PJT_STTS_CD']}"></td>
      </tr>

      <!-- 3행: 시작일 / 종료일 -->
      <tr>
        <th>시작일</th>
        <td th:text="${pjt['PJT_BGNG_DT']}">
          <!-- (선택) LocalDateTime 포맷: th:text="${#temporals.format(pjt['PJT_BGNG_DT'],'yyyy-MM-dd')}" -->
        </td>

        <th>종료일</th>
        <td th:text="${pjt['PJT_END_DT']}">
          <!-- (선택) 문자열 'T' 제거: th:text="${#strings.replace(pjt['PJT_END_DT'],'T',' ')}" -->
        </td>
      </tr>

      <!-- 4행: 버전 / 등록일 (필요 없으면 지워도 됨) -->
      <tr>
        <th>버전</th>
        <td th:text="${pjt['ver']}">1</td>

        <th>등록일</th>
        <td th:text="${pjt['FRST_REG_DT']}">
          <!-- (선택) th:text="${#temporals.format(pjt['FRST_REG_DT'],'yyyy-MM-dd HH:mm:ss')}" -->
        </td>
      </tr>

      <!-- 5행:결재자/승인자 (필드명이 다르면 맞춰 수정)-->
      <tr>
        <th>결재자</th>
        <td th:text="${pjt['TB_PJT_APR']}"></td>

        <th>승인자</th>
        <td th:text="${pjt['app_user']}"></td>
      </tr>
       <!-- 6행:  내용 (한 줄 전체)  -->
      <tr>
        <th>내용</th>
        <!-- HTML 저장이라면 utext 유지(서버에서 sanitize 가정) -->
        <td colspan="3" th:utext="${pjt['content']}"></td>
      </tr>
      

      <!-- 7행: 첨부파일 (한 줄에 리스트) -->
      <tr>
        <th>첨부파일</th>
        <td colspan="3">
          <ul style="margin:0; padding-left:18px;">
            <li th:if="${not #strings.isEmpty(pjt['ATCH_FILE_SN1'])}">
              <a th:href="@{'/pjtMng/downloadFile?fileName=' + ${pjt['ATCH_FILE_SN1']} + '&orgName=' + ${pjt['ORG_FILE_NM1']}}"
                 th:text="${pjt['ORG_FILE_NM1']}">파일1</a>
            </li>
            <li th:if="${not #strings.isEmpty(pjt['ATCH_FILE_SN2'])}">
              <a th:href="@{'/pjtMng/downloadFile?fileName=' + ${pjt['ATCH_FILE_SN2']} + '&orgName=' + ${pjt['ORG_FILE_NM2']}}"
                 th:text="${pjt['ORG_FILE_NM2']}">파일2</a>
            </li>
            <li th:if="${not #strings.isEmpty(pjt['ATCH_FILE_SN3'])}">
              <a th:href="@{'/pjtMng/downloadFile?fileName=' + ${pjt['ATCH_FILE_SN3']} + '&orgName=' + ${pjt['ORG_FILE_NM3']}}"
                 th:text="${pjt['ORG_FILE_NM3']}">파일3</a>
            </li>
          </ul>

          <div class="muted"
               th:if="${#strings.isEmpty(pjt['ATCH_FILE_SN1']) and
                       #strings.isEmpty(pjt['ATCH_FILE_SN2']) and
                       #strings.isEmpty(pjt['ATCH_FILE_SN3'])}">
            첨부파일이 없습니다.
          </div>
        </td>
      </tr>
    </tbody>
  </table>

  <!-- 하단 버튼: 오른쪽 정렬 / 분홍=수정, 파랑=뒤로 -->
  <div class="actions">
    <a th:href="@{/pjtMng/getPjtList}" class="btn btn-primary">뒤로가기</a>
    
</div>
</body>
</html>
