<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>프로젝트 상세</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 50px;
      background-color: #f5f7fa;
      color: #333;
    }

    h1 {
      color: #4a4a4a;
      text-align: center;
      margin-bottom: 40px;
    }

    table {
      width: 75%;
      margin: 0 auto;
      border-collapse: collapse;
      background-color: #ffffff;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      border-radius: 10px;
      overflow: hidden;
    }

    th, td {
      padding: 16px 20px;
      text-align: left;
      border-bottom: 1px solid #e0e0e0;
    }

    th {
      width: 15%;
      background-color: #f0f0f0;
      font-weight: bold;
      color: #333;
    }

    tr:last-child td {
      border-bottom: none;
    }

    button {
      display: block;
      margin: 40px auto 0;
      padding: 12px 24px;
      background-color: #4a90e2;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    button:hover {
      background-color: #357abd;
    }
  </style>
</head>
<body>
  <h1>프로젝트 상세 정보</h1>

  <table>
    <tr><th>프로젝트 ID</th><td th:text="${pjt['PJT_SN']}"></td></tr>
    <tr><th>프로젝트명</th><td th:text="${pjt['PJT_NM']}"></td></tr>
    <tr><th>상태</th><td th:text="${pjt['PJT_STTS_CD']}"></td></tr>
    <tr><th>담당자</th><td th:text="${pjt['EMP_NM']}"></td></tr>
    <tr><th>시작일</th><td th:text="${pjt['PJT_BGNG_DT']}"></td></tr>
    <tr><th>종료일</th><td th:text="${pjt['PJT_END_DT']}"></td></tr>
    <tr><th>등록자</th><td th:text="${pjt['FRST_RGTR_ID']}"></td></tr>
    <tr><th>등록일</th><td th:text="${pjt['FRST_REG_DT']}"></td></tr>
    <tr><th>내용</th><td th:utext="${pjt['content']}"></td></tr>
	<tr>
	<tr>
	  <th>첨부파일</th>
	  <td>
	    <span th:if="${not #strings.isEmpty(pjt['ATCH_FILE_SN'])}">
			<a th:href="@{'/pjtMng/downloadFile?fileName=' + ${pjt['ATCH_FILE_SN']} + '&orgName=' + ${pjt['ORG_FILE_NM']}}"
			   th:text="${pjt['ORG_FILE_NM']}">첨부파일 다운로드</a>
	    </span>
	    <span th:unless="${not #strings.isEmpty(pjt['ATCH_FILE_SN'])}">
	      첨부 없음
	    </span>
	  </td>
	</tr>
    
  </table>

  <button onclick="history.back()">← 목록으로 돌아가기</button>
</body>
</html>
