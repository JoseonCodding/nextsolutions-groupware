<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>사원 목록</title>
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f5f6fa;
            padding: 30px;
        }
        .container {
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            max-width: 1000px;
            margin: auto;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        h2 {
            margin-bottom: 20px;
            font-size: 22px;
            font-weight: bold;
            color: #333;
        }
        table {
            width: 100%;
            border-spacing: 0;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }
        th {
            background: #f0f2f5;
            font-weight: bold;
        }
        tr:hover {
            background-color: #f9fafc;
        }
        .btn {
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-edit {
            background: #4a90e2;
            color: white;
        }
        .btn-edit:hover {
            background: #357ab8;
        }
        .btn-toggle {
            background: #27ae60;
            color: white;
        }
        .btn-toggle.inactive {
            background: #e74c3c;
        }
        .btn-toggle:hover {
            opacity: 0.9;
        }
        .top-actions {
            text-align: right;
            margin-bottom: 15px;
        }
        .add-btn {
            background: #4a90e2;
            color: #fff;
            padding: 8px 14px;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        .add-btn:hover {
            background: #357ab8;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>사원 목록</h2>

    <div class="top-actions">
        <a th:href="@{/join}">
            <button class="add-btn">+ 신규 사원 등록</button>
        </a>
    </div>

    <table>
        <thead>
        <tr>
            <th>사번</th>
            <th>아이디</th>
            <th>비밀번호</th>
            <th>상태</th>
            <th>관리</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="emp : ${employees}">
            <td th:text="${emp.emp_seq}">1</td>
            <td th:text="${emp.employeeId}">hong</td>
            <td th:text="${emp.password}">****</td>
            <td>
                <span th:text="${emp.active == 1 ? '활성' : '비활성'}"
                      th:classappend="${emp.active == 1 ? 'active' : 'inactive'}"></span>
            </td>
            <td>
                <!-- 수정 버튼 -->
                <a th:href="@{/employee/edit(emp_seq=${emp.emp_seq})}">
                    <button class="btn btn-edit">수정</button>
                </a>

                <!-- 활성/비활성 토글 버튼 -->
                <form th:action="@{/employee/toggle}" method="post" style="display:inline;">
                    <input type="hidden" name="emp_seq" th:value="${emp.emp_seq}">
                    <button type="submit"
                            class="btn btn-toggle"
                            th:classappend="${emp.active == 0 ? 'inactive' : ''}"
                            th:text="${emp.active == 1 ? '비활성화' : '활성화'}">
                    </button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
