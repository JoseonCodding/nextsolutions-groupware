<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>사원 관리</title>
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f5f6fa;
            margin: 0;
            padding: 30px;
        }
        h1 {
            margin-bottom: 20px;
            color: #333;
        }
        table {
            width: 100%;
            background: white;
            border-collapse: collapse;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        th, td {
            padding: 14px;
            text-align: center;
            border-bottom: 1px solid #ddd;
            font-size: 14px;
        }
        th {
            background: #4a90e2;
            color: white;
            font-weight: bold;
        }
        tr:hover td {
            background-color: #f0f8ff;
        }
        .status-active {
            color: #28a745;
            font-weight: bold;
        }
        .status-inactive {
            color: #dc3545;
            font-weight: bold;
        }
        .btn {
            padding: 8px 14px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            transition: 0.2s;
        }
        .btn-active {
            background: #28a745;
            color: white;
        }
        .btn-active:hover {
            background: #218838;
        }
        .btn-inactive {
            background: #dc3545;
            color: white;
        }
        .btn-inactive:hover {
            background: #c82333;
        }
    </style>
</head>
<body>
<h1>사원 관리</h1>

<table>
    <thead>
    <tr>
        <th>사번</th>
        <th>아이디</th>
        <th>비밀번호</th>
        <th>상태</th>
        <th>작업</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="emp : ${employees}">
        <td th:text="${emp.emp_seq}"></td>
        <td th:text="${emp.employeeId}"></td>
        <td th:text="${emp.password}"></td>
        <td th:classappend="${emp.status == '활성'} ? 'status-active' : 'status-inactive'"
            th:text="${emp.status}"></td>
        <td>
            <button th:if="${emp.status == '활성'}"
                    class="btn btn-inactive"
                    th:attr="data-emp=${emp.emp_seq}">비활성화</button>
            <button th:if="${emp.status != '활성'}"
                    class="btn btn-active"
                    th:attr="data-emp=${emp.emp_seq}">활성화</button>
        </td>
    </tr>
    </tbody>
</table>

<script>
    document.querySelectorAll("button").forEach(btn => {
        btn.addEventListener("click", function() {
            const empSeq = this.dataset.emp;
            fetch("/employee/toggle", {
                method: "POST",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: `emp_seq=${empSeq}`
            }).then(res => res.text())
              .then(data => {
                  if (data === "OK") {
                      location.reload();
                  }
              });
        });
    });
</script>
</body>
</html>
