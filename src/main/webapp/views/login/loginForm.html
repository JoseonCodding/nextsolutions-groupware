<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NextSolutions - 로그인</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', sans-serif;
    min-height: 100vh;
    display: flex;
    background: #f0f2f5;
  }

  /* ── 왼쪽 브랜드 패널 ── */
  .brand-panel {
    width: 420px;
    flex-shrink: 0;
    background: #1a2250;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px 40px;
    position: relative;
    overflow: hidden;
  }

  .brand-panel::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 30% 20%, rgba(144,202,249,0.12) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 80%, rgba(57,73,171,0.3) 0%, transparent 60%);
    pointer-events: none;
  }

  .brand-logo {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: 0.4px;
    background: linear-gradient(135deg, #90caf9, #80deea);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 16px;
    position: relative;
  }

  .brand-tagline {
    font-size: 13px;
    color: rgba(255,255,255,0.45);
    text-align: center;
    line-height: 1.7;
    position: relative;
  }

  .brand-features {
    margin-top: 48px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    width: 100%;
    position: relative;
  }

  .brand-feature {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    background: rgba(255,255,255,0.06);
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.07);
  }

  .brand-feature-icon {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    background: rgba(144,202,249,0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #90caf9;
    font-size: 15px;
    flex-shrink: 0;
  }

  .brand-feature-text {
    font-size: 13px;
    font-weight: 500;
    color: rgba(255,255,255,0.75);
  }

  /* ── 오른쪽 폼 패널 ── */
  .form-panel {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 48px 32px;
  }

  .login-card {
    width: 100%;
    max-width: 400px;
    background: #fff;
    border-radius: 16px;
    padding: 40px 36px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08), 0 1px 4px rgba(0,0,0,0.04);
    border: 1px solid #e2e8f0;
    animation: slideUp 0.35s cubic-bezier(0.2, 0.8, 0.2, 1);
  }

  @keyframes slideUp {
    from { transform: translateY(12px); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
  }

  .login-card-header {
    text-align: center;
    margin-bottom: 32px;
  }

  .login-card-header img {
    height: 44px;
    width: auto;
    margin-bottom: 20px;
    display: block;
    margin-left: auto;
    margin-right: auto;
  }

  .login-card-header h1 {
    font-size: 20px;
    font-weight: 700;
    color: #1a202c;
    letter-spacing: -0.3px;
    margin-bottom: 4px;
  }

  .login-card-header p {
    font-size: 13px;
    color: #94a3b8;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 16px;
  }

  .form-group label {
    font-size: 12px;
    font-weight: 600;
    color: #4a5568;
    letter-spacing: 0.2px;
  }

  .form-group input {
    width: 100%;
    height: 44px;
    padding: 0 14px;
    border: 1.5px solid #e2e8f0;
    border-radius: 8px;
    font-family: inherit;
    font-size: 14px;
    color: #1a202c;
    background: #fff;
    transition: border-color 0.15s, box-shadow 0.15s;
    outline: none;
  }

  .form-group input::placeholder { color: #cbd5e0; }

  .form-group input:focus {
    border-color: #3949ab;
    box-shadow: 0 0 0 3px rgba(57,73,171,0.12);
  }

  .login-btn {
    width: 100%;
    height: 46px;
    border: none;
    border-radius: 8px;
    background: #3949ab;
    color: #fff;
    font-family: inherit;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 8px;
    transition: filter 0.15s, transform 0.06s;
    letter-spacing: 0.2px;
  }

  .login-btn:hover { filter: brightness(1.08); }
  .login-btn:active { transform: translateY(1px); }

  .login-footer {
    text-align: center;
    margin-top: 20px;
    font-size: 13px;
    color: #94a3b8;
  }

  .login-footer a {
    color: #3949ab;
    font-weight: 600;
    text-decoration: none;
  }

  .login-footer a:hover { text-decoration: underline; }

  /* ── 반응형 ── */
  @media (max-width: 768px) {
    .brand-panel { display: none; }
    .form-panel { padding: 24px 16px; }
    .login-card { padding: 28px 20px; }
  }
</style>
<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<!-- 왼쪽 브랜드 패널 -->
<div class="brand-panel">
  <!-- 장식 원 -->
  <div style="position:absolute;width:320px;height:320px;border-radius:50%;background:rgba(144,202,249,0.06);top:-80px;right:-80px;pointer-events:none;"></div>
  <div style="position:absolute;width:200px;height:200px;border-radius:50%;background:rgba(57,73,171,0.18);bottom:40px;left:-60px;pointer-events:none;"></div>

  <div style="position:relative;text-align:center;margin-bottom:40px;">
    <div style="display:inline-flex;align-items:center;justify-content:center;width:72px;height:72px;background:rgba(144,202,249,0.15);border-radius:20px;margin-bottom:20px;border:1px solid rgba(144,202,249,0.2);">
      <i class="fa fa-building-columns" style="font-size:28px;color:#90caf9;"></i>
    </div>
    <div class="brand-logo">NEXTSOLUTIONS</div>
    <div class="brand-tagline">스마트한 업무를 위한<br>올인원 그룹웨어 플랫폼</div>
  </div>

  <div class="brand-features">
    <div class="brand-feature">
      <div class="brand-feature-icon"><i class="fa fa-clock"></i></div>
      <span class="brand-feature-text">근태 · 연차 · 일정 통합관리</span>
    </div>
    <div class="brand-feature">
      <div class="brand-feature-icon"><i class="fa fa-file-signature"></i></div>
      <span class="brand-feature-text">전자결재 · 문서 워크플로우</span>
    </div>
    <div class="brand-feature">
      <div class="brand-feature-icon"><i class="fa fa-diagram-project"></i></div>
      <span class="brand-feature-text">프로젝트 · 팀 협업 관리</span>
    </div>
  </div>
</div>

<!-- 오른쪽 폼 패널 -->
<div class="form-panel">
  <div class="login-card">

    <div class="login-card-header">
      <h1>로그인</h1>
      <p>사번과 비밀번호로 로그인하세요</p>
    </div>

    <form th:action="@{/login/process}" method="post" id="loginForm">
      <div class="form-group">
        <label for="employeeId">사번 (아이디)</label>
        <input
          type="text"
          id="employeeId"
          name="employeeId"
          placeholder="숫자 8자리 입력"
          required
          inputmode="numeric"
          maxlength="8"
          pattern="[0-9]{8}"
          title="아이디는 숫자 8자리여야 합니다."
          autocomplete="username"
        />
      </div>

      <div class="form-group">
        <label for="password">비밀번호</label>
        <input type="password" id="password" name="password" placeholder="비밀번호 입력" autocomplete="current-password"/>
      </div>

      <button type="submit" class="login-btn">로그인</button>
    </form>

    <div class="login-footer">
      계정이 없으신가요?&nbsp;
      <a th:href="@{/company/register}">회사 가입</a>
    </div>

  </div>
</div>

<!-- 로그인 실패 시 alert -->
<script th:if="${param.error}">
  alert("사번과 비밀번호가 맞지 않습니다. 다시 입력해주세요.");
</script>

<!-- 회사 가입 완료 시 alert -->
<script th:if="${param.registered}">
  const adminId = /*[[${param.adminId}]]*/ '';
  alert('가입이 완료되었습니다!\n관리자 사번: ' + adminId + '\n해당 사번으로 로그인하세요.');
</script>

<script>
  const idEl = document.getElementById('employeeId');
  const form = document.getElementById('loginForm');

  idEl.addEventListener('input', () => {
    idEl.value = idEl.value.replace(/\D/g, '').slice(0, 8);
  });

  form.addEventListener('submit', (e) => {
    if (!/^\d{8}$/.test(idEl.value)) {
      alert('아이디는 숫자 8자리여야 합니다.');
      idEl.focus();
      e.preventDefault();
    }
  });
</script>

</body>
</html>
