<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <title th:text="${boardMeta.boardName + ' 상세보기'}">게시판 상세보기</title>
  <style>
    .container{max-width:960px;margin:24px auto;padding:0 16px}
    .header{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
    h2{margin:0}
    .board-meta{display:flex;flex-wrap:wrap;gap:12px;color:#6b7280;margin-top:6px}
    .board-meta strong{color:#111827}
    .like-btn{border:1px solid #ddd;border-radius:9999px;padding:.3rem .7rem;background:#fff;cursor:pointer}
    .like-btn.liked{color:#e11d48;border-color:#e11d48}
    .like-btn[disabled]{opacity:.5;cursor:not-allowed}
    .like-count{margin-left:.25rem;font-weight:600}
    .divider{border-top:1px solid #e5e7eb;margin:16px 0}
    .board-content{min-height:120px;line-height:1.6}
    .actions{display:flex;gap:8px;margin-top:16px}
    .btn{display:inline-block;padding:.4rem .8rem;border:1px solid #d1d5db;border-radius:.5rem;text-decoration:none}
    .btn-danger{border-color:#ef4444;color:#ef4444}
    .btn[disabled]{opacity:.5;pointer-events:none}
    /* 댓글 */
    .comments-section h3{margin:0 0 8px}
    .comment-list{list-style:none;padding:0;margin:0}
    .comment-item{padding:12px 0;position:relative;border-bottom:1px solid #f3f4f6}
    .comment-item .meta{display:flex;gap:10px;align-items:center;color:#6b7280}
    .comment-item .meta strong{color:#111827}
    .comment-item .text{margin-top:4px;white-space:pre-wrap}
    .comment-item.is-reply{margin-left:28px}
    .comment-item.is-reply::before{
      content:"";position:absolute;left:-16px;top:18px;width:12px;height:12px;
      border-left:2px solid #e5e7eb;border-bottom:2px solid #e5e7eb;border-bottom-left-radius:8px
    }
    .reply-form, .comment-form textarea{width:100%}
    .reply-form textarea, .comment-form textarea{box-sizing:border-box}
    .muted{color:#9ca3af}
    .badge{display:inline-block;padding:.1rem .45rem;border:1px solid #e5e7eb;border-radius:.4rem;font-size:.75rem;color:#6b7280}
  </style>
  <script>
    document.addEventListener('click', function(e){
      if (e.target.matches('.btn-reply')){
        const id=e.target.getAttribute('data-target');
        const el=document.getElementById(id);
        if(el) el.style.display='block';
      }
      if (e.target.matches('.btn-cancel')){
        const id=e.target.getAttribute('data-target');
        const el=document.getElementById(id);
        if(el) el.style.display='none';
      }
    });
  </script>
</head>
<body>
<div class="container">
  <!-- 공통 네비가 있다면 사용 -->
  <div th:replace="~{board/board_nav :: boardNav}"></div>

  <div class="header">
    <div>
      <h2 th:text="${board.title}">게시글 제목</h2>
      <div class="board-meta">
        <span>게시판: <span class="badge" th:text="${boardMeta.boardName}">보드명</span></span>
        <span>작성자: <strong th:text="${board.employeeId}">employeeId</strong></span>
        <span>
          작성일:
          <strong th:text="${board.createdAt != null ? #dates.format(board.createdAt,'yyyy-MM-dd HH:mm') : '정보 없음'}"></strong>
        </span>
        <span>조회: <strong th:text="${board.viewCount} ?: 0">0</strong></span>
        <span th:if="${boardMeta.useLike}">좋아요: <strong th:text="${board.likeCount} ?: 0">0</strong></span>
      </div>
    </div>

    <!-- 좋아요 토글 -->
    <div th:if="${boardMeta.useLike}">
      <form th:action="@{|/board/${boardMeta.boardId}/like/toggle|}" method="post">
        <input type="hidden" name="postId" th:value="${board.postId}" />
        <!-- CSRF
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        -->
        <button type="submit"
                class="like-btn"
                th:classappend="${likedByMe} ? ' liked' : ''"
                th:disabled="${session.loginUser == null}">
          <span th:text="${likedByMe} ? '♥' : '♡'">♡</span>
          <span>좋아요</span>
        </button>
        <span class="like-count" th:text="${likeCount} ?: 0">0</span>
        <div class="muted" th:if="${session.loginUser == null}" style="text-align:right;font-size:.85rem">
          로그인 후 이용 가능합니다
        </div>
      </form>
    </div>
  </div>

  <div class="divider"></div>

  <!-- 본문 -->
  <div class="board-content" th:utext="${board.content}">내용</div>

  <div class="divider"></div>

  <!-- 댓글 영역 (보드 설정에 따라) -->
  <section th:if="${boardMeta.useComment}" class="comments-section">
    <h3>댓글 (<span th:text="${comments != null ? comments.size() : 0}">0</span>)</h3>

    <ul class="comment-list">
      <!-- flat 리스트, parentCommentId!=null이면 시각적 들여쓰기 -->
      <li th:each="c : ${comments}"
          class="comment-item"
          th:classappend="${c.parentCommentId} != null ? ' is-reply' : ''">
        <div class="meta">
          <strong th:text="${c.employeeId}">작성자</strong>
          <span class="time"
                th:text="${c.createdAt != null ? #temporals.format(c.createdAt, 'yyyy-MM-dd HH:mm') : ''}"></span>

          <!-- 상위댓글에만 답글 버튼 노출 -->
          <button type="button"
                  class="btn btn-reply"
                  th:if="${c.parentCommentId} == null and ${session.loginUser} != null"
                  th:attr="data-target=${'rf-' + c.commentId}">
            답글쓰기
          </button>

          <!-- 본인 댓글 삭제 -->
          <form th:if="${session.loginUser != null and #strings.equals(session.loginUser.employeeId, c.employeeId)}"
                th:action="@{|/board/${boardMeta.boardId}/comment/delete|}" method="post" style="display:inline">
            <input type="hidden" name="commentId" th:value="${c.commentId}"/>
            <input type="hidden" name="postId"    th:value="${c.postId}"/>
            <!-- CSRF
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            -->
            <input class="btn" type="submit" value="삭제"/>
          </form>
        </div>

        <div class="text" th:text="${c.content}">내용</div>

        <!-- 답글 작성 폼 (상위댓글 전용) -->
        <form th:id="${'rf-' + c.commentId}"
              th:if="${c.parentCommentId} == null and ${session.loginUser} != null"
              th:action="@{|/board/${boardMeta.boardId}/comment/reply|}"
              method="post" class="reply-form"
              style="display:none; margin-top:8px">
          <input type="hidden" name="postId"          th:value="${c.postId}"/>
          <input type="hidden" name="parentCommentId" th:value="${c.commentId}"/>
          <!-- CSRF
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
          -->
          <textarea name="content" rows="3" placeholder="답글을 입력하세요" required></textarea>
          <div style="margin-top:6px;display:flex;gap:6px">
            <button class="btn" type="submit">등록</button>
            <button class="btn btn-cancel" type="button" th:attr="data-target=${'rf-' + c.commentId}">취소</button>
          </div>
        </form>
      </li>
    </ul>

    <!-- 댓글 입력폼 (로그인 사용자만) -->
    <div class="comment-form" th:if="${session.loginUser != null}">
      <form th:action="@{|/board/${boardMeta.boardId}/comment/save|}" method="post">
        <input type="hidden" name="postId" th:value="${board.postId}" />
        <input type="hidden" name="parentCommentId" value="" />
        <!-- CSRF
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        -->
        <textarea name="content" rows="3" placeholder="댓글을 입력하세요" required></textarea>
        <div style="margin-top:6px">
          <button class="btn" type="submit">등록</button>
        </div>
      </form>
    </div>
    <div class="muted" th:if="${session.loginUser == null}">
      로그인 후 댓글을 작성할 수 있습니다.
    </div>
  </section>

  <!-- 하단 액션 -->
  <div class="actions">
    <!-- 목록 -->
    <a class="btn" th:href="@{|/board/${boardMeta.boardId}|}">목록으로</a>

    <!-- 수정: NOTICE는 읽기 전용, 그 외에는 작성자만 -->
    <a class="btn"
       th:if="${boardMeta.boardType != 'NOTICE' and session.loginUser != null and #strings.equals(board.employeeId, session.loginUser.employeeId)}"
       th:href="@{|/board/${boardMeta.boardId}/modify?(postId=${board.postId})|}">
      수정
    </a>

    <!-- 삭제: NOTICE는 관리자만, 그 외에는 작성자 또는 관리자 -->
    <form th:if="${
   (boardMeta.boardType == 'NOTICE' and session.loginUser != null and #strings.equals(session.loginUser.employeeId, '20250002')) or
   (boardMeta.boardType != 'NOTICE' and session.loginUser != null and (#strings.equals(board.employeeId, session.loginUser.employeeId) or #strings.equals(session.loginUser.employeeId, '20250002')))
 }"
      th:action="@{|/board/${boardMeta.boardId}/delete|}"
      method="post"
      style="display:inline">
  <input type="hidden" name="postId" th:value="${board.postId}" />
  <!-- CSRF -->
  <!-- <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" /> -->
  <button type="submit" class="btn btn-danger"
          onclick="return confirm('게시글을 삭제하시겠습니까?');">
    삭제
  </button>
</form>

  </div>
</div>
</body>
</html>
