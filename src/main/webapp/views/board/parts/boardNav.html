<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
  <body>
    <nav th:fragment="boardNav" 
         style="background:#f8f9fa; border-bottom:1px solid #ddd; padding:8px 0;">
      <div class="container" style="display:flex; gap:20px;">
        <a th:href="@{/boards?section=notice}"
           th:classappend="${param.section=='announcement'} ? 'active' : ''"
           style="text-decoration:none; color:#333; font-weight:500;">
          공지사항
        </a>
        <a th:href="@{/boards?section=free}"
           th:classappend="${param.section=='free'} ? 'active' : ''"
           style="text-decoration:none; color:#333; font-weight:500;">
          자유게시판
        </a>
      </div>
    </nav>
  </body>
</html>
