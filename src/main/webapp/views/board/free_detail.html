<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>자유게시판 상세보기</title>
</head>
<body>

    <div class="container">
        <h2 th:text="${board.title}">게시글 제목</h2>
        <div class="board-meta">
            <span>작성자: <strong th:text="${board.authorId}">author</strong></span>
            <p><strong>작성일:</strong>
            <span th:text="${board.regDate != null ? #dates.format(board.regDate, 'yyyy-MM-dd HH:mm') 
      					   : '작성일 정보 없음'}">2025-08-05</span></p>
            <span>조회: <strong th:text="${board.viewCnt}">0</strong></span>
            <span>좋아요: <strong th:text="${board.likeCnt}">0</strong></span>
        </div>
        <hr />
        <div class="board-content" th:utext="${board.content}">
            게시글 내용이 여기에 표시됩니다.
        </div>
        <hr />
        
        <!-- 댓글 목록 -->
    	<div class="comments-section">
        <h3>댓글 (<span th:text="${comments.size()}">0</span>)</h3>
        <ul>
            <li th:each="c : ${comments}">
            <form action="/board/commentDelete">
            		<input name="commentId" th:value="${c.commentId}" type="hidden"/> 
            		<input name="postId" th:value="${c.postId}" type="hidden"/> 
                <p><input name="authorId" th:value="${c.authorId}" readonly="readonly"/> : <span th:text="${c.content}"></span> </p>
                <small th:text="${#temporals.format(c.createdAt, 'yyyy-MM-dd HH:mm')}">2025-08-07 09:49</small>
                <input type="submit" value="삭제"/>
             </form>
            </li>
        </ul>
    	</div>

    	<!-- 댓글 입력폼 -->
    	<div class="comment-form">
       		<form th:action="@{/board/free/comment/save}" method="post">
            	<input type="hidden" name="postId" th:value="${board.id}" />
            	<input type="hidden" name="parentCommentId" value="" />
           		<textarea name="content" rows="3" placeholder="댓글을 입력하세요" required></textarea>
            	<button type="submit">등록</button>
       	 	</form>
    	</div>
        
        
        <div class="board-actions">
            <a th:href="@{/board/free}" class="btn">목록으로</a>
            <a th:href="@{'/board/free/modify'(id=${board.id})}" class="btn">수정</a>
            <a th:href="@{'/board/free/delete'(id=${board.id})}" 
               th:onclick="|return confirm('게시글을 삭제하시겠습니까?');|"
               class="btn btn-danger">삭제</a>
        </div>
    </div>
</body>
</html>
