<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org" lang="ko">
<head>
<meta charset="UTF-8">
<title>글수정 폼</title>
<link href="https://cdn.jsdelivr.net/npm/summernote@0.8.20/dist/summernote-lite.min.css" rel="stylesheet">
</head>
<body>
	<h1>글 수정 폼</h1>
<div class="container">
  <h2>게시글 수정</h2>

  <form th:action="${activeBoard} == 'free' 
                   ? @{/board/free/modify} 
                   : @{/board/custom/{boardId}/modify(boardId=${board.boardId})}"
      method="post">
  <input type="hidden" name="postId" th:value="${board.postId}"/>

  <div class="form-group">
    <label>제목</label>
    <input type="text" name="title" th:value="${board.title}" required/>
  </div>

  <div class="form-group" style="margin-top:8px">
    <label>내용</label>
    <textarea id="summernote" name="content" th:utext="*{board.content}" rows="12" placeholder="내용을 입력하세요" required></textarea>
  </div>

  <div style="margin-top:12px; display:flex; gap:8px">
    <button type="submit"
            th:onclick="|return confirm('게시글을 수정하시겠습니까?');|">저장</button>

    <a th:href="${activeBoard} == 'free' 
                 ? @{/board/free/detail(postId=${board.postId})}
                 : @{/board/custom/{boardId}/detail(boardId=${board.boardId}, postId=${board.postId})}"
       th:onclick="|return confirm('수정 중인 내용이 저장되지 않습니다. 취소하시겠습니까?');|">
      취소
    </a>
  </div>
</form>
  
</div>
	    <!-- Summernote 관련 JS -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/summernote@0.8.20/dist/summernote-lite.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/summernote/0.8.20/lang/summernote-ko-KR.min.js"></script>
<script>
    $(document).ready(function() {
      $('#summernote').summernote({
        lang: 'ko-KR',
        placeholder: '내용을 입력하세요',
        tabsize: 2,
        height: 300,
        toolbar: [
          ['style', ['style']],
          ['font', ['bold', 'italic', 'underline', 'clear']],
          ['fontname', ['fontname']],
          ['fontsize', ['fontsize']],
          ['color', ['color']],
          ['para', ['ul', 'ol', 'paragraph']],
          ['height', ['height']],
          ['insert', ['picture', 'link', 'table']],
          ['view', ['fullscreen', 'codeview', 'help']]
        ],
        callbacks: {
          onInit: function() {
            let $editable = $(this).next('.note-editor').find('.note-editable');
            $editable.css('text-align', 'left');
          }
        }
      });
    });
</script>
</body>
</html>
