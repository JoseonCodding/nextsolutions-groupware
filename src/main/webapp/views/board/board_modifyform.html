<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org" lang="ko">
<head>
<meta charset="UTF-8">
<title>글수정 폼</title>
</head>
<body>
	<h1>글 수정 폼</h1>
<div class="container">
  <h2>게시글 수정</h2>

  <form th:action="@{/board/free/modify}" method="post">
    <input type="hidden" name="postId" th:value="${board.postId}"/>

    <div class="form-group">
      <label>제목</label>
      <input type="text" name="title" th:value="${board.title}" required/>
    </div>

    <div class="form-group" style="margin-top:8px">
      <label>내용</label>
      <textarea name="content" rows="10" required
                th:text="${board.content}"></textarea>
    </div>

    <div style="margin-top:12px; display:flex; gap:8px">
      <button type="submit"
      		  th:onclick="|return confirm('게시글을 수정하시겠습니까?');|">저장</button>
      <a th:href="@{'/board/free/detail'(postId=${board.postId})}">취소</a>
    </div>
  </form>
</div>
	
</body>
</html>
