<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>게시판 목록</title>
</head>
<body>
<div th:insert="board/parts/header :: header"></div>
<div th:insert="board/parts/boardNav :: boardNav"></div>

<div class="container">
    <div class="board-controls" style="display: flex; justify-content: space-between; margin: 20px 0;">
        <!-- 정렬 드롭다운 -->
        <div class="sort">
            <select name="sort" th:onchange="|location.href='?sort=' + this.value|">
                <option value="" th:selected="${sort == null}">정렬</option>
                <option value="viewCount" th:selected="${sort=='viewCount'}">조회순</option>
                <option value="likeCount" th:selected="${sort=='likeCount'}">추천순</option>
            </select>
        </div>

        <!-- 검색 폼 -->
        <form th:action="@{/boards}" method="get" class="search-form" style="display: flex;">
            <input type="text" name="keyword" th:value="${keyword}" placeholder="검색" style="padding: 5px;" />
            <button type="submit" style="padding: 5px 10px; margin-left: 5px;">🔍</button>
        </form>

        <a th:href="@{/board/create}" style="padding: 5px 10px; margin-left: 10px; background: #007bff; color: #fff; border-radius: 4px; text-decoration: none;">
            글쓰기
        </a>
    </div>

    <!-- 게시글 테이블 -->
    <table class="board-table" style="width: 100%; border-collapse: collapse;">
        <thead style="background: #f5f5f5;">
        <tr>
            <th style="padding: 10px; border-bottom: 1px solid #ddd;">NO</th>
            <th style="padding: 10px; border-bottom: 1px solid #ddd;">제목</th>
            <th style="padding: 10px; border-bottom: 1px solid #ddd;">작성자</th>
            <th style="padding: 10px; border-bottom: 1px solid #ddd;">작성일</th>
            <th style="padding: 10px; border-bottom: 1px solid #ddd;">조회수</th>
            <th style="padding: 10px; border-bottom: 1px solid #ddd;">추천수</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="b, stat : ${boards}">
            <td style="padding: 10px; text-align: center;" th:text="${stat.index + 1}">1</td>
            <td style="padding: 10px;">
                <a th:href="@{/board/view(id=${b.id})}" th:text="${b.title}">제목</a>
            </td>
            <td style="padding: 10px; text-align: center;" th:text="'작성자 ID: ' + ${b.authorId}">작성자</td>
            <td style="padding: 10px; text-align: center;" 
            	th:text="${b.createdAt != null ? #temporals.format(b.createdAt, 'yyyy-MM-dd') : '작성일 없음'}">2025-08-05</td>
            <td style="padding: 10px; text-align: center;" th:text="${b.viewCount}">0</td>
            <td style="padding: 10px; text-align: center;" th:text="${b.likeCount}">0</td>
        </tr>
        <tr th:if="${#lists.isEmpty(boards)}">
            <td colspan="6" style="padding: 90px; text-align: center; color: #999;">등록된 게시글이 없습니다.</td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
