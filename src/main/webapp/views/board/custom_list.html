<title th:text="${board != null ? board.boardName : '커스텀 게시판'}">커스텀 게시판</title>
<link rel="stylesheet" href="/css/board.css">
<!-- 본문 -->
<h1 style="margin-top:12px;">게시판</h1>
<div class="board-container">
  <div class="board-controls">
  <div class="left-controls">
     <!-- 정렬 -->
     <form th:action="@{/board/custom/{boardId}(boardId=${activeBoardId})}" method="get" class="search-form" id="sortForm">
     <div class="form-group">
       <input type="hidden" name="keyword" th:value="${keyword}">
       <input type="hidden" name="size" th:value="${size}">
       <input type="hidden" name="page" value="1">
       <select name="sort" onchange="document.getElementById('sortForm').submit()">
         <option value="" disabled th:selected="${sort == null or #strings.isEmpty(sort)}">선택</option>
         <option value="newest" th:selected="${sort}=='newest'">최신순</option>
         <option value="views"  th:selected="${sort}=='views'">조회수순</option>
         <option value="likes"  th:selected="${sort}=='likes'">추천순</option>
       </select>
       <noscript><button type="submit">정렬 적용</button></noscript>
       </div>
     </form>

     <!-- 검색 -->
     <form th:action="@{/board/custom/{boardId}(boardId=${activeBoardId})}" method="get" class="search-form">
     <div class="form-group">
       <input type="text" name="keyword" th:value="${keyword}" placeholder="제목/작성자 검색">
       <input type="hidden" name="sort" th:value="${sort}">
       <input type="hidden" name="size" th:value="${size}">
       <input type="hidden" name="page" value="1">
       <button type="submit"><i class="fa fa-search"></i>검색</button>
       <a th:href="@{/board/custom/{boardId}(boardId=${activeBoardId})}" class="filter-btn"><i class="fa fa-rotate-left"></i> 초기화 </a>
     </div>
     </form>
     </div>

     <!-- 글쓰기 -->
     <a th:href="@{/board/custom/{boardId}/write(
                    boardId=${board.boardId},
                    page=${page}, size=${size}, sort=${sort}, keyword=${keyword}
                  )}"
        class="btn" th:if="${canWrite}">글쓰기</a>
  </div>

  <!-- 목록 테이블 -->
  <table class="board-table" style="width:100%; border-collapse:collapse;">
    <thead style="background:#f5f5f5;">
      <tr>
        <th>번호</th>
        <th>제목</th>
        <th>작성자</th>
        <th>등록일</th>
        <th>조회수</th>
        <th>추천수</th>
      </tr>
    </thead>
    <tbody>
      <tr th:each="b, stat : ${boards}">
        <td th:text="${offset + stat.count}">1</td>
        <td class="board-title">
          <a style="width: 300px;"
          	 th:href="@{/board/custom/{boardId}/detail(
                         boardId=${board.boardId},
                         postId=${b.postId},
                         page=${page}, size=${size}, sort=${sort}, keyword=${keyword}
                       )}"
             th:text="${b.title}">제목</a>
        </td>
        <td th:text="|${b.empNm} ${b.position}|">작성자</td>
        <td th:text="${b.createdAt != null ? #dates.format(b.createdAt, 'yyyy-MM-dd') : ''}"></td>
        <td th:text="${b.viewCount ?: 0}"></td>
        <td th:text="${b.likeCount ?: 0}"></td>
      </tr>

      <tr th:if="${#lists.isEmpty(boards)}">
  	  <td colspan="6" style="padding:90px; text-align:center; color:#999;"
      	  th:text="${#strings.isEmpty(keyword) ? '등록된 게시글이 없습니다.' : '검색 조건에 맞는 게시글이 없습니다.'}">
  	  </td>
	  </tr>
    </tbody>
  </table>

<!-- 페이지네이션 -->
<nav class="pagination" th:if="${page != null}">
  <!-- Previous 버튼 (5페이지 앞으로) -->
  <a class="prev"
     th:if="${page > 1}"
     th:href="@{/board/custom/{boardId}(boardId=${board.boardId}, page=${page-5 > 1 ? page-5 : 1}, size=${size}, sort=${sort}, keyword=${keyword})}">
    &#x2039; Previous
  </a>

  <!-- 첫 페이지 -->
  <span th:if="${startPage > 1 and page == 1}"
        class="page-number now-page disabled"
        th:text="1"></span>

  <a th:if="${startPage > 1 and page != 1}"
     class="page-number"
     th:text="1"
     th:href="@{/board/custom/{boardId}(boardId=${board.boardId}, page=1, size=${size}, sort=${sort}, keyword=${keyword})}"></a>

  <!-- 앞쪽 생략 표시 -->
  <span th:if="${startPage > 2}" class="ellipsis">...</span>

  <!-- 페이지 숫자들 -->
  <span th:each="i : ${#numbers.sequence(startPage, endPage)}">
    <span th:if="${i == page}" class="page-number now-page disabled" th:text="${i}"></span>
    <a th:if="${i != page}" class="page-number"
       th:text="${i}"
       th:href="@{/board/custom/{boardId}(boardId=${board.boardId}, page=${i}, size=${size}, sort=${sort}, keyword=${keyword})}"></a>
  </span>

  <!-- 뒤쪽 생략 표시 -->
  <span th:if="${endPage < totalPages - 1}" class="ellipsis">...</span>

  <!-- 마지막 페이지 -->
  <span th:if="${endPage < totalPages and page == totalPages}"
        class="page-number now-page disabled"
        th:text="${totalPages}"></span>

  <a th:if="${endPage < totalPages and page != totalPages}"
     class="page-number"
     th:text="${totalPages}"
     th:href="@{/board/custom/{boardId}(boardId=${board.boardId}, page=${totalPages}, size=${size}, sort=${sort}, keyword=${keyword})}"></a>

  <!-- Next 버튼 (5페이지 뒤로) -->
  <a class="next"
     th:if="${page < totalPages}"
     th:href="@{/board/custom/{boardId}(boardId=${board.boardId}, page=${page+5 < totalPages ? page+5 : totalPages}, size=${size}, sort=${sort}, keyword=${keyword})}">
    Next &#x203A;
  </a>
</nav>

	<!-- 게시판 리스트 호버링 적용 JS (다른 페이지 테이블과 CSS 충돌방지용) -->
	<script>
		document.querySelectorAll('td.board-title').forEach(td => {
			  td.parentElement.addEventListener('mouseenter', () => {
			    td.parentElement.classList.add('hover-row');
			  });
			  td.parentElement.addEventListener('mouseleave', () => {
			    td.parentElement.classList.remove('hover-row');
			  });
			});
	</script>
