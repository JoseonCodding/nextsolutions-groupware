<title>공지사항 상세보기</title>
<link rel="stylesheet" href="/css/board_detail.css">
<div class="container">
    <h2 th:text="${board.title}">게시글 제목</h2>

    <div class="board-meta">
      <span>작성자: <strong th:text="${#strings.isEmpty(board.empNm) ? board.employeeId : board.empNm}"></strong></span>
      <span th:text="${board.position}"></span>
      <p>
        <span>작성일:</span>
        <strong th:text="${board.createdAt != null ? #dates.format(board.createdAt,'yyyy-MM-dd HH:mm') : '정보 없음'}"></strong>
      </p>
      <span>조회: <strong th:text="${board.viewCount}">0</strong></span>
      <span>좋아요: <strong th:text="${board.likeCount} ?: 0">0</strong></span>
    </div>
    <hr />

    <!-- 본문 -->
    <div class="text" th:utext="${board.content}">내용</div>

    <hr />
<!-- 좋아요 토글 -->
<div class="like-comment-display">
    <div class="like-toggle" th:if="${useLike}">
      <form th:action="@{/board/notice/like/toggle}" method="post">
        <input type="hidden" name="postId" th:value="${board.postId}" />
        <input type="hidden" name="page"    th:value="${page}">
  		<input type="hidden" name="size"    th:value="${size}">
  		<input type="hidden" name="sort"    th:value="${sort}">
  		<input type="hidden" name="keyword" th:value="${#strings.isEmpty(keyword) ? null : keyword}">
        <button type="submit" class="like-icon" th:classappend="${likedByMe} ? ' liked' : ''">
        <i th:class="${likedByMe} ? 'fa-solid fa-heart' : 'fa-regular fa-heart'"></i>
        <span class="label">좋아요</span>
      </button>
      <span class="count" th:text="${likeCount}">0</span>
    </form> 
</div>
</div>
    <div class="board-actions">
      <!-- 목록으로: 현재 페이지 상태 유지 -->
      <a th:href="@{/board/notice(page=${page},size=${size},sort=${sort},keyword=${keyword})}" class="btn">목록으로</a>

      <!-- 삭제: 관리자만 / 현재 페이지 상태 유지 -->
      <a class="btn btn-danger"
         th:if="${session.loginUser != null and (
                   session.loginUser.role == '대표'
                   or session.loginUser.role == '게시판'
                   or session.loginUser.role == '공지사항'
                 )}"
         th:href="@{'/board/notice/delete'(postId=${board.postId}, page=${page}, size=${size}, sort=${sort}, keyword=${keyword})}"
         th:onclick="|return confirm('게시글을 삭제하시겠습니까?');|">삭제</a>
    </div>
 </div>
