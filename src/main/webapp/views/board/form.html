<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>새 게시글 작성</title>
</head>
<body>
  <!-- header -->
<div th:insert="board/parts/header :: header"></div>
<div th:insert="board/parts/boardNav :: boardNav"></div>

  <div class="container" style="max-width: 800px; margin: 40px auto;">
    <h2>새 게시글 작성</h2>
    
    <form th:action="@{/board/save}" th:object="${board}" method="post">
      <!-- 제목 -->
      <div class="form-group" style="margin-bottom: 20px;">
        <label for="title">제목</label>
        <input type="text"
               id="title"
               th:field="*{title}"
               placeholder="제목을 입력하세요"
               required
               style="width:100%; padding:8px;"/>
      </div>

      <!-- 내용 -->
      <div class="form-group" style="margin-bottom: 20px;">
        <label for="content">내용</label>
        <textarea id="content"
                  th:field="*{content}"
                  rows="10"
                  placeholder="내용을 입력하세요"
                  required
                  style="width:100%; padding:8px; line-height:1.5;"></textarea>
      </div>

      <!-- 버튼 -->
      <div class="form-actions" style="display:flex; gap:10px;">
        <button type="submit"
                style="padding:8px 16px; border:1px solid #3498db; background:#3498db; color:#fff; cursor:pointer;">
          저장
        </button>
        <a th:href="@{/board}"
           style="padding:8px 16px; border:1px solid #ccc; text-decoration:none; color:#333;">
          취소
        </a>
      </div>
    </form>
  </div>

</body>
</html>
