<nav class="tab-nav">
  <a th:each="b : ${allBoards}"
     th:href="@{/board/{boardId}(boardId=${b.boardId})}"
     th:text="${b.boardName}"
     th:classappend="${activeBoardId} == ${b.boardId} ? ' active'">게시판</a>

  <a th:if="${session.loginUser != null and session.loginUser.role == '대표'}"
     th:href="@{/admin/boards}"
     style="margin-left:auto; color:#6b7280; font-size:13px;">
    <i class="fa fa-gear"></i> 게시판관리
  </a>
</nav>
