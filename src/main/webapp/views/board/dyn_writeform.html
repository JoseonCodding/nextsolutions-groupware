<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <title th:text="${boardMeta.boardName + ' 작성'}">게시글 작성</title>
  <style>
    .container{max-width:900px;margin:24px auto;padding:0 16px}
    h2{margin:8px 0 4px}
    .badge{display:inline-block;padding:.1rem .45rem;border:1px solid #e5e7eb;border-radius:.4rem;font-size:.75rem;color:#6b7280}
    .notice-tip{background:#fffbeb;border:1px solid #fcd34d;padding:12px;border-radius:8px;color:#92400e;margin:12px 0}
    .form-group{margin:14px 0}
    label{display:block;margin-bottom:6px;font-weight:700}
    input[type="text"]{width:100%;padding:10px;border:1px solid #d1d5db;border-radius:8px;box-sizing:border-box}
    textarea{width:100%;padding:10px;border:1px solid #d1d5db;border-radius:8px;box-sizing:border-box;min-height:240px}
    .muted{color:#9ca3af;font-size:.9rem}
    .actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px}
    .btn{display:inline-block;padding:.48rem .9rem;border:1px solid #d1d5db;border-radius:.55rem;background:#fff;text-decoration:none;cursor:pointer}
    .btn-primary{background:#2563eb;color:#fff;border-color:#2563eb}
    .btn-secondary{background:#f3f4f6}
    .btn[disabled]{opacity:.5;cursor:not-allowed}
    .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  </style>
  <script>
    function bindCounter(id, outId, max){
      var el=document.getElementById(id), out=document.getElementById(outId);
      if(!el||!out) return;
      var fn=function(){
        var v=el.value || '';
        if(max && v.length>max){ el.value=v.substring(0,max); }
        out.textContent=(el.value||'').length + (max?'/'+max:'');
      };
      el.addEventListener('input', fn); fn();
    }
    document.addEventListener('DOMContentLoaded', function(){
      bindCounter('title','titleCnt',200);
      bindCounter('content','contentCnt',4000);
    });
  </script>
</head>
<body>
<div th:replace="~{board/board_nav :: boardNav}"></div>

<!-- 역할/보드타입 기반 권한  -->
<div class="container"
     th:with="
       isLogin=${session.loginUser != null},
       roleCode=${isLogin ? session.loginUser.role : 0},
       typeLower=${#strings.toLowerCase(boardMeta.boardType)},
       isFree=${typeLower == 'free'},
       isNotice=${typeLower == 'notice'},
       canWrite=${
         isLogin and (
           (roleCode==1 and isFree)                    /* 일반 사용자는 free만 */
           or (roleCode==3 and (isNotice or isFree))   /* 공지 담당자는 notice/free 가능 */
         )
       }
     ">
  <div class="row" style="justify-content:space-between">
    <div>
      <h2 th:text="${boardMeta.boardName}">게시판</h2>
      <span class="badge" th:text="${boardMeta.boardType}">TYPE</span>
    </div>
    <a class="btn" th:href="@{|/board/${boardMeta.boardId}|}">목록으로</a>
  </div>

  <!-- 공지 전용 안내 -->
  <div class="notice-tip" th:if="${isNotice}">
    이 게시물은 <strong>결재 상신</strong> 후 승인되면 공지게시판에 자동 게시됩니다.
    (임시저장은 결재 상신 전까지 <em>임시보관</em> 상태로 DB에 저장됩니다)
  </div>

  <!-- 작성 폼: 권한 없으면 아예 렌더 안 함 -->
  <form th:if="${canWrite}"
        th:action="@{|/board/${boardMeta.boardId}/save|}"
        th:object="${boardDTO}" method="post">
    <!-- CSRF
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
    -->

    <!-- 참고용: 서버에도 타입 전달 -->
    <input type="hidden" name="boardType" th:value="${boardMeta.boardType}" />

    <!-- 제목 -->
    <div class="form-group">
      <label for="title">제목 <span class="muted" id="titleCnt">0/200</span></label>
      <input type="text" id="title" th:field="*{title}" maxlength="200" placeholder="제목을 입력하세요" required />
    </div>

    <!-- 내용 -->
    <div class="form-group">
      <label for="content">내용 <span class="muted" id="contentCnt">0/4000</span></label>
      <textarea id="content" th:field="*{content}" maxlength="4000" placeholder="내용을 입력하세요" required></textarea>
      <div class="muted">※ 이미지/링크는 에디터 정책에 맞춰 자동 정리됩니다.</div>
    </div>

    <!-- 액션: 보드타입별 버튼 -->
    <div class="actions" th:if="${isFree}">
      <button type="submit" class="btn btn-primary" name="mode" value="publish">등록</button>
      <a class="btn btn-secondary" th:href="@{|/board/${boardMeta.boardId}|}">취소</a>
    </div>

    <div class="actions" th:if="${isNotice}">
      <button type="submit" class="btn btn-secondary" name="mode" value="draft">임시저장</button>
      <button type="submit" class="btn btn-primary"   name="mode" value="requestApproval">결재 상신</button>
      <a class="btn" th:href="@{|/board/${boardMeta.boardId}|}">취소</a>
    </div>
  </form>

  <!-- 권한 없는 사용자는 아무것도 안 보이게 하려면 아래 라인 유지(빈 div) -->
  <div th:if="${!canWrite}"></div>
</div>
</body>
</html>
