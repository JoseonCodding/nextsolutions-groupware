<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
  <meta charset="UTF-8" />
  <title th:text="${boardMeta.boardName + ' 수정'}">게시글 수정</title>
  <style>
    .container{max-width:900px;margin:24px auto;padding:0 16px}
    h2{margin:8px 0 4px}
    .badge{display:inline-block;padding:.1rem .45rem;border:1px solid #e5e7eb;border-radius:.4rem;font-size:.75rem;color:#6b7280}
    .status-badge{display:inline-block;padding:.1rem .45rem;border:1px solid #d1d5db;border-radius:.4rem;font-size:.75rem;margin-left:6px}
    .tip{border-radius:8px;padding:12px;margin:12px 0}
    .tip--notice{background:#fffbeb;border:1px solid #fcd34d;color:#92400e}
    .tip--pending{background:#eff6ff;border:1px solid #93c5fd;color:#1e40af}
    .form-group{margin:14px 0}
    label{display:block;margin-bottom:6px;font-weight:700}
    input[type="text"]{width:100%;padding:10px;border:1px solid #d1d5db;border-radius:8px;box-sizing:border-box}
    textarea{width:100%;padding:10px;border:1px solid #d1d5db;border-radius:8px;box-sizing:border-box;min-height:260px}
    .muted{color:#9ca3af;font-size:.9rem}
    .actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px}
    .btn{display:inline-block;padding:.48rem .9rem;border:1px solid #d1d5db;border-radius:.55rem;background:#fff;text-decoration:none;cursor:pointer}
    .btn-primary{background:#2563eb;color:#fff;border-color:#2563eb}
    .btn-secondary{background:#f3f4f6}
    .btn-danger{border-color:#ef4444;color:#ef4444}
    .btn[disabled]{opacity:.5;cursor:not-allowed}
    .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap;justify-content:space-between}
    .file-list{margin-top:6px}
    .file-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px dashed #eee}
  </style>
  <script>
    function bindCounter(id, outId, max){
      var el=document.getElementById(id), out=document.getElementById(outId);
      if(!el||!out) return;
      function fn(){
        var v=el.value || '';
        if(max && v.length>max){ el.value=v.substring(0,max); }
        out.textContent=(el.value||'').length + (max?'/'+max:'');
      }
      el.addEventListener('input', fn); fn();
    }
    document.addEventListener('DOMContentLoaded', function(){
      bindCounter('title','titleCnt',200);
      bindCounter('content','contentCnt',8000);
    });
  </script>
</head>
<body>
<div th:replace="~{board/board_nav :: boardNav}"></div>

<div class="container">
  <div class="row">
    <div>
      <h2 th:text="${boardMeta.boardName}">게시판</h2>
      <span class="badge" th:text="${boardMeta.boardType}">TYPE</span>
      <!-- 공지 상태 배지 -->
      <span class="status-badge" th:if="${boardMeta.boardType=='NOTICE'}"
            th:text="${'상태: ' + (noticeStatus != null ? noticeStatus : 'DRAFT')}">상태</span>
    </div>
    <div style="display:flex;gap:8px">
      <a class="btn" th:href="@{|/board/${boardMeta.boardId}/detail?postId=${boardDTO.postId}|}">상세보기</a>
      <a class="btn" th:href="@{|/board/${boardMeta.boardId}|}">목록</a>
    </div>
  </div>

  <!-- 공지 안내문 -->
  <div class="tip tip--notice" th:if="${boardMeta.boardType=='NOTICE'}">
    공지는 <strong>결재 승인</strong> 시 게시판에 노출됩니다. 상태별 동작:
    <ul style="margin:6px 0 0 18px">
      <li><b>DRAFT</b>: 내용 수정 후 <i>임시저장</i> 또는 <i>결재 상신</i></li>
      <li><b>PENDING</b>: 상신 대기 — 필요시 <i>상신취소</i> 후 다시 수정/상신</li>
      <li><b>APPROVED</b>: 이미 게시 — 수정 시 <i>수정안 임시저장</i> → <i>재상신</i></li>
    </ul>
  </div>

  <div class="tip tip--pending" th:if="${boardMeta.boardType=='NOTICE' and noticeStatus=='PENDING'}">
    현재 결재 <b>상신 대기</b> 상태입니다. 내용 변경은 결재 결과에 반영되지 않을 수 있으니,
    필요한 경우 <b>상신취소</b> 후 수정/재상신 하세요.
  </div>

  <!-- 수정 폼 -->
  <form th:action="@{|/board/${boardMeta.boardId}/modify|}" th:object="${boardDTO}" method="post" enctype="multipart/form-data">
    <!-- CSRF
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
    -->
    <input type="hidden" th:field="*{postId}"/>

    <!-- 제목 -->
    <div class="form-group">
      <label for="title">제목 <span class="muted" id="titleCnt">0/200</span></label>
      <input type="text" id="title" th:field="*{title}" maxlength="200" required />
    </div>

    <!-- 내용 -->
    <div class="form-group">
      <label for="content">내용 <span class="muted" id="contentCnt">0/8000</span></label>
      <textarea id="content" th:field="*{content}" maxlength="8000" required></textarea>
    </div>

    <!-- 액션: 보드 타입/상태별 버튼 -->
    <!-- FREE: 즉시 반영 -->
    <div class="actions" th:if="${boardMeta.boardType != 'NOTICE'}">
      <button type="submit" class="btn btn-primary" name="mode" value="update"
              th:onclick="|return confirm('수정 내용을 저장하시겠습니까?');|">저장</button>
      <a class="btn btn-secondary" th:href="@{|/board/${boardMeta.boardId}/detail?postId=${boardDTO.postId}|}">취소</a>
    </div>

    <!-- NOTICE: 상태별 제어 -->
    <div class="actions" th:if="${boardMeta.boardType == 'NOTICE'}">

      <!-- DRAFT -->
      <div th:if="${noticeStatus == null || noticeStatus == 'DRAFT'}">
        <button type="submit" class="btn btn-secondary" name="mode" value="draft">임시저장</button>
        <button type="submit" class="btn btn-primary"   name="mode" value="requestApproval"
                th:onclick="|return confirm('이 공지를 결재 상신하시겠습니까?');|">결재 상신</button>
        <a class="btn" th:href="@{|/board/${boardMeta.boardId}/detail?postId=${boardDTO.postId}|}">취소</a>
      </div>

      <!-- PENDING -->
      <div th:if="${noticeStatus == 'PENDING'}">
        <button type="submit" class="btn btn-danger" name="mode" value="cancelApproval"
                th:onclick="|return confirm('상신을 취소하고 수정 가능 상태로 되돌릴까요?');|">상신취소</button>
        <a class="btn" th:href="@{|/board/${boardMeta.boardId}/detail?postId=${boardDTO.postId}|}">돌아가기</a>
      </div>

      <!-- APPROVED -->
      <div th:if="${noticeStatus == 'APPROVED'}">
        <div class="muted" style="margin-bottom:6px">
          현재 게시 중입니다. 변경 사항은 <b>재상신</b> 승인 시 반영됩니다.
        </div>
        <button type="submit" class="btn btn-secondary" name="mode" value="revisionDraft">수정안 임시저장</button>
        <button type="submit" class="btn btn-primary"   name="mode" value="requestReapproval"
                th:onclick="|return confirm('수정안을 재상신하시겠습니까?');|">재상신</button>
        <a class="btn" th:href="@{|/board/${boardMeta.boardId}/detail?postId=${boardDTO.postId}|}">취소</a>
      </div>

    </div>
  </form>
</div>
</body>
</html>
