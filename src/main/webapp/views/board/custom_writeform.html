<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <title th:text="${board != null ? board.boardName + ' 글쓰기' : '커스텀 글쓰기'}">커스텀 글쓰기</title>
  <link href="https://cdn.jsdelivr.net/npm/summernote@0.8.20/dist/summernote-lite.min.css" rel="stylesheet">
  <style>
    .container {
      max-width: 800px;
      margin: 40px auto;
      font-family: 'Noto Sans KR', sans-serif;
    }
    label { display:block; margin-bottom:5px; font-weight:700; }
    input, textarea {
      width:100%; padding:10px; margin-bottom:20px; box-sizing:border-box;
      border:1px solid #ddd; border-radius:4px;
    }
    .form-actions { display:flex; gap:10px; }
    .form-actions button {
      padding:8px 16px; border:none; background:#007bff; color:#fff; cursor:pointer;
    }
    .form-actions a {
      padding:8px 16px; border:1px solid #ccc; text-decoration:none; color:#333;
    }
    .board-nav { background:#f7f9fc; padding:10px 20px; border-bottom:1px solid #dcdcdc; }
    .board-nav ul { list-style:none; display:flex; padding:0; margin:0; }
    .board-nav li { margin-right:30px; }
    .board-nav a { text-decoration:none; font-weight:700; color:#666; padding:8px 12px; border-bottom:2px solid transparent; }
    .board-nav li.active a { color:#000; border-bottom:2px solid #2c3e50; }
  </style>
</head>
<body>

<!-- 상단 탭: 활성 보드 표시 -->
<div class="board-nav">
  <ul>
    <li th:each="b : ${allBoards}"
        th:classappend="${activeBoardId} == ${b.boardId} ? 'active'">
      <a th:href="@{/board/{boardId}(boardId=${b.boardId})}"
         th:text="${b.boardName}">게시판</a>
    </li>
  </ul>
</div>

<div class="container">
  <h2 th:text="${board != null ? board.boardName + ' 글쓰기' : '커스텀 글쓰기'}">커스텀 글쓰기</h2>

  <form th:action="@{/board/custom/{boardId}/save(boardId=${board.boardId})}"
        th:object="${boardDTO}" method="post">

    <!-- boardId를 서버에 함께 전달(안전용) -->
    <input type="hidden" name="boardId" th:value="${board.boardId}" />

    <!-- 제목 -->
    <div class="form-group">
      <label for="title">제목</label>
      <input type="text" id="title" th:field="*{title}" placeholder="제목을 입력하세요" required />
    </div>

    <!-- 내용 -->
    <div class="form-group">
      <label for="content">내용</label>
      <textarea id="summernote" name="content" th:text="*{content}" rows="12" placeholder="내용을 입력하세요" required></textarea>
      <!--  <textarea id="content" th:field="*{content}" rows="12" placeholder="내용을 입력하세요" required></textarea> -->
    </div>

    <!-- 버튼 -->
    <div class="form-actions">
      <button type="submit">등록</button>
      <a th:href="@{/board/custom/{boardId}(boardId=${board.boardId})}">취소</a>
    </div>
  </form>
</div>
    <!-- Summernote 관련 JS -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/summernote@0.8.20/dist/summernote-lite.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/summernote/0.8.20/lang/summernote-ko-KR.min.js"></script>
    <script th:if="${editData.docType == '프로젝트'}">
    $(document).ready(function() {
      $('#summernote').summernote({
        lang: 'ko-KR',
        placeholder: '내용을 입력하세요',
        tabsize: 2,
        height: 300,
        toolbar: [
          ['style', ['style']],
          ['font', ['bold', 'italic', 'underline', 'clear']],
          ['fontname', ['fontname']],
          ['fontsize', ['fontsize']],
          ['color', ['color']],
          ['para', ['ul', 'ol', 'paragraph']],
          ['height', ['height']],
          ['insert', ['picture', 'link', 'table']],
          ['view', ['fullscreen', 'codeview', 'help']]
        ],
        callbacks: {
          onInit: function() {
            let $editable = $(this).next('.note-editor').find('.note-editable');
            $editable.css('text-align', 'left');
          }
        }
      });
    });
    </script>
</body>
</html>
