<title th:text="${board != null ? board.boardName + ' 글쓰기' : '커스텀 글쓰기'}">커스텀 글쓰기</title>
<link href="https://cdn.jsdelivr.net/npm/summernote@0.8.20/dist/summernote-lite.min.css" rel="stylesheet">
<link rel="stylesheet" href="/css/board.css">

<h1 style="margin-top:12px;" th:text="${board != null ? board.boardName + ' 글쓰기' : '커스텀 글쓰기'}">커스텀 글쓰기</h1>
<div class="container">
  <form id="customWriteForm"
  		th:action="@{/board/custom/{boardId}/save(boardId=${board.boardId})}"
        th:object="${boardDTO}" method="post">

    <!-- boardId를 서버에 함께 전달(안전용) -->
    <input type="hidden" name="boardId" th:value="${board.boardId}" />

    <!-- 제목 -->
    <div class="form-group">
      <label for="title">제목</label>
      <input type="text" id="title" th:field="*{title}" placeholder="제목을 입력하세요" />
    </div>

    <!-- 내용 -->
    <div class="form-group">
      <label for="content">내용</label>
      <textarea id="summernote" name="content" th:text="*{content}" rows="12" placeholder="내용을 입력하세요" ></textarea>
      <!--  <textarea id="content" th:field="*{content}" rows="12" placeholder="내용을 입력하세요" required></textarea> -->
    </div>

    <!-- 버튼 -->
    <div class="form-actions">
      <button type="submit">등록</button>
      <a th:href="@{/board/custom/{boardId}(boardId=${board.boardId})}"
      	 th:onclick="|return confirm('내용이 저장되지 않습니다. 취소하시겠습니까?');|">취소</a>
    </div>
  </form>
</div>
    <!-- Summernote 관련 JS -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/summernote@0.8.20/dist/summernote-lite.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/summernote/0.8.20/lang/summernote-ko-KR.min.js"></script>
<script>
$(document).ready(function () {
  // ===== Summernote 초기화 =====
  $('#summernote').summernote({
    lang: 'ko-KR',
    placeholder: '내용을 입력하세요',
    tabsize: 2,
    height: 300,
    disableDragAndDrop: true,
    toolbar: [
      ['style', ['style']],
      ['font', ['bold', 'italic', 'underline', 'clear']],
      ['fontname', ['fontname']],
      ['fontsize', ['fontsize']],
      ['color', ['color']],
      ['para', ['ul', 'ol', 'paragraph']],
      ['height', ['height']],
      ['view', ['fullscreen', 'codeview', 'help']]
    ],
    callbacks: {
      onInit: function () {
        let $editable = $(this).next('.note-editor').find('.note-editable');
        $editable.css('text-align', 'left');
      },
      // 이미지 업로드 차단
      onImageUpload: function () { /* block */ },
      // 붙여넣기 시 이미지/태그 차단
      onPaste: function (e) {
        const ev = (e.originalEvent || e);
        const cd = ev.clipboardData;
        const hasBinaryImage =
          cd && Array.from(cd.items || []).some(i => i.type && i.type.startsWith('image'));
        const html = cd ? cd.getData('text/html') : '';
        const hasImgTag = /<img[\s\S]*?>/i.test(html);

        if (hasBinaryImage || hasImgTag) {
          e.preventDefault();
          document.execCommand('insertText', false, (cd && cd.getData('text/plain')) || '');
        }
      },
      // 드래그앤드롭 이미지 차단
      onDrop: function (e) {
        const ev = (e.originalEvent || e);
        const dt = ev.dataTransfer;
        if (dt && Array.from(dt.files || []).some(f => f.type && f.type.startsWith('image'))) {
          e.preventDefault();
          e.stopPropagation();
        }
      }
    }
  });

  // ===== 제목/내용 유효성 검사 =====
  $('#customWriteForm').on('submit', function (e) {
    const $title = $('#title');
    const rawTitle = ($title.val() || '').trim();

    if (!rawTitle) {
      alert('제목을 입력해주세요.');
      $title.focus();
      e.preventDefault();
      return false;
    }

    // Summernote 내용 가져오기
    const html = $('#summernote').summernote('code') || '';
    const editorEmpty = $('#summernote').summernote('isEmpty');
    const textOnly = html
      .replace(/<[^>]*>/g, '')
      .replace(/&nbsp;/g, ' ')
      .trim();

    if (editorEmpty || textOnly.length === 0) {
      alert('내용을 입력해주세요.');
      $('#summernote').summernote('focus');
      e.preventDefault();
      return false;
    }

    // 통과 시 정상 제출
    return true;
  });
});
</script>
