<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <title th:text="${boardMeta.boardName + ' 목록'}">게시판</title>
  <style>
    .container{max-width:960px;margin:24px auto;padding:0 16px}
    .board-controls{display:flex;justify-content:space-between;gap:12px;align-items:center;margin:20px 0;flex-wrap:wrap}
    .board-table{width:100%;border-collapse:collapse}
    .board-table th,.board-table td{padding:10px;border-bottom:1px solid #e5e7eb}
    .board-table thead{background:#f9fafb}
    .btn{display:inline-block;padding:.4rem .8rem;border:1px solid #d1d5db;border-radius:.5rem;text-decoration:none}
    .btn[disabled]{opacity:.6;pointer-events:none}
    .pagination{display:flex;gap:6px;align-items:center;margin:16px 0}
    .disabled{pointer-events:none;opacity:.4}
    .badge{display:inline-block;padding:.15rem .45rem;border:1px solid #e5e7eb;border-radius:.4rem;font-size:.75rem;color:#6b7280}
    .muted{color:#9ca3af}
    .filters{display:flex;gap:10px;align-items:center}
    .filters form{display:flex;gap:6px;align-items:center}
    input[type="text"]{padding:6px 8px}
    select{padding:6px 8px}
  </style>
  <script>
    // 선택 변경 시 폼 자동 제출
    function submitById(id){ var f=document.getElementById(id); if(f) f.submit(); }
  </script>
</head>
<body>
<div th:replace="~{board/board_nav :: boardNav}"></div>

<div class="container"
     th:with="
       isLogin=${session.loginUser != null},
       roleCode=${isLogin ? session.loginUser.role : 0},
       type=${#strings.toLowerCase(boardMeta.boardType)},
       canWrite=${
         isLogin and (
           (roleCode==1 and type=='free')
           or (roleCode==3 and (type=='free' or type=='notice'))
         )
       }">
  <h2>
    <span th:text="${boardMeta.boardName}">게시판</span>
    <span class="badge" th:text="${boardMeta.boardType}">TYPE</span>
  </h2>

  <!-- 컨트롤: 정렬/검색/글쓰기 -->
  <div class="board-controls">
    <div class="filters">
      <!-- 정렬: likeCount 옵션은 useLike일 때만 노출 -->
      <form th:action="@{|/board/${boardMeta.boardId}|}" method="get" id="sortForm">
        <input type="hidden" name="keyword" th:value="${keyword}" />
        <input type="hidden" name="page" th:value="${page}" />
        <input type="hidden" name="size" th:value="${size}" />
        <select name="sort" th:onchange="'submitById(\'sortForm\')'">
          <option value="" th:selected="${sort == null}">정렬</option>
          <option value="createdAt" th:selected="${sort=='createdAt'}">최신순</option>
          <option value="viewCount" th:selected="${sort=='viewCount'}">조회수순</option>
          <option value="likeCount"
                  th:if="${boardMeta.useLike}"
                  th:selected="${sort=='likeCount'}">추천순</option>
        </select>
      </form>

      <!-- 검색: 정렬 유지 -->
      <form th:action="@{|/board/${boardMeta.boardId}|}" method="get">
        <input type="hidden" name="sort" th:value="${sort}" />
        <input type="hidden" name="size" th:value="${size}" />
        <input type="text" name="keyword" th:value="${keyword}" placeholder="검색" />
        <button type="submit" class="btn">🔍</button>
      </form>

      <!-- 페이지 사이즈 -->
      <form th:action="@{|/board/${boardMeta.boardId}|}" method="get" id="sizeForm">
        <input type="hidden" name="sort" th:value="${sort}" />
        <input type="hidden" name="keyword" th:value="${keyword}" />
        <select name="size" th:onchange="'submitById(\'sizeForm\')'">
          <option th:selected="${size==10}" th:value="10">10개</option>
          <option th:selected="${size==20}" th:value="20">20개</option>
          <option th:selected="${size==50}" th:value="50">50개</option>
        </select>
      </form>
    </div>

    <!-- 글쓰기 버튼: 권한 없으면 DOM에 아예 없음 -->
    <a class="btn" th:if="${canWrite}" th:href="@{|/board/${boardMeta.boardId}/write|}">글쓰기</a>

</div>

  <!-- 목록 테이블 -->
  <table class="board-table">
    <thead>
      <tr>
        <th style="width:70px;text-align:center">NO</th>
        <th>제목</th>
        <th style="width:140px;text-align:center">작성자</th>
        <th style="width:170px;text-align:center">작성일</th>
        <th style="width:100px;text-align:center">조회수</th>
        <th style="width:100px;text-align:center" th:if="${boardMeta.useLike}">추천수</th>
      </tr>
    </thead>
    <tbody>
      <tr th:each="b, it : ${boards}">
        <td style="text-align:center" th:text="${(page-1)*size + it.index + 1}">1</td>
        <td>
          <a th:href="@{|/board/${boardMeta.boardId}/detail?postId=${b.postId}|}"
             th:text="${b.title}">제목</a>
        </td>
        <td style="text-align:center" th:text="${b.employeeId}">작성자</td>
        <td style="text-align:center"
            th:text="${b.createdAt != null ? #dates.format(b.createdAt, 'yyyy-MM-dd HH:mm') : ''}">날짜</td>
        <td style="text-align:center" th:text="${b.viewCount} ?: 0">0</td>
        <td style="text-align:center" th:if="${boardMeta.useLike}" th:text="${b.likeCount} ?: 0">0</td>
      </tr>

      <tr th:if="${#lists.isEmpty(boards)}">
        <td th:colspan="${boardMeta.useLike ? 6 : 5}"
            style="padding:90px; text-align:center; color:#9ca3af;">
          등록된 게시글이 없습니다.
        </td>
      </tr>
    </tbody>
  </table>

  <!-- 페이징: sort/keyword 유지 -->
  <div class="pagination">
    <a th:classappend="${page==1}?' disabled'"
       th:href="@{|/board/${boardMeta.boardId}?page=1&size=${size}&sort=${sort}&keyword=${keyword}|}">&lt;&lt;</a>

    <a th:classappend="${page==1}?' disabled'"
       th:href="@{|/board/${boardMeta.boardId}?page=${page>1?page-1:1}&size=${size}&sort=${sort}&keyword=${keyword}|}">&lt;</a>

    <span th:each="p : ${#numbers.sequence(startPage, endPage)}">
      <a th:if="${p!=page}"
         th:href="@{|/board/${boardMeta.boardId}?page=${p}&size=${size}&sort=${sort}&keyword=${keyword}|}"
         th:text="${p}"></a>
      <span th:if="${p==page}" th:text="${p}"
            style="font-weight:700;padding:2px 6px;border:1px solid #3b82f6;border-radius:4px;background:#eff6ff"></span>
    </span>

    <a th:classappend="${page==totalPages}?' disabled'"
       th:href="@{|/board/${boardMeta.boardId}?page=${page<totalPages?page+1:totalPages}&size=${size}&sort=${sort}&keyword=${keyword}|}">&gt;</a>

    <a th:classappend="${page==totalPages}?' disabled'"
       th:href="@{|/board/${boardMeta.boardId}?page=${totalPages}&size=${size}&sort=${sort}&keyword=${keyword}|}">&gt;&gt;</a>
  </div>
</div>
</body>
</html>
