<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>새 게시글 작성</title>
    <link rel="stylesheet" href="/css/boardStyle.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <!-- 상단 네비게이션 바 (Topbar) -->
    <header class="topbar">
        <div class="logo">NEXTSOLUTIONS</div>
        <nav class="menu">
            <a>일정관리</a>
            <a>근태관리</a>
            <a>프로젝트</a>
            <a>전자결제</a>
            <a>게시판 관리</a>
            <a>문서관리</a>
            <a>사원관리</a>
            <a class="logout">로그아웃</a>
	        <span class="help-icon" title="도움말">
	            <i class="fa-solid fa-circle-question fa-2xl"></i>
	        </span>
        </nav>
    </header>

  <div class="container" style="max-width: 800px; margin: 40px auto;">
    <h2>새 게시글 작성</h2>
    
    <form th:action="@{/board/save}" th:object="${boardDTO}" method="post">
      <!-- 제목 -->
      <div class="form-group" style="margin-bottom: 20px;">
        <label for="title">제목</label>
        <input type="text"
               id="title"
               th:field="*{title}"
               placeholder="제목을 입력하세요"
               required
               style="width:100%; padding:8px;"/>
      </div>

      <!-- 내용 -->
      <div class="form-group" style="margin-bottom: 20px;">
        <label for="content">내용</label>
        <textarea id="content"
                  th:field="*{content}"
                  rows="10"
                  placeholder="내용을 입력하세요"
                  required
                  style="width:100%; padding:8px; line-height:1.5;"></textarea>
      </div>

      <!-- 버튼 -->
      <div class="form-actions" style="display:flex; gap:10px;">
        <button type="submit"
                style="padding:8px 16px; border:1px solid #3498db; background:#3498db; color:#fff; cursor:pointer;">
          저장
        </button>
        <a th:href="@{/board}"
           style="padding:8px 16px; border:1px solid #ccc; text-decoration:none; color:#333;">
          취소
        </a>
      </div>
    </form>
  </div>

</body>
</html>
