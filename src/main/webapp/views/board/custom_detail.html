<title>커스텀 게시판 상세보기</title>
<link rel="stylesheet" href="/css/board_detail.css">
  <script>
    document.addEventListener('click', function(e){
      if (e.target.matches('.btn-reply')){
        const id=e.target.getAttribute('data-target');
        const form=document.getElementById(id);
        if(form) form.style.display='block';
      }
      if (e.target.matches('.btn-cancel')){
        const id=e.target.getAttribute('data-target');
        const form=document.getElementById(id);
        if(form) form.style.display='none';
      }
    });
  </script>
<div class="container">
  <h2 th:text="${board.title}">게시글 제목</h2>

  <!-- 상단 메타 -->
  <div class="board-meta">
    <span>작성자: <strong th:text="${#strings.isEmpty(board.empNm) ? board.employeeId : board.empNm}"></strong></span>
    <span th:text="${board.position}"></span>
    <p>
      <strong>작성일:</strong>
      <span th:text="${board.createdAt != null ? #dates.format(board.createdAt, 'yyyy-MM-dd HH:mm') : '작성일 정보 없음'}"></span>
    </p>
    <p th:if="${board.updatedAt != null}">
      <strong>수정일:</strong>
      <span th:text="${#dates.format(board.updatedAt, 'yyyy-MM-dd HH:mm')}"></span>
  	</p>
    <span>조회: <strong th:text="${board.viewCount} ?: 0"></strong></span>
    <span>좋아요: <strong th:text="${board.likeCount} ?: 0"></strong></span>
  </div>
  <hr/>

  <!-- 본문 -->
  <div class="board-content" th:utext="${board.content}">
    게시글 내용이 여기에 표시됩니다.
  </div>

  <hr/>
<!-- 좋아요 + 댓글 표시 -->
<div class="like-comment-display">
  <div class="like-toggle" th:if="${useLike}">
    <form th:action="@{/board/custom/{boardId}/like/toggle(boardId=${board.boardId})}" method="post">
  		<input type="hidden" name="postId" th:value="${board.postId}" />
  		<input type="hidden" name="page"    th:value="${page}">
  		<input type="hidden" name="size"    th:value="${size}">
  		<input type="hidden" name="sort"    th:value="${sort}">
  		<input type="hidden" name="keyword" th:value="${#strings.isEmpty(keyword) ? null : keyword}">
  		<button type="submit" class="like-icon" th:classappend="${likedByMe} ? ' liked' : ''">
    	<i th:class="${likedByMe} ? 'fa-solid fa-heart' : 'fa-regular fa-heart'"></i>
        <span class="label">좋아요</span>
  		</button>
  		<span class="count" th:text="${board.likeCount}">0</span>
	  </form>
  </div>
    <!-- 댓글 카운트 표시 -->
  <div class="comment-icon">
    <i class="fa-regular fa-comment"></i>
    <span class="label">댓글</span>
    <span class="count" th:text="${commentCount}">0</span>
  </div>
</div>

  <!-- 댓글 목록 -->
  <div class="comments-section" th:if="${useComment}">
    <ul class="comment-list">
      <li th:each="c : ${comments}"
          class="comment-item"
          th:classappend="${c.parentCommentId} != null ? ' is-reply' : ''"
          th:if="${(c.isDeleted != true) or (c.parentCommentId == null and (c.hasChild == true))}">
        <div class="meta">
          <strong th:text="${c.empNm} ?: ${c.employeeId}">작성자</strong>
          <span class="time"
                th:if="${c.createdAt != null}"
                th:text="${#temporals.format(c.createdAt, 'yyyy-MM-dd HH:mm')}"></span>

          <!-- 답글 버튼: 부모 + 미삭제일 때만 -->
          <button type="button" class="btn-reply"
        			th:if="${c.parentCommentId == null and c.isDeleted == false}"
        			th:attr="data-target=${'rf-' + c.commentId}">답글</button>

          <!-- 댓글 삭제 버튼 -->
          <form th:if="${me != null and me == c.employeeId and !#bools.isTrue(c.isDeleted)}"
                th:action="@{/board/custom/{boardId}/comment/delete(boardId=${board.boardId})}"
                method="post" style="display:inline">
            <input type="hidden" name="commentId" th:value="${c.commentId}">
            <input type="hidden" name="postId" th:value="${c.postId}">
            <input type="hidden" name="page"    th:value="${page}">
  			<input type="hidden" name="size"    th:value="${size}">
  			<input type="hidden" name="sort"    th:value="${sort}">
  			<input type="hidden" name="keyword" th:value="${#strings.isEmpty(keyword) ? null : keyword}">
            <input type="submit" value="삭제" class="btn-reply"/>
          </form>
        </div>

        <!-- 본문: 삭제된 댓글이면 라벨만 -->
        <div class="text"
             th:text="${(c.isDeleted == true and c.parentCommentId == null and c.hasChild == true)
                       ? '[삭제된 댓글입니다]' : c.content}"></div>

        <!-- 대댓글 등록 폼 -->
        <form th:id="${'rf-' + c.commentId}"
        	  class="comment-form-overlay" 
      		  th:if="${c.parentCommentId == null and !#bools.isTrue(c.isDeleted)}"
      	  	  th:action="@{/board/custom/{boardId}/comment/reply(boardId=${board.boardId})}"
      		  method="post" style="display:none">
  		<input type="hidden" name="postId" th:value="${c.postId}">
  		<input type="hidden" name="parentCommentId" th:value="${c.commentId}">
  		<input type="hidden" name="page"    th:value="${page}">
  		<input type="hidden" name="size"    th:value="${size}">
  		<input type="hidden" name="sort"    th:value="${sort}">
  		<input type="hidden" name="keyword" th:value="${#strings.isEmpty(keyword) ? null : keyword}">
  		<textarea name="content" rows="3" placeholder="답글을 입력하세요" required></textarea>
  		<div class="reply-actions">
  		<button type="button" class="btn-cancel"
            	th:attr="data-target=${'rf-' + c.commentId}">취소</button>
    	<button type="submit" class="btn-submit-reply">등록</button>
  		</div>
		</form>
      </li>
    </ul>
  </div>

  <!-- 댓글 입력폼 -->
  <form class="comment-form-overlay" th:if="${useComment}"
    	th:action="@{/board/custom/{boardId}/comment/save(boardId=${board.boardId})}" method="post">
      <input type="hidden" name="postId" th:value="${board.postId}" />
      <input type="hidden" name="parentCommentId" value="" />
  		<input type="hidden" name="page"    th:value="${page}">
  		<input type="hidden" name="size"    th:value="${size}">
  		<input type="hidden" name="sort"    th:value="${sort}">
  		<input type="hidden" name="keyword" th:value="${#strings.isEmpty(keyword) ? null : keyword}">
      <textarea name="content" rows="3" placeholder="댓글을 입력하세요" required></textarea>
      <div class="reply-actions">
      <button type="submit" class="btn-submit-reply">등록</button>
      </div>
    </form>

  <!-- 액션 -->
  <div class="board-actions">
    <a th:href="@{/board/custom/{boardId}(boardId=${board.boardId},page=${page},size=${size},sort=${sort},keyword=${keyword})}" class="btn">목록으로</a>

    <a class="btn"
   	   th:if="${session.loginUser != null and #strings.equals(board.employeeId, session.loginUser.employeeId)}"
   	   th:href="@{|/board/custom/${board.boardId}/modify?postId=${board.postId}&page=${page}&size=${size}${sort != null ? '&sort=' + sort : ''}${keyword != null ? '&keyword=' + keyword : ''}|}">
   	수정</a>

    <a class="btn btn-danger"
       th:if="${session.loginUser != null and (
                 #strings.equals(board.employeeId, session.loginUser.employeeId)
                 or #strings.equals(session.loginUser.employeeId, '20250004')
               )}"
       th:href="@{/board/custom/{boardId}/delete(boardId=${board.boardId}, postId=${board.postId}, page=${page}, size=${size}, sort=${sort}, keyword=${keyword})}"
       th:onclick="|return confirm('게시글을 삭제하시겠습니까?');|">삭제</a>
  </div>
</div>
