<script src='/js/jquery-3.7.1.min.js'></script>
<style>
.admin-grid {
  display: grid;
  gap: 20px;
}
.admin-top {
  display: grid;
  grid-template-columns: 420px 1fr;
  gap: 20px;
  align-items: start;
}
.admin-card {
  background: #fff;
  border-radius: 12px;
  border: 1px solid #f1f5f9;
  box-shadow: 0 1px 4px rgba(0,0,0,.05);
  overflow: hidden;
}
.admin-card-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 16px 20px;
  border-bottom: 1px solid #f1f5f9;
}
.admin-card-icon {
  width: 34px; height: 34px;
  border-radius: 8px;
  background: #eef2ff;
  color: #3949ab;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px;
  flex-shrink: 0;
}
.admin-card-title {
  font-size: 14px;
  font-weight: 700;
  color: #1a202c;
}
.admin-card-body { padding: 20px; }

/* 생성 폼 */
.form-row { display: flex; flex-direction: column; gap: 4px; margin-bottom: 14px; }
.form-row label { font-size: 12px; font-weight: 600; color: #6b7280; }
.form-row input[type="text"] {
  padding: 9px 12px;
  border-radius: 8px;
  border: 1px solid #e2e8f0;
  font-size: 14px;
  font-family: inherit;
  transition: border-color .15s, box-shadow .15s;
}
.form-row input[type="text"]:focus {
  outline: none;
  border-color: #3949ab;
  box-shadow: 0 0 0 3px rgba(57,73,171,.12);
}
.checkbox-group {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.checkbox-label {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 13px;
  color: #374151;
  padding: 5px 10px;
  border-radius: 6px;
  border: 1px solid #e2e8f0;
  cursor: pointer;
  transition: background .12s, border-color .12s;
}
.checkbox-label:hover { background: #f5f7ff; border-color: #c7d2fe; }
.checkbox-label input[type="checkbox"] { accent-color: #3949ab; }
.toggle-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 0;
  border-bottom: 1px solid #f8fafc;
  font-size: 13px;
  color: #374151;
}
.toggle-row:last-child { border-bottom: none; }
.toggle-row label { display: flex; align-items: center; gap: 8px; cursor: pointer; }

/* 통계 */
.stats-split { display: grid; grid-template-columns: 180px 1fr; gap: 16px; }
.board-list-stat { display: flex; flex-direction: column; gap: 4px; }
.board-list-stat .item {
  padding: 8px 12px;
  border-radius: 8px;
  font-size: 13px;
  color: #374151;
  cursor: pointer;
  border: 1px solid transparent;
  transition: background .12s;
}
.board-list-stat .item:hover { background: #f5f7ff; }
.board-list-stat .item.active { background: #eef2ff; border-color: #c7d2fe; color: #3949ab; font-weight: 600; }
.kpi-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
.kpi-card {
  background: #f8fafc;
  border-radius: 10px;
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.kpi-icon {
  width: 36px; height: 36px;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px;
  flex-shrink: 0;
}
.kpi-icon.red    { background: #fff5f5; color: #e53e3e; }
.kpi-icon.yellow { background: #fffbeb; color: #d97706; }
.kpi-icon.green  { background: #f0fff4; color: #38a169; }
.kpi-label { font-size: 11px; color: #94a3b8; font-weight: 500; margin-bottom: 2px; }
.kpi-val   { font-size: 22px; font-weight: 700; color: #1a202c; line-height: 1; }
.kpi-board-name { font-size: 11px; color: #3949ab; margin-top: 1px; }

/* 테이블 */
.board-table { width: 100%; border-collapse: collapse; }
.board-table th {
  padding: 10px 14px;
  background: #f8fafc;
  font-size: 12px;
  font-weight: 600;
  color: #6b7280;
  text-align: left;
  white-space: nowrap;
  border-bottom: 1px solid #f1f5f9;
}
.board-table td {
  padding: 11px 14px;
  font-size: 13px;
  color: #374151;
  border-bottom: 1px solid #f8fafc;
  vertical-align: middle;
}
.board-table tr:last-child td { border-bottom: none; }
.board-table tr:hover td { background: #fafbff; }
.badge {
  display: inline-block;
  padding: 2px 9px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
}
.badge.green { background: #dcfce7; color: #15803d; }
.badge.red   { background: #fee2e2; color: #b91c1c; }
.role-chip {
  display: inline-block;
  padding: 2px 7px;
  border-radius: 5px;
  background: #eef2ff;
  color: #3949ab;
  font-size: 11px;
  font-weight: 500;
  margin: 1px;
}
.action-btns { display: flex; gap: 6px; align-items: center; flex-wrap: nowrap; }
.btn-sm {
  padding: 5px 11px;
  border-radius: 7px;
  font-size: 12px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  border: 1px solid transparent;
  transition: filter .12s;
  white-space: nowrap;
}
.btn-sm:hover { filter: brightness(.95); }
.btn-sm.edit   { background: #eef2ff; color: #3949ab; border-color: #c7d2fe; }
.btn-sm.toggle-on  { background: #fff3e0; color: #e65100; border-color: #fed7aa; }
.btn-sm.toggle-off { background: #f0fdf4; color: #15803d; border-color: #bbf7d0; }
.btn-sm.del    { background: #fff5f5; color: #e53e3e; border-color: #fecaca; }

/* 생성 버튼 */
.submit-btn {
  width: 100%;
  padding: 10px;
  border: none;
  border-radius: 8px;
  background: linear-gradient(135deg, #3949ab, #283593);
  color: #fff;
  font-size: 14px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  margin-top: 4px;
  transition: filter .15s;
}
.submit-btn:hover { filter: brightness(1.05); }

/* 다이얼로그 */
dialog {
  border: none;
  border-radius: 14px;
  padding: 0;
  box-shadow: 0 20px 60px rgba(0,0,0,.18);
  width: 420px;
  max-width: 94vw;
}
dialog::backdrop { background: rgba(0,0,0,.35); }
.dialog-header {
  padding: 16px 20px;
  border-bottom: 1px solid #f1f5f9;
  font-size: 15px;
  font-weight: 700;
  color: #3949ab;
}
.dialog-body { padding: 20px; }
.dialog-footer {
  padding: 12px 20px;
  border-top: 1px solid #f1f5f9;
  display: flex;
  justify-content: flex-end;
  gap: 8px;
}
.btn-cancel {
  padding: 8px 16px;
  border-radius: 8px;
  border: 1px solid #e2e8f0;
  background: #fff;
  color: #6b7280;
  font-size: 13px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
}
.btn-save {
  padding: 8px 20px;
  border-radius: 8px;
  border: none;
  background: linear-gradient(135deg, #3949ab, #283593);
  color: #fff;
  font-size: 13px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
}
</style>

<div class="admin-grid">

  <div class="admin-top">

    <!-- 새 게시판 생성 -->
    <div class="admin-card">
      <div class="admin-card-header">
        <div class="admin-card-icon"><i class="fa fa-plus"></i></div>
        <div class="admin-card-title">새 게시판 생성</div>
      </div>
      <div class="admin-card-body">
        <form th:action="@{/admin/boards/create}" method="post">
          <input type="hidden" th:name="${_csrf?.parameterName}" th:value="${_csrf?.token}" />

          <div class="form-row">
            <label>게시판명 <span style="color:#e53e3e">*</span></label>
            <input type="text" name="boardName" required placeholder="예) 자유게시판">
          </div>

          <div class="form-row">
            <label>접근 권한 (중복선택)</label>
            <div class="checkbox-group">
              <label class="checkbox-label"><input type="checkbox" name="accessRoles" value="USER" checked> USER</label>
              <label class="checkbox-label"><input type="checkbox" name="accessRoles" value="ADMIN"> ADMIN</label>
              <label class="checkbox-label"><input type="checkbox" name="accessRoles" value="NOTICE_MANAGER"> NOTICE_MANAGER</label>
            </div>
          </div>

          <div class="toggle-row">
            <label><input type="checkbox" name="useComment" checked> 댓글 사용</label>
          </div>
          <div class="toggle-row">
            <label><input type="checkbox" name="useLike" checked> 좋아요 사용</label>
          </div>

          <div id="errBox" th:if="${error}" th:attr="data-msg=${error}"></div>
          <button class="submit-btn" type="submit"><i class="fa fa-plus"></i> 게시판 생성</button>
        </form>
      </div>
    </div>

    <!-- 게시판 통계 -->
    <div class="admin-card">
      <div class="admin-card-header">
        <div class="admin-card-icon" style="background:#e8f5e9;color:#2e7d32"><i class="fa fa-chart-bar"></i></div>
        <div class="admin-card-title">오늘 게시판 통계</div>
      </div>
      <div class="admin-card-body">
        <div class="stats-split">
          <div class="board-list-stat" id="stat-board-list">
            <div th:each="s,iter : ${todayStats}"
                 class="item"
                 th:classappend="${iter.index == 0} ? ' active'"
                 th:attr="data-id=${s.boardId},data-name=${s.boardName},data-views=${s.viewToday},data-likes=${s.likeToday},data-posts=${s.postToday}"
                 onclick="loadToday(this)"
                 th:text="${s.boardName}">게시판명</div>
            <div th:if="${#lists.isEmpty(todayStats)}" class="item" style="color:#94a3b8;cursor:default">통계 없음</div>
          </div>
          <div class="kpi-grid">
            <div class="kpi-card">
              <div class="kpi-icon red"><i class="fa fa-eye"></i></div>
              <div>
                <div class="kpi-label">오늘 조회수</div>
                <div class="kpi-val" id="kpi-views">0</div>
                <div class="kpi-board-name" id="kpi-boardname"></div>
              </div>
            </div>
            <div class="kpi-card">
              <div class="kpi-icon yellow"><i class="fa fa-heart"></i></div>
              <div>
                <div class="kpi-label">오늘 좋아요수</div>
                <div class="kpi-val" id="kpi-likes">0</div>
                <div class="kpi-board-name" id="kpi-boardname-dup"></div>
              </div>
            </div>
            <div class="kpi-card">
              <div class="kpi-icon green"><i class="fa fa-pen"></i></div>
              <div>
                <div class="kpi-label">오늘 게시글 등록</div>
                <div class="kpi-val" id="kpi-posts">0</div>
                <div class="kpi-board-name" id="kpi-boardname-dup2"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 게시판 목록 -->
  <div class="admin-card">
    <div class="admin-card-header">
      <div class="admin-card-icon" style="background:#f3e5f5;color:#6a1b9a"><i class="fa fa-list"></i></div>
      <div class="admin-card-title">게시판 목록</div>
    </div>
    <div style="overflow-x:auto">
      <table class="board-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>게시판명</th>
            <th>접근 권한</th>
            <th>상태</th>
            <th>생성일</th>
            <th>수정일</th>
            <th>관리</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="b : ${boards}">
            <td th:text="${b.boardId}" style="color:#94a3b8;font-size:12px"></td>
            <td style="font-weight:600" th:text="${b.boardName}"></td>
            <td>
              <span th:each="r : ${#strings.arraySplit(b.accessRole, ',')}"
                    class="role-chip" th:text="${r.trim()}"></span>
            </td>
            <td>
              <span class="badge"
                    th:classappend="${b.isActive} ? ' green' : ' red'"
                    th:text="${b.isActive} ? '활성' : '비활성'"></span>
            </td>
            <td th:text="${#dates.format(b.createdAt, 'yyyy-MM-dd')}" style="color:#94a3b8;font-size:12px"></td>
            <td th:text="${#dates.format(b.updatedAt, 'yyyy-MM-dd')}" style="color:#94a3b8;font-size:12px"></td>
            <td>
              <div class="action-btns">
                <button class="btn-sm edit" type="button"
                        th:unless="${#strings.equalsIgnoreCase(b.boardType,'NOTICE') or #strings.equalsIgnoreCase(b.boardType,'FREE')}"
                        th:attr="data-id=${b.boardId},data-name=${b.boardName},data-roles=${b.accessRole},data-cmt=${b.useComment},data-like=${b.useLike}"
                        onclick="openEdit(this)">
                  <i class="fa fa-pen"></i> 수정
                </button>

                <form th:action="@{/admin/boards/toggle}" method="post" style="margin:0">
                  <input type="hidden" th:name="${_csrf?.parameterName}" th:value="${_csrf?.token}" />
                  <input type="hidden" name="boardId" th:value="${b.boardId}" />
                  <input type="hidden" name="isActive" th:value="${!b.isActive}" />
                  <button class="btn-sm" type="submit"
                          th:classappend="${b.isActive} ? ' toggle-on' : ' toggle-off'"
                          th:text="${b.isActive} ? '비활성화' : '활성화'"></button>
                </form>

                <form th:unless="${#strings.equalsIgnoreCase(b.boardType,'NOTICE') or #strings.equalsIgnoreCase(b.boardType,'FREE')}"
                      th:action="@{/admin/boards/delete}" method="post" style="margin:0">
                  <input type="hidden" th:name="${_csrf?.parameterName}" th:value="${_csrf?.token}" />
                  <input type="hidden" name="boardId" th:value="${b.boardId}" />
                  <button type="submit" class="btn-sm del"
                          onclick="return confirm('정말 삭제하시겠습니까?')">
                    <i class="fa fa-trash"></i>
                  </button>
                </form>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<!-- 수정 다이얼로그 -->
<dialog id="editDialog">
  <div class="dialog-header"><i class="fa fa-pen" style="margin-right:8px;font-size:13px"></i>게시판 수정</div>
  <div class="dialog-body">
    <form id="editForm" th:action="@{/admin/boards/edit}" method="post">
      <input type="hidden" th:name="${_csrf?.parameterName}" th:value="${_csrf?.token}" />
      <input type="hidden" name="boardId" id="edit-boardId" />

      <div class="form-row">
        <label>게시판명</label>
        <input type="text" name="boardName" id="edit-boardName" required>
      </div>

      <div class="form-row">
        <label>접근 권한 (중복선택)</label>
        <div class="checkbox-group">
          <label class="checkbox-label"><input type="checkbox" name="accessRoles" value="USER" id="edit-role-user"> USER</label>
          <label class="checkbox-label"><input type="checkbox" name="accessRoles" value="ADMIN" id="edit-role-admin"> ADMIN</label>
          <label class="checkbox-label"><input type="checkbox" name="accessRoles" value="NOTICE_MANAGER" id="edit-role-nm"> NOTICE_MANAGER</label>
        </div>
      </div>

      <div class="toggle-row">
        <label><input type="checkbox" name="useComment" id="edit-useComment"> 댓글 사용</label>
      </div>
      <div class="toggle-row">
        <label><input type="checkbox" name="useLike" id="edit-useLike"> 좋아요 사용</label>
      </div>
    </form>
  </div>
  <div class="dialog-footer">
    <button class="btn-cancel" type="button" onclick="document.getElementById('editDialog').close()">취소</button>
    <button class="btn-save" type="button" onclick="document.getElementById('editForm').submit()">저장</button>
  </div>
</dialog>

<script th:src="@{/js/admin_boards.js}"></script>
