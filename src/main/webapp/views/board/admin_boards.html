<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>게시판 관리자</title>
  <style>
    :root {
      --gap: 12px; --radius: 12px;
      --primary: #3949ab; /* indigo */
      --primary-600: #303f9f;
      --surface: #ffffff;
      --ink: #1f2937;
      --muted: #6b7280;
      --border: #e5e7eb;
      --table-head: #eef2ff;
    }
    * { box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Noto Sans KR, Arial, sans-serif; margin: 0; color: var(--ink); background: #f8fafc; }
    header { padding: 20px 0; position: sticky; top: 0; z-index: 10; color: #fff; background: var(--primary); box-shadow: 0 2px 8px rgba(0,0,0,.08); }
    header h1 { margin: 0; font-size: 20px; color: #fff }
    header .muted { color: rgba(255,255,255,0.9); }
    .container { padding: 20px; max-width: 1200px; margin: 0 auto; }

    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: var(--gap); align-items: start; }
    .card { border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); box-shadow: 0 1px 2px rgba(0,0,0,.04); overflow: hidden; }
    .card h2 { margin: 0; padding: 14px 16px; border-bottom: 1px solid #f0f0f0; font-size: 16px; background: #fff; }
    .card .content { padding: 16px; }

    .muted { color: var(--muted); font-size: 12px; }
    .row { display: grid; grid-template-columns: 140px 1fr; gap: 8px; align-items: center; margin-bottom: 10px; }
    input[type=text], select, textarea { width: 100%; padding: 10px; border:1px solid #cbd5e1; border-radius: 10px; background:#fff; }
    input[type=checkbox] { transform: scale(1.15); }
    .actions { display: flex; gap: 8px; align-items: center; flex-wrap: nowrap; justify-content: flex-start; }
    .actions form { display: contents; }

    .btn { appearance: none; border: 1px solid #cbd5e1; background: #f8fafc; color: #3949ab; padding: 9px 14px; border-radius: 999px; cursor: pointer; transition: .15s; display: inline-flex; align-items: center; white-space: nowrap; }
    .btn:hover { filter: brightness(0.98); }
    .btn.primary { background: var(--primary); color: #fff; border-color: var(--primary); }
    .btn.primary:hover { background: var(--primary-600); border-color: var(--primary-600); }
    .btn.ghost { background: #3949ab; color: #f8fafc; }

    .table-wrap { overflow: auto; border: 1px solid --border; border-radius: var(--radius); }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 10px 10px; border-bottom: 1px solid #edf2f7; text-align: left; }
    thead th { white-space: nowrap; font-weight: 700; color: #111827; background: var(--table-head); position: sticky; top: 0; z-index: 5; }
    tr:hover td { background: #fafaff; }

    .td-actions {  position: relative; vertical-align: bottom; }
    .btn-row { display: flex; gap: 6px; justify-content: flex-end; margin-top: 4px; }

    .badge { display: inline-block; padding: 2px 10px; border-radius: 999px; font-size: 12px; border:1px solid #e5e7eb; }
    .badge.green { background:#ecfdf5; border-color:#a7f3d0; color:#065f46 }
    .badge.red { background:#fef2f2; border-color:#fecaca; color:#991b1b }
    
    .btn.danger { background:#ef4444; color:#fff; border-color:#ef4444; }
	.btn.danger:hover { filter:brightness(.95); }
    

    /* dialog */
    dialog { border:none; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,.25); width: 640px; max-width: calc(100% - 32px); }
    dialog::backdrop { background: rgba(0,0,0,.35); }
    dialog header { position: static; background: var(--table-head); border-bottom:1px solid #e5e7eb; border-radius: 16px 16px 0 0; padding: 10px 0; }
    dialog .content { padding: 16px; }

    @media (max-width: 960px) { .grid { grid-template-columns: 1fr; } .row { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<header>
  <div class="container">
    <h1>게시판 관리자</h1>
    <p class="muted" style="margin:6px 0 0">게시판 생성/수정, 활성화 관리</p>
    <a href="/board/notice" class="btn btn-primary" style="margin-top:8px;">
      목록으로
    </a>
  </div>
</header>

<div class="container">
  <div class="grid">
    <!-- 생성 카드 -->
    <div class="card">
      <h2>새 게시판 생성</h2>
      <div class="content">
        <form th:action="@{/admin/boards/create}" method="post">
          <input type="hidden" th:name="${_csrf?.parameterName}" th:value="${_csrf?.token}" />
          <div class="row">
            <label>게시판명 <span class="muted">*</span></label>
            <input type="text" name="boardName" required placeholder="예) 자유게시판">
          </div>

          <!-- 변경: 접근 권한 → 체크박스 중복 선택 -->
          <div class="row">
            <label>접근 권한 (중복선택)</label>
            <div class="actions" style="gap:16px">
              <label><input type="checkbox" name="accessRoles" value="USER" checked> USER</label>
              <label><input type="checkbox" name="accessRoles" value="ADMIN"> ADMIN</label>
              <label><input type="checkbox" name="accessRoles" value="NOTICE_MANAGER"> NOTICE_MANAGER</label>
            </div>
          </div>

          <div class="row">
            <label>댓글 사용</label>
            <input type="checkbox" name="useComment" checked>
          </div>
          <div class="row">
            <label>좋아요 사용</label>
            <input type="checkbox" name="useLike" checked>
          </div>
          <div class="actions" style="margin-top: 12px;">
            <button class="btn primary" type="submit">생성</button>
          </div>
        </form>
      </div>
    </div>

    <!-- 목록 카드 -->
    <div class="card">
      <h2>게시판 목록</h2>
      <div class="content">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>이름</th>
                <th>권한</th>
                <th>활성</th>
                <th>생성</th>
                <th>수정</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="b : ${boards}">
                <td th:text="${b.boardId}"></td>
                <td><span th:text="${b.boardName}"></span></td>
                <!-- 보기 좋게 CSV를 ' · '로 표시 -->
                <td><span th:text="${#strings.replace(b.accessRole, ',', ' · ')}"></span></td>
                <td>
                  <span class="badge" th:classappend="${b.isActive} ? ' green' : ' red'"
                        th:text="${b.isActive} ? '활성화' : '비활성화'"></span>
                </td>
                <td><span th:text="${#dates.format(b.createdAt, 'yyyy-MM-dd')}"></span></td>
                <td class="td-actions">
                  <span th:text="${#dates.format(b.updatedAt, 'yyyy-MM-dd')}"></span>
                  <div class="btn-row">
                    <button class="btn" type="button"
                            th:disabled="${#strings.equalsIgnoreCase(b.boardType, 'NOTICE')}"
                            th:attr="
                              data-id=${b.boardId},
                              data-name=${b.boardName},
                              data-roles=${b.accessRole},
                              data-cmt=${b.useComment},
                              data-like=${b.useLike}
                            "
                            onclick="openEdit(this)">수정</button>

                    <form th:action="@{/admin/boards/toggle}" method="post">
                      <input type="hidden" th:name="${_csrf?.parameterName}" th:value="${_csrf?.token}" />
                      <input type="hidden" name="boardId" th:value="${b.boardId}" />
                      <input type="hidden" name="isActive" th:value="${!b.isActive}" />
                      <button class="btn ghost" th:text="${b.isActive} ? '비활성화' : '활성화'"></button>
                    </form>
                    
                    <!-- 소프트삭제 (목록에서 사라짐) -->
    <form th:action="@{/admin/boards/delete}" method="post">
      <input type="hidden" th:name="${_csrf?.parameterName}" th:value="${_csrf?.token}" />
      <input type="hidden" name="boardId" th:value="${b.boardId}" />
      <button type="submit" class="btn danger"
              onclick="return confirm('해당 게시판을 정말 삭제하시겠습니까?');"
              title="휴지통으로 이동">
        <!-- trash icon -->
        <svg viewBox="0 0 24 24" class="ico-trash" style="width:16px;height:16px;vertical-align:-2px">
          <path d="M9 3h6l1 2h4v2H4V5h4l1-2Zm1 7h2v8h-2v-8Zm4 0h2v8h-2v-8ZM7 10h2v8H7v-8Z"/>
        </svg>
      </button>
    </form>
     
                  </div>
                </td>
              </tr>

            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 수정 다이얼로그 -->
<dialog id="editDialog">
  <header>
    <div class="container" style="padding: 8px 16px; color: #3949ab">
      <strong>게시판 수정</strong>
    </div>
  </header>
  <div class="content">
    <form id="editForm" th:action="@{/admin/boards/edit}" method="post">
      <input type="hidden" th:name="${_csrf?.parameterName}" th:value="${_csrf?.token}" />
      <input type="hidden" name="boardId" id="edit-boardId" />

      <div class="row">
        <label>게시판명</label>
        <input type="text" name="boardName" id="edit-boardName" required>
      </div>

      <!-- 변경: 접근 권한 → 체크박스 중복 선택 -->
      <div class="row">
        <label>접근 권한 (중복선택)</label>
        <div class="actions" style="gap:16px">
          <label><input type="checkbox" name="accessRoles" value="USER" id="edit-role-user"> USER</label>
          <label><input type="checkbox" name="accessRoles" value="ADMIN" id="edit-role-admin"> ADMIN</label>
          <label><input type="checkbox" name="accessRoles" value="NOTICE_MANAGER" id="edit-role-nm"> NOTICE_MANAGER</label>
        </div>
      </div>

      <div class="row">
        <label>댓글 사용</label>
        <input type="checkbox" name="useComment" id="edit-useComment">
      </div>
      <div class="row">
        <label>좋아요 사용</label>
        <input type="checkbox" name="useLike" id="edit-useLike">
      </div>

      <div class="actions" style="margin-top: 12px; justify-content: flex-end;">
        <button class="btn" type="button" onclick="document.getElementById('editDialog').close()">취소</button>
        <button class="btn primary" type="submit">저장</button>
      </div>
    </form>
    <p class="muted" style="margin-top:8px">NOTICE 유형은 컨트롤러에서 수정이 차단됩니다.</p>
  </div>
</dialog>

<script>
  function openEdit(btn) {
    const dlg = document.getElementById('editDialog');
    const id = btn.getAttribute('data-id');
    const name = btn.getAttribute('data-name');
    const rolesCsv = (btn.getAttribute('data-roles') || '').split(',').map(s => s.trim()).filter(Boolean);
    const cmt = btn.getAttribute('data-cmt') === 'true';
    const like = btn.getAttribute('data-like') === 'true';

    document.getElementById('edit-boardId').value = id;
    document.getElementById('edit-boardName').value = name;

    // 권한 체크박스 초기화 & 프리셋
    const roleUser = document.getElementById('edit-role-user');
    const roleAdmin = document.getElementById('edit-role-admin');
    const roleNm = document.getElementById('edit-role-nm');
    [roleUser, roleAdmin, roleNm].forEach(el => el && (el.checked = false));
    rolesCsv.forEach(r => {
      if (r === 'USER' && roleUser) roleUser.checked = true;
      if (r === 'ADMIN' && roleAdmin) roleAdmin.checked = true;
      if (r === 'NOTICE_MANAGER' && roleNm) roleNm.checked = true;
    });

    document.getElementById('edit-useComment').checked = cmt;
    document.getElementById('edit-useLike').checked = like;

    if (!dlg.open) dlg.showModal();
  }
</script>

</body>
</html>
