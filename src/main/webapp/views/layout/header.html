<!-- CJ 채용 사이트 마우스 따라오는 JS 건드리지 말기------ (동현) -->
<style>
  /* 중요: 라인 기준이 될 컨테이너를 relative */
  .topbar .menu { position: relative; }
</style>

<script>
(function () {
  const menu = document.querySelector(".topbar .menu");
  if (!menu) return;

  // underline 엘리먼트 준비
  const line = document.createElement("div");
  line.style.position = "absolute";
  line.style.bottom = "0";
  line.style.height = "3px";
  line.style.background = "linear-gradient(90deg, #330d69, #30c9cd)";
  line.style.transition = "left 0.5s ease, width 0.5s ease";
  line.style.pointerEvents = "none";
  line.style.left = "0";
  line.style.width = "0";
  line.style.willChange = "left, width";
  menu.appendChild(line);

  const anchors = Array.from(menu.querySelectorAll("a"));
  // 활성 탭 결정: .active > aria-current="page" > 첫번째
  let active =
    menu.querySelector("a.active") ||
    menu.querySelector('a[aria-current="page"]') ||
    anchors[0] ||
    null;

  // 좌표 계산 (스크롤/고정툴바 대응)
  function measure(el) {
    const r = el.getBoundingClientRect();
    const p = menu.getBoundingClientRect();
    // 메뉴 내부 스크롤이 있으면 보정
    const left = r.left - p.left + menu.scrollLeft;
    return { left, width: r.width };
  }

  // 라인 이동
  function setLineTo(el) {
    if (!el) return;
    const { left, width } = measure(el);
    // rAF로 레이아웃 스로틀
    cancelAnimationFrame(setLineTo._raf);
    setLineTo._raf = requestAnimationFrame(() => {
      line.style.left = left + "px";
      line.style.width = width + "px";
    });
  }

  // 활성 탭으로 복귀
  function setLineToActive() {
    setLineTo(active);
  }

  // 초기 위치
  if (active) setLineToActive();

  // 호버 시 라인 이동
  anchors.forEach((a) => {
    a.addEventListener("mouseenter", () => setLineTo(a));
    // 키보드 접근성: 탭 이동 시에도 이동
    a.addEventListener("focus", () => setLineTo(a));
    // 활성 탭 갱신 로직(선택): 클릭 시 active 교체
    a.addEventListener("click", () => {
      active = a;
      // 기존 active 클래스 관리(선택)
      anchors.forEach(x => x.classList && x.classList.remove("active"));
      a.classList && a.classList.add("active");
    });
  });

  // 메뉴 밖으로 마우스가 나가면 원래 활성 탭으로 복귀
  menu.addEventListener("mouseleave", setLineToActive);
  // 포커스가 메뉴 바깥으로 나가면 복귀
  menu.addEventListener("focusout", (e) => {
    // 메뉴 내부에 포커스가 남아있지 않으면 복귀
    if (!menu.contains(e.relatedTarget)) setLineToActive();
  });

  // 리사이즈/스크롤 시 재계산
  window.addEventListener("resize", setLineToActive, { passive: true });
  // 상단 고정툴바 + 내부 스크롤이 있을 수 있으니 둘 다 대응
  window.addEventListener("scroll", setLineToActive, { passive: true });
  menu.addEventListener("scroll", setLineToActive, { passive: true });

})();
</script>
