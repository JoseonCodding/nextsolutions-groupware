<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>★전자 결재 메인</title>
    <link rel="stylesheet" href="/css/approvalStyle.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- 상단 네비게이션 바 (Topbar) -->
    <header class="topbar">
        <div class="logo">NEXTSOLUTIONS</div>
        <nav class="menu">
            <a>일정관리</a>
            <a>근태관리</a>
            <a>프로젝트</a>
            <a>전자결제</a>
            <a>게시판 관리</a>
            <a>문서관리</a>
            <a>사원관리</a>
            <a class="logout">로그아웃</a>
	        <span class="help-icon" title="도움말">
	            <i class="fa-solid fa-circle-question fa-2xl"></i>
	        </span>
        </nav>
    </header>

    <main class="main-content">
        <div class="board-header">
            <h1>결재 관리</h1>
        </div>

		<!-- 필터 -->
		<!-- 
		미구현 : 	1.필터 적용 후, 필터영역 고정안됨 -> 파라미터값 받아서 항상 표시되도록 구현 예정
				2.페이지네이션 시, 파라미터의 필터값 못받고 노필터 상태로 페이지바뀜
		 -->
		<div class="filter-bar">
		    <form method="get" action="/approval/main">
		        <select name="type" class="custom-select">
		            <option value="">결재 종류</option>
		            <option value="프로젝트">프로젝트</option>
		            <option value="근태">근태</option>
		            <option value="공지사항">공지사항</option>
		        </select>
		        <select name="status" class="custom-select">
		            <option value="">결재 상태</option>
		            <option value="대기">대기</option>
		            <option value="진행중">진행중</option>
		            <option value="완료">완료</option>
		            <option value="반려">반려</option>
		        </select>
		        <button type="submit" class="btn-filter">필터 적용</button>
		    </form>
		</div>

        <!-- 게시판 -->
        <table>
            <thead>
                <tr>
                    <th style="width:200px;">기안일</th>
                    <th style="width:100px;">결재 종류</th>
                    <th >제목</th>
                    <th style="width:100px;">부서</th>
                    <th style="width:100px;">작성자</th>
                    <th style="width:100px;">결재 상태</th>
                </tr>
            </thead>
            
            <tbody>
            
            	<!-- 필터에 해당하는 게시글이 없는 경우, 안내 문구 출력 -->
            	<tr th:if="${#lists.isEmpty(approvalData)}">
            		<td colspan="6" class="list-empty">필터 조건에 해당하는 게시글이 없습니다.</td>
            	</tr>
            	
                <tr th:each="dto : ${approvalData}">
                	<td th:text="${#dates.format(dto.createdAt, 'yyyy/M/d hh:mm:ss')}"></td>
            		<td th:text="${dto.docType}"></td>
				    <td th:text="${dto.title}" class="title"></td>
				    <td th:text="${dto.department}"></td>
				    <td th:text="${dto.writer}"></td>
				    <td th:text="${dto.status}"></td>
				</tr>
            </tbody>
        </table>
        
        <!-- 페이지네이션 -->
		<nav class="pagination">
		  <!-- Previous 버튼 -->
		  <a th:if="${page > 1}" th:href="@{/approval/main(page=${page-5 > 1 ? page-5 : 1})}" class="prev">&#x2039; Previous</a>
		
		  <!-- 첫 페이지 -->
		  <span th:if="${startPage > 1 and page == 1}" class="page-number active disabled" th:text="1"></span>
		  <a th:if="${startPage > 1 and page != 1}" th:href="@{/approval/main(page=1)}" th:text="1" class="page-number"></a>
		
		  <span th:if="${startPage > 2}" class="ellipsis">...</span>
		
		  <!-- 페이지 숫자들 -->
		  <span th:each="i : ${#numbers.sequence(startPage, endPage)}">
		    <span th:if="${i == page}" class="page-number active disabled" th:text="${i}"></span>
		    <a th:if="${i != page}" th:href="@{/approval/main(page=${i})}" th:text="${i}" class="page-number"></a>
		  </span>
		
		  <span th:if="${endPage < totalPages - 1}" class="ellipsis">...</span>
		
		  <!-- 마지막 페이지 -->
		  <span th:if="${endPage < totalPages and page == totalPages}" class="page-number active disabled" th:text="${totalPages}"></span>
		  <a th:if="${endPage < totalPages and page != totalPages}" th:href="@{/approval/main(page=${totalPages})}" th:text="${totalPages}" class="page-number"></a>
		
		  <!-- Next 버튼 -->
		  <a th:if="${page < totalPages}" th:href="@{/approval/main(page=${page+5 < totalPages ? page+5 : totalPages})}">Next &#x203A;</a>
		</nav>
		
    </main>

</body>
</html>
