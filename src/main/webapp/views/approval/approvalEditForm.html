<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>★전자 결재 문서 수정</title>   
    
	<link rel="stylesheet" href="/css/approvalStyle.css">
    
</head>
<body>
	<div style="padding-left: 50px; padding-right: 50px;">
		<!-- 뷰어 상단 타이틀 -->
		<h1 th:switch="${editData != null ? editData.docType : '-'}" style="text-align:center; margin-top:45px; margin-bottom:30px;">
		    <span th:case="'연차'">연차 결재 문서</span>
		    <span th:case="'근태'">근태 결재 문서</span>
		</h1>
		
	    <form method="post" th:action="@{/approval/edit}" th:object="${editData}">
	        
	        <!-- post 후 되돌아가기 위해서 파라미터값 보내기 -->
	        <input type="hidden" th:field="*{docId}" />
	        <input type="hidden" th:name="page" th:value="${page}" />
	        <input type="hidden" th:name="type" th:value="${type}" />
	        <input type="hidden" th:name="status" th:value="${status}" />
	        <input type="hidden" name="docType" th:value="${editData.docType}" />
	                
	        <table style="width:444px;">
	            <tr>
	                <th style="width:186px;">작성자</th>
	                <td style="width:186px;">
  					    <span th:if="${editData != null}">
				        <span th:text="${editData.writer != null ? ' ' + editData.writer : ' -'}">-</span>
				        <span th:text="${editData.writerPosition != null ? editData.writerPosition : ''}"></span>
				      </span>
	                </td>
	            </tr>
	            <tr>
	                <th>부서</th>
	                <td th:text="*{deptName}"></td>
	            </tr>
	            <tr>
	                <th>작성일</th>
	                <td th:text="${editData == null ? '-' : #dates.format(editData.createdAt, 'yyyy/MM/dd')}"></td>
	            </tr>
				<tr>
					<th>문서번호</th>
					<td th:text="${editData == null ? '-' : editData.docId}"></td>
				</tr>
	        </table>
	        
		    <!-- [연차] -->
		    <table th:if="${editData.docType == '연차'}"
		           style="margin-top:30px; border-collapse:collapse; width:100%;">
		        <tr>
		            <th>연차 발생일</th>
		            <td>
		                <span th:text="${editData.leaveCreateDate != null ? #dates.format(editData.leaveCreateDate, 'yyyy-MM-dd') : '-'}"></span>
		            </td>
		        </tr>
		        <tr>
		        </tr>
		        <tr>
		            <th>연차 사용일</th>
		            <td>
						<input type="date" name="leaveUsedDate"
						       th:value="${editData.leaveUsedDate != null ? #dates.format(editData.leaveUsedDate, 'yyyy-MM-dd') : ''}" />
		            </td>
		        </tr>
		        <tr>
		            <th>연차 사유</th>
		            <td>
		                <textarea name="content" rows="5" style="width:95%;" th:text="${editData.content}"></textarea>
		            </td>
		        </tr>
		    </table>
	        
			<!-- [근태] -->
			<table th:if="${editData.docType == '근태'}"
			       style="margin-top:30px; border-collapse:collapse; width:100%;">
			    <tr>
			        <th>항목</th>
			        <td>
			            <div style="display:flex; gap:28px; align-items:center; flex-wrap:wrap; justify-content:flex-start;">
			                <label style="display:flex; align-items:center; gap:8px; font-size:16px;">
			                    <input class="action-one" type="checkbox" name="actions" value="IN"
			                      th:checked="${editData != null and (editData.timeInout == '출근' or editData.timeInout == '출퇴근')}" />
			                    정상출근
			                </label>
			                <label style="display:flex; align-items:center; gap:8px; font-size:16px;">
			                    <input class="action-one" type="checkbox" name="actions" value="OUT"
			                      th:checked="${editData != null and (editData.timeInout == '퇴근' or editData.timeInout == '출퇴근')}" />
			                    정상퇴근
			                </label>
			            </div>
			        </td>
			    </tr>
			    <tr>
			        <th>출근 시간</th>
			        <td><span th:text="${editData.checkInTime != null ? #dates.format(editData.checkInTime, 'yyyy-MM-dd HH:mm:ss') : '-'}"></span></td>
			    </tr>
			    <tr>
			        <th>퇴근 시간</th>
			        <td><span th:text="${editData.checkOutTime != null ? #dates.format(editData.checkOutTime, 'yyyy-MM-dd HH:mm:ss') : '-'}"></span></td>
			    </tr>
			    <tr>
			        <th>수정 사유</th>
			        <td>
			            <textarea name="content" rows="5" style="width:95%;" th:text="${editData.content}"></textarea>
			        </td>
			    </tr>
			</table>
	
	        
			<!-- 저장, 취소 버튼 영역 -->
			<button type="submit" class="save-btn">저장</button>
			
			<a th:href="@{'/approval/viewer'(docId=${editData.docId}, page=${page}, type=${type}, status=${status})}">
			    <button type="button" class="back-btn">취소</button>
			</a>
	    </form>
    </div>
    
    <!-- [근태] 유효성 검사 -->
	<script th:if="${editData != null and editData.docType == '근태'}" th:inline="javascript">
	    document.querySelector("form").addEventListener("submit", function(e) {
	        const checkboxes = document.querySelectorAll(".action-one");
	        const checked = Array.from(checkboxes).some(cb => cb.checked);
	        if (!checked) {
	            e.preventDefault();
	            alert("수정 항목을 최소 1개 이상 선택하세요.");
	        }
	    });
	</script>
	
	<script>
	  document.addEventListener('DOMContentLoaded', function() {
	    const leaveUsedDateInput = document.querySelector("input[name='leaveUsedDate']");
	    if (leaveUsedDateInput) {
	      const today = new Date();
	      const tomorrow = new Date(today);
	      tomorrow.setDate(tomorrow.getDate() + 1);
	      const yyyy = tomorrow.getFullYear();
	      const mm = String(tomorrow.getMonth() + 1).padStart(2, '0');
	      const dd = String(tomorrow.getDate()).padStart(2, '0');
	      leaveUsedDateInput.min = `${yyyy}-${mm}-${dd}`;
	    }
	  });
	</script>
	
	<!-- [연차] 유효성 검사 -->
	<script th:inline="javascript">
	  var docType = /*[[${editData.docType}]]*/ '';
	
	  document.querySelector("form").addEventListener("submit", function(e) {
	    if (docType === "연차") {
	      const leaveUsedDateInput = this.querySelector("input[name='leaveUsedDate']");
	      if (leaveUsedDateInput) {
	        const selectedDate = new Date(leaveUsedDateInput.value);
	        const today = new Date();
	        today.setHours(0, 0, 0, 0);
	        const tomorrow = new Date(today);
	        tomorrow.setDate(tomorrow.getDate() + 1);
	
	        if (selectedDate < tomorrow) {
	          e.preventDefault();
	          alert("연차는 익일부터 사용 가능합니다.");
	          leaveUsedDateInput.focus();
	          return;
	        }
	      }
	
	      const reason = this.querySelector("textarea[name='content']");
	      if (!reason || reason.value.trim() === "") {
	        e.preventDefault();
	        alert("사유를 반드시 입력해야 합니다.");
	        if (reason) reason.focus();
	        return;
	      }
	    }
	  });
	</script>

	
	<script>
	  document.getElementById("btnSave").addEventListener("click", function(e) {
	    if (!confirm("저장 시 취소할 수 없습니다.\n진행하시겠습니까?")) {
	      e.preventDefault();
	    }
	  });
	
	  document.getElementById("btnCancel").addEventListener("click", function(e) {
	    if (!confirm("수정을 취소합니다.\n진행하시겠습니까?")) {
	      e.preventDefault();
	    }
	  });
	</script>
</body>
</html>
