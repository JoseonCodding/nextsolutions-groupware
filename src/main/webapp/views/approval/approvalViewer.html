<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org" lang="ko">

<head>
	<meta charset="UTF-8">
	<title>★전자 결재 뷰어</title>

	<link href="https://cdn.jsdelivr.net/npm/summernote@0.8.20/dist/summernote-lite.min.css" rel="stylesheet">
	
</head>
<body>

	<div style="display: flex;">
	
		<!-- 작성자, 부서, 기안일, 문서번호 영역 -->
		<table border="">
			<tr>
				<td>작성자</td>
				<td th:text="${approvalData == null ? '-' : approvalData.writer}"></td>
			</tr>
			<tr>
				<td>부서</td>
				<td th:text="${approvalData == null ? '-' : approvalData.deptName}"></td>
			</tr>
			<tr>
				<td>기안일</td>
				<td th:text="${approvalData == null ? '-' : #dates.format(approvalData.createdAt, 'yyyy/MM/dd HH:mm:ss')}"></td>
			</tr>
			<tr>
				<td>문서번호</td>
				<td th:text="${approvalData == null ? '-' : approvalData.docId}"></td>
			</tr>
		</table>
	
		<!-- 결재선 영역 -->
		<table border="" style="margin-left: 50px">
		  <tr>
		    <td><b>상신자</b></td>
		    <td><b>중간결재자</b></td>
		    <td><b>최종결재자</b></td>
		  </tr>
		  <tr>
		    <td>
		    	<span th:text="${approvalData == null ? '-' : approvalData.writer}"></span>
		    </td>
			<td>
			  <span th:text="${approvalData == null ? '-' : approvalData.approverName}"></span>
			</td>
		    <td>
			  <span th:text="${approvalData == null ? '-' : approvalData.managerName}"></span>
			</td>
		  </tr>
		  <tr>
		  	<td th:text="${approvalData == null ? '-' : #dates.format(approvalData.createdAt, 'yyyy/MM/dd')}"></td>
            <td>
                <span th:if="${approvalData != null and approvalData.firstSign != null}">
                    <span th:style="${approvalData.status == '반려' ? 'color:red;' : 'color:black;'}"
                          th:text="${#dates.format(approvalData.firstSign, 'yyyy/MM/dd') + (approvalData.status == '반려' ? ' (반려)' : '')}">
                    </span>
                </span>
                <span th:if="${approvalData == null or approvalData.firstSign == null}">-</span>
            </td>
            <td>
                <span th:if="${approvalData != null and approvalData.secondSign != null}">
                    <span th:style="${approvalData.status == '반려' ? 'color:red;' : 'color:black;'}"
                          th:text="${#dates.format(approvalData.secondSign, 'yyyy/MM/dd') + (approvalData.status == '반려' ? ' (반려)' : '')}">
                    </span>
                </span>
                <span th:if="${approvalData == null or approvalData.secondSign == null}">-</span>
            </td>
		  </tr>
		</table>

	</div>
	
	<!-- 제목 영역 -->
	<div style="margin-top: 20px; ">
		<table border="">
			<tr>
				<td>결재 종류</td>
				<td th:text="${approvalData == null ? '-' : approvalData.docType}"></td>
				<td>결재 상태</td>
				<td th:text="${approvalData == null ? '-' : approvalData.status}"></td>
			</tr>
			<tr>
				<td>제목</td>
				<td colspan="3" th:text="${approvalData == null ? '존재하지 않는 문서입니다.' : approvalData.title}"></td>
			</tr>
		</table>
	</div>
	
	<!-- (프로젝트) 제목 -->
	<table th:if="${approvalData != null and approvalData.docType == '프로젝트'}" style="margin-top: 20px;" border="">
	    <tr>
	        <td>프로젝트 시작일</td>
	        <td>
	            <span th:text="${approvalData.pjtBgngDt != null ? #dates.format(approvalData.pjtBgngDt, 'yyyy-MM-dd') : '-'}"></span>
	        </td>
	        <td>프로젝트 종료일</td>
	        <td>
	            <span th:text="${approvalData.pjtEndDt != null ? #dates.format(approvalData.pjtEndDt, 'yyyy-MM-dd') : '-'}"></span>
	        </td>
	    </tr>
	</table>

	<!-- 내용 영역 -->
	<!-- if 연차 -->
	<table th:if="${approvalData != null and approvalData.docType == '연차'}" style="margin-top: 20px;" border="">
	    <tr>
	        <th>연차 발생일</th>
	        <td><span th:text="${approvalData.leaveCreateDate != null ? #dates.format(approvalData.leaveCreateDate, 'yyyy-MM-dd') : '-'}"></span></td>
	    </tr>
	    <tr><th>휴가 사용일</th>
	        <td><span th:text="${approvalData.leaveUsedDate != null ? #dates.format(approvalData.leaveUsedDate, 'yyyy-MM-dd') : '-'}"></span></td>
	    </tr>
	    <tr>
	        <th>사용 이유</th>
	        <td><div th:text="${approvalData.content == null or approvalData.content.isEmpty() ? '내용이 없습니다' : approvalData.content}"></div></td>
	    </tr>
	</table>
	
	<!-- if 근태 -->
	<table th:if="${approvalData != null and approvalData.docType == '근태'}" style="margin-top: 20px;" border="">
	    <tr>
	        <th>출근 시간</th>
	        <td><span th:text="${approvalData.checkInTime != null ? #dates.format(approvalData.checkInTime, 'yyyy-MM-dd HH:mm:ss') : '-'}"></span></td>
	    </tr>
	    <tr>
	        <th>퇴근 시간</th>
	        <td><span th:text="${approvalData.checkOutTime != null ? #dates.format(approvalData.checkOutTime, 'yyyy-MM-dd HH:mm:ss') : '-'}"></span></td>
	    </tr>
	    <tr>
	    	<th>수정 항목</th>
	    	<td><span th:text="${approvalData.modifiedBy != null ? approvalData.timeInout : '-'}"></span></td>
	    </tr>
   	    <tr>
	        <th>수정 사유</th>
	        <td><div th:utext="${approvalData.modificationReason == null or approvalData.modificationReason.isEmpty() ? '내용이 없습니다' : approvalData.modificationReason}"></div></td>
	    </tr>
	    <tr>
	        <th>승인일자</th>
	        <td><span th:text="${approvalData.modifiedAt != null ? #dates.format(approvalData.modifiedAt, 'yyyy-MM-dd HH:mm:ss') : '-'}"></span></td>
	    </tr>

	</table>

	
	<!-- if 프로젝트, 공지사항 -->
	<div th:unless="${approvalData != null and (approvalData.docType == '연차' or approvalData.docType == '근태')}"
	     style="border:1px solid; margin-top: 20px; background-color: aqua; padding:10px;"
	     th:utext="${approvalData == null ? '-' : (approvalData.content == null or approvalData.content.isEmpty() ? '내용이 없습니다' : approvalData.content)}">
	</div>
	
	<!-- 첨부파일 다운로드 영역 -->
	<div th:if="${approvalData != null and approvalData.docType == '프로젝트'}" style="background-color: white; margin-top: 20px;">
	  <b>첨부파일</b> :
	  <span th:if="${approvalData != null and not #strings.isEmpty(approvalData.attachFileUuid)}">
	    <a th:href="@{'/approval/downloadFile?fileName=' + ${approvalData.attachFileUuid} + '&orgName=' + ${approvalData.attachFileOrgName}}"
	       th:utext="${approvalData.attachFileOrgName}">다운로드</a>
	  </span>
	  <span th:unless="${approvalData != null and not #strings.isEmpty(approvalData.attachFileUuid)}">
	    첨부파일이 없습니다.
	  </span>
	</div>
	

	<!-- 목록으로(approvalData가 있을때) or 처음으로(approvalData가 없을때) -->
	<a th:if="${approvalData != null}"
	   th:href="@{'/approval/main'(docId=${approvalData.docId}, page=${page}, type=${type}, status=${status})}">
	   목록으로
	</a>
	
	<a th:unless="${approvalData != null}"
	   th:href="@{/approval/main}">
	   처음으로
	</a>
	
	<!-- 수정, 삭제 버튼 영역 -->
	<div th:if="${approvalData != null and approvalData.status == '대기' and (approvalData.docType == '공지사항') 
		and approvalData.writerId == loginUser.employeeId}">
	    <a th:href="@{/approval/edit(docId=${approvalData.docId}, page=${page}, type=${type}, status=${status})}">수정</a>
	    <a th:href="@{/approval/delete(docId=${approvalData.docId}, page=${page}, type=${type}, status=${status})}"
	       onclick="return confirm('삭제하면 복원할 수 없습니다.\n정말로 삭제하시겠습니까?');">삭제</a>
	</div>

	<!-- 승인 & 반려 버튼 영역 -->
	<div th:if="${approvalData != null and (
	              (approvalData.status == '대기' and 
	               ((approvalData.docType == '공지사항' and loginUser.role == '게시판') or
	                (approvalData.docType == '연차' and loginUser.role == '근태') or
	                (approvalData.docType == '프로젝트' and loginUser.role == '프로젝트') or
	                (approvalData.docType == '근태' and loginUser.role == '근태')
	               )
	              ) 
	              or 
	              (approvalData.status == '진행중' and loginUser.role == '대표')
	            )}">
	    <!-- 승인 버튼 -->
	    <form th:action="@{/approval/approve}" method="post" style="display: inline;">
	        <input type="hidden" name="docId" th:value="${approvalData.docId}" />
	        <input type="hidden" name="docType" th:value="${approvalData.docType}" />
	        <button type="submit" 
	                onclick="return confirm('한 번 승인하면 취소할 수 없습니다.\n정말로 승인하시겠습니까?');">승인</button>
	    </form>
	    <!-- 반려 버튼 -->
	    <form th:action="@{/approval/reject}" method="post" style="display: inline;">
	        <input type="hidden" name="docId" th:value="${approvalData.docId}" />
	        <input type="hidden" name="docType" th:value="${approvalData.docType}" />
	        <button type="submit" 
	                onclick="return confirm('한 번 반려하면 취소할 수 없습니다.\n정말로 반려하시겠습니까?');">반려</button>
	    </form>
	</div>

	

</body>
</html>
