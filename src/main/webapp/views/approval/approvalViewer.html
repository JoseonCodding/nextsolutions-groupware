<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org" lang="ko">
<head>
<meta charset="UTF-8">
<title>★전자 결재 뷰어</title>
    
</head>
<body>

	<div style="display: flex;">
	
		<!-- 작성자, 부서, 기안일, 문서번호 영역 -->
		<table border="">
			<tr>
				<td>작성자</td>
				<td th:text="${viewData == null ? '-' : viewData.writer}"></td>
			</tr>
			<tr>
				<td>부서</td>
				<td th:text="${viewData == null ? '-' : viewData.department}"></td>
			</tr>
			<tr>
				<td>기안일</td>
				<td th:text="${viewData == null ? '-' : #dates.format(viewData.createdAt, 'yyyy/M/d hh:mm:ss')}"></td>
			</tr>
			<tr>
				<td>문서번호</td>
				<td th:text="${viewData == null ? '-' : viewData.docId}"></td>
			</tr>
		</table>
	
		<!-- 결재선 영역 -->
		<table border="" style="margin-left: 50px">
		  <tr>
		    <td><b>상신자</b></td>
		    <td><b>결재자</b></td>
		    <td><b>관리자</b></td>
		  </tr>
		  <tr>
		    <td>
		    	<span th:text="${viewData == null ? '-' : viewData.writer}"></span>
		    </td>
			<td>
			  <span th:text="${viewData == null ? '-' : (viewData.docType == '근태' ? '김근태대장' : (viewData.docType == '공지사항' ? '박공지사항' : (viewData.docType == '프로젝트' ? '정프로젝트' : '-')))}"></span>
			</td>
		    <td>
			  <span th:text="${viewData == null ? '-' : '김대표'}"></span>
			</td>
		  </tr>
		</table>

	</div>
	
	<!-- 제목 영역 -->
	<div style="margin-top: 20px;">
		<table border="">
			<tr>
				<td>결재 종류</td>
				<td th:text="${viewData == null ? '-' : viewData.docType}"></td>
			</tr>
			<tr>
				<td>제목</td>
				<td th:text="${viewData == null ? '-' : viewData.title}"></td>
			</tr>
		</table>
	</div>

	<!-- 뷰어 영역 : innerHTML로 렌더링 예정 -->
	<div style="border:1px solid; margin-top: 20px; background-color: aqua;" th:text="${viewData == null ? '-' : viewData.content}">
	</div>
	
	<!-- 수정, 삭제 버튼 영역 -->
	<div th:if="${viewData == null ? '-' : viewData.status =='대기'}">
		<th:block th:if="${viewData != null}">
			<a th:href="@{/approval/edit(docId=${viewData.docId} , page=${page}, type=${type}, status=${status})}">
				<button>수정</button>
			</a>
		</th:block>
		
		<th:block th:if="${viewData != null}">
			<a th:href="@{/approval/delete(docId=${viewData.docId}, page=${page}, type=${type}, status=${status})}"
				onclick="return confirm('삭제하면 복원할 수 없습니다.\n정말로 삭제하시겠습니까?');">
				<button>삭제</button>
			</a>
		</th:block>
	</div>
	
	<!-- 승인, 반려 버튼 영역 -->
	<div th:if="${viewData == null ? '-' : viewData.status =='대기'}">
		<th:block th:if="${viewData != null}">
			<a>
				<button>승인</button>
			</a>
		</th:block>
		
		<th:block th:if="${viewData != null}">
			<a onclick="return confirm('한 번 반려하면 취소할 수 없습니다.\n정말로 반려하시겠습니까?');">
				<button>반려</button>
			</a>
		</th:block>
	</div>

</body>
</html>
