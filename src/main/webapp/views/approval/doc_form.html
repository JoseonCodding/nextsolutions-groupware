<title>결재 신청</title>
<link rel="stylesheet" href="/css/board.css">

<div class="board-container" style="max-width:760px;">
    <div class="board-controls">
        <h2 class="board-title">자유양식 결재 신청</h2>
    </div>

    <form method="post" action="/approval/doc/submit" onsubmit="return validateDoc()">
        <table class="board-table">
            <tr>
                <th style="width:120px;">템플릿 선택</th>
                <td>
                    <select id="templateSelect" onchange="loadTemplate(this.value)"
                            style="padding:8px; width:100%;">
                        <option value="">-- 템플릿 없이 작성 --</option>
                        <option th:each="t : ${templates}"
                                th:value="${t.templateId}"
                                th:text="${t.title}"
                                th:selected="${selected != null and t.templateId == selected.templateId}">
                        </option>
                    </select>
                    <input type="hidden" name="templateId" id="templateIdInput"
                           th:value="${selected != null ? selected.templateId : ''}">
                </td>
            </tr>
            <tr>
                <th>제목</th>
                <td>
                    <input type="text" name="title" id="docTitle"
                           th:value="${selected != null ? selected.title : ''}"
                           placeholder="결재 문서 제목" style="width:100%; padding:8px;"
                           required maxlength="200">
                </td>
            </tr>
            <tr>
                <th>내용</th>
                <td>
                    <textarea name="content" id="docContent" rows="14"
                              style="width:100%; padding:8px; font-size:14px; resize:vertical;"
                              placeholder="내용을 입력하세요"
                              th:text="${selected != null ? selected.content : ''}"></textarea>
                </td>
            </tr>
            <tr>
                <th>결재자</th>
                <td>
                    <div style="display:flex; gap:8px; align-items:center;">
                        <select name="approverId" id="approverSelect"
                                style="padding:8px; flex:1;" required>
                            <option value="">-- 결재자 선택 --</option>
                            <option th:each="emp : ${approvers}"
                                    th:value="${emp['employeeId']}"
                                    th:text="${emp['emp_nm'] + ' (' + (emp['position'] ?: '') + ')'}">
                            </option>
                        </select>
                        <button type="button" id="aiRecommendBtn" onclick="recommendApprover()"
                                style="white-space:nowrap; padding:8px 14px; background:var(--primary);
                                       color:#fff; border:none; border-radius:6px; font-size:13px;
                                       font-weight:600; cursor:pointer; display:flex; align-items:center; gap:6px;">
                            <i class="fa fa-wand-magic-sparkles"></i> AI 추천
                        </button>
                    </div>
                    <input type="hidden" name="approverName" id="approverName">
                    <!-- AI 추천 결과 -->
                    <div id="aiRecommendResult" style="display:none; margin-top:10px; padding:12px 14px;
                         background:var(--primary-light); border-radius:8px; border-left:3px solid var(--primary);
                         font-size:13px; color:var(--text-1);">
                        <div style="font-weight:700; color:var(--primary); margin-bottom:4px;">
                            <i class="fa fa-robot"></i> AI 추천 결재자
                        </div>
                        <div id="aiRecommendName" style="font-size:15px; font-weight:700; margin-bottom:4px;"></div>
                        <div id="aiRecommendReason" style="color:var(--text-2); line-height:1.5;"></div>
                    </div>
                </td>
            </tr>
        </table>

        <div style="display:flex; justify-content:center; gap:10px; margin-top:20px;">
            <button type="submit" class="save-btn">결재 신청</button>
            <a href="/approval/doc/list" class="back-btn">취소</a>
        </div>
    </form>
</div>

<script>
function loadTemplate(id) {
    document.getElementById('templateIdInput').value = id;
    if (!id) return;
    fetch('/approval/template/content?templateId=' + id)
        .then(r => r.json())
        .then(data => {
            if (data && data.content) {
                document.getElementById('docContent').value = data.content;
            }
        })
        .catch(() => {});
}

document.getElementById('approverSelect').addEventListener('change', function() {
    const opt = this.options[this.selectedIndex];
    document.getElementById('approverName').value = opt.text.split(' (')[0];
});

function validateDoc() {
    if (!document.getElementById('approverSelect').value) {
        alert('결재자를 선택하세요.');
        return false;
    }
    return true;
}

async function recommendApprover() {
    const title   = document.getElementById('docTitle').value.trim();
    const content = document.getElementById('docContent').value.trim();

    if (!title && !content) {
        alert('제목 또는 내용을 먼저 입력하세요.');
        return;
    }

    const btn = document.getElementById('aiRecommendBtn');
    btn.disabled = true;
    btn.innerHTML = '<i class="fa fa-spinner fa-spin"></i> 분석 중...';

    try {
        const res = await fetch('/ai/approval/recommend', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ title, content })
        });
        const data = await res.json();

        if (data.error) {
            alert('AI 추천 실패: ' + data.error);
            return;
        }

        let rec;
        try {
            rec = typeof data.result === 'string' ? JSON.parse(data.result) : data.result;
        } catch {
            alert('AI 응답 파싱 실패');
            return;
        }

        // 드롭다운에서 해당 사번 옵션 자동 선택
        const sel = document.getElementById('approverSelect');
        let matched = false;
        for (const opt of sel.options) {
            if (opt.value === rec.employeeId) {
                sel.value = rec.employeeId;
                document.getElementById('approverName').value = rec.name;
                matched = true;
                break;
            }
        }

        // 결과 박스 표시
        document.getElementById('aiRecommendName').textContent =
            rec.name + (matched ? ' ✓ 자동 선택됨' : ' (목록에서 직접 선택하세요)');
        document.getElementById('aiRecommendReason').textContent = rec.reason;
        document.getElementById('aiRecommendResult').style.display = 'block';

    } catch (e) {
        alert('요청 실패: ' + e.message);
    } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="fa fa-wand-magic-sparkles"></i> AI 추천';
    }
}
</script>
