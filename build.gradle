checkstyle {
	toolVersion = '10.12.2'
	configFile = rootProject.file('config/checkstyle/checkstyle.xml')
	 ignoreFailures = true // 코드스타일 맞지 않아도 진행, false : 코드스타일준수
}

tasks.withType(Checkstyle) {
    reports {
        xml.required = false
        html.required = true
    }
}
