plugins {
	id 'java'
	id 'war'                 // 안정적 jsp배포를위함 'war' 플러그인 추가
	id 'org.springframework.boot' version '3.5.0'
	id 'io.spring.dependency-management' version '1.1.7'
	id 'checkstyle' // ✅ Checkstyle 플러그인 추가
}

group = 'com.kdt'
version = '0.0.1-SNAPSHOT'

java {
	toolchain {
		languageVersion = JavaLanguageVersion.of(17)
	}
}

repositories {
    mavenCentral()
    
    // 인증서 에러로 인해 lib다운 에러발생시 추가할것 -- 배포환경에서 사용금지
    gradlePluginPortal() 
    maven {
        url = uri("http://some-insecure-repo-url")
        allowInsecureProtocol = true
    }
}
dependencies {

	// https://mvnrepository.com/ 참조

	//=============== JSP 사용시 주석해제 (선택1) =====================================//

    //implementation 'org.apache.tomcat.embed:tomcat-embed-jasper' // JSP 지원
    //implementation 'jakarta.servlet.jsp.jstl:jakarta.servlet.jsp.jstl-api:2.0.0'
    //runtimeOnly 'org.glassfish.web:jakarta.servlet.jsp.jstl:2.0.0'
    //compileOnly 'jakarta.servlet:jakarta.servlet-api:6.0.0'
    //compileOnly 'javax.servlet:javax.servlet-api:4.0.1'

    //=============== JSP 사용시 주석해제 (선택1) =====================================//
  
    //=============== html 사용시 주석해제 =====================================//
     implementation 'org.springframework.boot:spring-boot-starter-thymeleaf' 
	//=============== html 사용시 주석해제 =====================================//

	// Spring MVC 웹 개발을 위한 기본 스타터 (Spring MVC + Tomcat 내장)
	implementation 'org.springframework.boot:spring-boot-starter-web'
	
	// SOAP 웹 서비스 개발을 위한 스타터 (Simple Object Access Protocol의 약자로, 웹 서비스 통신 방식 중 하나)
	implementation 'org.springframework.boot:spring-boot-starter-web-services'
	
	// MySQL 데이터베이스와 연결하기 위한 JDBC 드라이버 (실행 시점에만 필요)
	runtimeOnly 'com.mysql:mysql-connector-j'
	
	// 테스트용 Spring Boot 스타터 (JUnit, Mockito, Spring Test 등 포함)
	testImplementation 'org.springframework.boot:spring-boot-starter-test'
	
	// 테스트 실행 시 JUnit 플랫폼 실행기
	testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
	
	// MyBatis와 Spring Boot 통합 스타터 (MyBatis ORM 지원)
	implementation 'org.mybatis.spring.boot:mybatis-spring-boot-starter:3.0.3'
	
	// MySQL Connector/J (MySQL DB용 JDBC 드라이버)
	// runtimeOnly와 중복되므로 보통 하나만 사용
	implementation 'mysql:mysql-connector-java:8.0.33'
	
	// 롬복(Lombok) 라이브러리 - 코드 자동 생성(게터/세터 등)
	implementation 'org.projectlombok:lombok'
	
	// 롬복 어노테이션 프로세서 (컴파일 시 코드 생성용)
	annotationProcessor 'org.projectlombok:lombok'
	
	// P6Spy - SQL 로그를 보기 쉽게 콘솔 출력해주는 라이브러리, 개발 편의성 향상용
	implementation 'com.github.gavlyukovskiy:p6spy-spring-boot-starter:1.9.1'
	
	// 페이징헬퍼
	implementation 'com.github.pagehelper:pagehelper-spring-boot-starter:1.4.7'
	
	// BCrypt + CSRF 보호
	implementation 'org.springframework.boot:spring-boot-starter-security'
	
	developmentOnly 'org.springframework.boot:spring-boot-devtools'

	// AOP - CompanyContextAspect (컨트롤러 DTO에 companyId 자동 주입)
	implementation 'org.springframework.boot:spring-boot-starter-aop'
	

	    // === PDF 생성을 위한 OpenPDF 라이브러리 ===
    // LibrePDF(OpenPDF)는 iText 2.x 기반의 오픈소스 PDF 라이브러리입니다.
    // com.lowagie.text.Document, PdfWriter 등 클래스를 제공하며
    // 한글 폰트 임베딩도 지원합니다.
    implementation 'com.github.librepdf:openpdf:1.3.32' // 또는 1.3.39

	


	// XSS(크로스 사이트 스크립팅) 공격 방지를 위해 추가
	implementation 'org.jsoup:jsoup:1.17.2'

}

tasks.named('test') {
	useJUnitPlatform()
}

